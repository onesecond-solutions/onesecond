<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>★SMS 로그인 교환 검증 (onesecond-test 전용)</title>
<!-- ★테스트 전용. 운영 무관. 본인인증 1회 → 서버내부 매핑+세션 교환. 토큰 원문 표시·저장 0.
     anon key·EXPECTED_USER_ID는 검수팀이 로컬 파일(login_test.local.js, gitignore)로 주입 — 커밋·대표 입력 0. -->
<script src="https://cdn.portone.io/v2/browser-sdk.js"></script>
<script src="login_test.local.js"></script>  <!-- 검수팀 로컬 생성: window.TEST_ANON / window.TEST_EXPECTED -->
<style>
  body{font-family:system-ui,sans-serif;max-width:680px;margin:24px auto;padding:0 16px;line-height:1.6;color:#222}
  .warn{background:#FEF3C7;border:1px solid #F59E0B;border-radius:8px;padding:10px 14px;font-size:.9rem;margin-bottom:16px}
  h1{font-size:1.2rem}
  button{background:#534AB7;color:#fff;border:0;border-radius:8px;padding:12px 22px;font-size:1rem;cursor:pointer}
  pre{background:#0F172A;color:#CBD5E1;border-radius:8px;padding:12px;font-size:.8rem;white-space:pre-wrap;word-break:break-all}
</style>
</head>
<body>
<div class="warn">★ <b>테스트 전용</b> — 아래 버튼을 <b>한 번</b>만 누르세요. 본인 명의 휴대폰으로 KCP 테스트 인증 1회.</div>
<h1>SMS 로그인 검증</h1>
<p><button onclick="runLogin()">휴대폰 본인인증으로 로그인</button></p>
<pre id="out">버튼을 누르면 결과가 표시됩니다.</pre>

<script>
  const STORE_ID = "store-41e93948-a67a-4ae0-abc5-1c95266ee12b";
  const IDENTITY_CHANNEL_KEY = "channel-key-c53d6ac7-21e9-4db6-b523-2dcfecc06387";
  const SUPABASE_URL = "https://gelbgtfiuhqdpnlwxqrs.supabase.co";
  // ★검수 전용 함수 호출. login_test.local.js의 window.TEST_LOGIN_FUNCTION 로 지정 가능(기본=testmap).
  //   운영 complete-phone-login 을 부르면 자동 매핑이 없어 login_failed → 반드시 testmap.
  const LOGIN_FN = window.TEST_LOGIN_FUNCTION || (SUPABASE_URL + "/functions/v1/complete-phone-login-testmap");
  function log(o){ document.getElementById("out").textContent = (typeof o==="string"?o:JSON.stringify(o,null,2)); }

async function runLogin(){
  const anon = window.TEST_ANON, expected = window.TEST_EXPECTED;
  if(!anon || !expected){ log("검수팀: login_test.local.js (window.TEST_ANON / window.TEST_EXPECTED) 를 먼저 생성하세요."); return; }
  log("본인인증창 호출 중...");
  const identityVerificationId = "ivlogin-" + crypto.randomUUID();
  const state = crypto.randomUUID();
  try{
    const res = await PortOne.requestIdentityVerification({ storeId: STORE_ID, channelKey: IDENTITY_CHANNEL_KEY, identityVerificationId });
    if(res && res.code !== undefined){ log({step:"인증 취소/실패", code:res.code, message:res.message}); return; }

    // 1) 서버: 본인인증 확정 → 서버내부 매핑 → 일회용 token_hash(세션 아님). phone·token 로그 0.
    const r1 = await fetch(LOGIN_FN, {
      method:"POST", headers:{ "Content-Type":"application/json", "apikey":anon, "Authorization":"Bearer "+anon },
      body: JSON.stringify({ verificationId: res.identityVerificationId, state }),
    });
    const d1 = await r1.json();
    if(!r1.ok || !d1.token_hash){ log({step:"login(testmap)", http:r1.status, error:d1.error}); return; }

    // 2) 클라: 공식 verifyOtp 교환 → 실제 세션
    const r2 = await fetch(SUPABASE_URL + "/auth/v1/verify", {
      method:"POST", headers:{ "Content-Type":"application/json", "apikey":anon },
      body: JSON.stringify({ type:"email", token_hash: d1.token_hash }),
    });
    const d2 = await r2.json();
    if(!r2.ok || !d2.access_token){ log({step:"verifyOtp 교환", http:r2.status, error:(d2.error_description||d2.msg||d2.error)}); return; }

    // 3) 대표님 확인 3가지만(토큰 원문 표시·저장 0)
    log({
      "session_created": !!d2.access_token,
      "기존 test-login user_id와 동일": !!(d2.user && d2.user.id === expected),
      "신규 auth 사용자 증가": "0 (작업자 DB 교차확인)",
    });
  }catch(e){ log({step:"예외", message:String(e && e.message || e)}); }
}
</script>
</body>
</html>
