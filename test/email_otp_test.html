<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>★이메일 OTP 회귀 검증 (onesecond-test 전용)</title>
<!-- ★테스트 전용. 기존 이메일 OTP 로그인 경로(auth/v1/otp→verify)가 SMS 추가 후에도 작동하는지 표본 회귀. -->
<script src="login_test.local.js"></script>  <!-- window.TEST_ANON -->
<style>
  body{font-family:system-ui,sans-serif;max-width:680px;margin:24px auto;padding:0 16px;line-height:1.6;color:#222}
  .warn{background:#FEF3C7;border:1px solid #F59E0B;border-radius:8px;padding:10px 14px;font-size:.9rem;margin-bottom:16px}
  button{background:#534AB7;color:#fff;border:0;border-radius:8px;padding:10px 18px;font-size:.95rem;cursor:pointer}
  pre{background:#0F172A;color:#CBD5E1;border-radius:8px;padding:12px;font-size:.8rem;white-space:pre-wrap;word-break:break-all}
  label{font-size:.85rem;color:#555;display:block;margin-top:10px} input{padding:6px 8px;border:1px solid #ccc;border-radius:6px;width:100%;box-sizing:border-box}
</style>
</head>
<body>
<div class="warn">★ <b>테스트 전용</b> — 기존 이메일 OTP 로그인 회귀. 메일 수신 가능한 이메일을 입력하세요(OTP 코드가 메일로 발송됨).</div>
<h1>이메일 OTP 회귀 검증</h1>

<label>이메일 (메일 수신 가능)</label>
<input id="email" autocomplete="off" placeholder="you@example.com">
<p><button onclick="reqOtp()">OTP 메일 요청</button></p>

<label>메일로 받은 6자리 OTP</label>
<input id="otp" autocomplete="off" inputmode="numeric">
<p><button onclick="verifyOtp()">OTP 확인 → 로그인</button></p>
<pre id="out">① OTP 요청 → 메일 코드 → ② 확인</pre>

<script>
  const SUPABASE_URL = "https://gelbgtfiuhqdpnlwxqrs.supabase.co";
  function log(o){ document.getElementById("out").textContent = (typeof o==="string"?o:JSON.stringify(o,null,2)); }
  function anon(){ return window.TEST_ANON; }

async function reqOtp(){
  const email = (document.getElementById("email").value||"").trim();
  if(!anon()){ log("login_test.local.js(window.TEST_ANON) 필요"); return; }
  if(email.indexOf("@")<0){ log("이메일을 입력하세요."); return; }
  log("OTP 메일 요청 중...");
  try{
    const r = await fetch(SUPABASE_URL + "/auth/v1/otp", {
      method:"POST", headers:{ "Content-Type":"application/json", "apikey":anon() },
      body: JSON.stringify({ email, create_user: true }) });  // 기존 doLogin과 동일 엔드포인트
    const d = await r.json();
    log({ "OTP 요청 http": r.status, ok: (r.status>=200&&r.status<300), error: d.error_description||d.msg||d.error, 안내:"메일의 6자리 코드를 아래에 입력 후 확인" });
  }catch(e){ log({step:"예외", message:String(e&&e.message||e)}); }
}

async function verifyOtp(){
  const email = (document.getElementById("email").value||"").trim();
  const token = (document.getElementById("otp").value||"").trim();
  if(!token){ log("OTP 코드를 입력하세요."); return; }
  log("OTP 확인 중...");
  try{
    const r = await fetch(SUPABASE_URL + "/auth/v1/verify", {
      method:"POST", headers:{ "Content-Type":"application/json", "apikey":anon() },
      body: JSON.stringify({ email, token, type:"email" }) });  // 기존 verifyOtp와 동일
    const d = await r.json();
    log({ "session_created": !!d.access_token, "user_id": d.user && d.user.id,
      "http": r.status, error: d.error_description||d.msg||d.error,
      note:"이메일 OTP 경로가 SMS 추가 후에도 정상=회귀 0. 토큰 원문 미표시." });
  }catch(e){ log({step:"예외", message:String(e&&e.message||e)}); }
}
</script>
</body>
</html>
