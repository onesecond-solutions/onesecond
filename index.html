<!-- ============================================================================
  2026-06-12 구조 통합 (중복 가입 폼 제거):
    index.html = 순수 진입 redirect 전용. 가입/로그인 모달 마크업 보유 X.
    · 가입/로그인 폼의 단일 소스 = pages/landing.html (auth-modal.js + #ga-fields)
    · 옛 index.html(가입 폼 포함) = archive/2026-06-12_index_full_pre_consolidation.html
  진입 분기:
    · 로그인 토큰 보유 → app.html
    · 그 외(?auth=signup/login 포함) → pages/landing.html?{원래 쿼리 그대로}
      (auth-modal.js가 ?auth 파라미터 읽어 모달 자동 오픈 — 페이지 무관)
    · about.html / app.html 의 index.html?auth=signup|login 링크도 그대로 동작
      (여기서 landing.html?auth=... 로 포워딩되어 모달 오픈)
  ⚠️ 가입/랜딩 UI를 고칠 때는 pages/landing.html 한 곳만 고치면 됨 (중복 없음).
============================================================================ -->
<script>
(function () {
  try {
    var hasToken = localStorage.getItem('os_token') || sessionStorage.getItem('os_token');
    if (hasToken) {
      window.location.replace('/app.html'); // 로그인 사용자 자동 진입
      return;
    }
    // 비로그인 = 항상 landing.html. ?auth=signup/login 쿼리는 그대로 넘겨 모달 자동 오픈.
    window.location.replace('/pages/landing.html' + (window.location.search || ''));
  } catch (e) {
    window.location.href = '/pages/landing.html';
  }
})();
</script>

<body>
<noscript>
  <p>원세컨드로 이동하려면 <a href="/pages/landing.html">여기를 클릭</a>하세요.</p>

</body>
