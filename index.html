<!-- ============================================================================
  홈 인덱스 전환 (2026-07-08 대표 결정 B안):
    index.html = 순수 진입 redirect 전용. 첫 화면 = app.html 검색 홈(비로그인 포함).
  진입 분기:
    · 로그인 토큰 보유 → app.html (기존 동일)
    · 비로그인 → app.html (검색 홈). 옛 랜딩 강제 경유 폐지.
      ?auth=signup/login 쿼리는 그대로 넘김 → app.html이 인앱 로그인/가입 모달 지연로드로 처리.
    · 랜딩(pages/landing.html) = 로그인 필수 경유지 아님. about 소개 + 가입 폼 단일 소스로만 유지.
    · about.html / app.html 의 ?auth=signup|login 링크도 app.html에서 인앱 모달로 동작.
  ⚠️ 가입/로그인 폼(auth-modal) 마크업 단일 소스 = pages/landing.html.
     app.html은 클릭 시 지연로드로 그 마크업을 가져와 씀(전역 로드 금지 — 2026-07-05 로그아웃 사고 방지).
============================================================================ -->
<script>
(function () {
  try {
    var hasToken = localStorage.getItem('os_token') || sessionStorage.getItem('os_token');
    if (hasToken) {
      window.location.replace('/app.html'); // 로그인 사용자 자동 진입
      return;
    }
    // 비로그인 첫 화면 = app.html 검색 홈. ?auth=signup/login 쿼리는 보존(app.html 인앱 모달 오픈).
    window.location.replace('/app.html' + (window.location.search || ''));
  } catch (e) {
    window.location.href = '/app.html';
  }
})();
</script>
