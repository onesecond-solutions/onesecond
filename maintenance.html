<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>원세컨드 리뉴얼 안내</title>
<meta name="description" content="원세컨드는 더 나은 서비스를 위해 대규모 리뉴얼 및 시스템 개편 작업을 진행하고 있습니다." />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: #0B0C0E;
    color: #F4F4F5;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  .wrap {
    max-width: 560px;
    width: 100%;
  }
  .ic {
    font-size: 64px;
    margin-bottom: 24px;
    line-height: 1;
  }
  h1 {
    font-size: 1.75rem;
    font-weight: 800;
    margin: 0 0 28px;
    letter-spacing: -0.02em;
    line-height: 1.3;
  }
  p {
    font-size: 1rem;
    color: #A1A1AA;
    line-height: 1.7;
    margin: 0 0 14px;
  }
  .signoff {
    font-size: 0.875rem;
    color: #71717A;
    margin-top: 36px;
    letter-spacing: 0.02em;
  }
  @media (max-width: 480px) {
    h1 { font-size: 1.5rem; }
    p { font-size: 0.95rem; }
  }
</style>
</head>
<body>
  <main class="wrap" role="main">
    <div class="ic" aria-hidden="true">🛠️</div>
    <h1>원세컨드 리뉴얼 안내</h1>
    <p>안녕하세요.</p>
    <p>현재 원세컨드는 더 나은 서비스를 제공하기 위해<br />대규모 리뉴얼 및 시스템 개편 작업을 진행하고 있습니다.</p>
    <p>이용에 불편을 드려 진심으로 죄송합니다.</p>
    <p>새로운 모습으로 다시 찾아오겠습니다.</p>
    <p>감사합니다.</p>
    <div class="signoff">— 원세컨드 운영팀 —</div>
  </main>
</body>
</html>
