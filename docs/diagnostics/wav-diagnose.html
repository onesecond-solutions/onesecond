<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WAV 재생 자동 진단 — onesecond</title>
<style>
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Malgun Gothic',sans-serif;max-width:760px;margin:0 auto;padding:20px;color:#1e293b;background:#f8fafc;line-height:1.6;}
  h1{font-size:1.25rem;margin:0 0 4px;}
  .sub{color:#64748b;font-size:0.85rem;margin-bottom:18px;}
  .card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:16px;margin-bottom:14px;}
  label{font-size:0.8rem;font-weight:700;color:#475569;display:block;margin-bottom:6px;}
  textarea{width:100%;box-sizing:border-box;border:1px solid #cbd5e1;border-radius:8px;padding:9px 11px;font-size:0.82rem;font-family:ui-monospace,Menlo,Consolas,monospace;min-height:54px;}
  .row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
  button{border:0;border-radius:8px;padding:9px 14px;font-size:0.85rem;font-weight:700;cursor:pointer;}
  .b-primary{background:#2563eb;color:#fff;}
  .b-ghost{background:#eef2ff;color:#3730a3;}
  .verdict{border-radius:12px;padding:16px 18px;font-weight:700;font-size:0.95rem;margin-bottom:14px;display:none;}
  .v-codec{background:#fef2f2;border:1px solid #fecaca;color:#b91c1c;}
  .v-pcmfail{background:#fffbeb;border:1px solid #fde68a;color:#b45309;}
  .v-ok{background:#f0fdf4;border:1px solid #bbf7d0;color:#15803d;}
  .v-wait{background:#f1f5f9;border:1px solid #e2e8f0;color:#475569;}
  table{width:100%;border-collapse:collapse;font-size:0.82rem;}
  td{padding:6px 8px;border-bottom:1px solid #f1f5f9;vertical-align:top;}
  td.k{color:#64748b;width:150px;font-weight:600;}
  td.v{font-family:ui-monospace,Menlo,Consolas,monospace;word-break:break-all;}
  audio{width:100%;margin-top:10px;}
  .ok{color:#15803d;font-weight:700;} .bad{color:#b91c1c;font-weight:700;}
</style>
</head>
<body>
  <h1>🔊 WAV 재생 자동 진단</h1>
  <div class="sub">onesecond 라이브(로그인 상태)에서 이 페이지를 열면 자동 실행됩니다. 붙여넣기 필요 없음.<br>측정: WAV 내부 <b>FORMAT 코드</b>(1=PCM) + 브라우저 <b>audio.error.code</b>(4=디코딩 불가).</div>

  <div class="card">
    <label>대상 storage_path (myspace 버킷)</label>
    <textarea id="path"></textarea>
    <div class="row">
      <button class="b-primary" onclick="run()">이 파일 진단</button>
      <button class="b-ghost" onclick="preset('wav')">실패 WAV 예시</button>
      <button class="b-ghost" onclick="preset('mp3')">정상 MP3 예시(대조)</button>
    </div>
  </div>

  <div id="verdict" class="verdict"></div>

  <div class="card">
    <table id="result"><tr><td class="k">상태</td><td class="v" id="r-status">대기 중…</td></tr></table>
    <div id="player"></div>
  </div>

<script>
var SUPABASE_URL='https://pdnwgzneooyygfejrvbg.supabase.co';
var ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkbndnem5lb295eWdmZWpydmJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NDc5ODgsImV4cCI6MjA5MjQyMzk4OH0.I79w8Jk-pPgoLHNrcSLhem88jz6_azcDOqglBZjRjPs';

var PRESET={
  wav:'branch/306edf6a-15db-4b69-a6b9-dae74b08cd33/543e0f99-0533-47bd-8836-be961c72a273/f8e747b5-2486-4dfe-9635-99ba092be126_1.wav',  /* 보장분석 건강 1시간도입.wav (7.3MB, 압축 의심) */
  mp3:'branch/306edf6a-15db-4b69-a6b9-dae74b08cd33/56d1a4d6-8e3f-4f98-898e-6e802a84a263/6074eb90-727d-40c1-a9fb-f7934db97d48_TTS.mp3'  /* 알릴의무 TTS 예시.mp3 (대조군) */
};
var FMT={1:'PCM (재생 가능)',2:'MS-ADPCM',6:'A-law',7:'µ-law',17:'IMA-ADPCM',49:'GSM 6.10',85:'MP3',65534:'EXTENSIBLE'};

function token(){ try{ return localStorage.getItem('os_token')||sessionStorage.getItem('os_token')||''; }catch(e){ return ''; } }
function signedFull(raw){ if(!raw) return ''; if(/^https?:\/\//.test(raw)) return raw; if(raw.indexOf('/storage/v1')===0) return SUPABASE_URL+raw; if(raw.charAt(0)==='/') return SUPABASE_URL+'/storage/v1'+raw; return SUPABASE_URL+'/storage/v1/'+raw; }
function preset(k){ document.getElementById('path').value=PRESET[k]; run(); }
function esc(s){ return String(s==null?'':s).replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c];}); }

function rows(obj){
  var h=''; for(var i=0;i<obj.length;i++){ h+='<tr><td class="k">'+esc(obj[i][0])+'</td><td class="v">'+obj[i][1]+'</td></tr>'; }
  document.getElementById('result').innerHTML=h;
}
function verdict(cls,txt){ var v=document.getElementById('verdict'); v.className='verdict '+cls; v.innerHTML=txt; v.style.display='block'; }

async function sign(path){
  var enc=path.split('/').map(encodeURIComponent).join('/');
  var r=await fetch(SUPABASE_URL+'/storage/v1/object/sign/myspace/'+enc,{method:'POST',headers:{apikey:ANON,Authorization:'Bearer '+token(),'Content-Type':'application/json'},body:JSON.stringify({expiresIn:600})});
  if(!r.ok) throw new Error('서명 URL 발급 실패 '+r.status+((r.status===401||r.status===403)?' — 로그인/권한 확인 필요':((r.status===404)?' — 파일 없음(경로 확인)':'')));
  var j=await r.json(); var u=signedFull(j.signedURL||j.signedUrl); if(!u) throw new Error('서명 URL 비어있음'); return u;
}

function parseFmt(ab){
  var dv=new DataView(ab); var u8=new Uint8Array(ab);
  function tag(o){ return String.fromCharCode(u8[o],u8[o+1],u8[o+2],u8[o+3]); }
  var riff=tag(0), wave=tag(8), i=12, fmt=-1;
  while(i+8<=dv.byteLength){ var id=tag(i); var sz=dv.getUint32(i+4,true); if(id==='fmt '){ fmt=i+8; break; } i+=8+sz; if(sz<0||sz>1e7) break; }
  var out={riff:riff,wave:wave,format:-1};
  if(fmt>=0 && fmt+16<=dv.byteLength){ out.format=dv.getUint16(fmt,true); out.ch=dv.getUint16(fmt+2,true); out.rate=dv.getUint32(fmt+4,true); out.bits=dv.getUint16(fmt+14,true); }
  return out;
}

function testAudio(url){
  return new Promise(function(resolve){
    var a=new Audio(); var done=false; var log=[];
    function fin(){ if(done) return; done=true; resolve({errCode:(a.error&&a.error.code)||0, dur:a.duration, net:a.networkState, ready:a.readyState, log:log}); }
    ['loadstart','loadedmetadata','canplay','durationchange','error','stalled','suspend'].forEach(function(ev){ a.addEventListener(ev,function(){ log.push(ev); if(ev==='error'||ev==='canplay'||ev==='loadedmetadata') setTimeout(fin,400); }); });
    a.preload='metadata'; a.src=url; a.load();
    document.getElementById('player').innerHTML=''; a.controls=true; document.getElementById('player').appendChild(a);
    setTimeout(fin,9000);
  });
}

async function run(){
  var path=(document.getElementById('path').value||'').trim();
  if(!path){ verdict('v-wait','storage_path를 입력하거나 예시 버튼을 눌러주세요.'); return; }
  verdict('v-wait','진단 중… (서명 → 헤더 분석 → 재생 테스트)');
  document.getElementById('player').innerHTML='';
  rows([['상태','진단 중…'],['대상',esc(path)]]);
  var isWav=/\.wave?$/i.test(path);
  try{
    var url=await sign(path);
    var resp=await fetch(url,{headers:{Range:'bytes=0-127'}});
    var ct=resp.headers.get('content-type')||'';
    var ab=await resp.arrayBuffer();
    var f=isWav?parseFmt(ab):{riff:'-',wave:'-',format:-2};
    var au=await testAudio(url);

    var fmtName=(f.format>=0)?(FMT[f.format]||('비표준/압축('+f.format+')')):(isWav?'fmt 청크 못 찾음':'WAV 아님');
    var playable=(au.dur>0 && au.dur!==Infinity && au.errCode===0);

    rows([
      ['HTTP status', resp.status+' '+((resp.status===206||resp.status===200)?'<span class="ok">OK</span>':'<span class="bad">이상</span>')],
      ['Content-Type', esc(ct)],
      ['RIFF / WAVE', esc(f.riff)+' / '+esc(f.wave)+((f.riff==='RIFF'&&f.wave==='WAVE')?' <span class="ok">정상 WAV 컨테이너</span>':(isWav?' <span class="bad">헤더 비정상</span>':''))],
      ['<b>FORMAT 코드</b>', (f.format>=0?('<b>'+f.format+'</b> → '+esc(fmtName)+(f.format===1?' <span class="ok">PCM</span>':' <span class="bad">비-PCM</span>')):esc(fmtName))],
      ['채널 / 샘플레이트 / 비트', (f.ch||'-')+'ch / '+(f.rate||'-')+'Hz / '+(f.bits||'-')+'bit'],
      ['<b>audio.error.code</b>', '<b>'+au.errCode+'</b>'+(au.errCode===4?' <span class="bad">MEDIA_ERR_SRC_NOT_SUPPORTED (디코딩 불가)</span>':(au.errCode===0?' <span class="ok">에러 없음</span>':' (1=ABORTED 2=NETWORK 3=DECODE)'))],
      ['재생 길이(duration)', (au.dur>0&&au.dur!==Infinity)?('<span class="ok">'+au.dur.toFixed(1)+'초</span>'):'<span class="bad">0:00 / 측정 불가</span>'],
      ['이벤트 로그', esc(au.log.join(' → ')||'(없음)')]
    ]);

    // ── 자동 판정 ──
    if(isWav && f.format>0 && f.format!==1 && au.errCode===4){
      verdict('v-codec','🔴 <b>코덱 문제 확정</b> — FORMAT='+f.format+'('+esc(fmtName)+'), audio.error=4.<br>비-PCM 압축 WAV라 브라우저가 디코딩할 수 없습니다. <b>프론트 패치로 해결 불가.</b><br>→ 원본 WAV 보존 + 재생용 MP3 변환 파이프라인 필요(작업지시서).');
    } else if(isWav && f.format===1 && !playable){
      verdict('v-pcmfail','🟠 <b>PCM인데 재생 실패</b> — FORMAT=1(PCM)인데 재생이 안 됩니다.<br>코덱 문제 아님 → signed URL / Range / CORS / 플레이어 경로를 계속 추적해야 합니다. (status='+resp.status+', err='+au.errCode+', CT='+esc(ct)+')');
    } else if(playable){
      verdict('v-ok','🟢 <b>재생 정상</b> — duration='+au.dur.toFixed(1)+'초, error=0.'+(isWav?(' FORMAT='+f.format+'('+esc(fmtName)+').'):' (MP3 대조군).'));
    } else {
      verdict('v-pcmfail','🟠 판정 보류 — FORMAT='+(f.format)+', err='+au.errCode+', dur='+au.dur+'. 위 표를 확인하세요.');
    }
  }catch(e){
    rows([['오류', esc(e.message||String(e))]]);
    verdict('v-pcmfail','⚠️ 진단 실패: '+esc(e.message||String(e))+'<br>로그인 상태(onesecond 라이브)인지, 경로가 맞는지 확인해주세요.');
  }
}

// 로드 시 실패 WAV 자동 진단
window.addEventListener('DOMContentLoaded',function(){ document.getElementById('path').value=PRESET.wav; run(); });
</script>
</body>
</html>
