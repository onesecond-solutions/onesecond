<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- 2026-05-14 캐시 본진 — GitHub Pages max-age=600 격차 해소 -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>원세컨드 | 로그인</title>
<meta http-equiv="refresh" content="0; url=/pages/home_v2.html?auth=login">
<link rel="canonical" href="https://onesecond.solutions/pages/home_v2.html">
<script>
  // Phase 1.5 — 로그인 흐름은 home_v2.html 통합 모달로 흡수
  // ?auth=login 파라미터 = home_v2.html 진입 시 자동 로그인 모달 open + redirect 파라미터 보존
  (function () {
    var search = window.location.search || '';
    var redirectQ = new URLSearchParams(search).get('redirect');
    var url = '/pages/home_v2.html?auth=login';
    if (redirectQ) url += '&redirect=' + encodeURIComponent(redirectQ);
    window.location.replace(url);
  })();
</script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Pretendard, sans-serif; background: #FAFAF9; color: #111827; margin: 0; padding: 80px 24px; text-align: center; }
  a { color: #A0522D; font-weight: 700; text-decoration: none; }
  a:hover { text-decoration: underline; }
</style>
</head>
<body>
  <p>잠시 후 로그인 화면으로 이동합니다.</p>
  <p><a href="/pages/home_v2.html?auth=login">바로 이동하기 →</a></p>
</body>
</html>
