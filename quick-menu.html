<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Quick Menu - OneSecond</title>
<style>
body { margin:0; font-family:sans-serif; display:flex; }

.sidebar {
  width:230px;
  background:#2c2c2c;
  color:#aaa;
  height:100vh;
  padding-top:20px;
}

.nav-item {
  padding:12px 20px;
  cursor:pointer;
  color:#aaa;
}

.nav-item:hover {
  background:rgba(255,255,255,0.05);
  color:#ffffff;
}

.nav-item.active {
  background:rgba(200,117,58,0.15);
  color:#ffffff;
  border-left:3px solid #c8753a;
}

.main {
  flex:1;
  padding:20px;
}

.topbar {
  display:flex;
  justify-content:flex-end;
  gap:10px;
  margin-bottom:20px;
}

button {
  padding:8px 12px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="nav-item active" onclick="setActive(this)">홈</div>
  <div class="nav-item" onclick="setActive(this)">MY SPACE</div>
  <div class="nav-item" onclick="setActive(this)">Quick Menu</div>
</div>

<div class="main">
  <div class="topbar">
    <span id="user-name">사용자</span>
    <button onclick="logout()">로그아웃</button>
  </div>

  <h2>Quick Menu 화면</h2>
</div>

<script>
function setActive(el){
  document.querySelectorAll('.nav-item').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
}

function logout(){
  localStorage.clear();
  location.href='index.html';
}

// 사용자 표시
const user = JSON.parse(localStorage.getItem('os_user') || '{}');
if(user.name){
  document.getElementById('user-name').innerText = user.name;
}
</script>

</body>
</html>
