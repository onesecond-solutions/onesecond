<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>게시판</title>
<style>
/* ── 기본 변수 ── */
:root {
  --brown-dark: #3d2b1f;
  --brown-mid:  #6b4226;
  --accent:     #c8753a;
  --cream:      #fdf8f3;
  --brown-pale: #f5ede4;
  --text-dark:  #1a1008;
  --text-mid:   #5a3e2b;
  --text-light: #9a7a62;
  --line:       #ede4dc;
  --white:      #ffffff;
}

/* ── 전체 레이아웃 ── */
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: inherit; background: var(--cream); color: var(--text-dark); }

.board-wrap {
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow: hidden;
}

/* ── 페이지 헤더 ── */
.board-page-header {
  background: linear-gradient(135deg, #3d2b1f 0%, #6b4226 60%, #a0724a 100%);
  padding: 1.2em 1.5em 1em;
  margin-bottom: 8px;
  flex-shrink: 0;
}
.board-page-header h2 {
  font-size: 1.05em;
  font-weight: 800;
  color: #fff;
  letter-spacing: -0.3px;
  margin-bottom: 0.2em;
}
.board-page-header p {
  font-size: 0.72em;
  color: rgba(255,255,255,0.6);
  line-height: 1.5;
}

/* ── 게시판 탭 바 ── */
.board-tab-bar {
  flex-shrink: 0;
  background: var(--white);
  border-bottom: 1px solid var(--line);
  padding: 0 1.2em;
  display: flex;
  align-items: center;
  gap: 0;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.board-tab-bar::-webkit-scrollbar { display: none; }

.board-tab {
  padding: 0.78em 1em;
  font-size: 0.8947em;
  font-weight: 600;
  color: var(--text-light);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all .15s;
  white-space: nowrap;
  flex-shrink: 0;
}
.board-tab:hover { color: var(--text-mid); }
.board-tab.active {
  color: var(--brown-dark);
  border-bottom-color: var(--accent);
  font-weight: 800;
}
.board-tab .badge {
  display: inline-block;
  margin-left: 4px;
  padding: 1px 5px;
  border-radius: 99px;
  font-size: 0.72em;
  font-weight: 700;
  background: #f0e6dc;
  color: var(--accent);
}
.hub-badge {
  display: inline-block;
  margin-left: 4px;
  padding: 1px 5px;
  border-radius: 4px;
  font-size: 0.68em;
  font-weight: 700;
  background: rgba(200,117,58,.12);
  color: var(--accent);
  border: 1px solid rgba(200,117,58,.25);
  vertical-align: middle;
}

/* ── 게시판 본문 영역 ── */
.board-body {
  flex: 1;
  overflow-y: auto;
  padding: 1em 1.2em;
  -webkit-overflow-scrolling: touch;
}

/* ── 허브 안내 배너 ── */
.hub-notice {
  display: flex;
  align-items: flex-start;
  gap: 0.6em;
  background: rgba(200,117,58,.07);
  border: 1px solid rgba(200,117,58,.22);
  border-radius: 10px;
  padding: 0.72em 0.9em;
  margin-bottom: 1em;
  font-size: 0.78em;
  color: var(--text-mid);
  line-height: 1.6;
}
.hub-notice .hi-icon { font-size: 1.05em; flex-shrink: 0; margin-top: 0.1em; }

/* ── 카테고리 + 글쓰기 필터 바 ── */
.board-filter-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1em;
  gap: 0.6em;
  flex-wrap: wrap;
}
.category-pills {
  display: flex;
  gap: 0.4em;
  flex-wrap: wrap;
}
.cat-pill {
  padding: 0.3em 0.85em;
  border-radius: 99px;
  font-size: 0.78em;
  font-weight: 600;
  border: 1px solid var(--line);
  background: var(--white);
  color: var(--text-light);
  cursor: pointer;
  transition: all .15s;
}
.cat-pill:hover { border-color: var(--accent); color: var(--accent); }
.cat-pill.active { background: var(--brown-dark); color: var(--white); border-color: var(--brown-dark); }

.write-btn {
  height: 2.1em;
  padding: 0 0.9em;
  background: var(--accent);
  color: var(--white);
  border: none;
  border-radius: 8px;
  font-size: 0.8421em;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  white-space: nowrap;
  transition: background .15s;
  flex-shrink: 0;
}
.write-btn:hover { background: #b5642e; }

/* ── 게시글 목록 ── */
.post-list { display: flex; flex-direction: column; gap: 0.6em; }

.post-item {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 0.85em 1em;
  cursor: pointer;
  transition: all .15s;
}
.post-item:hover {
  border-color: rgba(200,117,58,.35);
  box-shadow: 0 2px 10px rgba(61,43,31,.07);
  transform: translateY(-1px);
}

.post-top {
  display: flex;
  align-items: center;
  gap: 0.5em;
  margin-bottom: 0.4em;
}
.post-cat-badge {
  padding: 0.15em 0.55em;
  border-radius: 4px;
  font-size: 0.72em;
  font-weight: 700;
  flex-shrink: 0;
}
.post-cat-badge.notice       { background: #fff3cd; color: #856404; }
.post-cat-badge.product      { background: #d1ecf1; color: #0c5460; }
.post-cat-badge.underwriting { background: #d4edda; color: #155724; }

.post-title {
  font-size: 0.8947em;
  font-weight: 700;
  color: var(--text-dark);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.post-new-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent); flex-shrink: 0;
}

.post-preview {
  font-size: 0.8em;
  color: var(--text-light);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  margin-bottom: 0.5em;
  line-height: 1.5;
}
.post-meta {
  display: flex;
  align-items: center;
  gap: 0.7em;
  font-size: 0.72em;
  color: var(--text-light);
}
.post-meta span { display: flex; align-items: center; gap: 0.25em; }

/* ── 빈 상태 ── */
.empty-state {
  text-align: center;
  padding: 3em 1em;
  color: var(--text-light);
}
.empty-icon { font-size: 2.2em; margin-bottom: 0.5em; }
.empty-title { font-size: 0.9em; font-weight: 700; color: var(--text-mid); margin-bottom: 0.4em; }
.empty-desc  { font-size: 0.8em; line-height: 1.7; }

/* ── 게시글 상세 오버레이 ── */
.detail-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 300;
  background: rgba(26,16,8,.72);
  backdrop-filter: blur(3px);
  align-items: flex-end;
  justify-content: center;
  padding: 0;
}
.detail-overlay.active { display: flex; animation: fadeIn .2s ease; }
@keyframes fadeIn { from{opacity:0}to{opacity:1} }

.detail-sheet {
  background: var(--white);
  width: 100%; max-width: 680px;
  max-height: 90vh;
  border-radius: 20px 20px 0 0;
  display: flex; flex-direction: column;
  overflow: hidden;
  animation: slideUp .28s cubic-bezier(.34,1.2,.64,1);
}
@keyframes slideUp { from{transform:translateY(60px);opacity:0} to{transform:translateY(0);opacity:1} }

.detail-header {
  background: linear-gradient(135deg, var(--brown-dark), var(--brown-mid));
  padding: 1em 1.2em 0.85em;
  flex-shrink: 0;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 0.7em;
}
.detail-header-left { flex: 1; min-width: 0; }
.detail-cat-badge {
  display: inline-block;
  padding: 0.18em 0.6em;
  border-radius: 4px;
  font-size: 0.72em;
  font-weight: 700;
  background: rgba(255,255,255,.18);
  color: rgba(255,255,255,.9);
  margin-bottom: 0.4em;
}
.detail-title {
  font-size: 1em;
  font-weight: 800;
  color: var(--white);
  line-height: 1.4;
}
.detail-close {
  width: 2em; height: 2em; min-width: 2em;
  background: rgba(255,255,255,.15);
  border: none; border-radius: 50%;
  color: var(--white); font-size: 1.1em;
  cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  transition: background .15s; flex-shrink: 0;
}
.detail-close:hover { background: rgba(255,255,255,.28); }

.detail-meta-bar {
  flex-shrink: 0;
  padding: 0.65em 1.2em;
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; gap: 1em;
  font-size: 0.78em; color: var(--text-light);
  background: var(--cream);
}
.detail-meta-bar span { display: flex; align-items: center; gap: 0.3em; }

.detail-body {
  flex: 1;
  overflow-y: auto;
  padding: 1.2em;
  -webkit-overflow-scrolling: touch;
}
.detail-content {
  font-size: 0.8947em;
  color: var(--text-dark);
  line-height: 1.85;
  white-space: pre-wrap;
  word-break: break-word;
}

.detail-like-area {
  flex-shrink: 0;
  padding: 0.85em 1.2em;
  border-top: 1px solid var(--line);
  display: flex; align-items: center; justify-content: center;
}
.like-btn {
  display: flex; align-items: center; gap: 0.4em;
  padding: 0.5em 1.2em;
  background: var(--cream);
  border: 1.5px solid var(--line);
  border-radius: 99px;
  font-size: 0.85em; font-weight: 700;
  color: var(--text-mid);
  cursor: pointer; transition: all .15s;
  font-family: inherit;
}
.like-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(200,117,58,.05); }
.like-btn.liked { border-color: var(--accent); color: var(--accent); background: rgba(200,117,58,.08); }

/* ── 댓글 영역 ── */
.comments-section { padding: 0 1.2em 1.2em; flex-shrink: 0; }
.comments-title {
  font-size: 0.8421em;
  font-weight: 700;
  color: var(--text-mid);
  margin-bottom: 0.7em;
  padding-top: 0.7em;
  border-top: 1px solid var(--line);
}
.comment-list { display: flex; flex-direction: column; gap: 0.6em; margin-bottom: 0.85em; }
.comment-item {
  background: var(--cream);
  border-radius: 10px;
  padding: 0.7em 0.85em;
}
.comment-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 0.3em;
}
.comment-author { font-size: 0.78em; font-weight: 700; color: var(--brown-mid); }
.comment-time   { font-size: 0.7em; color: var(--text-light); }
.comment-text   { font-size: 0.82em; color: var(--text-dark); line-height: 1.65; }

.comment-input-wrap {
  display: flex; gap: 0.5em;
  align-items: flex-end;
}
.comment-input {
  flex: 1;
  border: 1.5px solid var(--line);
  border-radius: 10px;
  padding: 0.6em 0.85em;
  font-size: 0.82em;
  font-family: inherit;
  color: var(--text-dark);
  resize: none;
  min-height: 2.5em; max-height: 6em;
  outline: none;
  transition: border-color .15s;
  background: var(--white);
}
.comment-input:focus { border-color: var(--accent); }
.comment-submit {
  height: 2.5em; padding: 0 0.9em;
  background: var(--accent); color: var(--white);
  border: none; border-radius: 10px;
  font-size: 0.8em; font-weight: 700;
  font-family: inherit;
  cursor: pointer; white-space: nowrap;
  transition: background .15s; flex-shrink: 0;
}
.comment-submit:hover { background: #b5642e; }

/* ── 글쓰기 오버레이 ── */
.write-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 400;
  background: rgba(26,16,8,.75);
  backdrop-filter: blur(4px);
  align-items: flex-end;
  justify-content: center;
}
.write-overlay.active { display: flex; animation: fadeIn .2s ease; }

.write-sheet {
  background: var(--white);
  width: 100%; max-width: 600px;
  max-height: 88vh;
  border-radius: 20px 20px 0 0;
  display: flex; flex-direction: column;
  overflow: hidden;
  animation: slideUp .28s cubic-bezier(.34,1.2,.64,1);
}
.write-header {
  background: linear-gradient(135deg, var(--brown-dark), var(--brown-mid));
  padding: 1em 1.2em 0.85em;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
}
.write-header-title {
  font-size: 0.95em; font-weight: 800; color: var(--white);
}
.write-close {
  width: 2em; height: 2em;
  background: rgba(255,255,255,.15); border: none; border-radius: 50%;
  color: var(--white); font-size: 1.1em;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.write-close:hover { background: rgba(255,255,255,.28); }

.write-form {
  flex: 1; overflow-y: auto;
  padding: 1.2em;
  display: flex; flex-direction: column; gap: 0.85em;
  -webkit-overflow-scrolling: touch;
}
.write-label {
  font-size: 0.8em; font-weight: 700; color: var(--brown-dark);
  margin-bottom: 0.35em;
  display: block;
}
.write-select, .write-input, .write-textarea {
  width: 100%;
  border: 1.5px solid var(--line);
  border-radius: 10px;
  padding: 0.6em 0.85em;
  font-size: 0.8947em;
  font-family: inherit;
  color: var(--text-dark);
  outline: none;
  background: var(--white);
  transition: border-color .15s;
  -webkit-appearance: none;
}
.write-select:focus, .write-input:focus, .write-textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(200,117,58,.1);
}
.write-textarea { resize: vertical; min-height: 8em; }

.anon-row {
  display: flex; align-items: center; gap: 0.5em;
  font-size: 0.82em; color: var(--text-mid);
}
.anon-row input { accent-color: var(--accent); }

.write-footer {
  flex-shrink: 0;
  padding: 0.85em 1.2em;
  border-top: 1px solid var(--line);
  display: flex; gap: 0.6em;
}
.write-cancel {
  flex: 1; padding: 0.75em;
  background: var(--cream); border: 1.5px solid var(--line);
  border-radius: 10px; font-size: 0.8947em; font-weight: 700;
  font-family: inherit; cursor: pointer; color: var(--text-mid);
  transition: background .15s;
}
.write-cancel:hover { background: #ede4dc; }
.write-submit {
  flex: 2; padding: 0.75em;
  background: var(--accent); color: var(--white);
  border: none; border-radius: 10px;
  font-size: 0.8947em; font-weight: 700;
  font-family: inherit; cursor: pointer;
  transition: background .15s;
}
.write-submit:hover { background: #b5642e; }
.write-submit:disabled { background: #ccc; cursor: not-allowed; }

/* ── 로딩 ── */
.loading-msg {
  text-align: center;
  padding: 2.5em 1em;
  color: var(--text-light);
  font-size: 0.85em;
}
</style>
</head>
<body>
<div class="board-wrap">

  <!-- 페이지 헤더 -->
  <div class="board-page-header">
    <h2>📋 게시판</h2>
    <p>팀·지점·허브 게시판에서 정보를 공유하세요</p>
  </div>

  <!-- 게시판 탭 바 -->
  <div class="board-tab-bar">
    <div class="board-tab hub-tab active" data-board="hub" onclick="switchBoard('hub')">
      🌐 허브게시판 <span class="hub-badge">공개</span>
    </div>
    <div class="board-tab" data-board="team" onclick="switchBoard('team')">
      👥 팀게시판
    </div>
    <div class="board-tab" data-board="branch" onclick="switchBoard('branch')">
      🏢 지점게시판
    </div>
    <div class="board-tab" data-board="insurer" onclick="switchBoard('insurer')">
      🏦 보험사게시판
    </div>
  </div>

  <!-- 게시판 본문 -->
  <div class="board-body">

    <!-- 허브 안내 -->
    <div class="hub-notice" id="hub-notice">
      <span class="hi-icon">💡</span>
      <span>허브게시판은 팀·지점 게시판에서 좋은 글이 승인된 공개 게시판입니다. 직접 글쓰기는 불가합니다.</span>
    </div>

    <!-- 카테고리 필터 + 글쓰기 -->
    <div class="board-filter-bar">
      <div class="category-pills" id="category-pills"></div>
      <button class="write-btn" id="write-btn" onclick="openWriteModal()">✏️ 글쓰기</button>
    </div>

    <!-- 게시글 목록 -->
    <div class="post-list" id="post-list">
      <div class="loading-msg">불러오는 중...</div>
    </div>

  </div>
</div>

<!-- ── 게시글 상세 오버레이 ── -->
<div class="detail-overlay" id="detail-overlay">
  <div class="detail-sheet">
    <div class="detail-header">
      <div class="detail-header-left">
        <div class="detail-cat-badge" id="detail-cat-badge"></div>
        <div class="detail-title" id="detail-title"></div>
      </div>
      <button class="detail-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-meta-bar">
      <span>✍️ <span id="detail-author"></span></span>
      <span>🕐 <span id="detail-time"></span></span>
      <span>👁 <span id="detail-views"></span></span>
    </div>
    <div class="detail-body">
      <div class="detail-content" id="detail-content"></div>
    </div>
    <div class="detail-like-area">
      <button class="like-btn" id="like-btn" onclick="toggleLike()">
        ❤️ 도움이 됐어요 <span id="like-count">0</span>
      </button>
    </div>
    <div class="comments-section">
      <div class="comments-title">💬 댓글 <span id="comment-count-label"></span></div>
      <div class="comment-list" id="comment-list"></div>
      <div class="comment-input-wrap">
        <textarea class="comment-input" id="comment-input" placeholder="댓글을 입력하세요..." rows="1"
          oninput="autoResizeComment(this)"></textarea>
        <button class="comment-submit" onclick="submitComment()">등록</button>
      </div>
    </div>
  </div>
</div>

<!-- ── 글쓰기 오버레이 ── -->
<div class="write-overlay" id="write-overlay">
  <div class="write-sheet">
    <div class="write-header">
      <div class="write-header-title" id="write-modal-title">✏️ 글쓰기</div>
      <button class="write-close" onclick="closeWriteModal()">✕</button>
    </div>
    <div class="write-form">
      <div>
        <label class="write-label">카테고리</label>
        <select class="write-select" id="write-category"></select>
      </div>
      <div>
        <label class="write-label">제목</label>
        <input class="write-input" type="text" id="write-title" placeholder="제목을 입력하세요" maxlength="100">
      </div>
      <div>
        <label class="write-label">내용</label>
        <textarea class="write-textarea" id="write-content" placeholder="내용을 입력하세요"></textarea>
      </div>
      <div class="anon-row" id="anon-row" style="display:none;">
        <input type="checkbox" id="write-anon">
        <label for="write-anon">익명으로 작성하기</label>
      </div>
    </div>
    <div class="write-footer">
      <button class="write-cancel" onclick="closeWriteModal()">취소</button>
      <button class="write-submit" onclick="submitPost()">등록하기</button>
    </div>
  </div>
</div>

<script>
(function() {

// ── 전역 변수 선언 (if(!window.XXX) 패턴) ──
if (!window.SUPABASE_URL)       window.SUPABASE_URL       = window.SUPABASE_URL       || '';
if (!window.SUPABASE_KEY)       window.SUPABASE_KEY       = window.SUPABASE_KEY       || '';

if (!window._currentBoard)      window._currentBoard      = 'hub';
if (!window._currentCategory)   window._currentCategory   = 'all';
if (!window._allPosts)          window._allPosts          = [];
if (!window._currentPostId)     window._currentPostId     = null;

if (!window.BOARD_CATEGORIES) {
  window.BOARD_CATEGORIES = {
    hub:     ['전체', '공지사항', '상품Q&A', '인수Q&A'],
    team:    ['전체', '공지사항', '상품Q&A', '인수Q&A'],
    branch:  ['전체', '공지사항', '상품Q&A', '인수Q&A'],
    insurer: ['전체', '공지사항', '상품Q&A', '인수Q&A', '보험사 공지']
  };
}
if (!window.BOARD_LABEL) {
  window.BOARD_LABEL = {
    hub:'허브게시판', team:'팀게시판',
    branch:'지점게시판', insurer:'보험사게시판'
  };
}
if (!window.CAT_CLASS) {
  window.CAT_CLASS = {
    '공지사항':'notice', '상품Q&A':'product',
    '인수Q&A':'underwriting', '보험사 공지':'notice'
  };
}

// ── SUPABASE_URL/KEY 보장 (app.html window.SUPABASE_URL 참조) ──
function getSupabaseUrl() { return window.SUPABASE_URL || ''; }
function getSupabaseKey() { return window.SUPABASE_KEY || ''; }

// ── fetchWithAuth (app.html 전역 함수 재사용 or fallback) ──
function fetchWithAuth(url, options) {
  if (typeof window.fetchWithAuth === 'function') {
    return window.fetchWithAuth(url, options);
  }
  // fallback
  options = options || {};
  options.headers = options.headers || {};
  const token = window._userToken || localStorage.getItem('os_token') || '';
  options.headers['apikey']         = getSupabaseKey();
  options.headers['Authorization']  = `Bearer ${token}`;
  return fetch(url, options);
}

// ── 날짜 포맷 ──
function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60) return '방금 전';
  if (diff < 3600) return `${Math.floor(diff/60)}분 전`;
  if (diff < 86400) return `${Math.floor(diff/3600)}시간 전`;
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return `${d.getFullYear()}.${mm}.${dd}`;
}

// ── 초기화: _userOrg 세팅 ──
async function initBoard() {
  // app.html에서 이미 _userOrg 세팅됐을 수 있음
  if (!window._userOrg && window._userId) {
    try {
      const res = await fetchWithAuth(
        `${getSupabaseUrl()}/rest/v1/users?id=eq.${window._userId}&select=company,branch,team`
      );
      const data = await res.json();
      if (data && data[0]) {
        window._userOrg = {
          company: data[0].company || '',
          branch:  data[0].branch  || '',
          team:    data[0].team    || ''
        };
      }
    } catch(e) { console.warn('_userOrg 초기화 실패', e); }
  }
  switchBoard('hub');
}

// ── 탭 전환 ──
window.switchBoard = function(board) {
  window._currentBoard = board;
  window._currentCategory = 'all';
  document.querySelectorAll('.board-tab').forEach(t => t.classList.remove('active'));
  const tab = document.querySelector(`.board-tab[data-board="${board}"]`);
  if (tab) tab.classList.add('active');
  // 허브 안내 표시/숨김
  const notice = document.getElementById('hub-notice');
  if (notice) notice.style.display = board === 'hub' ? 'flex' : 'none';
  // 카테고리 렌더
  renderCategoryPills(board);
  // 글쓰기 버튼: 허브는 숨김
  const wb = document.getElementById('write-btn');
  if (wb) wb.style.display = board === 'hub' ? 'none' : 'block';
  // 게시글 로드
  loadPosts();
};

function renderCategoryPills(board) {
  const cats = window.BOARD_CATEGORIES[board] || ['전체'];
  const container = document.getElementById('category-pills');
  if (!container) return;
  container.innerHTML = cats.map(c => {
    const val = c === '전체' ? 'all' : c;
    const isActive = (val === 'all' && window._currentCategory === 'all') || val === window._currentCategory;
    return `<div class="cat-pill ${isActive ? 'active' : ''}" onclick="selectCategory('${val}')">${c}</div>`;
  }).join('');
}

window.selectCategory = function(cat) {
  window._currentCategory = cat;
  renderCategoryPills(window._currentBoard);
  renderPostList();
};

// ── 게시글 로드 ──
async function loadPosts() {
  const list = document.getElementById('post-list');
  if (!list) return;
  list.innerHTML = '<div class="loading-msg">불러오는 중...</div>';
  try {
    const board = window._currentBoard;
    const org   = window._userOrg || {};
    let url = '';

    if (board === 'hub') {
      url = `${getSupabaseUrl()}/rest/v1/posts?is_hub_visible=eq.true&order=created_at.desc`;
    } else if (board === 'team') {
      if (!org.team) {
        list.innerHTML = buildEmpty('👥', '소속 팀 정보가 없습니다', '내 정보 수정에서 팀명을 등록해 주세요.');
        return;
      }
      const orgId = encodeURIComponent(`${org.company}_${org.branch}_${org.team}`);
      url = `${getSupabaseUrl()}/rest/v1/posts?board_type=eq.team&organization_id=eq.${orgId}&order=created_at.desc`;
    } else if (board === 'branch') {
      if (!org.branch) {
        list.innerHTML = buildEmpty('🏢', '소속 지점 정보가 없습니다', '내 정보 수정에서 지점명을 등록해 주세요.');
        return;
      }
      const orgId = encodeURIComponent(`${org.company}_${org.branch}`);
      url = `${getSupabaseUrl()}/rest/v1/posts?board_type=eq.branch&organization_id=eq.${orgId}&order=created_at.desc`;
    } else {
      url = `${getSupabaseUrl()}/rest/v1/posts?board_type=eq.insurer&order=created_at.desc`;
    }

    const res  = await fetchWithAuth(url);
    const data = await res.json();
    window._allPosts = Array.isArray(data) ? data : [];
    renderPostList();
  } catch(e) {
    console.error(e);
    const list2 = document.getElementById('post-list');
    if (list2) list2.innerHTML = buildEmpty('⚠️', '불러오기 실패', '잠시 후 다시 시도해 주세요.');
  }
}

function buildEmpty(icon, title, desc) {
  return `<div class="empty-state">
    <div class="empty-icon">${icon}</div>
    <div class="empty-title">${title}</div>
    <div class="empty-desc">${desc}</div>
  </div>`;
}

function renderPostList() {
  const list = document.getElementById('post-list');
  if (!list) return;
  let posts = window._allPosts || [];
  if (window._currentCategory !== 'all') {
    posts = posts.filter(p => p.category === window._currentCategory);
  }
  if (!posts.length) {
    const board = window._currentBoard;
    const msgs = {
      hub:     { icon:'🌐', title:'허브게시판에 아직 게시글이 없습니다', desc:'팀·지점 게시판의 좋은 글이 승인 후 이곳에 모입니다.' },
      team:    { icon:'👥', title:'팀게시판에 아직 게시글이 없습니다', desc:'첫 글을 작성해보세요!' },
      branch:  { icon:'🏢', title:'지점게시판에 아직 게시글이 없습니다', desc:'첫 글을 작성해보세요!' },
      insurer: { icon:'🏦', title:'보험사게시판에 아직 게시글이 없습니다', desc:'첫 글을 작성해보세요!' }
    };
    const m = msgs[board] || msgs.hub;
    list.innerHTML = buildEmpty(m.icon, m.title, m.desc);
    return;
  }
  list.innerHTML = posts.map(p => buildPostItem(p)).join('');
}

function buildPostItem(p) {
  const catClass = window.CAT_CLASS[p.category] || 'product';
  const isNew = p.created_at && (Date.now() - new Date(p.created_at)) < 86400000;
  const preview = (p.content || '').replace(/\n/g,' ').substring(0, 60);
  return `
    <div class="post-item" onclick="openDetail('${p.id}')">
      <div class="post-top">
        <span class="post-cat-badge ${catClass}">${p.category || ''}</span>
        <span class="post-title">${escHtml(p.title || '')}</span>
        ${isNew ? '<span class="post-new-dot"></span>' : ''}
      </div>
      <div class="post-preview">${escHtml(preview)}</div>
      <div class="post-meta">
        <span>✍️ ${escHtml(p.display_name || p.author_name || '알 수 없음')}</span>
        <span>🕐 ${fmtDate(p.created_at)}</span>
        <span>👁 ${p.view_count || 0}</span>
        <span>❤️ ${p.like_count || 0}</span>
        <span>💬 ${p.comment_count || 0}</span>
      </div>
    </div>`;
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── 게시글 상세 ──
window.openDetail = async function(postId) {
  window._currentPostId = postId;
  const post = (window._allPosts || []).find(p => String(p.id) === String(postId));
  if (!post) return;

  // 조회수 증가 (background)
  fetchWithAuth(`${getSupabaseUrl()}/rest/v1/posts?id=eq.${postId}`, {
    method:'PATCH',
    headers:{'Content-Type':'application/json','Prefer':'return=minimal'},
    body: JSON.stringify({ view_count: (post.view_count||0) + 1 })
  }).catch(()=>{});

  const catClass = window.CAT_CLASS[post.category] || 'product';
  const badge = document.getElementById('detail-cat-badge');
  const title = document.getElementById('detail-title');
  const author = document.getElementById('detail-author');
  const time = document.getElementById('detail-time');
  const views = document.getElementById('detail-views');
  const content = document.getElementById('detail-content');
  const likeCount = document.getElementById('like-count');

  if (badge)   { badge.textContent = post.category || ''; badge.className = `detail-cat-badge ${catClass}`; }
  if (title)   title.textContent   = post.title   || '';
  if (author)  author.textContent  = post.display_name || post.author_name || '알 수 없음';
  if (time)    time.textContent    = fmtDate(post.created_at);
  if (views)   views.textContent   = (post.view_count||0) + 1;
  if (content) content.textContent = post.content || '';
  if (likeCount) likeCount.textContent = post.like_count || 0;

  // 좋아요 상태 초기화
  const likeBtn = document.getElementById('like-btn');
  if (likeBtn) likeBtn.classList.remove('liked');

  // 댓글 로드
  await loadComments(postId);

  const overlay = document.getElementById('detail-overlay');
  if (overlay) {
    overlay.classList.add('active');
    document.body.style.overflow = 'hidden';
  }
};

window.closeDetail = function() {
  const overlay = document.getElementById('detail-overlay');
  if (overlay) overlay.classList.remove('active');
  document.body.style.overflow = '';
  window._currentPostId = null;
};

// ── 좋아요 ──
window.toggleLike = async function() {
  if (!window._currentPostId) return;
  const likeBtn = document.getElementById('like-btn');
  const likeCount = document.getElementById('like-count');
  const post = (window._allPosts||[]).find(p => String(p.id) === String(window._currentPostId));
  if (!post || !likeBtn || !likeCount) return;

  const isLiked = likeBtn.classList.contains('liked');
  const newCount = isLiked
    ? Math.max(0, (post.like_count||0) - 1)
    : (post.like_count||0) + 1;

  likeBtn.classList.toggle('liked');
  likeCount.textContent = newCount;
  post.like_count = newCount;

  try {
    await fetchWithAuth(`${getSupabaseUrl()}/rest/v1/posts?id=eq.${window._currentPostId}`, {
      method:'PATCH',
      headers:{'Content-Type':'application/json','Prefer':'return=minimal'},
      body: JSON.stringify({ like_count: newCount })
    });
  } catch(e) { console.error(e); }
};

// ── 댓글 ──
async function loadComments(postId) {
  const commentList = document.getElementById('comment-list');
  const countLabel = document.getElementById('comment-count-label');
  if (!commentList) return;
  commentList.innerHTML = '<div style="font-size:0.78em;color:var(--text-light);padding:0.4em 0;">불러오는 중...</div>';
  try {
    const res = await fetchWithAuth(
      `${getSupabaseUrl()}/rest/v1/replies?post_id=eq.${postId}&order=created_at.asc`
    );
    const data = await res.json();
    const replies = Array.isArray(data) ? data : [];
    if (countLabel) countLabel.textContent = `(${replies.length})`;
    commentList.innerHTML = replies.length
      ? replies.map(r => `
          <div class="comment-item">
            <div class="comment-header">
              <span class="comment-author">${escHtml(r.display_name || r.author_name || '알 수 없음')}</span>
              <span class="comment-time">${fmtDate(r.created_at)}</span>
            </div>
            <div class="comment-text">${escHtml(r.content || '')}</div>
          </div>`).join('')
      : '<div style="font-size:0.78em;color:var(--text-light);padding:0.4em 0;">첫 댓글을 남겨보세요!</div>';
  } catch(e) {
    commentList.innerHTML = '<div style="font-size:0.78em;color:var(--text-light);">댓글을 불러올 수 없습니다.</div>';
  }
}

window.submitComment = async function() {
  const input = document.getElementById('comment-input');
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  if (!window._currentPostId) return;

  const btn = document.querySelector('.comment-submit');
  if (btn) { btn.disabled = true; btn.textContent = '등록 중...'; }

  try {
    await fetchWithAuth(`${getSupabaseUrl()}/rest/v1/replies`, {
      method:'POST',
      headers:{'Content-Type':'application/json','Prefer':'return=minimal'},
      body: JSON.stringify({
        post_id:      window._currentPostId,
        author_id:    window._userId,
        author_name:  window._userName || '알 수 없음',
        display_name: window._userName || '알 수 없음',
        content:      text,
        is_anonymous: false
      })
    });
    // comment_count 증가
    const post = (window._allPosts||[]).find(p => String(p.id) === String(window._currentPostId));
    if (post) {
      const newCnt = (post.comment_count||0) + 1;
      post.comment_count = newCnt;
      await fetchWithAuth(`${getSupabaseUrl()}/rest/v1/posts?id=eq.${window._currentPostId}`, {
        method:'PATCH',
        headers:{'Content-Type':'application/json','Prefer':'return=minimal'},
        body: JSON.stringify({ comment_count: newCnt })
      }).catch(()=>{});
    }
    input.value = '';
    input.style.height = '';
    await loadComments(window._currentPostId);
  } catch(e) {
    alert('댓글 등록 중 오류가 발생했습니다.');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '등록'; }
  }
};

window.autoResizeComment = function(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 96) + 'px';
};

// ── 글쓰기 ──
window.openWriteModal = function() {
  const board = window._currentBoard;
  const categories = (window.BOARD_CATEGORIES[board] || ['상품Q&A']).filter(c => c !== '전체');
  const select = document.getElementById('write-category');
  if (select) select.innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');

  const titleEl = document.getElementById('write-title');
  const contentEl = document.getElementById('write-content');
  if (titleEl) titleEl.value = '';
  if (contentEl) contentEl.value = '';

  // 익명 옵션: 보험사게시판 + member는 기본 익명
  const anonRow = document.getElementById('anon-row');
  const anonCheck = document.getElementById('write-anon');
  if (anonRow && anonCheck) {
    if (board === 'insurer' && window._userRole === 'member') {
      anonRow.style.display = 'flex';
      anonCheck.checked = true;
    } else {
      anonRow.style.display = 'none';
      anonCheck.checked = false;
    }
  }

  const modalTitle = document.getElementById('write-modal-title');
  if (modalTitle) modalTitle.textContent = `✏️ ${window.BOARD_LABEL[board]} 글쓰기`;

  const overlay = document.getElementById('write-overlay');
  if (overlay) { overlay.classList.add('active'); document.body.style.overflow = 'hidden'; }
};

window.closeWriteModal = function() {
  const overlay = document.getElementById('write-overlay');
  if (overlay) overlay.classList.remove('active');
  document.body.style.overflow = '';
};

window.submitPost = async function() {
  const titleEl   = document.getElementById('write-title');
  const contentEl = document.getElementById('write-content');
  const catEl     = document.getElementById('write-category');
  const anonEl    = document.getElementById('write-anon');

  const title   = titleEl   ? titleEl.value.trim()   : '';
  const content = contentEl ? contentEl.value.trim() : '';
  const category = catEl    ? catEl.value             : '';
  const isAnon   = anonEl   ? anonEl.checked          : false;

  if (!title)   { alert('제목을 입력해 주세요.'); return; }
  if (!content) { alert('내용을 입력해 주세요.'); return; }

  const org   = window._userOrg || {};
  const board = window._currentBoard;
  let orgId = '';
  if (board === 'team')   orgId = `${org.company||''}_${org.branch||''}_${org.team||''}`;
  if (board === 'branch') orgId = `${org.company||''}_${org.branch||''}`;

  let displayName = window._userName || '알 수 없음';
  if (isAnon) displayName = '익명';
  else if (board === 'insurer' && ['manager','branch_manager'].includes(window._userRole)) {
    displayName = org.company || window._userName || '보험회사';
  }

  const btn = document.querySelector('.write-submit');
  if (btn) { btn.disabled = true; btn.textContent = '등록 중...'; }

  try {
    await fetchWithAuth(`${getSupabaseUrl()}/rest/v1/posts`, {
      method:'POST',
      headers:{'Content-Type':'application/json','Prefer':'return=minimal'},
      body: JSON.stringify({
        board_type:      board,
        category,
        title,
        content,
        author_id:       window._userId,
        author_name:     window._userName || '알 수 없음',
        organization_id: orgId,
        is_hub_visible:  false,
        is_anonymous:    isAnon,
        display_name:    displayName,
        view_count:      0,
        like_count:      0,
        comment_count:   0
      })
    });
    closeWriteModal();
    await loadPosts();
  } catch(e) {
    alert('글 등록 중 오류가 발생했습니다.');
    console.error(e);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '등록하기'; }
  }
};

// ── 오버레이 클릭 닫기 ──
document.getElementById('detail-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeDetail();
});
document.getElementById('write-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeWriteModal();
});

// ── 초기화 실행 ──
initBoard();

window._boardReady = true;

})();
</script>
