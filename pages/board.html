<style>
/* ════════════════════════════════════════════════════════════
   board.html 전용 스타일
   레이아웃 구조: _template.html 표준 (pg-outer / pg-header-block / pg-tab-block / pg-content-block / pg-footer-block)
   design_guide.md 준수 — tokens.css 변수만 사용
════════════════════════════════════════════════════════════ */

/* ── 리셋 ── */
.pg-outer, .pg-outer *,
.detail-overlay, .detail-overlay *,
.write-overlay, .write-overlay * {
  margin: 0; padding: 0; box-sizing: border-box;
}

/* ── 최상위 래퍼 ── */
/* 2026-04-27 shell v1: 스코프 오버라이드 제거 — 글로벌 tokens.css 7값으로 일원화
   배경 제거 — D 영역의 var(--color-bg)=#FFFFFF가 비치도록 (시안 .pg-outer는 background 무지정) */
.pg-outer {
  display: flex;
  flex-direction: column;
  width: 100%;
  gap: var(--pg-tab-bottom);
  padding: var(--pg-side-padding);
  padding-bottom: var(--space-10);
  font-family: var(--font-sans, 'DM Sans', Pretendard, sans-serif);
  color: var(--color-text-primary);
  min-height: 100%;
}

/* ── ① 타이틀 블록 ── */
.pg-header-block {
  border-radius: var(--radius-md, 12px);
  overflow: hidden;
  flex-shrink: 0;
}
.pg-page-header {
  background: transparent;
  padding: var(--space-5, 20px) var(--space-1, 4px) var(--space-5, 20px) 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-4, 16px);
}
.pg-page-title {
  font-size: 1.5em;
  font-weight: var(--fw-black, 900);
  color: var(--color-text-primary);
  letter-spacing: -0.5px;
  margin-bottom: 4px;
}
.pg-page-title .accent { color: var(--color-accent, #D4845A); }
.pg-page-desc {
  font-size: 0.875em;
  font-weight: 400;
  color: var(--color-text-secondary);
  line-height: 1.6;
}
.pg-page-icon {
  font-size: 2.2em;
  opacity: 0.35;
  color: var(--color-accent, #D4845A);
}

/* ── ② 탭바 블록 ── */
.pg-tab-block {
  border-radius: var(--radius-md, 12px);
  overflow: hidden;
  flex-shrink: 0;
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  padding: 2px var(--space-2, 8px);
}
.pg-tab-bar {
  display: flex;
  flex-direction: row;
  gap: 0;
  flex-wrap: nowrap;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.pg-tab-bar::-webkit-scrollbar { display: none; }
.pg-tab-btn {
  padding: 12px var(--space-4, 16px);
  border: none;
  background: transparent;
  font-size: 0.895em;
  font-weight: var(--fw-semibold, 600);
  font-family: inherit;
  cursor: pointer;
  white-space: nowrap;
  color: var(--color-text-secondary);
  border-bottom: 3px solid transparent;
  transition: all var(--transition-fast, .15s);
  flex-shrink: 0;
}
.pg-tab-btn:hover { color: var(--color-text-primary); }
.pg-tab-btn.active {
  font-weight: var(--fw-black, 900);
  color: var(--color-accent, #D4845A);
  border-bottom-color: var(--color-accent, #D4845A);
}
.hub-badge {
  display: inline-block;
  margin-left: 4px;
  padding: 1px 5px;
  border-radius: var(--radius-xs, 6px);
  font-size: 0.68em;
  font-weight: 700;
  background: rgba(160, 82, 45, .12);
  color: var(--color-brand, #A0522D);
  border: 1px solid rgba(160, 82, 45, .25);
  vertical-align: middle;
}

/* ── ③ 콘텐츠 블록 ── */
.pg-content-block {
  border-radius: var(--radius-md, 12px);
  overflow: hidden;
  flex-shrink: 0;
  border: 1px solid var(--color-border);
  background: transparent;
}

/* ── 게시판 콘텐츠 영역 ── */
.board-content {
  padding: 1em 1.2em;
}

/* ── 허브 안내 배너 ── */
.hub-notice {
  display: flex;
  align-items: flex-start;
  gap: 0.6em;
  background: transparent;
  border: none;
  border-radius: var(--radius-sm, 8px);
  padding: 0.72em 0.9em;
  margin-bottom: 1em;
  font-size: 0.78em;
  color: var(--color-text-secondary);
  line-height: 1.6;
}
.hub-notice .hi-icon { font-size: 1.05em; flex-shrink: 0; margin-top: 0.1em; }

/* ── 카테고리 + 글쓰기 필터 바 ── */
.board-filter-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1em;
  gap: 0.6em;
  flex-wrap: wrap;
}
.category-pills { display: flex; gap: 0.4em; flex-wrap: wrap; }
.cat-pill {
  padding: 0.3em 0.85em;
  border-radius: var(--radius-full, 9999px);
  font-size: 0.78em;
  font-weight: 600;
  border: 1px solid var(--color-border);
  background: var(--color-surface, #fff);
  color: var(--color-text-tertiary);
  cursor: pointer;
  transition: all .15s;
}
.cat-pill:hover { border-color: var(--color-brand, #A0522D); color: var(--color-brand, #A0522D); }
.cat-pill.active { background: var(--color-text-primary); color: #fff; border-color: var(--color-text-primary); }

.write-btn {
  /* 2026-04-27 board v1 — 시안 .brd-write-btn 스타일 (클래스명 보존) */
  display: inline-flex; align-items: center; gap: 6px;
  padding: 10px 18px;
  background: var(--color-brand, #A0522D);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm, 8px);
  font-family: inherit;
  font-size: 0.895em;
  font-weight: var(--fw-bold, 700);
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background var(--transition-fast, .15s);
  box-shadow: 0 2px 6px rgba(160, 82, 45, 0.22);
}
.write-btn:hover { background: var(--color-brand-light, #C4733A); }

/* ── 업그레이드 토스트 (무료플랜 글쓰기 안내) ── */
.os-toast {
  position: fixed;
  left: 50%;
  bottom: 32px;
  transform: translate(-50%, 20px);
  background: var(--color-text-primary);
  color: #fff;
  padding: 12px 16px 12px 18px;
  border-radius: 10px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
  display: flex;
  align-items: center;
  gap: 14px;
  font-size: 0.88em;
  line-height: 1.5;
  z-index: 9999;
  opacity: 0;
  pointer-events: none;
  transition: opacity .22s ease, transform .22s ease;
  max-width: calc(100vw - 32px);
}
.os-toast.show {
  opacity: 1;
  transform: translate(-50%, 0);
  pointer-events: auto;
}
.os-toast-msg { white-space: pre-line; }
.os-toast-upgrade {
  flex-shrink: 0;
  background: var(--color-accent, #D4845A);
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 6px 12px;
  font-size: 0.88em;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  white-space: nowrap;
}
.os-toast-upgrade:hover { background: var(--color-brand-light, #C4733A); }

/* ── 게시글 목록 (v1 디자인 — 시안 design_test/board/v1-full.html 기반) ── */
.brd-list { display: flex; flex-direction: column; }
.brd-item {
  display: flex; gap: var(--space-4, 16px);
  padding: var(--space-5, 20px) var(--space-2, 8px);
  border-bottom: 1px solid var(--color-border);
  cursor: pointer;
  transition: background var(--transition-fast, .15s);
}
.brd-item:last-child { border-bottom: none; }
.brd-item:hover { background: var(--color-surface-2); }
.brd-badge {
  flex-shrink: 0;
  display: inline-flex; align-items: center;
  height: 22px;
  padding: 0 10px;
  border-radius: var(--radius-full, 9999px);
  font-size: 0.6875em; font-weight: var(--fw-black, 900);
  letter-spacing: 0.3px;
  align-self: flex-start;
  margin-top: 4px;
}
.brd-badge-notice   { background: #FDE8E8; color: #C0392B; }
.brd-badge-question { background: #E8F4FD; color: #1A5C7A; }
.brd-badge-info     { background: #E8FDE8; color: #1A7A3F; }
.brd-main { flex: 1; min-width: 0; }
.brd-title {
  font-size: 0.975em; font-weight: var(--fw-bold, 700);
  color: var(--color-text-primary);
  margin-bottom: var(--space-2, 8px);
  line-height: 1.4;
}
.brd-new-dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--color-accent, #D4845A);
  margin-left: 6px;
  vertical-align: middle;
}
.brd-insurer-name {
  font-size: 0.78em;
  color: var(--color-text-tertiary);
  margin-bottom: var(--space-2, 8px);
}
.brd-excerpt {
  font-size: 0.8em; color: var(--color-text-secondary);
  line-height: 1.6;
  margin-bottom: var(--space-2, 8px);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.brd-meta {
  display: flex; gap: var(--space-3, 12px);
  font-size: 0.7em; color: var(--color-text-tertiary);
}
.brd-meta strong { color: var(--color-text-secondary); font-weight: var(--fw-semibold, 600); }

/* ── 빈 상태 ── */
.empty-state { text-align: center; padding: 3em 1em; color: var(--color-text-tertiary); }
.empty-icon  { font-size: 2.2em; margin-bottom: 0.5em; }
.empty-title { font-size: 0.9em; font-weight: 700; color: var(--color-text-secondary); margin-bottom: 0.4em; }
.empty-desc  { font-size: 0.8em; line-height: 1.7; }

/* ── 로딩 ── */
.loading-msg { text-align: center; padding: 2.5em 1em; color: var(--color-text-tertiary); font-size: 0.842em; }

/* ── 게시글 상세 오버레이 ── */
.detail-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 300;
  background: rgba(26, 16, 8, .72);
  backdrop-filter: blur(3px);
  align-items: center; justify-content: center;
  padding: 20px;
}
.detail-overlay.active { display: flex; animation: brdFadeIn .2s ease; }
@keyframes brdFadeIn  { from { opacity: 0 }             to { opacity: 1 } }
@keyframes brdSlideUp { from { transform: translateY(60px); opacity: 0 } to { transform: translateY(0); opacity: 1 } }

.detail-sheet {
  background: var(--color-surface, #fff);
  width: 100%; max-width: 680px; max-height: 90vh;
  border-radius: var(--radius-xl, 20px);
  display: flex; flex-direction: column; overflow: hidden;
  animation: brdSlideUp .28s cubic-bezier(.34,1.2,.64,1);
}
.detail-header {
  background: linear-gradient(135deg, var(--color-brand, #A0522D) 0%, var(--color-brand-light, #C4733A) 100%);
  padding: 1em 1.2em 0.85em;
  flex-shrink: 0; display: flex; align-items: flex-start; justify-content: space-between; gap: 0.7em;
}
.detail-header-left { flex: 1; min-width: 0; }
.detail-cat-badge {
  display: inline-block; padding: 0.18em 0.6em;
  border-radius: var(--radius-xs, 6px); font-size: 0.72em; font-weight: 700;
  background: rgba(255, 255, 255, .18); color: rgba(255, 255, 255, .9); margin-bottom: 0.4em;
}
.detail-title { font-size: 1em; font-weight: 800; color: #fff; line-height: 1.4; }
.detail-close {
  width: 2em; height: 2em; min-width: 2em;
  background: rgba(255, 255, 255, .15); border: none; border-radius: 50%;
  color: #fff; font-size: 1.1em; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s; flex-shrink: 0;
}
.detail-close:hover { background: rgba(255, 255, 255, .28); }

.detail-meta-bar {
  flex-shrink: 0; padding: 0.65em 1.2em;
  border-bottom: 1px solid var(--color-border);
  display: flex; align-items: center; gap: 1em;
  font-size: 0.78em; color: var(--color-text-tertiary);
  background: var(--color-surface-2);
}
.detail-meta-bar span { display: flex; align-items: center; gap: 0.3em; }
.detail-body { flex: 1; overflow-y: auto; padding: 1.2em; -webkit-overflow-scrolling: touch; }
.detail-content {
  font-size: 0.895em; color: var(--color-text-primary);
  line-height: 1.85; white-space: pre-wrap; word-break: break-word;
}
.detail-like-area {
  flex-shrink: 0; padding: 0.85em 1.2em;
  border-top: 1px solid var(--color-border);
  display: flex; align-items: center; justify-content: center;
}
.like-btn {
  display: flex; align-items: center; gap: 0.4em;
  padding: 0.5em 1.2em;
  background: var(--color-surface-2);
  border: 1.5px solid var(--color-border);
  border-radius: var(--radius-full, 9999px);
  font-size: 0.842em; font-weight: 700;
  color: var(--color-text-secondary);
  cursor: pointer; transition: all .15s; font-family: inherit;
}
.like-btn:hover { border-color: var(--color-brand, #A0522D); color: var(--color-brand, #A0522D); background: rgba(160,82,45,.05); }
.like-btn.liked { border-color: var(--color-brand, #A0522D); color: var(--color-brand, #A0522D); background: rgba(160,82,45,.08); }

/* ── 댓글 영역 ── */
.comments-section { padding: 0 1.2em 1.2em; flex-shrink: 0; }
.comments-title {
  font-size: 0.842em; font-weight: 700; color: var(--color-text-secondary);
  margin-bottom: 0.7em; padding-top: 0.7em;
  border-top: 1px solid var(--color-border);
}
.comment-list { display: flex; flex-direction: column; gap: 0.6em; margin-bottom: 0.85em; }
.comment-item {
  background: var(--color-surface-2);
  border-radius: var(--radius-sm, 8px);
  padding: 0.7em 0.85em;
}
.comment-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.3em; }
.comment-author { font-size: 0.78em; font-weight: 700; color: var(--color-text-secondary); }
.comment-time   { font-size: 0.7em;  color: var(--color-text-tertiary); }
.comment-text   { font-size: 0.82em; color: var(--color-text-primary); line-height: 1.65; }

.comment-input-wrap { display: flex; gap: 0.5em; align-items: flex-end; }
.comment-input {
  flex: 1; border: 1.5px solid var(--color-border);
  border-radius: var(--radius-sm, 8px); padding: 0.6em 0.85em;
  font-size: 0.82em; font-family: inherit; color: var(--color-text-primary);
  resize: none; min-height: 2.5em; max-height: 6em; outline: none;
  transition: border-color .15s; background: var(--color-surface, #fff);
}
.comment-input:focus { border-color: var(--color-brand, #A0522D); }
.comment-submit {
  height: 2.5em; padding: 0 0.9em;
  background: var(--color-brand, #A0522D); color: #fff;
  border: none; border-radius: var(--radius-sm, 8px);
  font-size: 0.8em; font-weight: 700; font-family: inherit;
  cursor: pointer; white-space: nowrap; transition: background .15s; flex-shrink: 0;
}
.comment-submit:hover { background: var(--color-brand-light, #C4733A); }

/* ── 글쓰기 페이지 전환 뷰 ── */
.write-view {
  display: none;
  flex-direction: column;
  gap: 6px;
  width: 100%;
}
.write-view.active { display: flex; }

.write-back-row {
  display: flex; justify-content: flex-start; margin-bottom: 4px;
}
.write-back-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--color-surface, #fff);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-full, 9999px);
  padding: 7px 14px;
  font-size: 0.79em; font-weight: 700; font-family: inherit;
  color: var(--color-text-secondary);
  cursor: pointer; transition: background .15s;
}
.write-back-btn:hover { background: var(--color-surface-2); }

.write-card {
  background: var(--color-surface, #fff);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg, 16px);
  overflow: hidden;
}
.write-card-header {
  background: linear-gradient(135deg, var(--color-brand, #A0522D) 0%, var(--color-brand-light, #C4733A) 100%);
  padding: 1em 1.2em 0.85em;
  display: flex; align-items: center; gap: 8px;
}
.write-card-header-title { font-size: 0.95em; font-weight: 800; color: #fff; }

.write-form {
  padding: 1.2em;
  display: flex; flex-direction: column; gap: 0.9em;
}
.write-label {
  font-size: 0.8em; font-weight: 700; color: var(--color-text-primary);
  margin-bottom: 0.35em; display: block;
}
.write-select, .write-input, .write-textarea {
  width: 100%; border: 1.5px solid var(--color-border);
  border-radius: var(--radius-sm, 8px); padding: 0.6em 0.85em;
  font-size: 0.895em; font-family: inherit; color: var(--color-text-primary);
  outline: none; background: var(--color-surface, #fff); transition: border-color .15s;
  -webkit-appearance: none;
}
.write-select:focus, .write-input:focus, .write-textarea:focus {
  border-color: var(--color-brand, #A0522D);
  box-shadow: 0 0 0 3px rgba(160, 82, 45, .1);
}
.write-textarea { resize: vertical; min-height: 10em; }
.anon-row { display: flex; align-items: center; gap: 0.5em; font-size: 0.82em; color: var(--color-text-secondary); }
.anon-row input { accent-color: var(--color-brand, #A0522D); }

/* 첨부파일 */
.attach-zone {
  border: 2px dashed var(--color-border);
  border-radius: var(--radius-md, 12px);
  padding: 1em;
  background: var(--color-surface-2);
  transition: border-color .15s;
}
.attach-zone:hover { border-color: var(--color-brand, #A0522D); }
.attach-trigger {
  display: flex; align-items: center; gap: 8px;
  cursor: pointer;
}
.attach-trigger-icon {
  width: 36px; height: 36px; border-radius: var(--radius-sm, 8px);
  background: var(--color-surface, #fff);
  border: 1.5px solid var(--color-border);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1em; flex-shrink: 0;
}
.attach-trigger-text { font-size: 0.82em; color: var(--color-text-secondary); line-height: 1.5; }
.attach-trigger-text strong { display: block; color: var(--color-text-primary); font-size: 0.95em; }
.attach-trigger-sub { font-size: 0.75em; color: var(--color-text-tertiary); margin-top: 2px; }
.attach-file-input { display: none; }

.attach-preview-list {
  display: flex; flex-direction: column; gap: 6px; margin-top: 10px;
}
.attach-item {
  display: flex; align-items: center; gap: 8px;
  background: var(--color-surface, #fff);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm, 8px);
  padding: 7px 10px;
}
.attach-item-thumb {
  width: 36px; height: 36px; border-radius: 6px;
  object-fit: cover; flex-shrink: 0;
  background: var(--color-surface-2);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2em; overflow: hidden;
}
.attach-item-thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; }
.attach-item-info { flex: 1; min-width: 0; }
.attach-item-name { font-size: 0.79em; font-weight: 700; color: var(--color-text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.attach-item-size { font-size: 0.72em; color: var(--color-text-tertiary); margin-top: 2px; }
.attach-item-remove {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--color-surface-2);
  border: 1px solid var(--color-border);
  color: var(--color-text-tertiary);
  font-size: 0.75em; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.attach-item-remove:hover { background: #fde8e8; color: #c0392b; border-color: #e8b4b4; }
.attach-count-note { font-size: 0.75em; color: var(--color-text-tertiary); margin-top: 6px; }

.write-footer {
  padding: 1em 1.2em;
  border-top: 1px solid var(--color-border);
  display: flex; gap: 0.6em;
}
.write-cancel {
  flex: 1; padding: 0.75em;
  background: var(--color-surface-2);
  border: 1.5px solid var(--color-border);
  border-radius: var(--radius-sm, 8px);
  font-size: 0.895em; font-weight: 700; font-family: inherit;
  cursor: pointer; color: var(--color-text-secondary); transition: background .15s;
}
.write-cancel:hover { background: var(--color-border); }
.write-submit {
  flex: 2; padding: 0.75em;
  background: var(--color-brand, #A0522D); color: #fff;
  border: none; border-radius: var(--radius-sm, 8px);
  font-size: 0.895em; font-weight: 700; font-family: inherit;
  cursor: pointer; transition: background .15s;
}
.write-submit:hover    { background: var(--color-brand-light, #C4733A); }
.write-submit:disabled { background: #ccc; cursor: not-allowed; }

/* 업로드 진행바 */
.upload-progress {
  display: none; margin-top: 8px;

/* ── 상세 추가 정보 (상품/인수 Q&A) ── */
.detail-extra-list {
  display: flex; flex-direction: column; gap: 4px;

  border-radius: var(--radius-md, 12px);

}

/* ── 수정/삭제 액션바 ── */
.detail-action-bar {
  flex-shrink: 0;
  padding: 0.6em 1.2em;
  border-top: 1px solid var(--color-border);
  display: flex;
  gap: 0.5em;
  justify-content: flex-end;
  background: var(--color-surface-2);
}
.detail-edit-btn, .detail-delete-btn {
  padding: 0.4em 0.95em;

  cursor: pointer; border: 1.5px solid; transition: all .15s;

.detail-edit-btn {
  background: var(--color-surface, #fff);
  border-color: var(--color-border);
  color: var(--color-text-secondary);

.detail-delete-btn {
  background: var(--color-surface, #fff);
  border-color: #e8b4b4;
  color: #c0392b;
}
.detail-delete-btn:hover { background: #fde8e8; }

/* ── 첨부파일 표시 ── */
.detail-attach-list { display: flex; flex-direction: column; gap: 6px; }
.detail-attach-label {
  font-size: 0.78em; font-weight: 700;
  color: var(--color-text-secondary);
  margin-bottom: 6px;
}
.detail-attach-item {
  display: flex; align-items: center; gap: 8px;
  background: var(--color-surface-2);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm, 8px);
  padding: 7px 10px;
  text-decoration: none;
  transition: border-color .15s;

.detail-attach-item:hover { border-color: var(--color-brand, #A0522D); }
.detail-attach-thumb {
  width: 36px; height: 36px; border-radius: 6px;

  background: var(--color-surface, #fff);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2em; overflow: hidden;

.detail-attach-thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; }

  flex: 1; font-size: 0.82em; color: var(--color-text-primary);

<script>
(function() {

/* ── 상수 ── */
var BOARD_CATEGORIES = {
  hub:     ['전체', '공지사항', '상품Q&A', '인수Q&A'],
  team:    ['전체', '공지사항', '상품Q&A', '인수Q&A'],
  branch:  ['전체', '공지사항', '상품Q&A', '인수Q&A'],
  insurer: ['전체', '공지사항', '상품Q&A', '인수Q&A', '보험사 공지']
};
var BOARD_LABEL = {
  hub: '허브게시판', team: '팀게시판',
  branch: '지점게시판', insurer: '보험사게시판'
};
var CAT_CLASS = {
  '공지사항': 'notice', '상품Q&A': 'product',
  '인수Q&A': 'underwriting', '보험사 공지': 'notice'
};

/* ── 페이지 로컬 상태 ── */
var _currentBoard    = 'hub';
var _currentCategory = 'all';
var _allPosts        = [];
var _currentPostId   = null;
var _editingPostId   = null;   /* 수정 모드일 때 대상 postId */
var _userOrg         = null;

/* 보험사 게시판 전용 상태 */
var _insurerType     = 'all';   /* all / nonlife / life */
var _insurerName     = '';      /* 선택된 특정 보험사명 */
var _insurerCategory = 'all';   /* all / 공지사항 / 상품Q&A / 인수Q&A */

/* ── 유틸 ── */
function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(iso) {
  if (!iso) return '';
  var d = new Date(iso);
  var now = new Date();
  var diff = (now - d) / 1000;
  if (diff < 60)    return '방금 전';
  if (diff < 3600)  return Math.floor(diff / 60)   + '분 전';
  if (diff < 86400) return Math.floor(diff / 3600)  + '시간 전';
  var mm = String(d.getMonth() + 1).padStart(2, '0');
  var dd = String(d.getDate()).padStart(2, '0');
  return d.getFullYear() + '.' + mm + '.' + dd;
}

function buildEmpty(icon, title, desc, subItems) {
  var subHtml = '';
  if (subItems && subItems.length) {
    subHtml = '<div class="empty-sub-list">'
      + subItems.map(function(s) {
          return '<div class="empty-sub-item">'
            + '<span class="empty-sub-icon">' + s.icon + '</span>'
            + '<span class="empty-sub-text">' + s.text + '</span>'
            + '</div>';
        }).join('')
      + '</div>';
  }
  return '<div class="empty-state">'
    + '<div class="empty-icon">'  + icon  + '</div>'
    + '<div class="empty-title">' + title + '</div>'
    + '<div class="empty-desc">'  + desc  + '</div>'
    + subHtml
    + '</div>';
}

function _onboardingTip(icon, label, desc) {
  return '<div style="'
    +   'display:flex;align-items:center;gap:.7em;'
    +   'background:var(--color-surface-2);'
    +   'border:1px solid var(--color-border);'
    +   'border-radius:var(--radius-sm,8px);'
    +   'padding:.55em .85em;text-align:left;'
    + '">'
    +   '<span style="font-size:1.1em;flex-shrink:0;">' + icon + '</span>'
    +   '<div>'
    +     '<div style="font-size:.8em;font-weight:700;color:var(--color-text-primary);">' + label + '</div>'
    +     '<div style="font-size:.74em;color:var(--color-text-tertiary);">' + desc + '</div>'
    +   '</div>'
    + '</div>';
}

function _extraRow(label, value) {
  return '<div class="detail-extra-row">'
    + '<span class="detail-extra-label">' + label + '</span>'
    + '<span class="detail-extra-value">' + escHtml(String(value)) + '</span>'
    + '</div>';
}

/* ── [2026-04-17] 1차 탭 가시성 상태 (app_settings 반영) ── */
/* 기본값: 허브 표시 / 팀·지점 항상 표시(잠금) / 보험사 숨김 */
var _boardTabVisible = { hub: true, team: true, branch: true, insurer: false };

/* ── [2026-04-17] app_settings에서 1차 탭 설정 로드 ── */
function _loadBoardTabSettings() {
  if (!window.db || !window.db.fetch) {
    return Promise.resolve();
  }
  return window.db.fetch('/rest/v1/app_settings?group_name=eq.board_tab&select=key,value')
    .then(function(r) { return r.ok ? r.json() : []; })
    .then(function(rows) {
      if (!rows || !rows.length) return; /* DB 레코드 없으면 기본값 유지 */
      var map = {};
      rows.forEach(function(r) { map[r.key] = r.value; });
      /* 허브: 기본 표시, 명시적 'false'일 때만 숨김 */
      if (map.board_tab_hub !== undefined) {
        _boardTabVisible.hub = map.board_tab_hub !== 'false';
      }
      /* 보험사: 기본 숨김, 명시적 'true'일 때만 표시 (v2.0 대기) */
      if (map.board_tab_company !== undefined) {
        _boardTabVisible.insurer = map.board_tab_company === 'true';
      }
      /* 팀·지점은 잠금 — 토글 무시 */
    })
    .catch(function(e) { console.warn('[board] app_settings 로드 실패', e); });
}

/* ── [2026-04-17] 1차 탭 가시성 적용 + 기본 탭 결정 ── */
function _applyBoardTabVisibility() {
  var bar = document.getElementById('board-tab-bar');
  if (!bar) return 'hub';
  /* [2026-04-27] admin은 화면설정 무시 — 모든 탭 표시 + 기본은 hub
     CLAUDE.md "화면설정 무시 대상: admin 만" 원칙. branch_manager 미포함(콘텐츠 정책) */
  var role = (window.AppState && window.AppState.role) || '';
  var isAdmin = (role === 'admin');
  ['hub','team','branch','insurer'].forEach(function(key) {
    var btn = bar.querySelector('.pg-tab-btn[data-board="' + key + '"]');
    if (!btn) return;
    btn.style.display = (isAdmin || _boardTabVisible[key]) ? '' : 'none';
  });
  if (isAdmin) return 'hub';
  /* 표시 가능한 첫 번째 탭을 기본으로 */
  var order = ['hub','team','branch','insurer'];
  for (var i = 0; i < order.length; i++) {
    if (_boardTabVisible[order[i]]) return order[i];
  }
  return 'hub'; /* 안전망 */
}

/* ── 초기화: appstate:ready 표준 패턴 ── */
function _boot() {
  var s = window.AppState;
  /* [2026-04-17] app_settings 로드 → 탭 가시성 적용 → _switchBoard */
  _loadBoardTabSettings().then(function() {
    var defaultBoard = _applyBoardTabVisibility();

    if (s && s.org) {
      _userOrg = s.org;
      _switchBoard(defaultBoard);
      _bindOverlayClose();
    } else if (s && s.userId) {
      window.db.fetch('/rest/v1/users?id=eq.' + s.userId + '&select=company,branch,team')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data && data[0]) {
            _userOrg = {
              company: data[0].company || '',
              branch:  data[0].branch  || '',
              team:    data[0].team    || ''
            };
          }
          _switchBoard(defaultBoard);
          _bindOverlayClose();
        })
        .catch(function(e) {
          console.warn('org 로드 실패', e);
          _switchBoard(defaultBoard);
          _bindOverlayClose();
        });
    } else {
      _switchBoard(defaultBoard);
      _bindOverlayClose();
    }
  });
}

if (window.AppState && window.AppState.ready) {
  _boot();
} else {
  document.addEventListener('appstate:ready', function() { _boot(); }, { once: true });
}

/* ── 탭 전환 ── */
function _switchBoard(board) {
  _currentBoard    = board;
  _currentCategory = 'all';

  /* 탭 버튼 active */
  document.querySelectorAll('#board-tab-bar .pg-tab-btn').forEach(function(t) { t.classList.remove('active'); });
  var tab = document.querySelector('#board-tab-bar .pg-tab-btn[data-board="' + board + '"]');
  if (tab) tab.classList.add('active');

  /* 허브 안내 표시/숨김 */
  var notice = document.getElementById('hub-notice');
  if (notice) notice.style.display = (board === 'hub') ? 'flex' : 'none';

  /* 일반 뷰 / 보험사 뷰 전환 */
  var normalView  = document.getElementById('normal-board-view');
  var insurerView = document.getElementById('insurer-board-view');
  if (board === 'insurer') {
    if (normalView)  normalView.style.display  = 'none';
    if (insurerView) insurerView.style.display = 'block';
    /* 보험사 게시판 상태 초기화 */
    _insurerType     = 'all';
    _insurerName     = '';
    _insurerCategory = 'all';
    _resetInsurerUI();
    _loadPosts();
  } else {
    if (normalView)  normalView.style.display  = '';
    if (insurerView) insurerView.style.display = 'none';

    /* 글쓰기 버튼 표시 여부 */
    var wb   = document.getElementById('write-btn');
    var role = (window.AppState && window.AppState.role) || '';
    if (wb) {
      wb.style.display = (board === 'hub') ? 'none' : 'block';
    }

    _renderCategoryPills(board);
    _loadPosts();
  }
}
window.switchBoard = _switchBoard;

/* 보험사 게시판 UI 초기화 */
function _resetInsurerUI() {
  /* 세그먼트 버튼 초기화 */
  document.querySelectorAll('.insurer-seg-btn').forEach(function(b) { b.classList.remove('active'); });
  var firstBtn = document.querySelector('.insurer-seg-btn');
  if (firstBtn) firstBtn.classList.add('active');
  /* 드롭다운 숨김 */
  document.querySelectorAll('.insurer-dropdown').forEach(function(s) {
    s.classList.remove('visible');
    s.selectedIndex = 0;
  });
  /* 카테고리 탭 초기화 */
  document.querySelectorAll('.insurer-cat-btn').forEach(function(b) { b.classList.remove('active'); });
  var firstCat = document.querySelector('.insurer-cat-btn');
  if (firstCat) firstCat.classList.add('active');
}

/* 보험사 구분 선택 (전체 / 손해보험 / 생명보험) */
window.selectInsurerType = function(type) {
  _insurerType = type;
  _insurerName = '';
  /* 세그먼트 버튼 active */
  var btns = document.querySelectorAll('.insurer-seg-btn');
  btns.forEach(function(b) { b.classList.remove('active'); });
  var idx = { all: 0, nonlife: 1, life: 2 }[type] || 0;
  if (btns[idx]) btns[idx].classList.add('active');
  /* 드롭다운 표시/숨김 */
  var nonlifeSelect = document.getElementById('insurer-nonlife-select');
  var lifeSelect    = document.getElementById('insurer-life-select');
  if (nonlifeSelect) { nonlifeSelect.classList.toggle('visible', type === 'nonlife'); nonlifeSelect.selectedIndex = 0; }
  if (lifeSelect)    { lifeSelect.classList.toggle('visible',    type === 'life');    lifeSelect.selectedIndex = 0; }
  _renderInsurerPostList();
};

/* 보험사 드롭다운 변경 */
window.onInsurerSelectChange = function(type, value) {
  _insurerName = value || '';
  _renderInsurerPostList();
};

/* 보험사 카테고리 탭 선택 */
window.selectInsurerCat = function(cat) {
  _insurerCategory = cat;
  document.querySelectorAll('.insurer-cat-btn').forEach(function(b) { b.classList.remove('active'); });
  var btns = document.querySelectorAll('.insurer-cat-btn');
  var labels = ['all', '공지사항', '상품Q&A', '인수Q&A'];
  var idx = labels.indexOf(cat);
  if (btns[idx]) btns[idx].classList.add('active');
  _renderInsurerPostList();
};

/* 보험사 게시판 글 목록 렌더링 */
function _renderInsurerPostList() {
  var list = document.getElementById('insurer-post-list');
  if (!list) return;
  var posts = _allPosts.slice();
  /* 보험 구분 필터 */
  if (_insurerType === 'nonlife') {
    posts = posts.filter(function(p) { return p.insurance_type === 'nonlife'; });
  } else if (_insurerType === 'life') {
    posts = posts.filter(function(p) { return p.insurance_type === 'life'; });
  }
  /* 특정 보험사 필터 */
  if (_insurerName) {
    posts = posts.filter(function(p) {
      return (p.insurer_name || p.target_insurer_name || '') === _insurerName;
    });
  }
  /* 카테고리 필터 */
  if (_insurerCategory !== 'all') {
    posts = posts.filter(function(p) { return p.category === _insurerCategory; });
  }
  if (!posts.length) {
    list.innerHTML = buildEmpty('📭', '게시글이 없습니다', '조건을 바꿔보거나 첫 질문을 남겨보세요!');
    return;
  }
  list.innerHTML = posts.map(_buildInsurerPostItem).join('');
}

/* 보험사 게시판 전용 글 아이템 빌더 */
function _buildInsurerPostItem(p) {
  var catClass     = CAT_CLASS[p.category] || 'product';
  var badgeVariant = (catClass === 'notice') ? 'brd-badge-notice'
                   : (catClass === 'underwriting') ? 'brd-badge-question'
                   : 'brd-badge-info';
  var isNew        = p.created_at && (Date.now() - new Date(p.created_at)) < 86400000;
  var preview      = (p.content || '').replace(/\n/g, ' ').substring(0, 80);
  var typeLabel    = p.insurance_type === 'nonlife' ? '손해' : p.insurance_type === 'life' ? '생명' : '';
  var typeCls      = p.insurance_type === 'nonlife' ? 'nonlife' : 'life';
  var insurerBadge = typeLabel
    ? '<span class="ins-type-badge ' + typeCls + '">' + typeLabel + '</span>' : '';
  var insurerName  = escHtml(p.insurer_name || p.target_insurer_name || '');
  return '<div class="brd-item" onclick="window.openDetail(\'' + p.id + '\')">'
    + '<span class="brd-badge ' + badgeVariant + '">' + escHtml(p.category || '') + '</span>'
    + '<div class="brd-main">'
    + '<div class="brd-title">' + insurerBadge + escHtml(p.title || '') + (isNew ? '<span class="brd-new-dot"></span>' : '') + '</div>'
    + (insurerName ? '<div class="brd-insurer-name">' + insurerName + '</div>' : '')
    + (preview ? '<div class="brd-excerpt">' + escHtml(preview) + '</div>' : '')
    + '<div class="brd-meta">'
    + '<strong>' + escHtml(p.display_name || p.author_name || '알 수 없음') + '</strong>'
    + '<span>' + fmtDate(p.created_at) + '</span>'
    + '<span>👁 ' + (p.view_count || 0) + '</span>'
    + '<span>❤️ ' + (p.like_count || 0) + '</span>'
    + '<span>💬 ' + (p.comment_count || 0) + '</span>'
    + '</div>'
    + '</div>'
    + '</div>';
}

function _renderCategoryPills(board) {
  var cats = BOARD_CATEGORIES[board] || ['전체'];
  var container = document.getElementById('category-pills');
  if (!container) return;
  container.innerHTML = cats.map(function(c) {
    var val = (c === '전체') ? 'all' : c;
    var isActive = (val === 'all' && _currentCategory === 'all') || val === _currentCategory;
    return '<div class="cat-pill ' + (isActive ? 'active' : '') + '" onclick="window.selectCategory(\'' + val + '\')">' + c + '</div>';
  }).join('');
}

window.selectCategory = function(cat) {
  _currentCategory = cat;
  _renderCategoryPills(_currentBoard);
  _renderPostList();
};

/* ── 게시글 로드 ── */
async function _loadPosts() {
  var list = document.getElementById('post-list');
  if (!list) return;
  list.innerHTML = '<div class="loading-msg">불러오는 중...</div>';
  try {
    var board = _currentBoard;
    var org   = _userOrg || {};
    var path  = '';

    if (board === 'hub') {
      path = '/rest/v1/posts?is_hub_visible=eq.true&order=created_at.desc';
    } else if (board === 'team') {
      if (!org.team) {
        list.innerHTML = buildEmpty('👥', '소속 팀 정보가 없습니다', '내 정보 수정에서 팀명을 등록해 주세요.');
        return;
      }
      var orgId = encodeURIComponent(org.company + '_' + org.branch + '_' + org.team);
      path = '/rest/v1/posts?board_type=eq.team&organization_id=eq.' + orgId + '&order=created_at.desc';
    } else if (board === 'branch') {
      if (!org.branch) {
        list.innerHTML = buildEmpty('🏢', '소속 지점 정보가 없습니다', '내 정보 수정에서 지점명을 등록해 주세요.');
        return;
      }
      var orgId2 = encodeURIComponent(org.company + '_' + org.branch);
      path = '/rest/v1/posts?board_type=eq.branch&organization_id=eq.' + orgId2 + '&order=created_at.desc';
    } else {
      path = '/rest/v1/posts?board_type=eq.insurer&order=created_at.desc';
    }

    var res  = await window.db.fetch(path);
    var data = await res.json();
    _allPosts = Array.isArray(data) ? data : [];
    if (_currentBoard === 'insurer') {
      _renderInsurerPostList();
    } else {
      _renderPostList();
    }
  } catch(e) {
    console.error(e);
    var list2 = document.getElementById('post-list');
    if (list2) list2.innerHTML = buildEmpty('⚠️', '불러오기 실패', '잠시 후 다시 시도해 주세요.');
  }
}

function _renderPostList() {
  var list = document.getElementById('post-list');
  if (!list) return;
  var posts = _allPosts.slice();
  if (_currentCategory !== 'all') {
    posts = posts.filter(function(p) { return p.category === _currentCategory; });
  }
  if (!posts.length) {
    /* 전체 글이 0개 → 온보딩 카드 */
    if (!_allPosts.length) {
      if (_currentBoard === 'hub') {
        list.innerHTML = buildEmpty('🌐', '허브게시판에 아직 게시글이 없습니다', '팀·지점 게시판의 좋은 글이 승인 후 이곳에 모입니다.');
      } else if (_currentBoard === 'insurer') {
        list.innerHTML = buildEmpty('🏦', '보험사게시판에 아직 게시글이 없습니다', '첫 글을 작성해보세요!');
      } else {
        var boardName = _currentBoard === 'team' ? '팀' : '지점';
        var orgName   = '';
        if (_userOrg) {
          orgName = _currentBoard === 'team'
            ? (_userOrg.team   || '')
            : (_userOrg.branch || '');
        }
        var titleStr = orgName ? orgName + ' 게시판 오픈을 축하합니다 🎉' : boardName + '게시판이 열렸습니다 🎉';
        list.innerHTML = ''
          + '<div style="'
          +   'background:var(--color-surface,#fff);'
          +   'border:1.5px solid rgba(160,82,45,.25);'
          +   'border-radius:var(--radius-lg,16px);'
          +   'padding:1.8em 1.4em;'
          +   'text-align:center;'
          + '">'
          +   '<div style="font-size:2.4em;margin-bottom:.5em;">🎊</div>'
          +   '<div style="font-size:1em;font-weight:800;color:var(--color-text-primary);margin-bottom:.5em;">' + escHtml(titleStr) + '</div>'
          +   '<div style="font-size:.82em;color:var(--color-text-secondary);line-height:1.8;margin-bottom:1.4em;">'
          +     '이제 이 게시판에서 함께 정보를 쌓아가요.<br>'
          +     '상품 Q&A, 인수 케이스, 공지사항 — 카카오톡에서<br>위로 밀려 사라지던 정보를 여기서 잡아두세요.<br><br>'
          +     '💡 팀원이 많을수록 더 유용해집니다. 팀원을 초대해보세요!'
          +   '</div>'
          +   '<div style="display:flex;flex-direction:column;gap:.55em;max-width:280px;margin:0 auto;">'
          +     _onboardingTip('📌', '공지사항', '팀장·실장 공지를 고정해두세요')
          +     _onboardingTip('💊', '상품 Q&A', '상품·특약 궁금증을 올려보세요')
          +     _onboardingTip('🏥', '인수 Q&A', '인수 케이스를 공유하면 팀 전체 자산이 됩니다')
          +   '</div>'
          + '</div>';
      }
    } else {
      /* 글은 있지만 해당 카테고리 글이 없을 때 */
      list.innerHTML = buildEmpty('📭', '해당 카테고리에 게시글이 없습니다', '다른 카테고리를 선택하거나 첫 글을 작성해보세요!');
    }
    return;
  }
  list.innerHTML = posts.map(_buildPostItem).join('');
}

function _buildPostItem(p) {
  var catClass = CAT_CLASS[p.category] || 'product';
  var badgeVariant = (catClass === 'notice') ? 'brd-badge-notice'
                   : (catClass === 'underwriting') ? 'brd-badge-question'
                   : 'brd-badge-info';
  var isNew    = p.created_at && (Date.now() - new Date(p.created_at)) < 86400000;
  var preview  = (p.content || '').replace(/\n/g, ' ').substring(0, 80);
  return '<div class="brd-item" onclick="window.openDetail(\'' + p.id + '\')">'
    + '<span class="brd-badge ' + badgeVariant + '">' + escHtml(p.category || '') + '</span>'
    + '<div class="brd-main">'
    + '<div class="brd-title">' + escHtml(p.title || '') + (isNew ? '<span class="brd-new-dot"></span>' : '') + '</div>'
    + (preview ? '<div class="brd-excerpt">' + escHtml(preview) + '</div>' : '')
    + '<div class="brd-meta">'
    + '<strong>' + escHtml(p.display_name || p.author_name || '알 수 없음') + '</strong>'
    + '<span>' + fmtDate(p.created_at) + '</span>'
    + '<span>👁 ' + (p.view_count || 0) + '</span>'
    + '<span>❤️ ' + (p.like_count || 0) + '</span>'
    + '<span>💬 ' + (p.comment_count || 0) + '</span>'
    + '</div>'
    + '</div>'
    + '</div>';
}

/* ── 게시글 상세 ── */
window.openDetail = async function(postId) {
  _currentPostId = postId;
  var post = _allPosts.find(function(p) { return String(p.id) === String(postId); });
  if (!post) return;

  window.db.fetch('/rest/v1/posts?id=eq.' + postId, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
    body: JSON.stringify({ view_count: (post.view_count || 0) + 1 })
  }).catch(function() {});

  var catClass  = CAT_CLASS[post.category] || 'product';
  var badge     = document.getElementById('detail-cat-badge');
  var titleEl   = document.getElementById('detail-title');
  var authorEl  = document.getElementById('detail-author');
  var timeEl    = document.getElementById('detail-time');
  var viewsEl   = document.getElementById('detail-views');
  var contentEl = document.getElementById('detail-content');
  var likeCount = document.getElementById('like-count');

  if (badge)     { badge.textContent = post.category || ''; badge.className = 'detail-cat-badge ' + catClass; }
  if (titleEl)   titleEl.textContent   = post.title   || '';
  if (authorEl)  authorEl.textContent  = post.display_name || post.author_name || '알 수 없음';
  if (timeEl)    timeEl.textContent    = fmtDate(post.created_at);
  if (viewsEl)   viewsEl.textContent   = (post.view_count || 0) + 1;
  if (contentEl) contentEl.textContent = post.content || '';
  if (likeCount) likeCount.textContent = post.like_count || 0;

  /* 카테고리별 추가 정보 표시 */
  var extraArea = document.getElementById('detail-extra-fields');
  if (extraArea) {
    var extraHtml = '';
    if (post.category === '상품Q&A') {
      if (post.insurer_name)     extraHtml += _extraRow('🏦 보험사', post.insurer_name);
      if (post.product_category) extraHtml += _extraRow('📦 상품 카테고리', post.product_category);
    }
    if (post.category === '인수Q&A') {
      var ageGender = [post.patient_age ? post.patient_age + '세' : '', post.patient_gender || ''].filter(Boolean).join(' / ');
      if (ageGender)               extraHtml += _extraRow('👤 나이/성별', ageGender);
      if (post.disease_name)       extraHtml += _extraRow('🏥 질병명', post.disease_name);
      if (post.diagnosis_timing)   extraHtml += _extraRow('📅 진단 시기', post.diagnosis_timing);
      if (post.current_status)     extraHtml += _extraRow('💊 현재 상태', post.current_status);
    }
    if (extraHtml) {
      extraArea.style.display = 'block';
      extraArea.innerHTML = '<div class="detail-extra-list">' + extraHtml + '</div>';
    } else {
      extraArea.style.display = 'none';
      extraArea.innerHTML = '';
    }
  }

  /* 수정/삭제 버튼 노출 여부 (매니저 이상 = 관리자급 권한) */
  var s = window.AppState || {};
  var isAuthor = post.author_id && s.userId && String(post.author_id) === String(s.userId);
  var isAdmin  = !!(window.Auth && window.Auth.isFreeTier(s.role));
  var actionBar = document.getElementById('detail-action-bar');
  if (actionBar) actionBar.style.display = (isAuthor || isAdmin) ? 'flex' : 'none';

  /* 첨부파일 렌더링 */
  var attachArea = document.getElementById('detail-attachments');
  if (attachArea) {
    var attachUrls = [];
    try { attachUrls = post.attachments ? JSON.parse(post.attachments) : []; } catch(e) {}
    if (attachUrls.length) {
      attachArea.style.display = 'block';
      attachArea.innerHTML = '<div class="detail-attach-label">📎 첨부파일 (' + attachUrls.length + '개)</div>'
        + '<div class="detail-attach-list">'
        + attachUrls.map(function(url) {
            var fileName = decodeURIComponent(url.split('/').pop().replace(/^\d+_\d+_\d+\./, ''));
            var ext = (url.split('.').pop() || '').toLowerCase();
            var isImg = ['jpg','jpeg','png','gif','webp'].includes(ext);
            var thumbHtml = isImg
              ? '<img src="' + url + '" alt="">'
              : (ext === 'pdf' ? '📄' : '📊');
            return '<a class="detail-attach-item" href="' + url + '" target="_blank" download>'
              + '<div class="detail-attach-thumb">' + thumbHtml + '</div>'
              + '<span class="detail-attach-name">' + escHtml(fileName) + '</span>'
              + '<span class="detail-attach-dl">↓ 다운로드</span>'
              + '</a>';
          }).join('')
        + '</div>';
    } else {
      attachArea.style.display = 'none';
      attachArea.innerHTML = '';
    }
  }

  var likeBtn = document.getElementById('like-btn');
  if (likeBtn) likeBtn.classList.remove('liked');

  await _loadComments(postId);

  var overlay = document.getElementById('detail-overlay');
  if (overlay) { overlay.classList.add('active'); document.body.style.overflow = 'hidden'; }
};

window.closeDetail = function() {
  var overlay = document.getElementById('detail-overlay');
  if (overlay) overlay.classList.remove('active');
  document.body.style.overflow = '';
  _currentPostId = null;
};

/* ── 좋아요 ── */
window.toggleLike = async function() {
  if (!_currentPostId) return;
  var likeBtn   = document.getElementById('like-btn');
  var likeCount = document.getElementById('like-count');
  var post = _allPosts.find(function(p) { return String(p.id) === String(_currentPostId); });
  if (!post || !likeBtn || !likeCount) return;

  var isLiked  = likeBtn.classList.contains('liked');
  var newCount = isLiked
    ? Math.max(0, (post.like_count || 0) - 1)
    : (post.like_count || 0) + 1;

  likeBtn.classList.toggle('liked');
  likeCount.textContent = newCount;
  post.like_count = newCount;

  try {
    await window.db.fetch('/rest/v1/posts?id=eq.' + _currentPostId, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ like_count: newCount })
    });
  } catch(e) { console.error(e); }
};

/* ── 댓글 ── */
async function _loadComments(postId) {
  var commentList = document.getElementById('comment-list');
  var countLabel  = document.getElementById('comment-count-label');
  if (!commentList) return;
  commentList.innerHTML = '<div style="font-size:0.78em;color:var(--color-text-tertiary);padding:0.4em 0;">불러오는 중...</div>';
  try {
    var res     = await window.db.fetch('/rest/v1/comments?post_id=eq.' + postId + '&order=created_at.asc&select=id,post_id,content,author_id,author_name,created_at');
    var data    = await res.json();
    var replies = Array.isArray(data) ? data : [];
    if (countLabel) countLabel.textContent = '(' + replies.length + ')';
    commentList.innerHTML = replies.length
      ? replies.map(function(r) {
          return '<div class="comment-item">'
            + '<div class="comment-header">'
            + '<span class="comment-author">' + escHtml(r.display_name || r.author_name || '알 수 없음') + '</span>'
            + '<span class="comment-time">'   + fmtDate(r.created_at) + '</span>'
            + '</div>'
            + '<div class="comment-text">' + escHtml(r.content || '') + '</div>'
            + '</div>';
        }).join('')
      : '<div style="font-size:0.78em;color:var(--color-text-tertiary);padding:0.4em 0;">첫 댓글을 남겨보세요!</div>';
  } catch(e) {
    commentList.innerHTML = '<div style="font-size:0.78em;color:var(--color-text-tertiary);">댓글을 불러올 수 없습니다.</div>';
  }
}

window.submitComment = async function() {
  var input = document.getElementById('comment-input');
  if (!input) return;
  var text = input.value.trim();
  if (!text || !_currentPostId) return;

  var btn = document.querySelector('.comment-submit');
  if (btn) { btn.disabled = true; btn.textContent = '등록 중...'; }

  var s = window.AppState || {};
  try {
    var cRes = await window.db.fetch('/rest/v1/comments', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({
        post_id:     _currentPostId,
        content:     text,
        author_id:   String(s.userId || ''),
        author_name: s.name || '알 수 없음'
      })
    });
    if (!cRes.ok) {
      var errMsg = await cRes.text().catch(function() { return ''; });
      throw new Error('comment insert ' + cRes.status + ' ' + errMsg);
    }
    var post = _allPosts.find(function(p) { return String(p.id) === String(_currentPostId); });
    if (post) {
      var newCnt = (post.comment_count || 0) + 1;
      post.comment_count = newCnt;
      window.db.fetch('/rest/v1/posts?id=eq.' + _currentPostId, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify({ comment_count: newCnt })
      }).catch(function() {});
    }
    input.value = '';
    input.style.height = '';
    await _loadComments(_currentPostId);
  } catch(e) {
    alert('댓글 등록 중 오류가 발생했습니다.');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '등록'; }
  }
};

window.autoResizeComment = function(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 96) + 'px';
};

/* ── 수정 ── */
window.editPost = function() {
  var post = _allPosts.find(function(p) { return String(p.id) === String(_currentPostId); });
  if (!post) return;

  /* 상세 오버레이 닫기 */
  window.closeDetail();

  /* 글쓰기 뷰 열기 + 기존 내용 채우기 */
  window.openWriteView();
  var titleEl   = document.getElementById('write-title');
  var contentEl = document.getElementById('write-content');
  var catEl     = document.getElementById('write-category');
  if (titleEl)   titleEl.value   = post.title   || '';
  if (contentEl) contentEl.value = post.content || '';
  if (catEl && post.category) {
    Array.from(catEl.options).forEach(function(opt) {
      if (opt.value === post.category) opt.selected = true;
    });
  }

  /* 추가 필드 복원 */
  _switchFormFields(post.category || '');
  if (post.category === '상품Q&A') {
    var prodCatEl  = document.getElementById('write-product-category');
    if (prodCatEl)  prodCatEl.value  = post.product_category || '';
    /* 보험사 드롭다운 복원 */
    if (post.insurer_name && post.insurance_type) {
      window.formSelectInsurerType(post.insurance_type);
      var selId = post.insurance_type === 'nonlife' ? 'write-insurer-nonlife' : 'write-insurer-life';
      var selEl = document.getElementById(selId);
      if (selEl) {
        Array.from(selEl.options).forEach(function(o) { if (o.value === post.insurer_name) o.selected = true; });
      }
    }
  }
  if (post.category === '인수Q&A') {
    var ageEl      = document.getElementById('write-age');
    var genderEl   = document.getElementById('write-gender');
    var diseaseEl  = document.getElementById('write-disease');
    var diagEl     = document.getElementById('write-diagnosis-timing');
    var statusEl   = document.getElementById('write-current-status');
    if (ageEl)     ageEl.value    = post.patient_age       || '';
    if (genderEl)  genderEl.value = post.patient_gender    || '';
    if (diseaseEl) diseaseEl.value = post.disease_name     || '';
    if (diagEl)    diagEl.value   = post.diagnosis_timing  || '';
    if (statusEl)  statusEl.value = post.current_status    || '';
  }

  /* 수정 모드 플래그 — submitPost에서 PATCH로 처리 */
  _editingPostId = String(post.id);

  /* 헤더 타이틀 변경 */
  var viewTitle = document.getElementById('write-view-title');
  if (viewTitle) viewTitle.textContent = '✏️ 글 수정';

  /* 등록 버튼 텍스트 변경 */
  var submitBtn = document.querySelector('.write-submit');
  if (submitBtn) submitBtn.textContent = '수정 완료';
};

/* ── 삭제 ── */
window.deletePost = async function() {
  if (!_currentPostId) return;
  if (!confirm('이 게시글을 삭제하시겠습니까?')) return;
  try {
    await window.db.fetch('/rest/v1/posts?id=eq.' + _currentPostId, {
      method: 'DELETE',
      headers: { 'Prefer': 'return=minimal' }
    });
    window.closeDetail();
    await _loadPosts();
  } catch(e) {
    alert('삭제 중 오류가 발생했습니다.');
    console.error(e);
  }
};

/* 첨부파일 상태 */
var _attachFiles = [];

/* ── 카테고리별 추가 필드 전환 ── */
function _switchFormFields(category) {
  var fp = document.getElementById('fields-product');
  var fu = document.getElementById('fields-underwriting');
  if (fp) fp.style.display = (category === '상품Q&A') ? 'flex' : 'none';
  if (fu) fu.style.display = (category === '인수Q&A') ? 'flex' : 'none';

function _clearExtraFields() {
  ['write-product-category','write-age','write-disease',
   'write-diagnosis-timing','write-current-status'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.value = '';
  });
  var gender = document.getElementById('write-gender');
  if (gender) gender.value = '';
  /* 보험사 드롭다운 초기화 */
  ['write-insurer-nonlife','write-insurer-life',
   'write-uw-insurer-nonlife','write-uw-insurer-life'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) { el.selectedIndex = 0; el.style.display = 'none'; }
  });
  ['form-type-nonlife','form-type-life',
   'form-uw-type-nonlife','form-uw-type-life'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.classList.remove('active');
  });
}

/* ── 글쓰기 폼 보험사 선택 ── */
window.formSelectInsurerType = function(type) {
  var btnNL = document.getElementById('form-type-nonlife');
  var btnL  = document.getElementById('form-type-life');
  var selNL = document.getElementById('write-insurer-nonlife');
  var selL  = document.getElementById('write-insurer-life');
  if (btnNL) btnNL.classList.toggle('active', type === 'nonlife');
  if (btnL)  btnL.classList.toggle('active',  type === 'life');
  if (selNL) { selNL.style.display = type === 'nonlife' ? 'block' : 'none'; selNL.selectedIndex = 0; }
  if (selL)  { selL.style.display  = type === 'life'    ? 'block' : 'none'; selL.selectedIndex  = 0; }
};

window.formSelectInsurerTypeUW = function(type) {
  var btnNL = document.getElementById('form-uw-type-nonlife');
  var btnL  = document.getElementById('form-uw-type-life');
  var selNL = document.getElementById('write-uw-insurer-nonlife');
  var selL  = document.getElementById('write-uw-insurer-life');
  if (btnNL) btnNL.classList.toggle('active', type === 'nonlife');
  if (btnL)  btnL.classList.toggle('active',  type === 'life');
  if (selNL) { selNL.style.display = type === 'nonlife' ? 'block' : 'none'; selNL.selectedIndex = 0; }
  if (selL)  { selL.style.display  = type === 'life'    ? 'block' : 'none'; selL.selectedIndex  = 0; }
};

/* 글쓰기 폼에서 선택된 보험사명 + insurance_type 반환 */
function _getFormInsurer(category) {
  var name = '', type = '';
  if (category === '상품Q&A') {
    var selNL = document.getElementById('write-insurer-nonlife');
    var selL  = document.getElementById('write-insurer-life');
    if (selNL && selNL.style.display !== 'none') { name = selNL.value || ''; type = 'nonlife'; }
    else if (selL && selL.style.display !== 'none') { name = selL.value || ''; type = 'life'; }
  } else if (category === '인수Q&A') {
    var selNL2 = document.getElementById('write-uw-insurer-nonlife');
    var selL2  = document.getElementById('write-uw-insurer-life');
    if (selNL2 && selNL2.style.display !== 'none') { name = selNL2.value || ''; type = 'nonlife'; }
    else if (selL2 && selL2.style.display !== 'none') { name = selL2.value || ''; type = 'life'; }
  }
  return { name: name, insurance_type: type };
}

/* ── 업그레이드 토스트 (무료플랜 글쓰기 안내) ── */
var _toastTimer = null;
window.showUpgradeToast = function(message) {
  var t = document.getElementById('os-upgrade-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'os-upgrade-toast';
    t.className = 'os-toast';
    t.innerHTML = '<span class="os-toast-msg"></span>'
      + '<button type="button" class="os-toast-upgrade" onclick="window.onClickToastUpgrade()">업그레이드</button>';
    document.body.appendChild(t);
  }
  var msgEl = t.querySelector('.os-toast-msg');
  if (msgEl) msgEl.textContent = message || 'PRO 플랜에서 이용할 수 있습니다.';
  if (_toastTimer) { clearTimeout(_toastTimer); _toastTimer = null; }
  requestAnimationFrame(function() { t.classList.add('show'); });
  _toastTimer = setTimeout(function() {
    t.classList.remove('show');
    _toastTimer = null;
  }, 3000);
};
window.onClickToastUpgrade = function() {
  var t = document.getElementById('os-upgrade-toast');
  if (t) t.classList.remove('show');
  if (_toastTimer) { clearTimeout(_toastTimer); _toastTimer = null; }

/* ── 글쓰기 버튼 클릭 ── */
window.onClickWriteBtn = function() {
  if (_currentCategory === 'all') {
    alert('카테고리를 먼저 선택해 주세요.');
    return;
  }
  /* [TEMP] 첫 배포 정책(2026-04-21): 모든 가입자 허용. v1.2에서 복원 예정 */
  /* [P0-4] 무료플랜 글쓰기 차단 — Auth.isPro(): plan=pro 또는 role in (manager/branch_manager/admin)
   * var isProUser = window.Auth && window.Auth.isPro && window.Auth.isPro();
   * if (!isProUser) {
   *   window.showUpgradeToast('글쓰기는 PRO 플랜에서 이용할 수 있어요.');
   *   return;
   * }
   */
  window.openWriteView();
};

window.openWriteView = function() {
  var board      = _currentBoard;
  var categories = (BOARD_CATEGORIES[board] || ['상품Q&A']).filter(function(c) { return c !== '전체'; });
  var select     = document.getElementById('write-category');
  if (select) {
    select.innerHTML = categories.map(function(c) {
      return '<option value="' + c + '">' + c + '</option>';
    }).join('');
    /* 현재 선택된 카테고리 고정 */
    if (_currentCategory && _currentCategory !== 'all') {
      Array.from(select.options).forEach(function(opt) {
        if (opt.value === _currentCategory) opt.selected = true;
      });
      select.disabled = true;
    } else {
      select.disabled = false;
    }
  }

  var titleEl   = document.getElementById('write-title');
  var contentEl = document.getElementById('write-content');
  if (titleEl)   titleEl.value   = '';
  if (contentEl) contentEl.value = '';
  _clearExtraFields();

  /* 카테고리에 따라 추가 필드 표시 */
  var selectedCat = (_currentCategory && _currentCategory !== 'all') ? _currentCategory : '';
  _switchFormFields(selectedCat);

  var anonRow   = document.getElementById('anon-row');
  var anonCheck = document.getElementById('write-anon');
  var role = (window.AppState && window.AppState.role) || '';
  if (anonRow && anonCheck) {
    if (board === 'insurer' && ['ga_member', 'insurer_member'].includes(role)) {
      anonRow.style.display = 'flex';
      anonCheck.checked     = true;
    } else {
      anonRow.style.display = 'none';
      anonCheck.checked     = false;
    }
  }

  var viewTitle = document.getElementById('write-view-title');
  if (viewTitle) viewTitle.textContent = '✏️ ' + (BOARD_LABEL[board] || '') + ' 글쓰기';

  /* 첨부파일 초기화 */
  _attachFiles   = [];
  _editingPostId = null;
  _renderAttachPreview();

  /* 뷰 전환 */
  var listView  = document.getElementById('board-list-view');
  var writeView = document.getElementById('board-write-view');
  if (listView)  listView.style.display  = 'none';
  if (writeView) writeView.classList.add('active');
};

window.closeWriteView = function() {
  var listView  = document.getElementById('board-list-view');
  var writeView = document.getElementById('board-write-view');
  if (listView)  listView.style.display  = '';
  if (writeView) writeView.classList.remove('active');
  _attachFiles   = [];
  _editingPostId = null;
  _clearExtraFields();
  _switchFormFields('');
  _renderAttachPreview();
  /* 버튼/헤더/카테고리 초기화 */
  var submitBtn = document.querySelector('.write-submit');
  if (submitBtn) submitBtn.textContent = '등록하기';
  var viewTitle = document.getElementById('write-view-title');
  if (viewTitle && _currentBoard) viewTitle.textContent = '✏️ ' + (BOARD_LABEL[_currentBoard] || '') + ' 글쓰기';
  var select = document.getElementById('write-category');
  if (select) select.disabled = false;
};

/* 첨부파일 선택 핸들러 */
window.onAttachFileChange = function(input) {
  var files = Array.from(input.files || []);
  var remaining = 3 - _attachFiles.length;
  if (remaining <= 0) { alert('첨부파일은 최대 3개까지 가능합니다.'); input.value = ''; return; }
  files = files.slice(0, remaining);
  var oversize = files.filter(function(f) { return f.size > 5 * 1024 * 1024; });
  if (oversize.length) { alert('파일당 최대 5MB까지 첨부 가능합니다.\n(' + oversize.map(function(f){return f.name;}).join(', ') + ')'); input.value = ''; return; }
  _attachFiles = _attachFiles.concat(files);
  _renderAttachPreview();
  input.value = '';
};

function _renderAttachPreview() {
  var list = document.getElementById('attach-preview-list');
  var note = document.getElementById('attach-count-note');
  var trigger = document.querySelector('.attach-trigger');
  if (!list) return;
  list.innerHTML = _attachFiles.map(function(f, i) {
    var isImg = f.type.startsWith('image/');
    var sizeStr = f.size > 1024*1024 ? (f.size/1024/1024).toFixed(1)+'MB' : Math.round(f.size/1024)+'KB';
    var thumbHtml = isImg
      ? '<img src="' + URL.createObjectURL(f) + '" alt="">'
      : (f.type === 'application/pdf' ? '📄' : '📊');
    return '<div class="attach-item">'
      + '<div class="attach-item-thumb">' + thumbHtml + '</div>'
      + '<div class="attach-item-info">'
      + '<div class="attach-item-name">' + f.name + '</div>'
      + '<div class="attach-item-size">' + sizeStr + '</div>'
      + '</div>'
      + '<button class="attach-item-remove" type="button" onclick="window.removeAttach(' + i + ')">✕</button>'
      + '</div>';
  }).join('');
  if (note) {
    note.textContent = _attachFiles.length > 0 ? _attachFiles.length + '/3개 첨부됨' : '';
  }
  if (trigger) {
    trigger.style.display = _attachFiles.length >= 3 ? 'none' : 'flex';
  }
}

window.removeAttach = function(idx) {
  _attachFiles.splice(idx, 1);
  _renderAttachPreview();
};

/* Storage 업로드 */
async function _uploadAttachments(postId) {
  if (!_attachFiles.length) return [];
  var bar = document.getElementById('upload-progress');
  var barInner = document.getElementById('upload-progress-bar');
  if (bar) bar.classList.add('active');
  var urls = [];
  for (var i = 0; i < _attachFiles.length; i++) {
    var f = _attachFiles[i];
    var ext = f.name.split('.').pop();
    var fileName = 'posts/' + postId + '_' + Date.now() + '_' + i + '.' + ext;
    var res = await fetch(window.db.url('/storage/v1/object/board_attachments/' + fileName), {
      method: 'POST',
      headers: {
        'apikey': window.db.key,
        'Authorization': 'Bearer ' + window.db.getToken(),
        'Content-Type': f.type,
        'x-upsert': 'true'
      },
      body: f
    });
    if (res.ok) {
      urls.push(window.db.url('/storage/v1/object/public/board_attachments/' + fileName));
    }
    if (barInner) barInner.style.width = Math.round((i+1)/_attachFiles.length*100) + '%';
  }
  if (bar) { bar.classList.remove('active'); if(barInner) barInner.style.width='0%'; }
  return urls;
}

window.submitPost = async function() {
  var titleEl   = document.getElementById('write-title');
  var contentEl = document.getElementById('write-content');
  var catEl     = document.getElementById('write-category');
  var anonEl    = document.getElementById('write-anon');

  var title    = titleEl   ? titleEl.value.trim()   : '';
  var content  = contentEl ? contentEl.value.trim() : '';
  var category = catEl     ? catEl.value             : '';
  var isAnon   = anonEl    ? anonEl.checked          : false;

  if (!title)   { alert('제목을 입력해 주세요.'); return; }
  if (!content) { alert('내용을 입력해 주세요.'); return; }

  /* 상품Q&A 추가 필드 */
  var formInsurer     = _getFormInsurer(category);
  var insurer         = formInsurer.name;
  var insuranceType   = formInsurer.insurance_type;
  var productCategory = (document.getElementById('write-product-category') || {}).value || '';

  /* 인수Q&A 추가 필드 */
  var age             = (document.getElementById('write-age')              || {}).value || '';
  var gender          = (document.getElementById('write-gender')           || {}).value || '';
  var disease         = (document.getElementById('write-disease')          || {}).value || '';
  var diagnosisTiming = (document.getElementById('write-diagnosis-timing') || {}).value || '';
  var currentStatus   = (document.getElementById('write-current-status')   || {}).value || '';

  /* 카테고리별 필수값 검사 */
  if (category === '상품Q&A' && !insurer.trim()) { alert('보험사를 입력해 주세요.'); return; }
  if (category === '인수Q&A' && !disease.trim()) { alert('질병명을 입력해 주세요.'); return; }

  /* 보험사게시판 권한 체크 (프론트 방어) */
  var s     = window.AppState || {};
  var board = _currentBoard;
  if (board === 'insurer' && !['admin', 'insurer'].includes(s.role)) {
    alert('보험사게시판은 보험사 계정 또는 관리자만 작성할 수 있습니다.');
    return;
  }
  var org   = _userOrg || {};
  var orgId = '';
  if (board === 'team')   orgId = (org.company || '') + '_' + (org.branch || '') + '_' + (org.team || '');
  if (board === 'branch') orgId = (org.company || '') + '_' + (org.branch || '');

  var displayName = s.name || '알 수 없음';
  if (isAnon) {
    displayName = '익명';
  } else if (board === 'insurer' && [
    'ga_branch_manager', 'ga_manager',
    'insurer_branch_manager', 'insurer_manager'
  ].includes(s.role)) {
    displayName = org.company || s.name || '보험회사';
  }

  var btn = document.querySelector('.write-submit');
  if (btn) { btn.disabled = true; btn.textContent = _editingPostId ? '수정 중...' : '등록 중...'; }

  try {
    /* ── 수정 모드 (PATCH) ── */
    if (_editingPostId) {
      var patchBody = { title: title, content: content, category: category };
      if (category === '상품Q&A') {
        patchBody.insurer_name    = insurer;
        patchBody.product_category = productCategory;
      }
      if (category === '인수Q&A') {
        patchBody.patient_age       = age       ? parseInt(age) : null;
        patchBody.patient_gender    = gender    || null;
        patchBody.disease_name      = disease   || null;
        patchBody.diagnosis_timing  = diagnosisTiming || null;
        patchBody.current_status    = currentStatus   || null;
      }
      await window.db.fetch('/rest/v1/posts?id=eq.' + _editingPostId, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify(patchBody)
      });
      window.closeWriteView();
      await _loadPosts();
      return;
    }

    /* ── 신규 등록 (POST) ── */
    /* 1) 게시글 먼저 등록 (Prefer: return=representation 으로 id 받기) */
    var postBody = {
      board_type:      board,
      category:        category,
      title:           title,
      content:         content,
      author_id:       s.userId || '',
      author_name:     s.name   || '알 수 없음',
      organization_id: orgId,
      is_hub_visible:  false,
      is_anonymous:    isAnon,
      display_name:    displayName,
      view_count:      0,
      like_count:      0,
      comment_count:   0
    };
    if (category === '상품Q&A') {
      postBody.insurer_name     = insurer         || null;
      postBody.product_category = productCategory || null;
      postBody.insurance_type   = insuranceType   || null;
    }
    if (category === '인수Q&A') {
      postBody.patient_age      = age       ? parseInt(age) : null;
      postBody.patient_gender   = gender    || null;
      postBody.disease_name     = disease   || null;
      postBody.diagnosis_timing = diagnosisTiming || null;
      postBody.current_status   = currentStatus   || null;
      postBody.insurance_type   = insuranceType   || null;
    }
    var postRes = await window.db.fetch('/rest/v1/posts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
      body: JSON.stringify(postBody)
    });
    var postData = await postRes.json();
    var postId = (Array.isArray(postData) ? postData[0] : postData).id;

    /* 2) 첨부파일 업로드 */
    var attachUrls = [];
    if (_attachFiles.length && postId) {
      if (btn) btn.textContent = '파일 업로드 중...';
      attachUrls = await _uploadAttachments(postId);
    }

    /* 3) 첨부파일 URL이 있으면 posts 업데이트 */
    if (attachUrls.length && postId) {
      await window.db.fetch('/rest/v1/posts?id=eq.' + postId, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify({ attachments: JSON.stringify(attachUrls) })
      });
    }

    window.closeWriteView();
    await _loadPosts();
  } catch(e) {
    alert(_editingPostId ? '수정 중 오류가 발생했습니다.' : '글 등록 중 오류가 발생했습니다.');
    console.error(e);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = _editingPostId ? '수정 완료' : '등록하기'; }
  }
};

/* ── 오버레이 배경 클릭 닫기 ── */
function _bindOverlayClose() {
  var detailOv = document.getElementById('detail-overlay');
  if (detailOv) {
    detailOv.addEventListener('click', function(e) {
      if (e.target === this) window.closeDetail();
    });
  }
}

})();
</script>
