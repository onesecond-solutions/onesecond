<!-- 배너 슬롯 -->
<div id="page-banner-slot" style="display:none;flex-shrink:0;"></div>

<div class="news-outer">

  <!-- 헤더 -->
  <div class="news-header">
    <div class="news-header-text">
      <div class="news-header-title">📰 보험뉴스</div>
      <div class="news-header-sub">보험 업계 최신 소식을 빠르게 확인하세요</div>
    </div>
    <div class="news-header-icon">📰</div>
  </div>

  <!-- 탭 필터 -->
  <div class="news-tab-bar">
    <button class="news-tab-btn active" onclick="window.newsFilterTab('전체')">전체</button>
    <button class="news-tab-btn" onclick="window.newsFilterTab('생명보험')">생명보험</button>
    <button class="news-tab-btn" onclick="window.newsFilterTab('손해보험')">손해보험</button>
    <button class="news-tab-btn" onclick="window.newsFilterTab('제도·규제')">제도·규제</button>
  </div>

  <!-- 콘텐츠 -->
  <div class="news-content" id="news-content-area">
    <div class="news-loading" id="news-loading">
      <div class="news-spinner"></div>
      <span>뉴스를 불러오는 중...</span>
    </div>
  </div>

  <!-- 푸터 -->
  <div class="news-footer">뉴스를 스크립트로, 스크립트를 계약으로</div>

</div>

<script>
(function () {
  var _allNews = [];
  var _currentCategory = '전체';

  /* ── 탭 전환 ── */
  window.newsFilterTab = function (category) {
    _currentCategory = category;
    document.querySelectorAll('.news-tab-btn').forEach(function (btn) {
      btn.classList.toggle('active', btn.textContent.trim() === category);
    });
    window.newsRender();
  };

  /* ── 렌더 ── */
  window.newsRender = function () {
    var area = document.getElementById('news-content-area');
    var filtered = _currentCategory === '전체'
      ? _allNews
      : _allNews.filter(function (n) { return n.category === _currentCategory; });

    if (filtered.length === 0) {
      area.innerHTML = '<div class="news-empty"><div class="news-empty-icon">📭</div><span>등록된 뉴스가 없습니다.</span></div>';
      return;
    }

    area.innerHTML = filtered.map(function (n) {
      var dateStr = n.published_at ? n.published_at.slice(0, 10) : '';
      return [
        '<div class="news-card">',
        '  <div class="news-card-top">',
        '    <span class="news-card-category">' + (n.category || '전체') + '</span>',
        '    <span class="news-card-source">' + (n.source || '') + '</span>',
        '    <span class="news-card-date">' + dateStr + '</span>',
        '  </div>',
        '  <div class="news-card-title">' + n.title + '</div>',
        n.summary ? '  <div class="news-card-summary">' + n.summary + '</div>' : '',
        n.url ? '  <a class="news-card-link" href="' + n.url + '" target="_blank" rel="noopener">원문 보기 →</a>' : '',
        '</div>'
      ].join('');
    }).join('');
  };

  /* ── 데이터 로드 ── */
  function loadNews() {
    if (!window.db) return;
    fetch(window.db.url('/rest/v1/news?is_active=eq.true&order=published_at.desc'), {
      headers: {
        'apikey': window.db.key,
        'Authorization': 'Bearer ' + window.db.key
      }
    })
    .then(function (r) { return r.json(); })
    .then(function (data) {
      _allNews = Array.isArray(data) ? data : [];
      window.newsRender();
    })
    .catch(function (e) {
      console.error('[news] fetch error', e);
      var area = document.getElementById('news-content-area');
      area.innerHTML = '<div class="news-empty"><div class="news-empty-icon">⚠️</div><span>뉴스를 불러오지 못했습니다.</span></div>';
    });
  }

  /* ── 부트 ── */
  if (window.AppState && window.AppState.ready) {
    loadNews();
  } else {
    document.addEventListener('appstate:ready', function () { loadNews(); }, { once: true });
  }
})();
</script>
