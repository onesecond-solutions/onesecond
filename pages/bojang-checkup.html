<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>보험 점검 레포트 | onesecond</title>
<style>
:root{
  --bg:#F7F7FB; --s1:#FFFFFF; --s2:#F2F2F6; --bd:#E5E5EC;
  --tp:#18181B; --ts:#52525B; --tf:#8A8A93; --bodytx:#3F3F46;
  --ac:#6366F1; --ach:#5457E5; --ac-soft:#EEF0FF;
  --ok:#16A34A; --ok-soft:#E9F7EE; --warn:#E8890C; --warn-soft:#FDF3E4; --risk:#DC2626; --risk-soft:#FCECEC;
  --agent:#0891B2; --agent-soft:#E2F5F9;
  --radius-sm:12px; --radius:16px; --radius-lg:22px; --radius-full:999px;
  --sh-sm:0 1px 2px rgba(24,24,27,.05); --sh:0 6px 20px rgba(24,24,27,.07); --sh-lg:0 16px 44px rgba(24,24,27,.13);
  --font:Pretendard,"Apple SD Gothic Neo","Malgun Gothic",system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);}
body{font-family:var(--font);color:var(--tp);line-height:1.6;word-break:keep-all;-webkit-font-smoothing:antialiased;}
button{font:inherit;cursor:pointer;border:0;background:none;color:inherit;}

/* ── SHELL ── */
.shell{max-width:520px;margin:0 auto;min-height:100vh;background:var(--bg);display:flex;flex-direction:column;}
.topbar{position:sticky;top:0;z-index:20;background:rgba(247,247,251,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--bd);padding:12px 18px;display:flex;align-items:center;gap:8px;justify-content:space-between;}
.seg{display:inline-flex;background:var(--s2);border-radius:var(--radius-full);padding:3px;}
.seg button{font-size:12.5px;font-weight:700;color:var(--ts);padding:6px 13px;border-radius:var(--radius-full);transition:.15s;white-space:nowrap;}
.seg button.on{background:var(--s1);color:var(--tp);box-shadow:var(--sh-sm);}
.seg.aud button.on{background:var(--ac);color:#fff;}

/* ── VIEWPORT ── */
.viewport{flex:1;min-height:0;}
/* 넘기기(swipe) */
.deck{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.deck::-webkit-scrollbar{display:none;}
.deck .slide{flex:0 0 100%;scroll-snap-align:center;padding:18px;}
/* 세로형 */
.stack{display:flex;flex-direction:column;gap:16px;padding:18px;}
/* 공통 카드면 */
.card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--radius-lg);box-shadow:var(--sh);padding:24px;min-height:60px;}
.deck .slide .card{min-height:calc(100vh - 168px);display:flex;flex-direction:column;}

/* 도트/화살표 */
.dots{display:flex;justify-content:center;align-items:center;gap:7px;padding:14px 0 20px;}
.dots i{width:7px;height:7px;border-radius:50%;background:var(--bd);transition:.2s;}
.dots i.on{background:var(--ac);width:22px;border-radius:var(--radius-full);}
.navbtns{display:flex;justify-content:space-between;padding:0 18px 22px;}
.navbtns button{font-size:13.5px;font-weight:700;color:var(--ac);padding:9px 16px;border:1.5px solid var(--ac);border-radius:var(--radius-full);background:var(--s1);}
.navbtns button:disabled{opacity:.32;border-color:var(--bd);color:var(--tf);}
.hide{display:none!important;}

/* ── 공통 카드 요소 ── */
.eyebrow{font-size:11px;font-weight:800;letter-spacing:.16em;color:var(--ac);text-transform:uppercase;}
.cardnum{font-size:11px;font-weight:800;color:var(--tf);letter-spacing:.1em;}
.card h2{font-size:23px;font-weight:800;letter-spacing:-.02em;line-height:1.32;margin:12px 0 8px;}
.card .sub{font-size:14px;color:var(--ts);line-height:1.62;}

/* 1. 표지 */
.cover{justify-content:center;text-align:center;background:
  radial-gradient(120% 80% at 85% 8%, #EEF0FF 0%, transparent 55%), var(--s1);}
.cover .big{font-size:29px;font-weight:800;letter-spacing:-.02em;line-height:1.3;margin:14px 0 6px;}
.cover .big .nm{color:var(--ac);}
.cover .dt{font-size:13px;color:var(--tf);margin-top:4px;}
.cover .agent{margin-top:28px;display:inline-flex;align-items:center;gap:11px;background:var(--s2);border-radius:var(--radius-full);padding:10px 18px;}
.cover .agent .av{width:34px;height:34px;border-radius:50%;background:var(--ac);color:#fff;font-weight:800;display:grid;place-items:center;}
.cover .agent b{font-size:14px;display:block;text-align:left;} .cover .agent span{font-size:12.5px;color:var(--ts);}

/* 2. 가입 현황 */
.pol{display:flex;align-items:center;gap:13px;padding:15px 0;border-bottom:1px solid var(--bd);}
.pol:last-child{border-bottom:0;}
.pol .logo{flex:0 0 auto;width:42px;height:42px;border-radius:11px;background:var(--ac-soft);color:var(--ach);font-weight:800;font-size:15px;display:grid;place-items:center;}
.pol .mid{flex:1;min-width:0;} .pol .mid .co{font-size:12px;color:var(--tf);font-weight:600;} .pol .mid .pd{font-size:15px;font-weight:700;line-height:1.35;}
.pol .prem{text-align:right;flex:0 0 auto;} .pol .prem b{font-size:15px;font-weight:800;} .pol .prem span{font-size:11px;color:var(--tf);display:block;}
.polsum{margin-top:16px;background:var(--ac-soft);border-radius:14px;padding:13px 15px;display:flex;justify-content:space-between;align-items:center;}
.polsum span{font-size:13px;color:var(--ach);font-weight:700;} .polsum b{font-size:17px;font-weight:800;color:var(--ach);}

/* 3. 점검 포인트 */
.chk{border:1px solid var(--bd);border-radius:var(--radius);padding:15px 16px;margin-top:12px;position:relative;overflow:hidden;}
.chk::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;}
.chk.s-ok::before{background:var(--ok);}.chk.s-warn::before{background:var(--warn);}.chk.s-risk::before{background:var(--risk);}
.chk-top{display:flex;align-items:center;gap:11px;}
.chk-ic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:19px;}
.chk.s-ok .chk-ic{background:var(--ok-soft);}.chk.s-warn .chk-ic{background:var(--warn-soft);}.chk.s-risk .chk-ic{background:var(--risk-soft);}
.chk-top .nm{flex:1;font-size:16px;font-weight:800;}
.chk-badge{font-size:11px;font-weight:800;padding:4px 10px;border-radius:var(--radius-full);}
.chk.s-ok .chk-badge{background:var(--ok-soft);color:var(--ok);}.chk.s-warn .chk-badge{background:var(--warn-soft);color:var(--warn);}.chk.s-risk .chk-badge{background:var(--risk-soft);color:var(--risk);}
.chk-body{font-size:13.5px;color:var(--bodytx);line-height:1.6;margin-top:10px;}
.adv{margin-top:11px;background:var(--agent-soft);border:1px dashed #8FD5E4;border-radius:11px;padding:10px 12px;font-size:13px;color:#0E6B80;line-height:1.55;}
.adv .lb{font-size:10.5px;font-weight:800;letter-spacing:.08em;color:var(--agent);text-transform:uppercase;display:block;margin-bottom:3px;}
.adv.client{background:var(--s2);border:0;color:var(--bodytx);}
.adv.client .lb{color:var(--tf);}

/* 4. 총평 */
.voice{background:linear-gradient(160deg,#1E1B4B 0%, #312E81 100%);color:#fff;border:0;}
.voice .eyebrow{color:#A5B4FC;}
.voice h2{color:#fff;}
.voice .sub{color:#E0E1F5;}
.tsum{margin-top:16px;display:flex;flex-direction:column;gap:9px;}
.tsum .row{display:flex;align-items:center;gap:10px;font-size:13.5px;color:#E7E8F7;}
.tsum .row .dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto;}
.tsum .row.ok .dot{background:#4ADE80;}.tsum .row.warn .dot{background:#FBBF24;}.tsum .row.risk .dot{background:#F87171;}
.tsum .row b{font-weight:700;color:#fff;}

/* 5. 목적 + CTA */
.goalpick{display:flex;gap:8px;margin-top:14px;}
.goalpick button{flex:1;font-size:12.5px;font-weight:700;color:var(--ts);border:1.5px solid var(--bd);border-radius:12px;padding:11px 6px;line-height:1.3;background:var(--s1);transition:.15s;}
.goalpick button.on{border-color:var(--ac);background:var(--ac-soft);color:var(--ach);}
.agentnote{margin-top:14px;}
.agentnote label{font-size:12px;font-weight:700;color:var(--agent);display:block;margin-bottom:6px;}
.agentnote textarea{width:100%;min-height:82px;border:1.5px solid var(--bd);border-radius:12px;padding:12px;font:inherit;font-size:14px;line-height:1.6;resize:vertical;color:var(--tp);background:var(--s1);}
.agentnote textarea:focus{outline:none;border-color:var(--ac);}
.noteview{margin-top:14px;font-size:14.5px;color:var(--bodytx);line-height:1.66;background:var(--s2);border-radius:14px;padding:16px;}
.cta-h{font-size:16px;font-weight:800;margin:22px 0 4px;}
.cta-p{font-size:13px;color:var(--ts);margin-bottom:14px;}
.ctas{display:flex;flex-direction:column;gap:10px;}
.ctabtn{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;padding:16px 18px;border-radius:var(--radius);font-size:15px;font-weight:800;text-align:left;transition:transform .12s,box-shadow .2s;}
.ctabtn .arr{font-weight:700;opacity:.7;}
.ctabtn:active{transform:translateY(1px);}
.ctabtn.primary{background:var(--ac);color:#fff;box-shadow:0 10px 26px rgba(99,102,241,.32);}
.ctabtn.ghost{background:var(--s1);color:var(--tp);border:1.5px solid var(--bd);}
.ctabtn.ghost .arr{color:var(--ac);}
.done{display:none;margin-top:16px;background:var(--ok-soft);border:1px solid #BFE6CC;border-radius:14px;padding:18px;text-align:center;}
.done.on{display:block;}
.done b{font-size:16px;font-weight:800;color:var(--ok);}.done p{font-size:13px;color:var(--ts);margin-top:6px;}

.foot{text-align:center;padding:6px 0 26px;}
.foot .brand{font-size:11.5px;color:var(--tf);}.foot .brand b{color:var(--ts);}
.disc{font-size:11px;color:var(--tf);line-height:1.5;padding:0 24px 24px;text-align:center;}
.agentonly-tag{font-size:10.5px;font-weight:800;color:var(--agent);background:var(--agent-soft);border-radius:6px;padding:2px 7px;margin-left:6px;vertical-align:middle;}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div class="seg" id="viewSeg">
      <button data-view="swipe" class="on">넘기기</button>
      <button data-view="stack">세로형</button>
    </div>
    <div class="seg aud" id="audSeg">
      <button data-aud="agent" class="on">설계사</button>
      <button data-aud="client">고객</button>
    </div>
  </div>
  <div class="viewport" id="viewport"></div>
</div>

<script>
/* ══════════════════════════════════════════════════════════════════════
 * 보험 점검 레포트 — 데이터 주입형 렌더 엔진 (하드코딩 아님)
 * 보험 가입 자료(마이데이터/보험사 전산)를 아래 REPORT로 채우면
 * 불특정 고객·불특정 구성이 5장 카드로 렌더된다.
 *   뷰: 넘기기(스와이프) ↔ 세로형 / 노출: 설계사 ↔ 고객
 *   전문가 첨언(adv) → 설계사 뷰=항상 / 고객 뷰=toClient:true인 것만(자연스러운 톤)
 *   목적(goal)·설계사 총평(agentNote) → 설계사가 입력 → 5번째 카드·CTA에 반영
 * 아래는 형식 시연용 샘플(실고객 아님).
 * ════════════════════════════════════════════════════════════════════════ */
var REPORT = {
  customer:{ name:"김지희", meta:"42세 · 여성 · 2026.07 기준" },
  agent:{ name:"임태성 보험전문가", phone:"010-9241-9375", initial:"임" },
  policies:[
    { company:"삼성생명", short:"삼성", product:"종합보장보험 무배당", premium:"98,400" },
    { company:"현대해상", short:"현대", product:"굿앤굿 실손의료비", premium:"41,200" },
    { company:"메리츠화재", short:"메리츠", product:"올바른 암보험", premium:"33,900" },
    { company:"KB손해보험", short:"KB", product:"7대질병 수술비", premium:"18,500" }
  ],
  premiumTotal:"192,000",
  checkpoints:[
    { key:"medical", icon:"🩺", label:"의료실비", status:"ok",
      body:"실손이 가입돼 병원비 기본 축은 확보. 세대에 따라 자기부담·비급여가 달라집니다.",
      adv:"2세대 실손이라 비급여 부담은 적은 편. 유지 추천 — 굳이 4·5세대 전환 권하지 말 것.", toClient:false },
    { key:"cancer", icon:"🎗️", label:"암", status:"warn",
      body:"진단비는 있으나 실제 치료 과정의 주요치료비·비급여 보장이 얇습니다.",
      adv:"진단금 3천만 있는데 치료비 특약 없음. 유사암 소액 분류도 확인 필요.", toClient:true },
    { key:"brain", icon:"🫀", label:"뇌·심장", status:"risk",
      body:"뇌출혈·급성심근경색 위주라, 뇌혈관·허혈성심장질환까지의 넓은 범위가 빠져 있습니다.",
      adv:"넓은 범위 담보 전무 — 보완 1순위. 진단+수술 특약 묶어 제안.", toClient:true },
    { key:"surgery", icon:"🩹", label:"수술비", status:"warn",
      body:"수술비가 일부 있으나 반복 지급·질병/상해 구분이 불명확해 빈틈이 있습니다.",
      adv:"", toClient:false }
  ],
  summaryLead:"진단금은 넉넉한데 '치료 과정'과 '넓은 범위'가 비어 있습니다. 두 곳만 보완하면 대비가 크게 달라집니다.",
  /* ↓ 설계사 입력 영역(기본값·수정 가능) */
  goal:"checkup",            // reduce | checkup | recommend
  agentNote:"보험료를 늘리자는 게 아니라, 지금 진단금 중심 구성에서 '치료비'와 '넓은 범위' 두 곳만 채우면 됩니다. 무리한 리모델링 없이 필요한 부분만 정리해 드릴게요."
};

/* ── 상수 ── */
var STATUS={ ok:{b:"준비됨",c:"s-ok"}, warn:{b:"보완 권장",c:"s-warn"}, risk:{b:"부족",c:"s-risk"} };
var GOALS={
  reduce:{ label:"보험료 줄이기", cta:[
    {t:"부족한 보장만 보완 설계", k:"보완", cls:"primary"},
    {t:"전체 리모델링 제안 받기", k:"리모델링", cls:"ghost"},
    {t:"정밀 보험 분석 상담", k:"정밀", cls:"ghost"} ] },
  checkup:{ label:"내 보험 점검", cta:[
    {t:"부족한 보장 보완 설계 추천", k:"보완", cls:"primary"},
    {t:"전체 리모델링 제안 받기", k:"리모델링", cls:"ghost"},
    {t:"정밀 보험 분석 상담", k:"정밀", cls:"ghost"} ] },
  recommend:{ label:"상품 추천", cta:[
    {t:"정밀 보험 분석 상담", k:"정밀", cls:"primary"},
    {t:"부족한 보장 보완 설계 추천", k:"보완", cls:"ghost"},
    {t:"전체 리모델링 제안 받기", k:"리모델링", cls:"ghost"} ] }
};
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

var state={ view:"swipe", aud:"agent", idx:0 };

/* ── 카드 빌더 (audience에 따라 다르게) ── */
function cardCover(R){
  return '<div class="card cover"><div class="cardnum">01 / 05</div>'+
    '<div class="eyebrow" style="margin-top:10px">보험 점검 레포트</div>'+
    '<div class="big"><span class="nm">'+esc(R.customer.name)+'</span> 고객님</div>'+
    '<div class="sub">가입하신 보험을 네 가지 축으로 점검해 드립니다.</div>'+
    '<div class="dt">'+esc(R.customer.meta)+'</div>'+
    '<div class="agent"><div class="av">'+esc(R.agent.initial)+'</div><div><b>'+esc(R.agent.name)+'</b><span>'+esc(R.agent.phone)+'</span></div></div>'+
  '</div>';
}
function cardPolicies(R){
  var rows=R.policies.map(function(p){
    return '<div class="pol"><div class="logo">'+esc(p.short)+'</div>'+
      '<div class="mid"><div class="co">'+esc(p.company)+'</div><div class="pd">'+esc(p.product)+'</div></div>'+
      '<div class="prem"><b>'+esc(p.premium)+'</b><span>원/월</span></div></div>';
  }).join("");
  return '<div class="card"><div class="cardnum">02 / 05</div>'+
    '<div class="eyebrow" style="margin-top:10px">가입 보험 현황</div>'+
    '<h2>지금 이렇게 가입돼 있어요</h2>'+
    '<div style="margin-top:10px">'+rows+'</div>'+
    '<div class="polsum"><span>월 납입 보험료 합계</span><b>'+esc(R.premiumTotal)+'원</b></div>'+
  '</div>';
}
function cardCheckpoints(R){
  var items=R.checkpoints.map(function(c){
    var s=STATUS[c.status]||STATUS.warn;
    var advHtml="";
    if(c.adv){
      if(state.aud==="agent"){
        advHtml='<div class="adv"><span class="lb">전문가 첨언 · 설계사 전용</span>'+esc(c.adv)+'</div>';
      } else if(c.toClient){
        advHtml='<div class="adv client"><span class="lb">담당자 한마디</span>'+esc(c.adv)+'</div>';
      }
    }
    return '<div class="chk '+s.c+'"><div class="chk-top"><div class="chk-ic">'+c.icon+'</div>'+
      '<div class="nm">'+esc(c.label)+'</div><span class="chk-badge">'+s.b+'</span></div>'+
      '<div class="chk-body">'+esc(c.body)+'</div>'+advHtml+'</div>';
  }).join("");
  return '<div class="card"><div class="cardnum">03 / 05</div>'+
    '<div class="eyebrow" style="margin-top:10px">점검 포인트</div>'+
    '<h2>네 가지 축, 지금 상태는</h2>'+
    '<p class="sub">보험은 네 축을 <b>함께</b> 봐야 합니다.'+(state.aud==="agent"?' <span class="agentonly-tag">첨언=설계사 전용/조건부</span>':'')+'</p>'+
    items+
  '</div>';
}
function cardSummary(R){
  var rows=R.checkpoints.map(function(c){
    return '<div class="row '+c.status+'"><span class="dot"></span><b>'+esc(c.label)+'</b> · '+
      (c.status==="ok"?"준비됨":c.status==="warn"?"보완 권장":"부족")+'</div>';
  }).join("");
  return '<div class="card voice"><div class="cardnum" style="color:#A5B4FC">04 / 05</div>'+
    '<div class="eyebrow" style="margin-top:10px">총평</div>'+
    '<h2>정리하면 이렇습니다</h2>'+
    '<p class="sub">'+esc(R.summaryLead)+'</p>'+
    '<div class="tsum">'+rows+'</div>'+
  '</div>';
}
function cardGoalCta(R){
  var g=GOALS[R.goal]||GOALS.checkup;
  var head='<div class="card"><div class="cardnum">05 / 05</div>'+
    '<div class="eyebrow" style="margin-top:10px">상담 방향</div>';
  if(state.aud==="agent"){
    /* 설계사: 목적 선택 + 총평 입력 */
    var picks=Object.keys(GOALS).map(function(k){
      return '<button data-goal="'+k+'" class="'+(R.goal===k?"on":"")+'">'+esc(GOALS[k].label)+'</button>';
    }).join("");
    head+='<h2>고객 목적에 맞춰</h2>'+
      '<p class="sub">목적에 따라 결과·CTA가 달라집니다. <span class="agentonly-tag">설계사 입력</span></p>'+
      '<div class="goalpick" id="goalPick">'+picks+'</div>'+
      '<div class="agentnote"><label>설계사 총평 (고객에게 이렇게 보입니다)</label>'+
      '<textarea id="agentNote">'+esc(R.agentNote)+'</textarea></div>';
  } else {
    /* 고객: 목적 라벨 + 총평 표시 */
    head+='<h2>'+esc(g.label)+', 이렇게 도와드릴게요</h2>'+
      '<div class="noteview" id="noteView">'+esc(R.agentNote)+'</div>';
  }
  var ctas=g.cta.map(function(x){
    return '<button class="ctabtn '+x.cls+'" data-cta="'+esc(x.k)+'"><span>'+esc(x.t)+'</span><span class="arr">→</span></button>';
  }).join("");
  head+='<div class="cta-h">지금 필요한 건 딱 이거예요</div>'+
    '<div class="cta-p">많이 바꾸지 않습니다. 아래에서 원하시는 방향을 눌러주세요.</div>'+
    '<div class="ctas">'+ctas+'</div>'+
    '<div class="done" id="done"><b>✓ 상담 신청이 접수됐어요</b><p>'+esc(R.agent.name)+'이 확인 후 바로 연락드릴게요 🙏</p></div>'+
    '<div class="foot" style="margin-top:22px"><div class="brand"><b>Powered by onesecond</b> · © 2026 onesecond</div></div>';
  return head+'</div>';
}

function buildCards(){
  return [cardCover,cardPolicies,cardCheckpoints,cardSummary,cardGoalCta].map(function(fn){return fn(REPORT);});
}

function render(){
  var cards=buildCards();
  var vp=document.getElementById("viewport");
  if(state.view==="swipe"){
    vp.innerHTML='<div class="deck" id="deck">'+cards.map(function(h){return '<div class="slide">'+h+'</div>';}).join("")+'</div>'+
      '<div class="dots" id="dots">'+cards.map(function(_,i){return '<i class="'+(i===state.idx?"on":"")+'"></i>';}).join("")+'</div>'+
      '<div class="navbtns"><button id="prev">← 이전</button><button id="next">다음 →</button></div>';
    var deck=document.getElementById("deck");
    deck.scrollLeft=state.idx*deck.clientWidth;
    deck.addEventListener("scroll",function(){
      var i=Math.round(deck.scrollLeft/deck.clientWidth);
      if(i!==state.idx){state.idx=i;syncDots();}
    });
    document.getElementById("prev").addEventListener("click",function(){go(state.idx-1);});
    document.getElementById("next").addEventListener("click",function(){go(state.idx+1);});
    syncDots();
  } else {
    vp.innerHTML='<div class="stack">'+cards.map(function(h){return h;}).join("")+
      '<div class="disc">본 레포트는 입력·연동된 보장 정보를 이해하기 쉽게 정리한 안내 자료이며, 특정 상품의 가입·해지를 권유하지 않습니다.</div></div>';
  }
  bindCardEvents();
}
function go(i){
  var deck=document.getElementById("deck");if(!deck)return;
  i=Math.max(0,Math.min(4,i));state.idx=i;
  deck.scrollTo({left:i*deck.clientWidth,behavior:"smooth"});syncDots();
}
function syncDots(){
  var dots=document.getElementById("dots");if(dots){[].forEach.call(dots.children,function(d,i){d.classList.toggle("on",i===state.idx);});}
  var p=document.getElementById("prev"),n=document.getElementById("next");
  if(p)p.disabled=state.idx===0; if(n)n.disabled=state.idx===4;
}
function bindCardEvents(){
  var gp=document.getElementById("goalPick");
  if(gp)gp.addEventListener("click",function(e){var b=e.target.closest("[data-goal]");if(!b)return;REPORT.goal=b.getAttribute("data-goal");render();});
  var ta=document.getElementById("agentNote");
  if(ta)ta.addEventListener("input",function(){REPORT.agentNote=ta.value;});
  var done=document.getElementById("done");
  [].forEach.call(document.querySelectorAll("[data-cta]"),function(b){
    b.addEventListener("click",function(){ if(done){done.classList.add("on");done.scrollIntoView({behavior:"smooth",block:"center"});} });
  });
}

/* 토글 */
document.getElementById("viewSeg").addEventListener("click",function(e){
  var b=e.target.closest("[data-view]");if(!b)return;
  [].forEach.call(this.children,function(x){x.classList.toggle("on",x===b);});
  state.view=b.getAttribute("data-view");render();
});
document.getElementById("audSeg").addEventListener("click",function(e){
  var b=e.target.closest("[data-aud]");if(!b)return;
  [].forEach.call(this.children,function(x){x.classList.toggle("on",x===b);});
  state.aud=b.getAttribute("data-aud");render();
});
render();
</script>
</body>
</html>
