<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>원세컨드 운영센터</title>
<!-- ════════════════════════════════════════════════════════════════════════
  pages/admin-console.html — stub redirect (2026-05-31)
  · 운영센터는 app.html SPA D영역(#v-admin · 2단 탭/칩)으로 흡수됨 (Phase 2)
  · 본 파일은 옛 진입 경로(북마크 · admin-approvals.html 리다이렉트) 보존용 stub
  · 옛 ?view=<section> → 새 /app.html?view=admin&sec=<section> (섹션 이름 동일)
  · 인증·게이팅은 app.html 진입 시 처리 (showView _canSeeAdmin)
═══════════════════════════════════════════════════════════════════════════ -->
<script>
(function(){
  var sec = null;
  try{
    var q = new URLSearchParams(location.search);
    sec = q.get('sec') || q.get('view');  /* 옛 ?view=approvals → 새 sec=approvals */
  }catch(e){}
  var VALID = ['dashboard','approvals','users','branches','posts','comments','library','menu','notice','settings','logs'];
  var target = '/app.html?view=admin';
  if(sec && VALID.indexOf(sec) !== -1) target += '&sec=' + encodeURIComponent(sec);
  location.replace(target);
})();
</script>
</head>
<body>
<noscript><a href="/app.html?view=admin">운영센터로 이동</a></noscript>
<p style="font-family:'Pretendard',sans-serif;color:#888;padding:24px">운영센터로 이동 중…</p>
</body>
</html>
