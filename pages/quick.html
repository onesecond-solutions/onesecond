<style>
/* ════════════════════════════════════════════════════════════
   quick.html 전용 스타일
   레이아웃 구조: _template.html 표준 (pg-outer / pg-header-block / pg-tab-block / pg-content-block / pg-footer-block)
   2026-04-30: myspace.html 정합 통일 (헤더·패딩·푸터·C영역 분리·D 외곽선 정리)
   design_guide.md 준수 — tokens.css 변수만 사용
════════════════════════════════════════════════════════════ */

/* ── 최상위 래퍼 (myspace 정합: gap:0 + 블록별 margin-bottom) ── */
.pg-outer {
  padding: var(--pg-side-padding);
  padding-bottom: var(--space-10);
  display: flex;
  flex-direction: column;
  gap: 0;
  box-sizing: border-box;
  min-height: 100%;
}

/* ── ① 타이틀 블록 (myspace 정합) ── */
.pg-header-block {
  border-radius: var(--radius-md, 12px);
  overflow: hidden;
  flex-shrink: 0;
  margin-bottom: var(--pg-header-bottom);
}
.pg-page-header {
  background: transparent;
  padding: var(--space-5, 20px) var(--space-1, 4px) var(--space-5, 20px) 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-4, 16px);
}
.pg-page-title {
  font-size: 1.5em;
  font-weight: var(--fw-black, 900);
  color: var(--color-brand);
  letter-spacing: -0.5px;
  margin-bottom: 4px;
}
.pg-page-title .accent { color: var(--color-accent, #D4845A); }
.pg-page-desc {
  font-size: 0.875em;
  font-weight: 400;
  color: var(--color-text-secondary);
  line-height: 1.6;
}
.pg-page-icon {
  font-size: 2.2em;
  opacity: 0.35;
  color: var(--color-accent, #D4845A);
}

/* ── ② 탭바 블록 (좌우 16px margin: .qck-body-inner padding 정합 → .qck-content-shell 시각 경계와 일치) ── */
.pg-tab-block {
  border-radius: var(--radius-md, 12px);
  overflow: hidden;
  flex-shrink: 0;
  background: var(--color-surface, #fff);
  border: 1px solid var(--color-border);
  margin-bottom: var(--pg-tab-bottom);
  margin-left: 16px;
  margin-right: 16px;
}
.pg-tab-bar {
  display: flex;
  flex-direction: row;
  gap: 0;
  flex-wrap: wrap;
  overflow-x: auto;
}
.pg-tab-btn {
  padding: 11px 16px;
  border: none;
  background: transparent;
  font-size: 0.895em;
  font-weight: 600;
  font-family: var(--font-sans, 'DM Sans', Pretendard, sans-serif);
  cursor: pointer;
  white-space: nowrap;
  color: var(--color-text-secondary);
  border-bottom: 3px solid transparent;
  transition: all .15s;
  flex-shrink: 0;
}
.pg-tab-btn:hover { color: var(--color-text-primary); }
.pg-tab-btn.active {
  font-weight: 800;
  color: var(--color-text-primary);
  border-bottom-color: var(--color-accent, #D4845A);
}

/* ── ③ 콘텐츠 블록 (myspace 정합: 외곽 border 제거, 안쪽 .qck-content-shell 라인만 유지) ── */
.pg-content-block {
  border-radius: var(--radius-md, 12px);
  overflow: hidden;
  flex-shrink: 0;
  background: var(--color-surface, #fff);
  margin-bottom: var(--space-4);
}

/* ── 콘텐츠 내부 레이아웃 (C영역 분리 후 단일 컬럼) ── */
.qck-body-inner {
  padding: 16px;
}
.qck-content-shell {
  background: var(--color-surface, #fff);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md, 12px);
  overflow: hidden;
}
.qck-content-head {
  padding: 12px 16px;
  background: var(--color-surface-2);
  border-bottom: 1px solid var(--color-border);
}
.qck-content-head-title {
  font-size: 0.895em;
  font-weight: 800;
  color: var(--color-text-primary);
}
.qck-content-slot {
  padding: 20px;
  min-height: 300px;
  overflow-x: hidden;
  overflow-wrap: anywhere;
  word-break: break-word;
}
.qck-content-slot * {
  max-width: 100%;
  overflow-wrap: anywhere;
  word-break: break-word;
  box-sizing: border-box;
}
.qck-content-slot table { width: 100% !important; table-layout: auto; }

/* ── C영역 우측 패널 아이템 스타일 (app.html #c-quick 내부에서 사용) ── */
.qck-panel-title {
  font-size: 0.790em;
  font-weight: 800;
  color: var(--color-text-primary);
  margin-bottom: 8px;
}
.qck-panel-item {
  font-size: 0.790em;
  color: var(--color-text-primary);
  padding: 6px 0;
  border-bottom: 1px solid var(--color-border);
  cursor: pointer;
}
.qck-panel-item:last-child { border-bottom: none; }
.qck-panel-item:hover { color: var(--color-accent, #D4845A); }

/* ── ④ 푸터 블록 (myspace 정합: 회색 톤 한 줄 박스) ── */
.pg-footer-block {
  border-radius: var(--radius-md, 12px);
  overflow: hidden;
  flex-shrink: 0;
}
.pg-bottom-bar {
  background: var(--color-surface-2);
  color: var(--color-text-secondary);
  text-align: center;
  font-size: 0.8125em;
  font-weight: var(--fw-bold, 700);
  padding: 14px;
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md, 12px);
}
</style>


<div class="pg-outer" id="page-quick">

  <!-- 배너 슬롯 -->
  <div id="page-banner-slot" style="display:none;flex-shrink:0;"></div>

  <!-- ① 타이틀 블록 -->
  <div class="pg-header-block">
    <div class="pg-page-header">
      <div>
        <div class="pg-page-title">Quick 메뉴</div>
        <div class="pg-page-desc">긴박한 순간, 자주 쓰는 자료를 한 곳에서</div>
      </div>
      <div class="pg-page-icon">⚡</div>
    </div>
  </div>

  <!-- ② 탭바 블록 -->
  <div class="pg-tab-block">
    <div class="pg-tab-bar" id="quick-tab-bar">
      <button class="pg-tab-btn active" onclick="window.selectQuickMain(this,'가입설계 / 선심사 동의 녹취 스크립트')">가입설계 / 선심사 동의 녹취 스크립트</button>
      <button class="pg-tab-btn" onclick="window.selectQuickMain(this,'회사별 BMI 심사기준')">회사별 BMI 심사기준</button>
      <button class="pg-tab-btn" onclick="window.selectQuickMain(this,'보험연령표')">보험연령표</button>
      <button class="pg-tab-btn" onclick="window.selectQuickMain(this,'보험회사 결제정보')">보험회사 결제정보</button>
      <button class="pg-tab-btn" onclick="window.selectQuickMain(this,'미러링 전 녹취 스크립트')">미러링 전 녹취 스크립트</button>
      <button class="pg-tab-btn" onclick="window.selectQuickMain(this,'원전산 설계 바로가기')">원전산 설계 바로가기</button>
      <button class="pg-tab-btn" onclick="window.selectQuickMain(this,'보험회사 (모니터링) 연락처')">보험회사 (모니터링) 연락처</button>
    </div>
  </div>

  <!-- ③ 콘텐츠 블록 (C영역 분리: 추천/최근 패널은 app.html #c-quick으로 이동) -->
  <div class="pg-content-block">
    <div class="qck-body-inner">
      <div class="qck-content-shell">
        <div class="qck-content-head">
          <div class="qck-content-head-title" id="qck-content-title">가입설계 / 선심사 동의 녹취 스크립트</div>
        </div>
        <div class="qck-content-slot" id="qck-content-slot"></div>
      </div>
    </div>
  </div>

  <!-- ④ 푸터 블록 -->
  <div class="pg-footer-block">
    <div class="pg-bottom-bar">- 지금 멈추지 마세요. 한 문장이 전체 흐름을 바꿉니다 -</div>
  </div>

</div><!-- /.pg-outer -->


<script>
(function() {
'use strict';

/* ── 캐시 초기화 ── */
if (!window._qckCache) window._qckCache = {};

/* ── DB fetch: quick_contents 전체 로드 ── */
window._loadQuickContents = async function() {
  try {
    var res = await window.db.fetch(
      '/rest/v1/quick_contents?is_active=eq.true&order=sort_order.asc&select=tab_title,content_html'
    );
    if (!res.ok) {
      console.error('quick_contents fetch 실패:', res.status);
      return false;
    }
    var data = await res.json();
    if (!data || !data.length) {
      console.warn('quick_contents: 데이터 없음');
      return false;
    }
    data.forEach(function(row) {
      if (row.tab_title && row.content_html) {
        window._qckCache[row.tab_title] = row.content_html;
      }
    });
    return true;
  } catch(e) {
    console.error('quick_contents fetch 오류:', e);
    return false;
  }
};

/* ── 콘텐츠 슬롯 초기화 ── */
window._initQuickSlot = function() {
  var slot = document.getElementById('qck-content-slot');
  if (!slot) { console.warn('quick: qck-content-slot DOM 없음'); return; }

  var defaultKey = '가입설계 / 선심사 동의 녹취 스크립트';
  slot.innerHTML = '<div style="padding:40px;text-align:center;color:var(--color-text-tertiary);font-size:0.842em;">불러오는 중...</div>';

  var titleEl = document.getElementById('qck-content-title');
  if (titleEl) titleEl.textContent = defaultKey;

  window._loadQuickContents().then(function(ok) {
    var html;
    if (ok && window._qckCache[defaultKey]) {
      html = window._qckCache[defaultKey];
    } else if (!ok) {
      html = '<div style="padding:40px;text-align:center;color:var(--color-text-tertiary);font-size:0.842em;">콘텐츠를 불러오지 못했습니다.<br>새로고침 해주세요.</div>';
    } else {
      html = '<div style="padding:40px;text-align:center;color:var(--color-text-tertiary);font-size:0.842em;">준비 중입니다.</div>';
    }
    slot.innerHTML = html;
  });
};

/* ── 탭 클릭 ── */
window.selectQuickMain = function(btn, title) {
  document.querySelectorAll('#quick-tab-bar .pg-tab-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  var titleEl = document.getElementById('qck-content-title');
  var slot = document.getElementById('qck-content-slot');
  if (titleEl) titleEl.textContent = title;
  if (slot) slot.innerHTML = window._qckCache[title] ||
    '<div style="padding:40px;text-align:center;color:var(--color-text-tertiary);font-size:0.842em;">준비 중입니다.</div>';
  ['mirror-meritz','mirror-heungkuk'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.style.display = 'none';
  });
};

/* ── 미러링 토글 (quick_contents에서 호출) ── */
window.toggleMirrorScript = function(company) {
  var meritz   = document.getElementById('mirror-meritz');
  var heungkuk = document.getElementById('mirror-heungkuk');
  if (!meritz || !heungkuk) return;
  if (company === 'meritz') {
    meritz.style.display   = meritz.style.display   === 'none' ? 'block' : 'none';
    heungkuk.style.display = 'none';
  } else {
    heungkuk.style.display = heungkuk.style.display === 'none' ? 'block' : 'none';
    meritz.style.display   = 'none';
  }
};

/* ── 우측 패널 로드 ── */
window._initQuickPanel = function() {
  if (!window.db || !window.AppState || !window.AppState.ready) return;

  /* 추천 스크립트 */
  window.db.fetch('/rest/v1/scripts?is_recommended=eq.true&select=title&limit=5')
  .then(function(r) { return r.json(); })
  .then(function(data) {
    var card = document.getElementById('qck-right-recommended');
    if (!card) return;
    if (data && data.length) {
      card.innerHTML = '<div class="qck-panel-title">🔥 추천 스크립트</div>' +
        data.map(function(s) {
          return '<div class="qck-panel-item">' + s.title + '</div>';
        }).join('');
    } else {
      card.innerHTML = '<div class="qck-panel-title">🔥 추천 스크립트</div>' +
        '<div style="font-size:0.690em;color:var(--color-text-tertiary);padding:4px 0;">추천 스크립트가 없습니다.</div>';
    }
  })
  .catch(function() {
    var card = document.getElementById('qck-right-recommended');
    if (card) card.innerHTML = '<div class="qck-panel-title">🔥 추천 스크립트</div>' +
      '<div style="font-size:0.690em;color:var(--color-text-tertiary);padding:4px 0;">불러오지 못했습니다.</div>';
  });

  /* 최근 많이 본 */
  var userId = window.AppState.userId;
  if (userId) {
    window.db.fetch(
      '/rest/v1/script_usage_logs?user_id=eq.' + userId +
      '&select=script_title&order=created_at.desc&limit=20'
    )
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var seen = {}, unique = [];
      if (data) data.forEach(function(d) {
        if (!seen[d.script_title]) { seen[d.script_title] = true; unique.push(d); }
      });
      unique = unique.slice(0, 5);
      var card = document.getElementById('qck-right-recent');
      if (!card) return;
      if (unique.length) {
        card.innerHTML = '<div class="qck-panel-title">🕐 최근 많이 본</div>' +
          unique.map(function(s) {
            return '<div class="qck-panel-item">' + s.script_title + '</div>';
          }).join('');
      } else {
        card.innerHTML = '<div class="qck-panel-title">🕐 최근 많이 본</div>' +
          '<div style="font-size:0.690em;color:var(--color-text-tertiary);padding:4px 0;">최근 기록이 없습니다.</div>';
      }
    })
    .catch(function() {
      var card = document.getElementById('qck-right-recent');
      if (card) card.innerHTML = '<div class="qck-panel-title">🕐 최근 많이 본</div>' +
        '<div style="font-size:0.690em;color:var(--color-text-tertiary);padding:4px 0;">불러오지 못했습니다.</div>';
    });
  }
};

/* ── 부트 ── */
function _boot() {
  window._initQuickSlot();
  window._initQuickPanel();
}

/* ── appstate:ready 표준 패턴 ── */
if (window.AppState && window.AppState.ready) {
  _boot();
} else {
  document.addEventListener('appstate:ready', function() { _boot(); }, { once: true });
}

})();
</script>
