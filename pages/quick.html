<style>
:root{
  --brown-main:#4a2f1f;
  --brown-dark:#3b2416;
  --accent:#c8753a;
  --line:#e6dfd7;
  --text:#2f2a26;
}
/* ── 페이지 헤더 ── */
.quick-page-header {
  height:120px;
  background:linear-gradient(135deg, #3d2b1f 0%, #6b4226 100%);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 24px; flex-shrink:0;
}
.quick-page-title {
  font-family:Pretendard,'Noto Sans KR',sans-serif;
  font-size:1.5em; font-weight:800;
  color:#fff; letter-spacing:-0.5px; margin-bottom:6px;
}
.quick-page-desc {
  font-family:Pretendard,'Noto Sans KR',sans-serif;
  font-size:0.7895em; font-weight:400;
  color:rgba(255,255,255,0.65); letter-spacing:-0.2px;
}
.quick-page-icon { font-size:2.8em; opacity:0.15; }
.main-btns {
  display:flex; gap:0; flex-wrap:wrap;
  padding:4px 16px 0;
  border-top:1px solid rgba(200,117,58,0.15);
  border-bottom:1px solid #ddc8b4;
  background:#faf8f5;
  flex-shrink:0;
}
.main-btn {
  padding:13px 16px; border-radius:0;
  border:none; border-bottom:3px solid transparent;
  background:transparent;
  font-size:0.8947em; font-weight:600; color:#9a7a62;
  font-family:inherit; cursor:pointer; white-space:nowrap; transition:all .15s;
}
.main-btn:hover { color:#3b2416; border-bottom-color:rgba(200,117,58,0.4); }
.main-btn.active { color:#3b2416; border-bottom-color:#c8753a; font-weight:700; }
.main-btn:hover { background:#f0e0d0; border-color:#c8a080; }

.quick-frame-body {
  display:grid; grid-template-columns:1fr 200px; gap:16px; align-items:start;
}
.content-shell {
  background:white; border:1px solid var(--line); border-radius:16px; overflow:hidden;
}
.content-slot-header {
  padding:12px 16px; background:#e8d5c2; border-bottom:1px solid #d4b8a0;
}
.content-slot-title { font-size:0.8947em; font-weight:800; color:#3b2416; }
.content-slot {
  padding:20px; min-height:300px; overflow-x:hidden;
  overflow-wrap:anywhere; word-break:break-word;
}
.content-slot * { max-width:100%; overflow-wrap:anywhere; word-break:break-word; box-sizing:border-box; }
.content-slot table { width:100%!important; table-layout:auto; }
.next-btn {
  text-align:center; padding:14px; font-size:0.7895em;
  color:#aaa; font-style:italic; border-top:1px solid var(--line);
}
.right-panel { display:flex; flex-direction:column; gap:12px; }
.panel-card { background:white; border:1px solid var(--line); border-radius:12px; padding:14px; }
.panel-title { font-size:0.7895em; font-weight:800; color:#3b2416; margin-bottom:8px; }
.panel-item {
  font-size:0.7895em; color:var(--text); padding:6px 0;
  border-bottom:1px solid var(--line); cursor:pointer;
}
.panel-item:last-child { border-bottom:none; }
.panel-item:hover { color:var(--accent); }
@media(max-width:900px){
  .quick-frame-body { grid-template-columns:1fr; }
  .right-panel { display:none; }
}
</style>

<div>
<div class="quick-page-header">
  <div>
    <div class="quick-page-title">⚡ Quick 메뉴</div>
    <div class="quick-page-desc">업무 지원 도구 · 녹취 스크립트 · 보험사 정보</div>
  </div>
  <div class="quick-page-icon">🛠️</div>
</div>
<div class="main-btns">
  <button class="main-btn active" onclick="selectQuickMain(this,'가입설계 / 선심사 동의 녹취 스크립트')">가입설계 / 선심사 동의 녹취 스크립트</button>
  <button class="main-btn" onclick="selectQuickMain(this,'회사별 BMI 심사기준')">회사별 BMI 심사기준</button>
  <button class="main-btn" onclick="selectQuickMain(this,'보험연령표')">보험연령표</button>
  <button class="main-btn" onclick="selectQuickMain(this,'보험회사 결제정보')">보험회사 결제정보</button>
  <button class="main-btn" onclick="selectQuickMain(this,'미러링 전 녹취 스크립트')">미러링 전 녹취 스크립트</button>
  <button class="main-btn" onclick="selectQuickMain(this,'원전산 설계 바로가기')">원전산 설계 바로가기</button>
  <button class="main-btn" onclick="selectQuickMain(this,'보험회사 (모니터링) 연락처')">보험회사 (모니터링) 연락처</button>
</div>

<div class="quick-frame-body">
  <div class="content-shell">
    <div class="content-slot-header">
      <div class="content-slot-title" id="content-title">가입설계 / 선심사 동의 녹취 스크립트</div>
    </div>
    <div class="content-slot" id="content-slot"></div>
    <div class="next-btn">- 지금 멈추지 마세요. 한 문장이 전체 흐름을 바꿉니다 -</div>
  </div>
  <div class="right-panel">
    <div class="panel-card" id="right-recommended">
      <div class="panel-title">🔥 추천 스크립트</div>
      <div style="font-size:0.6875em;color:#9a7a62;padding:4px 0;">불러오는 중...</div>
    </div>
    <div class="panel-card" id="right-recent">
      <div class="panel-title">🕐 최근 많이 본</div>
      <div style="font-size:0.6875em;color:#9a7a62;padding:4px 0;">불러오는 중...</div>
    </div>
  </div>
</div>

<script>
// ── quick_contents DB 연동 ──
// overlayContent는 DB fetch 완료 후 채워짐 (하드코딩 제거)
if (!window.overlayContent) window.overlayContent = {};

(function() {
  // myspace 패턴 동일: if(!window.XXX) 선언으로 중복 방지
  if (!window.SUPABASE_URL) window.SUPABASE_URL = 'https://qursjteiovcylqiepmlo.supabase.co';
  if (!window.SUPABASE_KEY) window.SUPABASE_KEY = 'sb_publishable_JG_lIUT7MjcLwel1oa-BZg_o_IDOCIL';
  if (!window._userToken) window._userToken = localStorage.getItem('os_token') || sessionStorage.getItem('os_token');

  // DB에서 quick_contents 전체 fetch → overlayContent 객체에 tab_title 키로 저장
  async function loadQuickContents() {
    try {
      const headers = { 'apikey': window.SUPABASE_KEY };
      if (window._userToken) headers['Authorization'] = 'Bearer ' + window._userToken;

      const res = await fetch(
        window.SUPABASE_URL + '/rest/v1/quick_contents?is_active=eq.true&order=sort_order.asc&select=tab_title,content_html',
        { headers }
      );

      if (!res.ok) {
        console.error('quick_contents fetch 실패:', res.status);
        return false;
      }

      const data = await res.json();
      if (!data || !data.length) {
        console.warn('quick_contents: 데이터 없음');
        return false;
      }

      // tab_title → content_html 매핑
      data.forEach(function(row) {
        if (row.tab_title && row.content_html) {
          window.overlayContent[row.tab_title] = row.content_html;
        }
      });

      return true;
    } catch(e) {
      console.error('quick_contents fetch 오류:', e);
      return false;
    }
  }

  // content-slot DOM + DB 로드 모두 완료 후 기본 탭 렌더
  function initQuickContent() {
    var slot = document.getElementById('content-slot');
    if (!slot) {
      setTimeout(initQuickContent, 50);
      return;
    }
    // 로딩 중 표시
    var defaultKey = '가입설계 / 선심사 동의 녹취 스크립트';
    slot.innerHTML = '<div style="padding:40px;text-align:center;color:#aaa;font-size:0.8947em;">불러오는 중...</div>';
    var titleEl = document.getElementById('content-title');
    if (titleEl) titleEl.textContent = defaultKey;

    loadQuickContents().then(function(ok) {
      var html;
      if (ok && window.overlayContent[defaultKey]) {
        html = window.overlayContent[defaultKey];
      } else if (!ok) {
        html = '<div style="padding:40px;text-align:center;color:#c0392b;font-size:0.8947em;">콘텐츠를 불러오지 못했습니다.<br>새로고침 해주세요.</div>';
      } else {
        html = '<div style="padding:40px;text-align:center;color:#aaa;font-size:0.8947em;">준비 중입니다.</div>';
      }
      slot.innerHTML = html;
      window._quickReady = true;
    });
  }

  setTimeout(initQuickContent, 100);
})();

// ── 이하 기존 하드코딩 데이터 삭제됨 — DB로 대체 ──
// (삭제된 블록: window.overlayContent = { ... })
var _quickLegacyRemoved = true;

window.selectQuickMain = function(btn, title) {
  document.querySelectorAll('.main-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const titleEl = document.getElementById('content-title');
  const slot = document.getElementById('content-slot');
  if (titleEl) titleEl.textContent = title;
  if (slot) slot.innerHTML = window.overlayContent[title] || '<div style="padding:40px;text-align:center;color:#aaa;">준비 중입니다.</div>';
  ['mirror-meritz','mirror-heungkuk'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = 'none';
  });
}

window.toggleMirrorScript = function(company) {
  const meritz = document.getElementById('mirror-meritz');
  const heungkuk = document.getElementById('mirror-heungkuk');
  if (!meritz || !heungkuk) return;
  if (company === 'meritz') {
    meritz.style.display = meritz.style.display === 'none' ? 'block' : 'none';
    heungkuk.style.display = 'none';
  } else {
    heungkuk.style.display = heungkuk.style.display === 'none' ? 'block' : 'none';
    meritz.style.display = 'none';
  }
}

// ── 우측 패널 데이터 로드 ──
(function() {
  var supaUrl = window.SUPABASE_URL || 'https://qursjteiovcylqiepmlo.supabase.co';
  var supaKey = window.SUPABASE_KEY || 'sb_publishable_JG_lIUT7MjcLwel1oa-BZg_o_IDOCIL';
  var token = window._userToken || localStorage.getItem('os_token') || sessionStorage.getItem('os_token');
  var userId = window._userId;

  if (token) {
    fetch(`${supaUrl}/rest/v1/scripts?is_recommended=eq.true&select=title&limit=5`, {
      headers: {'apikey': supaKey, 'Authorization': `Bearer ${token}`}
    }).then(r => r.json()).then(data => {
      const card = document.getElementById('right-recommended');
      if (card && data.length) {
        card.innerHTML = '<div class="panel-title">🔥 추천 스크립트</div>' + data.map(s => `<div class="panel-item">${s.title}</div>`).join('');
      }
    }).catch(() => {});

    if (userId) {
      fetch(`${supaUrl}/rest/v1/script_usage_logs?user_id=eq.${userId}&select=script_title&order=created_at.desc&limit=20`, {
        headers: {'apikey': supaKey, 'Authorization': `Bearer ${token}`}
      }).then(r => r.json()).then(data => {
        const seen = new Set();
        const unique = data.filter(d => {
          if (seen.has(d.script_title)) return false;
          seen.add(d.script_title); return true;
        }).slice(0,5);
        const card = document.getElementById('right-recent');
        if (card && unique.length) {
          card.innerHTML = '<div class="panel-title">🕐 최근 많이 본</div>' + unique.map(s => `<div class="panel-item">${s.script_title}</div>`).join('');
        }
      }).catch(() => {});
    }
  }
})();

</script>
