                onclick="window.togetherCloseWrite()">✕</button>
      </div>
      <div class="tg-modal-body">
        <div class="tg-form-field">
          <label class="tg-form-label" for="tg-form-category">
            카테고리 <span class="tg-req">*</span>
          </label>
          <select class="tg-form-select" id="tg-form-category">
            <option value="feature_request">기능 요청</option>
            <option value="review">사용 후기</option>
            <option value="free">자유 공유</option>
          </select>
        </div>
        <div class="tg-form-field">
          <label class="tg-form-label" for="tg-form-title">
            제목 <span class="tg-req">*</span>
          </label>
          <input type="text" class="tg-form-input" id="tg-form-title"
                 maxlength="100" placeholder="간단히 적어주세요">
          <div class="tg-form-hint">2~100자</div>
        </div>
        <div class="tg-form-field">
          <label class="tg-form-label" for="tg-form-content">
            내용 <span class="tg-req">*</span>
          </label>
          <textarea class="tg-form-textarea" id="tg-form-content"
                    maxlength="5000" placeholder="편하게 써주세요"></textarea>
          <div class="tg-form-hint">10~5000자</div>
        </div>
      </div>
      <div class="tg-modal-footer">
        <button type="button" class="tg-btn tg-btn-secondary"
                onclick="window.togetherCloseWrite()">취소</button>
        <button type="button" class="tg-btn tg-btn-primary" id="tg-form-submit"
                onclick="window.togetherSubmitWrite()">저장</button>
      </div>
    </div>
  </div>

  <!-- ⑦ 상세 보기 오버레이 (3-2) -->
  <div class="tg-overlay" id="together-detail-overlay" onclick="window.togetherHandleOverlayClick(event, 'detail')">
    <div class="tg-modal" role="dialog">
      <div class="tg-modal-header">
        <div class="tg-modal-title">상세 보기</div>
        <button type="button" class="tg-modal-close" aria-label="닫기"
                onclick="window.togetherCloseDetail()">✕</button>
      </div>
      <div class="tg-modal-body" id="together-detail-body">
        <div class="pg-loading">불러오는 중...</div>
      </div>
    </div>
  </div>

</div><!-- /pg-outer -->


<!-- ════════════════════════════════════════════════════════════
     페이지 스크립트
     ▸ IIFE 래핑 (app.html이 자동 래핑하지만 안전상 명시)
     ▸ onclick 호출 함수는 window.* 전역 등록
     ▸ appstate:ready 표준 부트 패턴
     ▸ 현재 단계(3-1): 탭 전환 UI만. fetch·모달·댓글 로직은 3-2에서 추가
════════════════════════════════════════════════════════════ -->
<script>
(function () {
  'use strict';

  /* ── 상수 ── */
  var CAT_LABEL = {
    feature_request: '기능 요청',
    review: '사용 후기',
    free: '자유 공유'
  };

  /* ── 상태 ── */
  var _currentTab = 'all';
  var _posts = [];            // 캐시: together 게시글 전체
  var _postsLoading = false;
  var _currentDetailId = null;
  var _submittingWrite = false;
  var _submittingComment = false;

  /* ── 유틸 ─────────────────────────────────────────────────── */

  /* HTML escape — 사용자 입력 렌더링 시 XSS 방지 */
  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  /* YYYY.MM.DD */
  function fmtDate(iso) {
    if (!iso) return '';
    var d = new Date(iso);
    if (isNaN(d.getTime())) return '';
    var pad = function (n) { return n < 10 ? '0' + n : '' + n; };
    return d.getFullYear() + '.' + pad(d.getMonth() + 1) + '.' + pad(d.getDate());
  }

  /* 로그인 필요 처리 */
  function requireLogin(actionLabel) {
    var s = window.AppState || {};
    if (!s.userId) {
      alert((actionLabel || '작성') + '은 로그인 후 이용할 수 있습니다.');
      return false;
    }
    return true;
  }

  /* 현재 사용자 표시명 (AppState.name 우선) */
  function getAuthorName() {
    var s = window.AppState || {};
    return (s.name && s.name.trim()) ? s.name : '익명';
  }

  /* ── 데이터 로드 ──────────────────────────────────────────── */

  async function loadTogetherPosts() {
    if (_postsLoading) return;
    _postsLoading = true;
    try {
      var path = '/rest/v1/posts'
        + '?board_type=eq.together'
        + '&is_hidden=eq.false'
        + '&order=is_notice.desc,created_at.desc'
        + '&select=id,title,content,category,author_name,is_notice,created_at,author_id';
      var res = await window.db.fetch(path);
      if (!res.ok) throw new Error('posts fetch 실패: ' + res.status);
      _posts = await res.json();
    } catch (e) {
      console.error('[together] loadTogetherPosts error:', e);
      _posts = [];
      var panel = document.getElementById('together-tab-' + _currentTab);
      if (panel) panel.innerHTML = '<div class="pg-empty"><div class="pg-empty-ico">⚠️</div><div>글을 불러오지 못했습니다.<br>잠시 후 다시 시도해 주세요.</div></div>';
      return;
    } finally {
      _postsLoading = false;
    }
    renderList();
  }

  /* ── 리스트 렌더 ─────────────────────────────────────────── */

  function renderList() {
    var panel = document.getElementById('together-tab-' + _currentTab);
    if (!panel) return;

    var items = (_currentTab === 'all')
      ? _posts
      : _posts.filter(function (p) { return p.category === _currentTab; });

    if (!items || items.length === 0) {
      panel.innerHTML = ''
        + '<div class="pg-empty">'
        +   '<div class="pg-empty-ico">💬</div>'
        +   '<div>아직 글이 없습니다.<br>첫 이야기를 남겨보세요.</div>'
        + '</div>';
      return;
    }

    var html = '<div class="tg-grid">';
    items.forEach(function (p) {
      var preview = String(p.content || '').replace(/\s+/g, ' ').trim();
      html += '<div class="tg-card" onclick="window.togetherOpenDetail(\'' + esc(p.id) + '\')">'
            +   '<div class="tg-card-top">' + renderBadge(p) + '</div>'
            +   '<div class="tg-card-title">' + esc(p.title || '(제목 없음)') + '</div>'
            +   '<div class="tg-card-body">' + esc(preview) + '</div>'
            +   '<div class="tg-card-meta">'
            +     '<span>' + esc(p.author_name || '익명') + '</span>'
            +     '<span class="tg-meta-dot"></span>'
            +     '<span>' + esc(fmtDate(p.created_at)) + '</span>'
            +   '</div>'
            + '</div>';
    });
    html += '</div>';
    panel.innerHTML = html;
  }

  function renderBadge(p) {
    if (p.is_notice) {
      return '<span class="tg-cat-badge tg-cat-notice">공지</span>';
    }
    var cat = p.category || 'free';
    var label = CAT_LABEL[cat] || '자유 공유';
    return '<span class="tg-cat-badge tg-cat-' + esc(cat) + '">' + esc(label) + '</span>';
  }

  /* ── 탭 전환 ─────────────────────────────────────────────── */

  window.togetherSwitchTab = function (tabKey) {
    _currentTab = tabKey;

    var bar = document.getElementById('together-tab-bar');
    if (bar) {
      bar.querySelectorAll('.pg-tab-btn').forEach(function (btn) {
        btn.classList.toggle('active', btn.dataset.tab === tabKey);
      });
    }

    var body = document.getElementById('together-body');
    if (body) {
      body.querySelectorAll('.pg-tab-panel').forEach(function (panel) {
        panel.classList.toggle('active', panel.id === 'together-tab-' + tabKey);
      });
    }

    renderList();
  };

  /* ── 글쓰기 모달 ─────────────────────────────────────────── */

  window.togetherOpenWrite = function () {
    if (!requireLogin('글쓰기')) return;
    var ov = document.getElementById('together-write-overlay');
    if (!ov) return;
    document.getElementById('tg-form-category').value = 'feature_request';
    document.getElementById('tg-form-title').value = '';
    document.getElementById('tg-form-content').value = '';
    ov.classList.add('active');
    setTimeout(function () {
      var t = document.getElementById('tg-form-title');
      if (t) t.focus();
    }, 50);
  };

  window.togetherCloseWrite = function () {
    var ov = document.getElementById('together-write-overlay');
    if (ov) ov.classList.remove('active');
  };

  window.togetherHandleOverlayClick = function (ev, which) {
    if (ev.target && ev.target.classList && ev.target.classList.contains('tg-overlay')) {
      if (which === 'write') window.togetherCloseWrite();
      else if (which === 'detail') window.togetherCloseDetail();
    }
  };

  window.togetherSubmitWrite = async function () {
    if (_submittingWrite) return;
    if (!requireLogin('글쓰기')) return;

    var category = document.getElementById('tg-form-category').value;
    var title    = (document.getElementById('tg-form-title').value || '').trim();
    var content  = (document.getElementById('tg-form-content').value || '').trim();

    if (!CAT_LABEL[category]) { alert('카테고리를 선택해 주세요.'); return; }
    if (title.length < 2 || title.length > 100) { alert('제목은 2~100자로 입력해 주세요.'); return; }
    if (content.length < 10 || content.length > 5000) { alert('내용은 10~5000자로 입력해 주세요.'); return; }

    _submittingWrite = true;
    var btn = document.getElementById('tg-form-submit');
    if (btn) { btn.disabled = true; btn.textContent = '저장 중...'; }

    try {
      var payload = {
        title: title,
        content: content,
        category: category,
        board_type: 'together',
        author_name: getAuthorName(),
        author_id: window.AppState.userId,
        is_notice: false,
        is_hidden: false
      };
      var res = await window.db.fetch('/rest/v1/posts', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify(payload)
      });
      if (!res.ok) {
        var msg = await res.text().catch(function () { return ''; });
        throw new Error('insert 실패 ' + res.status + ' ' + msg);
      }
      window.togetherCloseWrite();
      await loadTogetherPosts();
    } catch (e) {
      console.error('[together] save post error:', e);
      alert('저장에 실패했습니다. 잠시 후 다시 시도해 주세요.');
    } finally {
      _submittingWrite = false;
      if (btn) { btn.disabled = false; btn.textContent = '저장'; }
    }
  };

  /* ── 상세 보기 ───────────────────────────────────────────── */

  window.togetherOpenDetail = async function (postId) {
    if (!postId) return;
    _currentDetailId = postId;
    var ov = document.getElementById('together-detail-overlay');
    var body = document.getElementById('together-detail-body');
    if (!ov || !body) return;
    body.innerHTML = '<div class="pg-loading">불러오는 중...</div>';
    ov.classList.add('active');

    var post = _posts.find(function (p) { return String(p.id) === String(postId); });
    if (!post) {
      body.innerHTML = '<div class="pg-empty"><div class="pg-empty-ico">⚠️</div><div>게시글을 찾을 수 없습니다.</div></div>';
      return;
    }

    renderDetail(post);
    await loadAndRenderComments(postId);
  };

  window.togetherCloseDetail = function () {
    var ov = document.getElementById('together-detail-overlay');
    if (ov) ov.classList.remove('active');
    _currentDetailId = null;
  };

  function renderDetail(p) {
    var body = document.getElementById('together-detail-body');
    if (!body) return;
    var html = ''
      + '<div class="tg-detail-title">' + esc(p.title || '(제목 없음)') + '</div>'
      + '<div class="tg-detail-meta">'
      +   renderBadge(p)
      +   '<span>' + esc(p.author_name || '익명') + '</span>'
      +   '<span class="tg-meta-dot"></span>'
      +   '<span>' + esc(fmtDate(p.created_at)) + '</span>'
      + '</div>'
      + '<div class="tg-detail-body">' + esc(p.content || '') + '</div>'
      + '<div class="tg-comment-section">'
      +   '<div class="tg-comment-section-title">'
      +     '<span>댓글</span>'
      +     '<span class="tg-comment-count-pill" id="tg-comment-count">0</span>'
      +   '</div>'
      +   '<ul class="tg-comment-list" id="tg-comment-list">'
      +     '<li class="tg-comment-empty">불러오는 중...</li>'
      +   '</ul>'
      +   renderCommentForm()
      + '</div>';
    body.innerHTML = html;
  }

  function renderCommentForm() {
    var logged = !!(window.AppState && window.AppState.userId);
    if (!logged) {
      return '<div class="tg-login-notice">로그인 후 댓글을 남길 수 있습니다.</div>';
    }
    return ''
      + '<div class="tg-comment-form">'
      +   '<textarea class="tg-form-textarea" id="tg-comment-input" '
      +             'maxlength="2000" placeholder="댓글을 남겨주세요"></textarea>'
      +   '<button type="button" class="tg-btn tg-btn-primary" '
      +           'id="tg-comment-submit" onclick="window.togetherSubmitComment()">등록</button>'
      + '</div>';
  }

  /* ── 댓글 (comments 테이블, author_id 텍스트) ─────────────── */

  async function loadAndRenderComments(postId) {
    var list = document.getElementById('tg-comment-list');
    var cnt  = document.getElementById('tg-comment-count');
    try {
      var path = '/rest/v1/comments'
        + '?post_id=eq.' + encodeURIComponent(postId)
        + '&order=created_at.asc'
        + '&select=id,post_id,content,author_id,author_name,created_at';
      var res = await window.db.fetch(path);
      if (!res.ok) throw new Error('comments fetch 실패: ' + res.status);
      var rows = await res.json();
      if (cnt) cnt.textContent = String(rows.length);
      if (!list) return;

      if (!rows.length) {
        list.innerHTML = '<li class="tg-comment-empty">첫 댓글을 남겨보세요.</li>';
        return;
      }
      var html = '';
      rows.forEach(function (c) {
        html += '<li class="tg-comment-item">'
              +   '<div class="tg-comment-meta">'
              +     '<span class="tg-comment-author">' + esc(c.author_name || '익명') + '</span>'
              +     '<span class="tg-meta-dot"></span>'
              +     '<span>' + esc(fmtDate(c.created_at)) + '</span>'
              +   '</div>'
              +   '<div class="tg-comment-text">' + esc(c.content || '') + '</div>'
              + '</li>';
      });
      list.innerHTML = html;
    } catch (e) {
      console.error('[together] loadComments error:', e);
      if (list) list.innerHTML = '<li class="tg-comment-empty">댓글을 불러오지 못했습니다.</li>';
    }
  }

  window.togetherSubmitComment = async function () {
    if (_submittingComment) return;
    if (!_currentDetailId) return;
    if (!requireLogin('댓글')) return;

    var input = document.getElementById('tg-comment-input');
    var content = (input && input.value || '').trim();
    if (content.length < 1) { alert('댓글 내용을 입력해 주세요.'); return; }
    if (content.length > 2000) { alert('댓글은 2000자 이내로 입력해 주세요.'); return; }

    _submittingComment = true;
    var btn = document.getElementById('tg-comment-submit');
    if (btn) { btn.disabled = true; btn.textContent = '등록 중...'; }

    try {
      var payload = {
        post_id: _currentDetailId,
        content: content,
        author_id: String(window.AppState.userId),   // comments.author_id (text) — RLS: auth.uid()::text 비교
        author_name: getAuthorName()
      };
      var res = await window.db.fetch('/rest/v1/comments', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify(payload)
      });
      if (!res.ok) {
        var msg = await res.text().catch(function () { return ''; });
        throw new Error('comment insert 실패 ' + res.status + ' ' + msg);
      }
      if (input) input.value = '';
      await loadAndRenderComments(_currentDetailId);
    } catch (e) {
      console.error('[together] save comment error:', e);
      alert('댓글 등록에 실패했습니다. 잠시 후 다시 시도해 주세요.');
    } finally {
      _submittingComment = false;
      if (btn) { btn.disabled = false; btn.textContent = '등록'; }
    }
  };

  /* ── 부팅 ─────────────────────────────────────────────────── */

  function _boot() {
    loadTogetherPosts();
  }

  if (window.AppState && window.AppState.ready) {
    _boot();
  } else {
    document.addEventListener('appstate:ready', function () { _boot(); }, { once: true });
  }

})();
</script>
