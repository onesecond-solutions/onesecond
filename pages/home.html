/* ════════════════════════════════════════════════════════════
   1. 6각형 다이어그램 (.home-hex-*)
════════════════════════════════════════════════════════════ */

.home-hex-wrap {
  position: relative;
  width: 100%;
  max-width: 480px;  /* 2026-05-17 정정: 600 → 480 축소 (D영역 이탈 격차 해소) */
  /* 좌우 정렬은 auto로 중앙 유지. 부모 정합 위해 display:block 명시 */
  display: block;
  margin: calc(var(--space-10) * -3) auto var(--space-3);
  aspect-ratio: 1 / 1;
  overflow: visible;
}

.home-hex-svg {
  width: 100%;
  height: 100%;
  overflow: visible;
}

.home-hex-line {
  stroke: var(--color-border);
  stroke-width: 2;
  fill: none;
}

.home-hex-node {
  cursor: pointer;
  transform-origin: center;
  transition: transform var(--transition-normal);
}

.home-hex-node-rect {
  fill: var(--color-surface);
  stroke: var(--color-border);
  stroke-width: 1.5;
  /* rx/ry는 SVG 속성으로 JS에서 setAttribute (구버전 브라우저 호환) */
  transition: fill var(--transition-normal), stroke var(--transition-normal), stroke-width var(--transition-normal);
}

.home-hex-node-label {
  font-family: inherit;
  font-size: 0.842em;
  font-weight: var(--fw-bold);
  fill: var(--color-text-primary);
  text-anchor: middle;
  dominant-baseline: central;
  pointer-events: none;
}

/* 호버 상태 */
.home-hex-node:hover .home-hex-node-rect,
.home-hex-node.hover .home-hex-node-rect {
  fill: var(--color-surface-2);
  stroke: var(--color-accent);
  stroke-width: 2;
}
.home-hex-node:hover,
.home-hex-node.hover {
  transform: scale(1.05);
}

/* 클릭 순간 피드백 */
.home-hex-node.clicking {
  transform: scale(0.95);
  transition: transform 0.1s ease-out;
}

/* 펄스 (호버·클릭 중에는 중단) */
.home-hex-node:not(:hover):not(.hover):not(.clicking) {
  animation: home-pulse 2s ease-in-out infinite;
}

/* 중앙 로고 박스 (2026-04-24: 텍스트 2줄 → logo05.png 이미지 1장, 박스 제거 / 이미지만 부각)
   2026-04-29: 흰색 원형 카드 부활 — 방사형 선이 시계 로고 안쪽까지 통과하던 시각 어색 시정
   ▸ 시안 design_test/home/v2-full.html `.hex-center-inner` 패턴 이식 (단, 라이브는 단일 div 구조 유지)
   ▸ z-index: 2 — SVG 방사형 선(.home-hex-line) 위에 배치
   ▸ 카드 크기 140px = 이미지 120px + 좌우 패딩 10px (이미지 보존) */
.home-hex-center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 140px;
  height: 140px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--color-surface);
  border: none;
  border-radius: 50%;
  box-shadow:
    0 20px 40px -8px rgba(160, 82, 45, 0.22),
    0 8px 16px -4px rgba(160, 82, 45, 0.14),
    inset 0 0 0 1px rgba(212, 132, 90, 0.12);
  text-align: center;
  pointer-events: none;
  z-index: 2;
}
.home-hex-logo-img {
  display: block;
  width: 120px;
  max-width: 100%;
  height: auto;
  object-fit: contain;
}


/* ════════════════════════════════════════════════════════════
   2. 호버 툴팁 (.home-hex-tooltip*) — 6방향 말풍선
   ▸ JS가 .home-hex-wrap 내부에 6개 툴팁 동적 생성
   ▸ 위치는 inline style로 left/top/transform 계산 주입
   ▸ 방향 구분은 data-pos 속성 (12/2/4/6/8/10)
════════════════════════════════════════════════════════════ */

.home-hex-tooltip {
  position: absolute !important;
  /* 2026-05-17 정정: 6방향 분산 → 중앙 시계 위치 통합 박음 (D영역/모바일 이탈 격차 해소) */
  left: 50% !important;
  top: 50% !important;
  width: clamp(180px, 260px, 80vw);
  max-width: 90%;
  background: var(--color-surface);
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow-md);
  overflow: hidden;
  opacity: 0;
  transform: translate(-50%, -50%) scale(0.95) !important;
  transform-origin: center;
  pointer-events: none;
  z-index: 20;
  transition: opacity 150ms ease-in, transform 180ms ease-out;
}
.home-hex-tooltip.active {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1) !important;
  pointer-events: auto;
}

/* 2026-05-17 정정: 중앙 통합 박힘 자리 = 6방향 꼬리 불필요 */
.home-hex-tooltip::before { display: none !important; }

/* 툴팁 헤더 — 브랜드 갈색 */
.home-hex-tip-header {
  background: var(--color-brand);
  color: #fff;
  padding: var(--space-2) var(--space-3);
  font-weight: var(--fw-bold);
  font-size: 0.937em;
  display: flex;
  align-items: center;
  gap: var(--space-2);
  line-height: 1.3;
}

/* 툴팁 본문 */
.home-hex-tip-body {
  padding: var(--space-3);
  font-size: 0.875em;
  color: var(--color-text-primary);
  line-height: 1.55;
}

/* 바로가기 CTA 버튼 — 주황 채움 */
.home-hex-tip-cta {
  display: block;
  width: calc(100% - var(--space-6));
  margin: 0 var(--space-3) var(--space-3);
  padding: var(--space-2) var(--space-3);
  background: var(--color-accent);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-weight: var(--fw-bold);
  font-size: 0.842em;
  font-family: inherit;
  cursor: pointer;
  text-align: center;
  transition: background var(--transition-fast);
}
.home-hex-tip-cta:hover,
.home-hex-tip-cta:focus-visible {
  background: var(--color-accent-dark, #b86a44);
  outline: none;
}


/* ════════════════════════════════════════════════════════════

<div class="home-welcome-bar" id="home-welcome-bar" role="region" aria-label="원세컨드 완성도">
  <div class="home-welcome-bar-greeting">
    안녕하세요 <span class="home-welcome-bar-name" id="home-welcome-name">팀장님</span>
  </div>

      <span class="home-welcome-bar-percent" id="home-welcome-percent">20%</span>
    </div>
    <div class="home-welcome-bar-track" role="progressbar" aria-valuenow="20" aria-valuemin="0" aria-valuemax="100">
      <div class="home-welcome-bar-fill" id="home-welcome-fill" style="width: 0%;"></div>
    </div>
  </div>
  <div class="home-welcome-bar-hint">여러분이 쓰실수록 함께 완성</div>
</div>

<script>
(function () {
  // 진행 바 % 수동 조정 자리 (채팅으로 % 변경 요청 시 본 상수만 수정)
  var _OS_PROGRESS_PERCENT = 20;

  function applyProgress() {
    var fill = document.getElementById('home-welcome-fill');
    var pctText = document.getElementById('home-welcome-percent');
    var track = fill && fill.parentElement;
    if (fill) {
      // 다음 frame에서 width 적용 → 차오름 애니메이션
      requestAnimationFrame(function () {
        fill.style.width = _OS_PROGRESS_PERCENT + '%';
      });
    }
    if (pctText) pctText.textContent = _OS_PROGRESS_PERCENT + '%';
    if (track) track.setAttribute('aria-valuenow', String(_OS_PROGRESS_PERCENT));
  }

  function applyName() {
    try {
      var s = window.AppState;
      var name = (s && s.name) ? s.name : '';
      if (!name) {
        // localStorage fallback
        var raw = localStorage.getItem('os_user') || sessionStorage.getItem('os_user') || '{}';
        var u = JSON.parse(raw);
        name = (u && (u.user_metadata && u.user_metadata.name)) || u.name || '';
      }
      var el = document.getElementById('home-welcome-name');
      if (el && name) el.textContent = name + ' 팀장님';
    } catch (e) { /* noop */ }
  }

  // AppState 준비됐으면 즉시, 아직이면 이벤트 대기
  if (window.AppState && window.AppState.ready) {
    applyName();
  } else {
    document.addEventListener('appstate:ready', applyName);
    // fallback — 이벤트 누락 환경 대비 짧은 지연 후 시도
    setTimeout(applyName, 600);
  }

  applyProgress();
})();
</script>

<!-- 2026-05-19 정정: 4팀 단체방2(team_notices) 최근 3건 Supabase fetch -->
<script>
(function () {
  'use strict';

  function timeAgo(iso) {
    if (!iso) return '';
    try {
      var t = new Date(iso).getTime();
      if (isNaN(t)) return '';
      var diff = (Date.now() - t) / 1000;
      if (diff < 60) return '방금 전';
      if (diff < 3600) return Math.floor(diff / 60) + '분 전';
      if (diff < 86400) return Math.floor(diff / 3600) + '시간 전';
      if (diff < 86400 * 7) return Math.floor(diff / 86400) + '일 전';
      return new Date(iso).toLocaleDateString('ko-KR', { month: 'numeric', day: 'numeric' });
    } catch (e) { return ''; }
  }

  function escapeHtml(s) {
    return String(s || '').replace(/[&<>"']/g, function (c) {
      return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
    });
  }

  /* CTA + 목록 클릭 = board 진입 + team_feed 탭 자동 활성화 */
  window.homeGoToTeamFeed = function () {
    try { sessionStorage.setItem('os_board_initial_tab', 'team_feed'); } catch (e) {}
    if (window.switchMenu) window.switchMenu('board');
    /* board 가동 후 탭 활성화 (300ms 안전 여유) */
    setTimeout(function () {
      if (typeof window.switchBoard === 'function') {
        window.switchBoard('team_feed');
      }
    }, 300);
  };

  function renderTodayList(items) {
    var listEl = document.getElementById('home-today-list');
    var metaEl = document.getElementById('home-today-meta');
    if (!listEl) return;

    if (!items || items.length === 0) {
      listEl.innerHTML = '<div class="home-today-list-empty">아직 새 글이 없습니다.<br>들어가서 첫 공지를 작성해 보세요.</div>';
      if (metaEl) metaEl.textContent = '새 글 없음';
      return;
    }

    if (metaEl) metaEl.textContent = '새 글 ' + items.length + '건 있습니다';

    var html = items.slice(0, 3).map(function (it) {
      var title = escapeHtml(it.title || it.content || '제목 없음').slice(0, 60);
      var when = escapeHtml(timeAgo(it.created_at));
      return '<div class="home-today-list-item" '
           + 'onclick="window.homeGoToTeamFeed &amp;&amp; window.homeGoToTeamFeed()" '
           + 'role="button" tabindex="0">'
           + '<span class="home-today-list-bullet" aria-hidden="true"></span>'
           + '<span class="home-today-list-title">' + title + '</span>'
           + '<span class="home-today-list-time">' + when + '</span>'
           + '</div>';
    }).join('');
    listEl.innerHTML = html;
  }

  function loadTodayList() {
    if (!window.fetch || !window.SUPABASE_URL || !window.SUPABASE_KEY) {
      renderTodayList(null);
      return;
    }
    var token = localStorage.getItem('os_token') || sessionStorage.getItem('os_token');
    /* 본인 소속 team_id 한정 (없으면 전체 최근 3건 fallback) */
    var teamId = (window.AppState && window.AppState.team_id) || '';
    var url = window.SUPABASE_URL
            + '/rest/v1/team_notices'
            + '?select=id,team_id,notice_type,title,content,created_at'
            + (teamId ? '&team_id=eq.' + encodeURIComponent(teamId) : '')
            + '&order=created_at.desc'
            + '&limit=3';
    fetch(url, {
      headers: {
        'apikey': window.SUPABASE_KEY,
        'Authorization': 'Bearer ' + (token || window.SUPABASE_KEY)
      }
    })
    .then(function (res) { return res.ok ? res.json() : []; })
    .then(function (data) { renderTodayList(data || []); })
    .catch(function () { renderTodayList(null); });
  }

  // AppState ready 후 fetch (token + team_id 정합)
  if (window.AppState && window.AppState.ready) {
    loadTodayList();
  } else {
    document.addEventListener('appstate:ready', loadTodayList);
    setTimeout(loadTodayList, 800);
  }
})();
</script>
