<style>

/* ════════════════════════════════════════════════════════════
   0. 홈 전용 오버라이드 (.page-header 공통 자산 위에 적용)
════════════════════════════════════════════════════════════ */

/* 상단 안내 배너 — 브라운 바탕 제거 + 중앙 정렬
   ▸ background: transparent → 페이지 배경(--color-bg, 크림 아이보리) 노출
   ▸ home.html에서만 .home-intro-header가 함께 부여되므로 다른 페이지의 .page-header에는 영향 없음 */
.home-intro-header {
  /* .page-header의 flex 레이아웃 무력화 → 자식 블록 쌓임 + text-align: center 정상 작동 */
  display: block;
  background: transparent;
  color: var(--color-text-primary);
  text-align: center;
  padding: var(--space-3) var(--space-4);
  margin-bottom: var(--space-1);
  border: none;
  box-shadow: none;
}

/* 상단 로고 아이콘 (v3.3) — 타이틀과 6각 다이어그램 사이 브랜드 각인 */
.home-hero-logo {
  display: flex;
  justify-content: center;
  align-items: center;
  margin: var(--space-1) auto var(--space-3);
}
.home-hero-logo img {
  height: 72px;
  width: auto;
  display: block;
}
.home-intro-header .page-header-title {
  color: var(--color-text-primary);
}
.home-intro-header .page-header-sub {
  color: var(--color-text-secondary);
}


/* ════════════════════════════════════════════════════════════
   1. 6각형 다이어그램 (.home-hex-*)
════════════════════════════════════════════════════════════ */

.home-hex-wrap {
  position: relative;
  width: 100%;
  max-width: 600px;
  margin: var(--space-1) auto var(--space-3);
  aspect-ratio: 1 / 1;
  overflow: visible;
}

.home-hex-svg {
  width: 100%;
  height: 100%;
  overflow: visible;
}

.home-hex-line {
  stroke: var(--color-border);
  stroke-width: 2;
  fill: none;
}

.home-hex-node {
  cursor: pointer;
  transform-origin: center;
  transition: transform var(--transition-normal);
}

.home-hex-node-rect {
  fill: var(--color-surface);
  stroke: var(--color-border);
  stroke-width: 1.5;
  /* rx/ry는 SVG 속성으로 JS에서 setAttribute (구버전 브라우저 호환) */
  transition: fill var(--transition-normal), stroke var(--transition-normal), stroke-width var(--transition-normal);
}

.home-hex-node-label {
  font-family: inherit;
  font-size: 0.842em;
  font-weight: var(--fw-bold);
  fill: var(--color-text-primary);
  text-anchor: middle;
  dominant-baseline: central;
  pointer-events: none;
}

/* 호버 상태 */
.home-hex-node:hover .home-hex-node-rect,
.home-hex-node.hover .home-hex-node-rect {
  fill: var(--color-surface-2);
  stroke: var(--color-accent);
  stroke-width: 2;
}
.home-hex-node:hover,
.home-hex-node.hover {
  transform: scale(1.05);
}

/* 클릭 순간 피드백 */
.home-hex-node.clicking {
  transform: scale(0.95);
  transition: transform 0.1s ease-out;
}

/* 펄스 (호버·클릭 중에는 중단) */
.home-hex-node:not(:hover):not(.hover):not(.clicking) {
  animation: home-pulse 2s ease-in-out infinite;
}

/* 중앙 로고 박스 */
.home-hex-center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  padding: var(--space-4) var(--space-5);
  background: var(--color-surface);
  border: 2px solid var(--color-brand);
  border-radius: var(--radius-lg);
  text-align: center;
  pointer-events: none;
  box-shadow: var(--shadow-sm);
}
.home-hex-logo {
  font-size: 1.5em;
  font-weight: var(--fw-black);
  color: var(--color-brand);
  letter-spacing: -0.02em;
  line-height: 1.1;
}
.home-hex-tagline {
  font-size: 0.842em;
  color: var(--color-text-secondary);
  margin-top: var(--space-1);
  line-height: 1.5;
}


/* ════════════════════════════════════════════════════════════
   2. 호버 툴팁 (.home-hex-tooltip*) — 6방향 말풍선
   ▸ JS가 .home-hex-wrap 내부에 6개 툴팁 동적 생성
   ▸ 위치는 inline style로 left/top/transform 계산 주입
   ▸ 방향 구분은 data-pos 속성 (12/2/4/6/8/10)
════════════════════════════════════════════════════════════ */

.home-hex-tooltip {
  position: absolute;
  width: 280px;
  background: var(--color-surface);
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow-md);
  overflow: hidden;
  opacity: 0;
  /* translate 정렬점(--tip-align)은 JS가 inline으로 주입.
     scale은 CSS가 담당 → 트랜지션 충돌 방지 */
  transform: var(--tip-align, none) scale(0.95);
  transform-origin: center;
  pointer-events: none;
  z-index: 20;
  transition: opacity 150ms ease-in, transform 180ms ease-out;
}
.home-hex-tooltip.active {
  opacity: 1;
  transform: var(--tip-align, none) scale(1);
  pointer-events: auto;
}

/* 말풍선 꼬리 — 각 방향에서 중앙 노드 쪽을 향함 (body 색과 동일하게) */
.home-hex-tooltip::before {
  content: '';
  position: absolute;
  width: 0;
  height: 0;
  border: 9px solid transparent;
}
.home-hex-tooltip[data-pos="12"]::before { bottom: -17px; left: 50%; transform: translateX(-50%); border-top-color: var(--color-surface); }
.home-hex-tooltip[data-pos="6"]::before  { top: -17px;  left: 50%; transform: translateX(-50%); border-bottom-color: var(--color-brand); }
.home-hex-tooltip[data-pos="2"]::before  { top: 14px;   left: -17px; border-right-color: var(--color-brand); }
.home-hex-tooltip[data-pos="4"]::before  { bottom: 14px; left: -17px; border-right-color: var(--color-surface); }
.home-hex-tooltip[data-pos="8"]::before  { bottom: 14px; right: -17px; border-left-color: var(--color-surface); }
.home-hex-tooltip[data-pos="10"]::before { top: 14px;   right: -17px; border-left-color: var(--color-brand); }

/* 툴팁 헤더 — 브랜드 갈색 */
.home-hex-tip-header {
  background: var(--color-brand);
  color: #fff;
  padding: var(--space-2) var(--space-3);
  font-weight: var(--fw-bold);
  font-size: 0.937em;
  display: flex;
  align-items: center;
  gap: var(--space-2);
  line-height: 1.3;
}

/* 툴팁 본문 */
.home-hex-tip-body {
  padding: var(--space-3);
  font-size: 0.875em;
  color: var(--color-text-primary);
  line-height: 1.55;
}

/* 바로가기 CTA 버튼 — 주황 채움 */
.home-hex-tip-cta {
  display: block;
  width: calc(100% - var(--space-6));
  margin: 0 var(--space-3) var(--space-3);
  padding: var(--space-2) var(--space-3);
  background: var(--color-accent);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-weight: var(--fw-bold);
  font-size: 0.842em;
  font-family: inherit;
  cursor: pointer;
  text-align: center;
  transition: background var(--transition-fast);
}
.home-hex-tip-cta:hover,
.home-hex-tip-cta:focus-visible {
  background: var(--color-accent-dark, #b86a44);
  outline: none;
}


/* ════════════════════════════════════════════════════════════
   3. A2 UI 인라인 미리보기 (.home-a2-preview*)
   ▸ .card 위에 fade-in + accent border만 커스텀
════════════════════════════════════════════════════════════ */

.home-a2-preview {
  max-width: 640px;
  margin: 0 auto var(--space-5);
  border-color: var(--color-accent);
  opacity: 0;
  transform: translateY(-10px);
  transition: opacity var(--transition-slow), transform var(--transition-slow);
}
.home-a2-preview.show {
  opacity: 1;
  transform: translateY(0);
}

.home-a2-preview-inner {
  display: flex;
  flex-direction: column;
  gap: var(--space-3);
}

.home-a2-preview-hint {
  font-size: 0.737em;
  color: var(--color-text-tertiary);
  text-align: center;
  margin-top: var(--space-2);
  padding-top: var(--space-3);
  border-top: 1px dashed var(--color-border);
}

/* 검색 input 행 — .input 위에 검색 아이콘만 얹음 */
.home-search-row {
  position: relative;
}
.home-search-row .input {
  padding-left: 40px;
}
.home-search-row::before {
  content: "🔍";
  position: absolute;
  top: 50%;
  left: var(--space-3);
  transform: translateY(-50%);
  font-size: 1em;
  pointer-events: none;
  opacity: 0.7;
}

/* 빠른실행 드롭다운 (tokens.css에 드롭다운 패턴 없음 → 커스텀) */
.home-quick-dropdown {
  margin-top: var(--space-2);
  display: none;             /* 기본 닫힘. 토글 버튼으로만 열림 */
  background: var(--color-surface-2);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  max-height: 280px;
  overflow-y: auto;
}
.home-quick-dd-item {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-3) var(--space-4);
  font-size: 0.842em;
  color: var(--color-text-primary);
  border-bottom: 1px solid var(--color-border);
  cursor: pointer;
  transition: background var(--transition-fast);
}
.home-quick-dd-item:last-child { border-bottom: none; }
.home-quick-dd-item:hover { background: var(--color-surface); }

/* 빠른실행 슬롯 — 라벨·버튼 우측 정렬 (드롭다운·안내는 영향 없음) */
#home-a2-preview-quick .section-title { justify-content: flex-end; }
#home-a2-preview-quick > .btn { display: block; margin-left: auto; }


/* ════════════════════════════════════════════════════════════
   4. Keyframes
════════════════════════════════════════════════════════════ */

@keyframes home-pulse {
  0%, 100% { transform: scale(1); }
  50%      { transform: scale(1.02); }
}


/* ════════════════════════════════════════════════════════════
   5. 모바일 반응형 (≤640px)
════════════════════════════════════════════════════════════ */

@media (max-width: 640px) {

  .home-hex-wrap {
    max-width: 360px;
    margin: var(--space-4) auto;
  }

  .home-hex-node-label { font-size: 0.737em; }

  .home-hex-center { padding: var(--space-3) var(--space-4); }
  .home-hex-logo   { font-size: 1.2em; }
  .home-hex-tagline { font-size: 0.737em; }

  /* 호버 비활성 (터치 디바이스) — 탭으로 툴팁 토글 */
  .home-hex-node:hover .home-hex-node-rect {
    fill: var(--color-surface);
    stroke: var(--color-border);
    stroke-width: 1.5;
  }
  .home-hex-node:hover { transform: none; }

  /* 모바일 툴팁 — 화면 폭 대비 축소 */
  .home-hex-tooltip { width: 240px; }

  /* 모바일 로고 — 60px로 축소 */
  .home-hero-logo img { height: 60px; }

  /* 미리보기 패딩 축소 */
  .home-a2-preview { padding: var(--space-4); }
}

</style>

<!-- ════════════════════════════════════════════════════════════
     <script> 청크 2/3 — NODES + SVG 렌더 + 호버/클릭 핸들러
     ▸ 청크 3에서 미리보기 함수가 별도 <script>로 추가됨

================================================================================ -->
<script>
(function () {
  'use strict';

  // ──────────────────────────────────────────────────────────

  // ──────────────────────────────────────────────────────────

  // NODES 데이터 (v3.2 — 툴팁 인터랙션 + 방향 + 바로가기 URL)

  //   targetUrl:       switchMenu 인자. null이면 CTA 버튼 없음 (기존 상단 UI와 중복 회피)
  //   tipDesc:         툴팁 본문 2~3줄 카피
  //                    ⚠️ [COPY-TODO]: 팀장님이 팀장님 검토 후 수정 예정인 항목
  // ──────────────────────────────────────────────────────────
  var NODES = [
    {
      id: 'scripts',
      label: '📜 스크립트',
      tipDesc: '17년 현장에서 검증된 상담 멘트',    /* [COPY-TODO] 팀장님 수정 대상 */
      angle: 0,
      tooltipPosition: '12',

    },
    {
      id: 'board',

      tipDesc: '영업 현장의 공지, 인수, 상품 소식',  /* 팀장님 확정 카피 */
      angle: 60,
      tooltipPosition: '2',
      targetUrl: 'board'
    },
    {
      id: 'quick',
      label: '⚡ 빠른실행',
      tipDesc: '클로징 타이밍 바로 클릭',           /* 팀장님 확정 카피 */
      angle: 120,
      tooltipPosition: '4',

    },
    {
      id: 'myspace',

      targetUrl: 'myspace'
    },
    {
      id: 'together',

      tipDesc: '불편한 점·필요한 기능 직접 제안',    /* [COPY-TODO] 팀장님 수정 대상 */
      angle: 240,
      tooltipPosition: '8',
      targetUrl: 'together'
    },
    {
      id: 'search',
      label: '🔍 검색기',
      tipDesc: '스크립트·게시글·자료 한 번에 검색',  /* [COPY-TODO] 팀장님 수정 대상 */

      tooltipPosition: '10',

      previewType: 'search'
    }
  ];

  // ──────────────────────────────────────────────────────────
  // SVG 좌표 상수 (모두 변수화 — 하드코딩 금지 원칙)
  // ──────────────────────────────────────────────────────────
  var VIEW_W = 600;
  var VIEW_H = 600;
  var CX     = 300;        // 중심 X
  var CY     = 300;        // 중심 Y
  var R_HEX  = 220;        // 중심에서 노드 중심까지 반지름
  var NODE_W = 140;
  var NODE_H = 80;
  /* tokens.css의 --radius-md(12px) 미러링.
     SVG rx/ry CSS는 구버전 브라우저 비호환으로 JS 속성 설정 */
  var RECT_RADIUS = 12;
  var SVG_NS = 'http://www.w3.org/2000/svg';

  // angle(°) → SVG 좌표 변환 (12시=0°, 시계방향)
  function angleToXY(angleDeg) {
    var rad = angleDeg * Math.PI / 180;
    return {
      x: CX + R_HEX * Math.sin(rad),
      y: CY - R_HEX * Math.cos(rad)
    };
  }

  // ──────────────────────────────────────────────────────────
  // SVG 동적 생성 (라인 6개 + 노드 6개 + 중앙 로고)
  // 색상은 모두 CSS 변수 (.home-hex-* 클래스)에서 관리
  // ──────────────────────────────────────────────────────────
  function renderHex() {
    var wrap = document.getElementById('homeHexWrap');
    if (!wrap) return;
    wrap.innerHTML = '';   // 재호출 안전 (예: 모바일 회전)

    var svg = document.createElementNS(SVG_NS, 'svg');
    svg.setAttribute('viewBox', '0 0 ' + VIEW_W + ' ' + VIEW_H);
    svg.setAttribute('class', 'home-hex-svg');

    // 1) 중심 → 각 노드 중심으로 라인
    NODES.forEach(function (node) {
      var pt = angleToXY(node.angle);
      var line = document.createElementNS(SVG_NS, 'line');
      line.setAttribute('class', 'home-hex-line');
      line.setAttribute('x1', CX);
      line.setAttribute('y1', CY);
      line.setAttribute('x2', pt.x);
      line.setAttribute('y2', pt.y);
      svg.appendChild(line);
    });

    // 2) 각 노드 그룹 (rect + label)
    NODES.forEach(function (node) {
      var pt = angleToXY(node.angle);

      var g = document.createElementNS(SVG_NS, 'g');
      g.setAttribute('class', 'home-hex-node');
      g.setAttribute('id', 'home-node-' + node.id);
      g.setAttribute('tabindex', '0');
      g.setAttribute('role', 'button');
      g.setAttribute('aria-label', node.label);
      g.setAttribute('aria-describedby', 'home-tip-' + node.id);
      g.addEventListener('mouseenter', function () { window.homeNodeHover(node.id); });
      g.addEventListener('mouseleave', function () { window.homeNodeOut(node.id); });
      g.addEventListener('focusin',    function () { window.homeNodeHover(node.id); });
      g.addEventListener('focusout',   function () { window.homeNodeOut(node.id); });
      g.addEventListener('click',      function () { window.homeNodeClick(node.id); });
      g.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          window.homeNodeClick(node.id);
        }
      });

      var rect = document.createElementNS(SVG_NS, 'rect');
      rect.setAttribute('class', 'home-hex-node-rect');
      rect.setAttribute('x', pt.x - NODE_W / 2);
      rect.setAttribute('y', pt.y - NODE_H / 2);
      rect.setAttribute('width', NODE_W);
      rect.setAttribute('height', NODE_H);
      rect.setAttribute('rx', RECT_RADIUS);
      rect.setAttribute('ry', RECT_RADIUS);
      g.appendChild(rect);

      var text = document.createElementNS(SVG_NS, 'text');
      text.setAttribute('class', 'home-hex-node-label');
      text.setAttribute('x', pt.x);
      text.setAttribute('y', pt.y);
      text.textContent = node.label;
      g.appendChild(text);

      svg.appendChild(g);
    });

    wrap.appendChild(svg);

    // 3) 중앙 로고 박스 (SVG 위에 절대 위치 div, pointer-events: none)
    var center = document.createElement('div');
    center.className = 'home-hex-center';
    center.innerHTML =
      '<div class="home-hex-logo">원세컨드</div>' +
      '<div class="home-hex-tagline">17년 현장이 담긴<br>TM 상담 도구</div>';
    wrap.appendChild(center);

    // 4) 6개 툴팁 DOM 생성 (노드별 absolute 배치)
    renderTooltips(wrap);
  }

  // ──────────────────────────────────────────────────────────
  // 툴팁 위치 계산 — SVG 좌표(0~600) → wrap 내 % 좌표
  //   노드 반폭/반높이 + 오프셋(~3%) 감안 + transform으로 정렬점 고정
  // ──────────────────────────────────────────────────────────
  var HALF_W_PCT = (NODE_W / 2 / VIEW_W) * 100;    // ≈ 11.67%
  var HALF_H_PCT = (NODE_H / 2 / VIEW_H) * 100;    // ≈ 6.67%
  var TIP_OFFSET_PCT = 3;                          // 툴팁과 노드 사이 간격 ≈ 18px (wrap 600px 기준)

  function computeTooltipStyle(nx, ny, pos) {
    var px = (nx / VIEW_W) * 100;
    var py = (ny / VIEW_H) * 100;
    switch (pos) {
      case '12': return { left: px + '%',                           top: (py - HALF_H_PCT - TIP_OFFSET_PCT) + '%', transform: 'translate(-50%, -100%)' };
      case '6':  return { left: px + '%',                           top: (py + HALF_H_PCT + TIP_OFFSET_PCT) + '%', transform: 'translate(-50%, 0)'      };
      case '2':  return { left: (px + HALF_W_PCT + TIP_OFFSET_PCT) + '%', top: py + '%',                           transform: 'translate(0, -50%)'      };
      case '4':  return { left: (px + HALF_W_PCT + TIP_OFFSET_PCT) + '%', top: py + '%',                           transform: 'translate(0, -50%)'      };
      case '8':  return { left: (px - HALF_W_PCT - TIP_OFFSET_PCT) + '%', top: py + '%',                           transform: 'translate(-100%, -50%)'  };
      case '10': return { left: (px - HALF_W_PCT - TIP_OFFSET_PCT) + '%', top: py + '%',                           transform: 'translate(-100%, -50%)'  };
      default:   return { left: '50%', top: '50%', transform: 'translate(-50%, -50%)' };
    }
  }

  // ──────────────────────────────────────────────────────────
  // 툴팁 DOM 생성 (노드 6개 각각)
  //   구조: [헤더(brand) | 본문(surface) | CTA(accent, 4개 메뉴만)]
  //   위치: CSS var(--tip-align)에 translate 주입 → active 시 scale 토글
  // ──────────────────────────────────────────────────────────
  function renderTooltips(wrap) {
    NODES.forEach(function (node) {
      var nodePt = angleToXY(node.angle);
      var style  = computeTooltipStyle(nodePt.x, nodePt.y, node.tooltipPosition);

      var tip = document.createElement('div');
      tip.className = 'home-hex-tooltip';
      tip.id = 'home-tip-' + node.id;
      tip.setAttribute('role', 'tooltip');
      tip.setAttribute('aria-hidden', 'true');
      tip.setAttribute('data-pos', node.tooltipPosition);
      tip.style.left = style.left;
      tip.style.top  = style.top;
      /* translate만 CSS 변수로 주입 (scale은 CSS가 담당) */
      tip.style.setProperty('--tip-align', style.transform);

      var html = '<div class="home-hex-tip-header">' + escapeHTML(node.label) + '</div>'
               + '<div class="home-hex-tip-body">'   + escapeHTML(node.tipDesc) + '</div>';
      if (node.targetUrl) {
        /* 이모지 뒤의 텍스트만 버튼 라벨로 추출 (예: "📜 스크립트" → "스크립트") */
        var menuName = node.label.replace(/^[^\s]+\s*/, '');
        html += '<button type="button" class="home-hex-tip-cta" '
             +  'onclick="window.homeTipCtaClick(\'' + node.targetUrl + '\')">'
             +  escapeHTML(menuName) + ' 바로가기 →</button>';
      }
      tip.innerHTML = html;

      /* 툴팁 영역 hover 시 자동 닫힘 타이머 취소 (CTA 버튼 클릭 여유 확보) */
      tip.addEventListener('mouseenter', function () { cancelHideTimer(node.id); });
      tip.addEventListener('mouseleave', function () { scheduleHideTimer(node.id); });

      wrap.appendChild(tip);
    });
  }

  function escapeHTML(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c];
    });
  }

  // ──────────────────────────────────────────────────────────
  // 툴팁 자동 닫힘 타이머 — 노드/툴팁 mouseleave 후 N ms 지연
  //   (노드→툴팁 사이로 마우스 이동 시 즉시 닫히지 않도록)
  // ──────────────────────────────────────────────────────────
  var HIDE_DELAY = 200;
  var hideTimers = {};

  function cancelHideTimer(nodeId) {
    if (hideTimers[nodeId]) { clearTimeout(hideTimers[nodeId]); delete hideTimers[nodeId]; }
  }
  function scheduleHideTimer(nodeId) {
    cancelHideTimer(nodeId);
    hideTimers[nodeId] = setTimeout(function () { hideTooltip(nodeId); }, HIDE_DELAY);
  }
  function hideTooltip(nodeId) {
    var tip = document.getElementById('home-tip-' + nodeId);
    if (tip) { tip.classList.remove('active'); tip.setAttribute('aria-hidden', 'true'); }
  }
  function hideAllTooltips() {
    NODES.forEach(function (n) {
      cancelHideTimer(n.id);
      hideTooltip(n.id);
      var ne = document.getElementById('home-node-' + n.id);
      if (ne) ne.classList.remove('hover');
    });
  }

  // ──────────────────────────────────────────────────────────
  // 노드 호버/포커스 — 해당 툴팁 활성화 + 다른 툴팁 모두 닫기
  // ──────────────────────────────────────────────────────────
  window.homeNodeHover = function (nodeId) {
    cancelHideTimer(nodeId);
    /* 다른 노드 툴팁 닫기 (동시 1개만 활성) */
    NODES.forEach(function (n) {
      if (n.id === nodeId) return;
      cancelHideTimer(n.id);
      hideTooltip(n.id);
      var ne = document.getElementById('home-node-' + n.id);
      if (ne) ne.classList.remove('hover');
    });
    var tip = document.getElementById('home-tip-' + nodeId);
    if (tip) { tip.classList.add('active'); tip.setAttribute('aria-hidden', 'false'); }
    var nodeEl = document.getElementById('home-node-' + nodeId);
    if (nodeEl) nodeEl.classList.add('hover');
  };

  // ──────────────────────────────────────────────────────────
  // 노드 호버/포커스 아웃 — 지연 타이머 예약 (툴팁 hover 시 취소)
  // ──────────────────────────────────────────────────────────
  window.homeNodeOut = function (nodeId) {
    var nodeEl = document.getElementById('home-node-' + nodeId);
    if (nodeEl) nodeEl.classList.remove('hover');
    scheduleHideTimer(nodeId);
  };

  // ──────────────────────────────────────────────────────────
  // 노드 클릭 — 분기:
  //   ▸ quick/search (behavior: inline-preview) → 기존 A2 preview 표시
  //   ▸ 나머지 4개 → 툴팁만 유지 (CTA 버튼 클릭이 실제 이동 담당)
  //   ▸ 모바일 탭: hover 이벤트도 발생하므로 mouseenter가 툴팁 열어줌
  // ──────────────────────────────────────────────────────────
  window.homeNodeClick = function (nodeId) {
    var node = NODES.filter(function (n) { return n.id === nodeId; })[0];
    if (!node) return;

    /* 클릭 피드백 (0.1초 scale-down) */
    var nodeEl = document.getElementById('home-node-' + nodeId);
    if (nodeEl) {
      nodeEl.classList.add('clicking');
      setTimeout(function () { nodeEl.classList.remove('clicking'); }, 100);
    }

    if (node.behavior === 'inline-preview') {
      if (window.homeShowPreview) window.homeShowPreview(node.previewType);
    }
    /* 나머지 4개는 툴팁 CTA 버튼으로만 이동 (학습 기회 확보) */
  };

  // ──────────────────────────────────────────────────────────
  // 툴팁 내 "바로가기" 버튼 클릭 → switchMenu 호출
  // ──────────────────────────────────────────────────────────
  window.homeTipCtaClick = function (targetUrl) {
    hideAllTooltips();
    if (window.switchMenu) window.switchMenu(targetUrl);
  };

  // ──────────────────────────────────────────────────────────
  // 외부(wrap 바깥) 클릭 시 열린 툴팁 모두 닫기
  // ──────────────────────────────────────────────────────────
  document.addEventListener('click', function (e) {
    var wrap = document.getElementById('homeHexWrap');
    if (wrap && !wrap.contains(e.target)) hideAllTooltips();
  });

  // ──────────────────────────────────────────────────────────
  // 초기 렌더 — DOM은 이미 (위쪽 HTML로) 준비되어 있음
  // ──────────────────────────────────────────────────────────
  renderHex();

})();
</script>


<!-- ════════════════════════════════════════════════════════════
     <script> 청크 3/3 — 미리보기 핸들러 + 영역밖 클릭
     ▸ A2 함수(doSearch, loadQuickDdItems, openQuickOverlay) 호출 시
       typeof === 'function' 가드 선행
     ▸ 빠른실행 항목은 A2의 #quick-dd-items 결과를 미러링하여 표시
       (loadQuickDdItems 1회 호출 + 인라인 onclick=openQuickOverlay 그대로 동작)
================================================================================ -->
<script>
(function () {
  'use strict';

  var quickItemsLoaded = false;

  // ──────────────────────────────────────────────────────────
  // 미리보기 영역 표시 — 검색기 또는 빠른실행 슬롯 활성화
  // ──────────────────────────────────────────────────────────
  window.homeShowPreview = function (previewType) {
    var container  = document.getElementById('home-a2-preview');
    var searchSlot = document.getElementById('home-a2-preview-search');
    var quickSlot  = document.getElementById('home-a2-preview-quick');
    if (!container || !searchSlot || !quickSlot) return;

    searchSlot.style.display = (previewType === 'search') ? 'block' : 'none';
    quickSlot.style.display  = (previewType === 'quick')  ? 'block' : 'none';

    // fade-in (display 후 다음 프레임에서 .show 토글)
    container.style.display = 'block';
    requestAnimationFrame(function () {
      container.classList.add('show');
    });

    if (previewType === 'quick') {
      loadQuickItemsIfNeeded();
    } else if (previewType === 'search') {
      setTimeout(function () {
        var inp = document.getElementById('home-search-input');
        if (inp) { try { inp.focus(); } catch (e) {} }
      }, 120);
    }
  };

  // ──────────────────────────────────────────────────────────
  // 미리보기 숨김 — fade-out 후 display:none
  // ──────────────────────────────────────────────────────────
  window.homeHidePreview = function () {
    var container = document.getElementById('home-a2-preview');
    if (!container) return;
    container.classList.remove('show');
    setTimeout(function () { container.style.display = 'none'; }, 250);
  };

  // ──────────────────────────────────────────────────────────
  // 검색 Enter — A2의 doSearch 직접 호출 (Q3 결정: Enter만 작동)
  // doSearch가 #content-area를 검색 결과로 교체 → home은 자동으로 사라짐
  // ──────────────────────────────────────────────────────────
  window.homePreviewSearchEnter = function (q) {
    q = (q || '').trim();
    if (!q) return;
    if (typeof window.doSearch === 'function') {
      window.doSearch(q);
    }
  };

  // ──────────────────────────────────────────────────────────
  // 빠른실행 드롭다운 토글 (펼쳐진 상태로 시작)
  // ──────────────────────────────────────────────────────────
  window.homePreviewQuickToggle = function () {
    var dd = document.getElementById('home-quick-preview-dropdown');
    if (!dd) return;
    /* getComputedStyle: CSS .home-quick-dropdown { display:none } 을 읽기 위해.
       dd.style.display는 인라인만 읽어서 빈 문자열이 나오는 문제 회피 */
    var isOpen = getComputedStyle(dd).display !== 'none';
    dd.style.display = isOpen ? 'none' : 'block';
  };

  // ──────────────────────────────────────────────────────────
  // 빠른실행 항목 로드 — A2 결과를 home으로 미러링
  // ▸ window.loadQuickDdItems가 #quick-dd-items에 박음 (인라인 onclick 포함)
  // ▸ dataset.loaded='true' 신호 후 innerHTML 복사
  // ──────────────────────────────────────────────────────────
  function loadQuickItemsIfNeeded() {
    if (quickItemsLoaded) return;
    var homeContainer = document.getElementById('home-quick-preview-items');
    if (!homeContainer) return;

    if (typeof window.loadQuickDdItems !== 'function' || typeof window.openQuickOverlay !== 'function') {
      homeContainer.innerHTML =
        '<div class="loading-placeholder" style="color:var(--color-danger);">' +
        '빠른실행 함수를 찾을 수 없습니다 (loadQuickDdItems / openQuickOverlay)</div>';
      return;
    }

    window.loadQuickDdItems();
    mirrorQuickItems(0);
  }

  function mirrorQuickItems(attempt) {
    var src = document.getElementById('quick-dd-items');
    var dst = document.getElementById('home-quick-preview-items');
    if (!src || !dst) return;

    if (src.dataset.loaded === 'true') {
      dst.innerHTML = src.innerHTML;
      // 보여주기 전용 — 모든 onclick 제거 (A2 헤더의 ⚡이 실제 실행 담당)
      var items = dst.querySelectorAll('[onclick]');
      for (var i = 0; i < items.length; i++) {
        items[i].removeAttribute('onclick');
        items[i].style.cursor = 'default';
      }
      quickItemsLoaded = true;
      return;
    }
    if (attempt >= 20) {        // 약 2초 폴링
      dst.innerHTML =
        '<div class="loading-placeholder" style="color:var(--color-danger);">' +
        '항목 로드에 실패했습니다</div>';
      return;
    }
    setTimeout(function () { mirrorQuickItems(attempt + 1); }, 100);
  }

  // ──────────────────────────────────────────────────────────
  // 영역밖 클릭 → 미리보기 닫기
  // ▸ 미리보기 컨테이너 또는 6각형 wrap 안 클릭은 무시
  // ──────────────────────────────────────────────────────────
  document.addEventListener('click', function (e) {
    var container = document.getElementById('home-a2-preview');
    if (!container || container.style.display === 'none') return;

    if (container.contains(e.target)) return;

    var hexWrap = document.getElementById('homeHexWrap');
    if (hexWrap && hexWrap.contains(e.target)) return;

    window.homeHidePreview();
  });

  // init: 미리보기 hidden·호버 패널 placeholder·6각형 모두 청크 1·2에서 처리됨
  // 영역밖 클릭 핸들러는 위에서 등록 완료 — 별도 init() 호출 불필요

})();
</script>
