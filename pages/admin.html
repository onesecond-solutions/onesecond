<!-- ═══════════════════════════════════════════════════════════════════════════
  pages/admin.html — admin_v2.html 진입 stub (2026-04-30 Phase B)
  ─────────────────────────────────────────────────────────────────────────────
  이전 버전 (1969줄, 100KB)은 다음 위치에 100% 보존:
    claude_code/_archive/admin_v1_20260430.html (git 히스토리에도 존재)

  진입 흐름:
    B 사이드바 #menu-admin 클릭 → app.html switchMenu('admin')
    → fetch('pages/admin.html') → 본 stub 로드
    → 본 stub이 admin_v2.html을 fetch → #adm-root 에 innerHTML 주입
    → admin_v2.html의 script가 IIFE 안에서 자체 부트 (안전장치 4중)

  롤백 방법: 본 파일을 _archive/admin_v1_20260430.html 내용으로 복원.
═══════════════════════════════════════════════════════════════════════════ -->

<style>
  #adm-root {
    position: fixed;
    inset: 0;
    z-index: 9000;
    background: var(--admin-bg, #1A130E);
    color: var(--admin-text-primary, #F5EFE6);
    overflow: auto;
    font-family: var(--font-sans);
  }
  #adm-root .adm-stub-loading {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--admin-text-secondary, #B8A99A);
    font-size: 14px;
  }
  #adm-root .adm-stub-spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--admin-border, #3F3027);
    border-top-color: var(--color-accent, #D4845A);
    border-radius: 50%;
    animation: admStubSpin 0.7s linear infinite;
  }
  @keyframes admStubSpin { to { transform: rotate(360deg); } }
</style>

<div id="adm-root">
  <div class="adm-stub-loading">
    <div class="adm-stub-spinner"></div>
    <div>관리자 콘솔 로딩 중...</div>
  </div>
</div>

<script>
(function () {
  var root = document.getElementById('adm-root');
  if (!root) return;

  fetch('pages/admin_v2.html', { cache: 'no-cache' })
    .then(function (r) {
      if (!r.ok) throw new Error('admin_v2.html not found (' + r.status + ')');
      return r.text();
    })
    .then(function (html) {
      root.innerHTML = html;
      // admin_v2.html 의 <script> 재실행 (app.html loadPage 와 동일 패턴)
      root.querySelectorAll('script').forEach(function (oldScript) {
        try {
          var newScript = document.createElement('script');
          newScript.textContent = '(function(){\n' + oldScript.textContent + '\n})();';
          document.body.appendChild(newScript);
          document.body.removeChild(newScript);
        } catch (e) { console.error('[admin stub] script exec error:', e); }
      });
    })
    .catch(function (e) {
      console.error('[admin stub] load failed:', e);
      root.innerHTML =
        '<div class="adm-stub-loading">' +
        '<div style="font-size:32px;opacity:0.5;">⚠️</div>' +
        '<div>관리자 콘솔을 불러오지 못했습니다.</div>' +
        '<div style="font-size:12px;opacity:0.6;">' + (e.message || '') + '</div>' +
        '<button onclick="window.switchMenu&&window.switchMenu(\'home\')" ' +
        'style="margin-top:12px;padding:8px 16px;background:var(--color-accent);color:#fff;' +
        'border:none;border-radius:8px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;">' +
        '본 앱으로 돌아가기</button>' +
        '</div>';
    });
})();
</script>
