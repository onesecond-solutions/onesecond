<style>
/* ════════════════════════════════════════════════════════════

  overflow: hidden;
  flex-shrink: 0;
}

  height: 120px;

  padding: 0 24px;
  position: relative;
  overflow: hidden;
}

}

  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(255, 215, 0, 0.15); border: 1px solid rgba(255, 215, 0, 0.3);

  letter-spacing: 0.5px; margin-bottom: 8px;
}
.pg-page-title {
  font-family: var(--font-sans, 'DM Sans', Pretendard, sans-serif);

}
.pg-page-desc {

}

/* ── ② 탭바 블록 ── */
.pg-tab-block {
  border-radius: var(--radius-md, 12px);

}

  border-bottom-color: var(--color-accent, #D4845A);
}

/* ── ③ 콘텐츠 블록 ── */

/* ── 관리자 콘텐츠 영역 ── */
.adm-content { padding: 20px; }

/* ── 카드 ── */

/* ── 버튼 ── */
.adm-btn {
  padding: 6px 12px; border-radius: var(--radius-sm, 8px);

}

.adm-btn-accent  { background: var(--color-accent, #D4845A); color: #fff; border-color: var(--color-accent, #D4845A); }

/* ── 입력 ── */
.adm-input {
  width: 100%; padding: 9px 12px;
  border: 1.5px solid var(--color-border, #E4DBCE);
  border-radius: var(--radius-sm, 8px);

/* ── 로딩/빈 상태 ── */

/* ── 로그 아이템 ── */
.adm-log-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid var(--color-border, #E4DBCE);

}

}

/* ── 공지 폼 ── */

.adm-textarea {
  width: 100%; padding: 10px 12px;

/* ── 역할 수정 모달 ── */
.adm-modal-overlay {
  display: none; position: fixed; inset: 0;

}

.adm-modal {
  background: var(--color-surface, #fff);
  border-radius: var(--radius-lg, 16px);

}
.adm-modal-header {
  background: linear-gradient(135deg, var(--color-brand, #A0522D), var(--color-brand-light, #C4733A));

}
.adm-modal-title { font-size: 0.9em; font-weight: 800; color: #fff; }
.adm-modal-close {
  width: 26px; height: 26px; border-radius: 50%;

  display: flex; align-items: center; justify-content: center;
}
.adm-modal-body   { padding: 18px 20px; }
.adm-modal-footer { padding: 8px 20px 16px; display: flex; gap: 8px; justify-content: flex-end; }

/* ══════════════════════════════════════════════

════════════════════════════════════════════════ */
.adm-set-sec { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start; }
@media (max-width: 768px) { .adm-set-sec { grid-template-columns: 1fr; } }

.adm-set-row {
  display: flex; align-items: center; justify-content: space-between;

}

.adm-set-row.is-locked { background: #F1EFE8; opacity: 0.75; }

}

.adm-ver-badge {
  font-size: 0.72em; background: #FAC775; color: #412402;

}

.adm-hint-box {

}

/* 미리보기 패널 */
.adm-pv { background: var(--color-surface-2, #F3EFE9); border-radius: var(--radius-md, 12px); padding: 14px; }
.adm-pv-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }

/* 브라우저 프레임 */
.adm-frame { background: #fff; border: 1px solid var(--color-border, #E4DBCE); border-radius: var(--radius-sm, 8px); overflow: hidden; }

.adm-pv-body { display: grid; grid-template-columns: 74px 1fr; min-height: 180px; }

/* 기능 게이트 미리보기 */

.adm-a2-top { width: 100%; min-height: 34px; background: var(--color-brand, #6B3A2A); border-radius: 4px; display: flex; align-items: center; justify-content: flex-end; padding: 4px 8px; gap: 8px; }

  font-size: 0.78em; padding: 4px 10px; border-radius: 4px;
  background: #fff; border: 1px solid var(--color-border, #E4DBCE);

<script>
(function () {
'use strict';

/* ── 로컬 상태 ── */
var _admTab = 'users';
var _admEditUserId = null;
var _admUsersCache = null;
var _admScriptsCache = null;

/* ── 공통 fetch (window.db 위임) ── */
function admFetch(path, options) {
  return window.db.fetch(path, options);
}

/* ── Storage 업로드 헬퍼 ── */
async function admStorageUpload(bucket, filePath, file) {
  /* db.js의 Supabase base URL 접근 (공개 속성 순서대로 시도) */
  var base = (window.db && window.db.url)
    || (window.db && window.db._url)
    || window._SUPABASE_URL
    || window.SUPABASE_URL
    || '';

  var token = (window.db && typeof window.db.getToken === 'function')
    ? window.db.getToken()
    : '';

  if (!base) {
    throw new Error('Supabase URL을 찾을 수 없습니다.\ndb.js에서 window.db.url을 공개 속성으로 노출해 주세요.');
  }

  return fetch(base + '/storage/v1/object/' + bucket + '/' + filePath, {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + token,
      'Content-Type': file.type,
      'x-upsert': 'true'
    },
    body: file
  });
}

function admContent(html) {
  var el = document.getElementById('adm-content');
  if (el) el.innerHTML = html;
}

/* ── 탭 전환 (onclick에서 호출 → window 선언 필수) ── */
window.admSwitchTab = function (tab, btn) {
  _admTab = tab;
  document.querySelectorAll('#admin-tab-bar .pg-tab-btn').forEach(function (el) {
    el.classList.remove('active');
  });
  if (btn) btn.classList.add('active');
  var map = {
    users:    window.admLoadUsers,
    scripts:  window.admLoadScripts,
    board:    window.admLoadBoard,
    logs:     window.admLoadLogs,
    notice:   window.admLoadNotice,
    settings: window.admLoadSettings
  };
  if (map[tab]) map[tab]();
};

/* ── 유틸 ── */
function admRoleBadge(role) {
  var map = {
    admin:          ['role-admin',   '관리자'],
    branch_manager: ['role-branch',  '지점장'],
    manager:        ['role-manager', '실장'],
    member:         ['role-member',  '설계사']
  };
  var entry = map[role] || ['role-member', role || '-'];
  return '<span class="role-badge ' + entry[0] + '">' + entry[1] + '</span>';
}

function admPlanBadge(plan) {
  return plan === 'pro'
    ? '<span class="plan-badge plan-pro">PRO</span>'
    : '<span class="plan-badge plan-free">무료</span>';
}

function admTimeAgo(ts) {
  if (!ts) return '-';
  var d = new Date(ts);
  return d.toLocaleDateString('ko-KR', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
}

/* ════════════════════════════════════════
   탭 1: 사용자 관리
════════════════════════════════════════ */
window.admLoadUsers = async function (filter) {
  admContent('<div class="adm-loading">사용자 목록 로딩 중...</div>');
  try {
    var res = await admFetch(
      '/rest/v1/users?select=id,name,email,role,plan,company,branch,team,created_at&order=created_at.desc&limit=100'
    );
    if (!res.ok) {
      var errBody = await res.text();
      console.error('[admin] admLoadUsers fetch 실패:', res.status, errBody);
      admContent('<div class="adm-empty">사용자 목록을 불러오지 못했습니다. (HTTP ' + res.status + ')<br><small style="color:#aaa;">' + errBody + '</small></div>');
      return;
    }
    var data = await res.json();
    _admUsersCache = data;
    window.admRenderUsers(data, filter || '');
  } catch (e) {
    console.error('[admin] admLoadUsers 오류:', e);
    admContent('<div class="adm-empty">사용자 목록을 불러오지 못했습니다.<br><small style="color:#aaa;">' + e.message + '</small></div>');
  }
};

window.admRenderUsers = function (data, filter) {
  var list = data;
  if (filter) {
    var q = filter.toLowerCase();
    list = data.filter(function (u) {
      return (u.name || '').toLowerCase().includes(q) ||
             (u.email || '').toLowerCase().includes(q) ||
             (u.company || '').toLowerCase().includes(q) ||
             (u.branch || '').toLowerCase().includes(q);
    });
  }

  var total      = data.length;
  var proCount   = data.filter(function (u) { return u.plan === 'pro'; }).length;
  var adminCount = data.filter(function (u) { return u.role === 'admin'; }).length;
  var todayStr   = new Date().toISOString().slice(0, 10);
  var todayCount = data.filter(function (u) { return (u.created_at || '').startsWith(todayStr); }).length;

  var html =
    '<div class="adm-stats-grid">' +
      '<div class="adm-stat"><div class="adm-stat-num">' + total      + '<span>명</span></div><div class="adm-stat-label">전체 가입자</div></div>' +
      '<div class="adm-stat"><div class="adm-stat-num">' + proCount   + '<span>명</span></div><div class="adm-stat-label">PRO 구독</div></div>' +
      '<div class="adm-stat"><div class="adm-stat-num">' + todayCount + '<span>명</span></div><div class="adm-stat-label">오늘 가입</div></div>' +
      '<div class="adm-stat"><div class="adm-stat-num">' + adminCount + '<span>명</span></div><div class="adm-stat-label">관리자</div></div>' +
    '</div>' +
    '<div class="adm-card">' +
      '<div class="adm-card-title">👥 사용자 목록</div>' +
      '<div class="adm-search-bar">' +
        '<input class="adm-input" style="max-width:280px;" id="adm-user-search"' +
          ' placeholder="이름·이메일·지점 검색..."' +
          ' oninput="window.admRenderUsers(window._admUsersCache_pub, this.value)">' +
        '<button class="adm-btn adm-btn-ghost" onclick="window.admLoadUsers()">🔄 새로고침</button>' +
      '</div>' +
      '<div class="adm-table-wrap">' +
        '<table class="adm-table">' +
          '<thead><tr>' +
            '<th>이름</th><th>이메일</th><th>역할</th><th>플랜</th><th>소속</th><th>가입일</th><th>관리</th>' +
          '</tr></thead><tbody>';

  if (list.length === 0) {
    html += '<tr><td colspan="7" style="text-align:center;color:#bbb;padding:30px;">검색 결과가 없습니다.</td></tr>';
  } else {
    list.forEach(function (u) {
      var org = [u.company, u.branch, u.team].filter(Boolean).join(' / ') || '-';
      html +=
        '<tr>' +
          '<td><strong>' + (u.name || '-') + '</strong></td>' +
          '<td style="color:#888;font-size:0.9em;">' + (u.email || '-') + '</td>' +
          '<td>' + admRoleBadge(u.role) + '</td>' +
          '<td>' + admPlanBadge(u.plan) + '</td>' +
          '<td style="font-size:0.85em;color:#888;">' + org + '</td>' +
          '<td style="color:#aaa;font-size:0.85em;">' + ((u.created_at || '').slice(0, 10) || '-') + '</td>' +
          '<td>' +
            '<button class="adm-btn adm-btn-ghost adm-btn-sm"' +
              ' onclick="window.admOpenRoleModal(\'' + u.id + '\',\'' + (u.name || '').replace(/'/g, '&apos;') + '\',\'' + (u.role || 'member') + '\',\'' + (u.plan || 'free') + '\')">' +
              '역할 변경' +
            '</button>' +
          '</td>' +
        '</tr>';
    });
  }

  html += '</tbody></table></div></div>';
  admContent(html);

  /* 공개 캐시 — 검색 oninput에서 접근 */
  window._admUsersCache_pub = _admUsersCache;

  if (filter) {
    var inp = document.getElementById('adm-user-search');
    if (inp) inp.value = filter;
  }
};

/* ── 역할 수정 모달 ── */
window.admOpenRoleModal = function (id, name, role, plan) {
  _admEditUserId = id;
  document.getElementById('adm-modal-username').textContent = name;
  document.getElementById('adm-role-select').value = role;
  document.getElementById('adm-plan-select').value = plan || 'free';
  document.getElementById('adm-role-modal').classList.add('active');
};

window.admCloseRoleModal = function () {
  document.getElementById('adm-role-modal').classList.remove('active');
  _admEditUserId = null;
};

window.admSaveRole = async function () {
  var id   = _admEditUserId;
  var role = document.getElementById('adm-role-select').value;
  var plan = document.getElementById('adm-plan-select').value;
  if (!id) return;
  try {
    var res = await admFetch('/rest/v1/users?id=eq.' + id, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ role: role, plan: plan })
    });
    if (res.ok) { window.admCloseRoleModal(); window.admLoadUsers(); }
    else alert('저장 중 오류가 발생했습니다.');
  } catch (e) { alert('네트워크 오류가 발생했습니다.'); }
};

/* ════════════════════════════════════════
   탭 2: 스크립트 관리
════════════════════════════════════════ */
var STAGE_LABEL = {

  situation_check: '상황확인', analysis: '보장분석',

        '<div class="adm-stat"><div class="adm-stat-num">' + active + '<span>개</span></div><div class="adm-stat-label">활성</div></div>' +
        '<div class="adm-stat"><div class="adm-stat-num">' + sampleCnt + '<span>개</span></div><div class="adm-stat-label">샘플</div></div>' +
        '<div class="adm-stat"><div class="adm-stat-num">' + leaderPick + '<span>개</span></div><div class="adm-stat-label">Leader Pick</div></div>' +
      '</div>' +

      /* ── 신규 스크립트 작성 폼 ── */

        '<div class="adm-card-title" style="cursor:pointer;display:flex;align-items:center;justify-content:space-between;" onclick="window.admToggleWriteForm()">' +

              '<input class="adm-input" id="adm-w-title" placeholder="스크립트 제목">' +

window.admBuildScriptTable = function (data) {

    '<div class="adm-table-wrap"><table class="adm-table">' +
    '<thead><tr><th>제목</th><th>단계</th><th>범위</th><th>상태</th><th>샘플</th><th>LeaderPick</th><th>관리</th></tr></thead>' +
    '<tbody>';

  if (!data || data.length === 0) {
    html += '<tr><td colspan="7" style="text-align:center;color:#bbb;padding:30px;">검색 결과가 없습니다.</td></tr>';
  } else {
    data.forEach(function (s) {
      var stage = STAGE_LABEL[s.stage] || s.stage || '-';
      html +=
        '<tr>' +

window.admFilterScripts = function (q) {
  var stageEl  = document.getElementById('adm-script-stage-filter');
  var typeEl   = document.getElementById('adm-script-type-filter');
  var stageFilter = stageEl ? stageEl.value : '';
  var typeFilter  = typeEl  ? typeEl.value  : '';
  var data = _admScriptsCache || [];
  if (q) data = data.filter(function (s) { return (s.title || '').toLowerCase().includes(q.toLowerCase()); });
  if (stageFilter) data = data.filter(function (s) { return s.stage === stageFilter; });
  if (typeFilter === 'sample') data = data.filter(function (s) { return s.is_sample; });
  if (typeFilter === 'leader') data = data.filter(function (s) { return s.is_leader_pick; });
  var wrap = document.getElementById('adm-script-table-wrap');
  if (wrap) wrap.innerHTML = window.admBuildScriptTable(data);
};

    var el = document.getElementById(id); if (el) el.value = '';
  });
  ['adm-w-sample','adm-w-leader'].forEach(function(id) {
    var el = document.getElementById(id); if (el) el.checked = false;
  });
  var el = document.getElementById('adm-w-stage'); if (el) el.value = '';

window.admSaveNewScript = async function () {
  var title     = (document.getElementById('adm-w-title') || {}).value || '';
  var stage     = (document.getElementById('adm-w-stage') || {}).value || '';
  var highlight = (document.getElementById('adm-w-highlight') || {}).value || '';
  var body      = (document.getElementById('adm-w-body') || {}).value || '';
  var isSample  = (document.getElementById('adm-w-sample') || {}).checked || false;
  var isLeader  = (document.getElementById('adm-w-leader') || {}).checked || false;
  var msgEl     = document.getElementById('adm-w-msg');

  if (!title.trim()) { if (msgEl) { msgEl.style.color='#c0392b'; msgEl.textContent='제목을 입력해 주세요.'; } return; }
  if (!stage)        { if (msgEl) { msgEl.style.color='#c0392b'; msgEl.textContent='단계를 선택해 주세요.'; } return; }
  if (!body.trim())  { if (msgEl) { msgEl.style.color='#c0392b'; msgEl.textContent='본문을 입력해 주세요.'; } return; }

  if (msgEl) { msgEl.style.color='var(--color-text-tertiary,#B89880)'; msgEl.textContent='저장 중...'; }

  try {
    var payload = {
      title: title.trim(),
      stage: stage,
      highlight_text: highlight.trim() || null,
      script_text: body.trim(),
      scope: 'global',
      is_active: true,
      is_sample: isSample,
      is_leader_pick: isLeader
    };
    var res = await admFetch('/rest/v1/scripts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify(payload)
    });
    if (res.ok) {
      if (msgEl) { msgEl.style.color='#27ae60'; msgEl.textContent='✅ 저장되었습니다!'; }
      window.admClearWriteForm();
      setTimeout(function () { window.admLoadScripts(); }, 800);
    } else {
      var errBody = await res.text();
      if (msgEl) { msgEl.style.color='#c0392b'; msgEl.textContent='저장 실패: ' + errBody; }
    }
  } catch (e) {
    if (msgEl) { msgEl.style.color='#c0392b'; msgEl.textContent='네트워크 오류가 발생했습니다.'; }
  }
};

window.admLoadBoard = async function () {

        '<div class="adm-stat"><div class="adm-stat-num">' + hidden  + '<span>개</span></div><div class="adm-stat-label">숨김 처리</div></div>' +
        '<div class="adm-stat"><div class="adm-stat-num">' + (total - notices - hidden) + '<span>개</span></div><div class="adm-stat-label">일반 게시글</div></div>' +
      '</div>' +
      '<div class="adm-card">' +
        '<div class="adm-card-title">💬 게시글 목록</div>' +
        '<div class="adm-search-bar">' +
          '<button class="adm-btn adm-btn-ghost" onclick="window.admLoadBoard()">🔄 새로고침</button>' +
        '</div>' +
        '<div class="adm-table-wrap"><table class="adm-table">' +
          '<thead><tr><th>제목</th><th>카테고리</th><th>작성자</th><th>작성일</th><th>상태</th><th>관리</th></tr></thead>' +
          '<tbody>';

    if (data.length === 0) {
      html += '<tr><td colspan="6" style="text-align:center;color:#bbb;padding:30px;">게시글이 없습니다.</td></tr>';
    } else {
      data.forEach(function (p) {
        var cat    = catLabel[p.category] || p.category || '-';
        var status = p.is_hidden
          ? '<span class="status-badge status-inactive">숨김</span>'
          : (p.is_notice
              ? '<span class="status-badge status-active">공지</span>'
              : '<span style="color:#aaa;font-size:0.85em;">일반</span>');
        html +=
          '<tr>' +
            '<td style="font-weight:600;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + (p.title || '-') + '</td>' +
            '<td><span style="font-size:0.8em;background:var(--color-surface-2,#F3EFE9);padding:2px 8px;border-radius:var(--radius-full,9999px);color:var(--color-text-secondary,#7A5C44);">' + cat + '</span></td>' +
            '<td style="color:#888;font-size:0.9em;">' + (p.author_name || '-') + '</td>' +
            '<td style="color:#aaa;font-size:0.85em;">' + ((p.created_at || '').slice(0, 10) || '-') + '</td>' +
            '<td>' + status + '</td>' +
            '<td style="display:flex;gap:4px;flex-wrap:wrap;">' +
              '<button class="adm-btn adm-btn-ghost adm-btn-sm"' +

      });
    }

    html += '</tbody></table></div></div>';
    admContent(html);

window.admLoadLogs = async function () {
  admContent('<div class="adm-loading">로그 로딩 중...</div>');
  try {
    var results = await Promise.all([
      admFetch('/rest/v1/activity_logs?select=id,event_type,target_type,target_id,created_at,users(name)&order=created_at.desc&limit=50'),
      admFetch('/rest/v1/activity_logs?select=target_id,scripts(title)&event_type=eq.view_script&limit=500')
    ]);

    var logs        = results[0].ok ? await results[0].json() : [];
    var scriptLogs  = results[1].ok ? await results[1].json() : [];

    /* 인기 스크립트 집계 */
    var scriptCount = {};
    scriptLogs.forEach(function (l) {
      var title = (l.scripts && l.scripts.title) || l.target_id || '알 수 없음';
      scriptCount[title] = (scriptCount[title] || 0) + 1;
    });
    var topScripts = Object.entries(scriptCount).sort(function (a, b) { return b[1] - a[1]; }).slice(0, 10);

    var eventIcon = {
      login: '🔑', view_script: '📋', click_quick: '⚡',
      add_favorite: '⭐', open_post: '💬', search: '🔍'
    };
    var eventMap = {
      login: '로그인', view_script: '스크립트 조회', click_quick: 'Quick 메뉴',
      add_favorite: '즐겨찾기 추가', open_post: '게시글 조회', search: '검색'
    };

    var html = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;">';

    /* 인기 스크립트 TOP 10 */
    html += '<div class="adm-card"><div class="adm-card-title">🏆 인기 스크립트 TOP 10</div>';
    if (topScripts.length === 0) {
      html += '<div class="adm-empty" style="padding:20px;">로그 데이터가 없습니다.<br><small style="color:#ccc;">activity_logs 테이블에 데이터가 쌓이면 표시됩니다.</small></div>';
    } else {
      topScripts.forEach(function (entry, i) {
        var pct = Math.round((entry[1] / (topScripts[0][1] || 1)) * 100);
        html +=
          '<div style="margin-bottom:10px;">' +
            '<div style="display:flex;justify-content:space-between;font-size:0.8em;margin-bottom:4px;">' +
              '<span style="font-weight:600;color:var(--color-text-primary,#3D2C1E);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px;">' + (i + 1) + '. ' + entry[0] + '</span>' +
              '<span style="color:var(--color-accent,#D4845A);font-weight:700;flex-shrink:0;margin-left:8px;">' + entry[1] + '회</span>' +
            '</div>' +
            '<div style="height:6px;background:var(--color-surface-2,#F3EFE9);border-radius:3px;">' +
              '<div style="height:100%;width:' + pct + '%;background:var(--color-accent,#D4845A);border-radius:3px;transition:width 0.5s;"></div>' +
            '</div>' +
          '</div>';
      });
    }
    html += '</div>';

    /* 최근 활동 로그 */
    html += '<div class="adm-card"><div class="adm-card-title">⏱️ 최근 활동 로그</div>';
    if (logs.length === 0) {
      html += '<div class="adm-empty" style="padding:20px;">로그 데이터가 없습니다.<br><small style="color:#ccc;">activity_logs 테이블 생성 후 수집됩니다.</small></div>';
    } else {
      logs.slice(0, 20).forEach(function (l) {
        var icon  = eventIcon[l.event_type]  || '📌';
        var event = eventMap[l.event_type]   || l.event_type;
        var name  = (l.users && l.users.name) || '알 수 없음';
        html +=
          '<div class="adm-log-item">' +
            '<div class="adm-log-icon" style="background:var(--color-surface-2,#F3EFE9);">' + icon + '</div>' +
            '<div class="adm-log-body">' +
              '<div class="adm-log-text"><strong>' + name + '</strong> · ' + event + '</div>' +
              '<div class="adm-log-time">' + admTimeAgo(l.created_at) + '</div>' +
            '</div>' +
          '</div>';
      });
    }
    html += '</div></div>';

    /* 안내 카드 */
    html +=
      '<div class="adm-card" style="background:var(--color-surface-2,#F3EFE9);">' +
        '<div class="adm-card-title">💡 로그 수집 설정 안내</div>' +
        '<div style="font-size:0.8em;color:var(--color-text-secondary,#7A5C44);line-height:1.8;">' +
          '로그 수집을 시작하려면 Supabase에서 <code style="background:var(--color-border,#E4DBCE);padding:1px 6px;border-radius:4px;">activity_logs</code> 테이블을 생성해야 합니다.<br>' +
          '<strong>필수 컬럼:</strong> id (bigserial), user_id (uuid), event_type (text), target_type (text), target_id (text), created_at (timestamptz)<br>' +
          '<strong>수집 항목:</strong> 로그인 / 스크립트 클릭 / Quick 메뉴 클릭 / 즐겨찾기 추가' +
        '</div>' +
      '</div>';

    admContent(html);
  } catch (e) {
    admContent('<div class="adm-empty">로그를 불러오지 못했습니다.</div>');
  }
};

    var savedBanner = localStorage.getItem('os_admin_banner');
    if (savedBanner) {

window.admPostNotice = async function () {
  var titleEl   = document.getElementById('adm-notice-title');
  var contentEl = document.getElementById('adm-notice-content');
  var scopeEl   = document.getElementById('adm-notice-scope');
  var title   = titleEl   ? titleEl.value.trim()   : '';
  var content = contentEl ? contentEl.value.trim() : '';
  var scope   = scopeEl   ? scopeEl.value           : 'global';
  if (!title || !content) { alert('제목과 내용을 모두 입력해 주세요.'); return; }
  try {
    var s = window.AppState || {};
    var res = await admFetch('/rest/v1/posts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({
        title: title, content: content, category: 'notice',
        is_notice: true, scope: scope,
        author_id: s.userId || '',
        author_name: s.name || '관리자',
        created_at: new Date().toISOString()
      })
    });
    if (res.ok) {
      alert('공지가 등록되었습니다.');
      if (titleEl)   titleEl.value   = '';
      if (contentEl) contentEl.value = '';
      setTimeout(window.admLoadNotice, 300);
    } else {
      alert('등록 중 오류가 발생했습니다.');
    }
  } catch (e) { alert('네트워크 오류가 발생했습니다.'); }
};

window.admSaveBanner = function () {
  var inp  = document.getElementById('adm-banner-text');
  var text = inp ? inp.value.trim() : '';
  if (!text) { alert('배너 문구를 입력해 주세요.'); return; }
  localStorage.setItem('os_admin_banner', text);
  var preview = document.getElementById('adm-banner-preview');
  if (preview) { preview.textContent = text; preview.style.display = 'block'; }
  alert('배너가 저장되었습니다.');
};

window.admClearBanner = function () {
  localStorage.removeItem('os_admin_banner');
  var inp     = document.getElementById('adm-banner-text');
  var preview = document.getElementById('adm-banner-preview');
  if (inp)     inp.value = '';
  if (preview) preview.style.display = 'none';
  alert('배너가 숨김 처리됐습니다.');
};

window.admBindSettingsEvents = function () {
  document.querySelectorAll('[data-s-menu]').forEach(function (cb) {
    cb.addEventListener('change', window.admSyncMenuPreview);
  });
  document.querySelectorAll('[data-s-gate]').forEach(function (cb) {
    cb.addEventListener('change', window.admSyncGatePreview);
  });
  document.querySelectorAll('[data-s-btab]').forEach(function (cb) {
    cb.addEventListener('change', window.admSyncBoardPreview);
  });
};

window.admSyncMenuPreview = function () {
  var on = 0, off = 0;
  document.querySelectorAll('[data-s-menu]').forEach(function (cb) {
    var key = cb.getAttribute('data-s-menu');
    var row = cb.closest('.adm-set-row');
    var lab = row.querySelector('.adm-set-rlabel');
    var st  = cb.parentElement.querySelector('.adm-cb-state');
    var pv  = document.querySelector('[data-pv-menu="' + key + '"]');
    if (cb.checked) {
      st.textContent = '표시'; st.classList.add('on'); st.classList.remove('off');
      row.classList.remove('is-off'); lab.classList.add('on');
      if (pv) pv.classList.remove('hidden');
      on++;
    } else {
      st.textContent = '숨김'; st.classList.add('off'); st.classList.remove('on');
      row.classList.add('is-off'); lab.classList.remove('on');
      if (pv) pv.classList.add('hidden');
      off++;
    }
  });
  var onEl = document.getElementById('adm-pv-menu-on');
  var offEl = document.getElementById('adm-pv-menu-off');
  if (onEl) onEl.textContent = on;
  if (offEl) offEl.textContent = off;

  var sb = document.getElementById('adm-pv-sb-menu');
  if (sb) {
    var existing = sb.querySelector('.adm-empty-msg');
    if (on === 0 && !existing) {
      var e = document.createElement('div'); e.className = 'adm-empty-msg'; e.textContent = '모든 메뉴 숨김';
      sb.appendChild(e);
    } else if (on > 0 && existing) existing.remove();
  }
};

/* 배너 미리보기 페이지 전환 */
window.admBnSelect = function (key, label) {
  document.querySelectorAll('.adm-bn-sel-btn').forEach(function (b) { b.classList.remove('active'); });
  var btns = document.querySelectorAll('.adm-bn-sel-btn');
  btns.forEach(function (b) {
    if (b.textContent.trim() === label.replace(/&apos;/g, "'")) b.classList.add('active');
  });

  var hidden = document.getElementById('banner-' + key);
  var url = (hidden && hidden.value) ? hidden.value : '';
  var banner = document.getElementById('adm-pv-bn-banner');
  if (!banner) return;

  if (url) {
    banner.style.backgroundImage = "url('" + url.replace(/'/g, "\\'") + "')";
    banner.style.backgroundSize = 'cover';
    banner.style.backgroundPosition = 'center';
    banner.style.background = banner.style.background;
    banner.style.color = '#fff';
    banner.style.textShadow = '0 1px 3px rgba(0,0,0,0.5)';
    banner.textContent = label + ' 배너';
  } else {
    banner.style.backgroundImage = 'none';
    banner.style.background = 'var(--color-brand, #6B3A2A)';
    banner.style.color = '#fff';
    banner.style.textShadow = 'none';
    banner.textContent = label + ' — 배너 없음 (기본 갈색)';
  }
};

window.admBannerFileSelected = function (pageKey) {
  var fileInput = document.getElementById('banner-file-' + pageKey);
  var preview   = document.getElementById('banner-preview-' + pageKey);
  var filename  = document.getElementById('banner-filename-' + pageKey);
  if (!fileInput || !fileInput.files || !fileInput.files[0]) return;
  var file = fileInput.files[0];

  /* 파일명 표시 */
  if (filename) {
    filename.textContent = file.name;
    filename.style.color = 'var(--color-text-primary,#3D2C1E)';
  }

  /* 로컬 미리보기 */
  if (preview) {
    var reader = new FileReader();
    reader.onload = function (e) {
      preview.innerHTML = '<img src="' + e.target.result + '" style="width:100%;height:100%;object-fit:cover;">';
    };
    reader.readAsDataURL(file);
  }
};

/* 배너 이미지 저장 (파일 선택 → Storage 업로드 → URL → app_settings upsert) */
window.admSaveBannerSettings = async function () {
  var keys = ['home','scripts','board','myspace','news','quick'];

  var upsertRows = [];
  var hasUpload = false;

  /* 진행 표시 */
  var saveBtn = document.querySelector('[onclick="window.admSaveBannerSettings()"]');
  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '⏳ 저장 중...'; }

  for (var i = 0; i < keys.length; i++) {
    var k         = keys[i];
    var fileInput = document.getElementById('banner-file-' + k);
    var hidden    = document.getElementById('banner-' + k);
    var file      = fileInput && fileInput.files && fileInput.files[0];

    if (file) {
      /* 파일이 선택된 경우 → Storage 업로드 */
      hasUpload = true;
      var ext      = file.name.split('.').pop().toLowerCase();
      var filePath = k + '_' + Date.now() + '.' + ext;

      try {
        var upRes = await admStorageUpload('onesecond_banner', filePath, file);
        if (!upRes.ok) {
          var upErr = await upRes.text();
          console.error('[admin] 배너 업로드 실패 (' + k + '):', upRes.status, upErr);
          alert('업로드 실패: ' + k + ' 페이지 (HTTP ' + upRes.status + ')\n\n' + upErr);
          if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '💾 배너 설정 저장'; }
          return;
        }
        /* Public URL: Supabase Storage 공개 URL 패턴 */
        var base = (window.db && window.db.url) ? window.db.url : '';
        var publicUrl = base + '/storage/v1/object/public/onesecond_banner/' + filePath;
        if (hidden) hidden.value = publicUrl;
        upsertRows.push({ group_name: 'banner_img', key: 'banner_img_' + k, value: publicUrl });
      } catch (e) {
        console.error('[admin] 업로드 네트워크 오류:', e);
        alert('네트워크 오류가 발생했습니다.\n' + e.message);
        if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '💾 배너 설정 저장'; }
        return;
      }

    } else if (hidden && hidden.value.trim()) {
      /* 파일 미선택 + 기존 URL 있음 → 기존값 유지 */
      upsertRows.push({ group_name: 'banner_img', key: 'banner_img_' + k, value: hidden.value.trim() });
    } else {
      /* 삭제된 경우 → 빈 값 저장 */
      upsertRows.push({ group_name: 'banner_img', key: 'banner_img_' + k, value: '' });
    }
  }

  /* app_settings DELETE → INSERT */
  try {
    var delRes2 = await admFetch('/rest/v1/app_settings?group_name=eq.banner_img', {
      method: 'DELETE',
      headers: { 'Prefer': 'return=minimal' }
    });
    if (!delRes2.ok && delRes2.status !== 404) {
      alert('저장 실패 (삭제 단계 오류)');
      if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '💾 배너 설정 저장'; }
      return;
    }
    var res = await admFetch('/rest/v1/app_settings', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify(upsertRows)
    });
    if (res.ok) {
      if (window.clearBannerCache) window.clearBannerCache();
      alert('배너 설정이 저장됐습니다.' + (hasUpload ? '\n✅ 이미지 업로드 및 URL 저장 완료.' : '') + '\n페이지 전환 시 즉시 반영됩니다.');
    } else {
      var e = await res.text();
      console.error('[admin] 배너 저장 실패:', res.status, e);
      alert('저장 실패 (HTTP ' + res.status + ')');
    }
  } catch (e) {
    alert('네트워크 오류가 발생했습니다.');
  }

  if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '💾 배너 설정 저장'; }
};

function _boot() {
  /* 관리자 권한 확인 */
  var s = window.AppState;
  if (!s || s.role !== 'admin') {
    admContent(
      '<div class="adm-empty" style="padding:60px;">' +
        '<div style="font-size:2em;margin-bottom:12px;">🔒</div>' +
        '<div style="font-weight:700;margin-bottom:6px;">접근 권한이 없습니다</div>' +
        '<div style="font-size:0.842em;color:var(--color-text-tertiary,#B89880);">관리자 계정으로 로그인해 주세요.</div>' +
      '</div>'
    );
    return;
  }
  window.admLoadUsers();
}

/* ── appstate:ready 표준 패턴 ── */
if (window.AppState && window.AppState.ready) {
  _boot();
} else {
  document.addEventListener('appstate:ready', function () { _boot(); }, { once: true });
}

})();
