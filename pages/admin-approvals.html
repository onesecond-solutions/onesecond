<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>원수사 가입 승인 — onesecond</title>

  <!-- 공통 가드 + 데이터 + admin 판정 -->
  <script src="/js/maintenance-guard.js"></script>
  <script src="/js/admin-config.js"></script>
  <script src="/js/db.js"></script>

  <!-- v2 인디고 토큰 -->
  <link rel="stylesheet" href="/css/tokens-v2.css" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--bodytx);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .wrap { max-width: 880px; margin: 0 auto; padding: 24px 16px 80px; }

    /* ── 헤더 ───────────────────────────────────────── */
    .hd { margin-bottom: 24px; }
    .hd-title {
      font-size: 22px; font-weight: 800; color: var(--tp);
      letter-spacing: -0.4px; display: flex; align-items: center; gap: 8px;
    }
    .hd-sub { font-size: 13px; color: var(--ts); margin-top: 6px; }
    .hd-count {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 22px; height: 22px; padding: 0 7px; border-radius: 999px;
      background: var(--ac); color: #fff; font-size: 12px; font-weight: 700;
    }

    /* ── 상태 박스 (로딩/빈/에러) ──────────────────────── */
    .state {
      text-align: center; padding: 48px 20px; border: 1px solid var(--bd);
      border-radius: 14px; background: var(--s1); color: var(--ts);
    }
    .state-icon { font-size: 34px; margin-bottom: 10px; opacity: 0.7; }
    .state-title { font-size: 15px; font-weight: 700; color: var(--tp); margin-bottom: 4px; }
    .state-sub { font-size: 13px; }
    .state.err .state-title { color: var(--err); }

    /* ── 가입 대기 카드 ────────────────────────────────── */
    .list { display: flex; flex-direction: column; gap: 12px; }
    .card {
      border: 1px solid var(--bd); border-radius: 14px; background: var(--s1);
      padding: 16px 18px; box-shadow: var(--sh-sm);
      display: flex; align-items: center; justify-content: space-between; gap: 14px;
      flex-wrap: wrap;
    }
    .card-main { flex: 1 1 auto; min-width: 200px; }
    .card-name {
      font-size: 16px; font-weight: 700; color: var(--tp);
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .badge {
      font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 999px;
      background: color-mix(in srgb, var(--ac) 12%, transparent); color: var(--ac);
    }
    .card-meta { font-size: 13px; color: var(--ts); margin-top: 5px; }
    .card-meta b { color: var(--bodytx); font-weight: 600; }
    .card-time { font-size: 12px; color: var(--tf); margin-top: 4px; }

    /* ── 버튼 ──────────────────────────────────────────── */
    .btn {
      font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer;
      border-radius: 10px; padding: 10px 18px; border: none; transition: background .15s, opacity .15s;
      white-space: nowrap;
    }
    .btn-primary { background: var(--ac); color: #fff; }
    .btn-primary:hover { background: var(--ach); }
    .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }
    .btn-ghost { background: transparent; color: var(--ts); border: 1px solid var(--bd); }
    .btn-ghost:hover { background: var(--s2); }

    /* ── 모달 ──────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      display: none; align-items: center; justify-content: center; padding: 16px; z-index: 100;
    }
    .modal-overlay.on { display: flex; }
    .modal {
      width: 100%; max-width: 440px; background: var(--s1); border: 1px solid var(--bd);
      border-radius: 16px; box-shadow: var(--sh-lg); padding: 22px; max-height: 88vh; overflow-y: auto;
    }
    .modal-title { font-size: 18px; font-weight: 800; color: var(--tp); margin-bottom: 4px; }
    .modal-sub { font-size: 13px; color: var(--ts); margin-bottom: 18px; }
    .modal-sub b { color: var(--bodytx); }

    .field-label { font-size: 13px; font-weight: 700; color: var(--tp); margin-bottom: 8px; display: block; }
    .field-hint { font-size: 12px; color: var(--tf); margin-bottom: 10px; }

    .branch-opt {
      display: flex; align-items: center; gap: 10px; padding: 11px 12px;
      border: 1px solid var(--bd); border-radius: 10px; cursor: pointer; margin-bottom: 8px;
      transition: border-color .15s, background .15s;
    }
    .branch-opt:hover { background: var(--s2); }
    .branch-opt.checked { border-color: var(--ac); background: color-mix(in srgb, var(--ac) 7%, transparent); }
    .branch-opt input { width: 17px; height: 17px; accent-color: var(--ac); cursor: pointer; }
    .branch-opt-name { font-size: 14px; font-weight: 600; color: var(--tp); }
    .branch-opt-org { font-size: 12px; color: var(--ts); }

    .modal-err {
      display: none; font-size: 13px; color: var(--err); background: color-mix(in srgb, var(--err) 8%, transparent);
      border-radius: 8px; padding: 9px 12px; margin: 4px 0 14px;
    }
    .modal-err.on { display: block; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

    /* ── 토스트 ────────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--tp); color: var(--bg); font-size: 14px; font-weight: 600;
      padding: 12px 22px; border-radius: 999px; box-shadow: var(--sh-lg);
      opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s; z-index: 200;
    }
    .toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.err { background: var(--err); color: #fff; }

    /* ── 접근 차단 ─────────────────────────────────────── */
    .denied { text-align: center; padding: 80px 20px; }
    .denied-icon { font-size: 44px; margin-bottom: 14px; }
    .denied-title { font-size: 18px; font-weight: 800; color: var(--tp); margin-bottom: 8px; }
    .denied-sub { font-size: 14px; color: var(--ts); }
  </style>
</head>
<body>

  <!-- 본문 (admin 통과 시에만 렌더) -->
  <div class="wrap" id="appRoot" hidden>
    <div class="hd">
      <div class="hd-title">🏛️ 원수사 가입 승인 <span class="hd-count" id="pendingCount">0</span></div>
      <div class="hd-sub">승인하면 계정이 활성화되고, 지점 매핑으로 자료실 글쓰기 권한이 부여됩니다.</div>
    </div>
    <div id="listArea"></div>
  </div>

  <!-- 접근 차단 (admin 아님) -->
  <div class="wrap denied" id="deniedRoot" hidden>
    <div class="denied-icon">🔒</div>
    <div class="denied-title">접근 권한이 없습니다</div>
    <div class="denied-sub">이 페이지는 운영자(admin) 전용입니다.</div>
  </div>

  <!-- 승인 모달 -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-title">가입 승인</div>
      <div class="modal-sub" id="modalSub"></div>
      <label class="field-label">담당 지점 배정</label>
      <div class="field-hint">하나 이상 선택하세요. 첫 번째 선택이 대표 지점이 됩니다.</div>
      <div id="branchList"></div>
      <div class="modal-err" id="modalErr"></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="btnCancel">취소</button>
        <button class="btn btn-primary" id="btnConfirm">승인 확정</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
  (function () {
    'use strict';

    var ROLE_LABEL = window.ROLE_LABEL || {};
    var state = { pending: [], branches: [], selectedUser: null };

    function esc(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function fmtDate(iso) {
      if (!iso) return '';
      var d = new Date(iso);
      if (isNaN(d.getTime())) return '';
      var p = function (n) { return (n < 10 ? '0' : '') + n; };
      return d.getFullYear() + '.' + p(d.getMonth() + 1) + '.' + p(d.getDate()) + ' ' + p(d.getHours()) + ':' + p(d.getMinutes());
    }

    var toastTimer = null;
    function toast(msg, isErr) {
      var el = document.getElementById('toast');
      el.textContent = msg;
      el.className = 'toast on' + (isErr ? ' err' : '');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function () { el.className = 'toast'; }, 2600);
    }

    // ── 상태 박스 ──────────────────────────────────────
    function renderState(kind) {
      var area = document.getElementById('listArea');
      if (kind === 'loading') {
        area.innerHTML = '<div class="state"><div class="state-icon">⏳</div><div class="state-title">불러오는 중…</div></div>';
      } else if (kind === 'empty') {
        area.innerHTML = '<div class="state"><div class="state-icon">✅</div><div class="state-title">대기 중인 가입 신청이 없습니다</div><div class="state-sub">새 원수사 가입 신청이 들어오면 이곳에 표시됩니다.</div></div>';
      } else if (kind === 'error') {
        area.innerHTML = '<div class="state err"><div class="state-icon">⚠️</div><div class="state-title">목록을 불러오지 못했습니다</div><div class="state-sub">잠시 후 새로고침해 주세요.</div></div>';
      }
    }

    // ── 가입 대기 목록 렌더 ─────────────────────────────
    function renderList() {
      var area = document.getElementById('listArea');
      document.getElementById('pendingCount').textContent = state.pending.length;
      if (state.pending.length === 0) { renderState('empty'); return; }

      var html = '<div class="list">';
      state.pending.forEach(function (u) {
        var roleLabel = ROLE_LABEL[u.role] || u.role || '';
        html += '<div class="card">'
          + '<div class="card-main">'
          + '<div class="card-name">' + esc(u.name || '(이름 없음)') + '<span class="badge">' + esc(roleLabel) + '</span></div>'
          + '<div class="card-meta"><b>' + esc(u.company || '-') + '</b> · ' + esc(u.email || '') + '</div>'
          + '<div class="card-time">신청 ' + esc(fmtDate(u.created_at)) + '</div>'
          + '</div>'
          + '<button class="btn btn-primary" data-approve="' + esc(u.id) + '">승인</button>'
          + '</div>';
      });
      html += '</div>';
      area.innerHTML = html;

      area.querySelectorAll('[data-approve]').forEach(function (btn) {
        btn.addEventListener('click', function () { openModal(btn.getAttribute('data-approve')); });
      });
    }

    // ── 데이터 로드 ────────────────────────────────────
    async function loadPending() {
      renderState('loading');
      try {
        var res = await window.db.fetch(
          '/rest/v1/users?status=eq.pending&role=like.insurer_*'
          + '&select=id,name,company,role,email,created_at&order=created_at.asc'
        );
        if (!res.ok) { renderState('error'); return; }
        state.pending = await res.json();
        renderList();
      } catch (e) { renderState('error'); }
    }

    async function loadBranches() {
      try {
        var res = await window.db.fetch('/rest/v1/branches?select=id,name,ga_org_name&order=name.asc');
        if (res.ok) state.branches = await res.json();
      } catch (e) { state.branches = []; }
    }

    // ── 모달 ───────────────────────────────────────────
    function openModal(userId) {
      var u = state.pending.find(function (x) { return x.id === userId; });
      if (!u) return;
      state.selectedUser = u;

      document.getElementById('modalSub').innerHTML =
        '<b>' + esc(u.name || '') + '</b> · ' + esc(u.company || '') + ' · ' + esc(ROLE_LABEL[u.role] || u.role || '');

      var bl = document.getElementById('branchList');
      if (state.branches.length === 0) {
        bl.innerHTML = '<div class="field-hint">등록된 지점이 없습니다. 먼저 지점을 등록해 주세요.</div>';
      } else {
        bl.innerHTML = state.branches.map(function (b) {
          return '<label class="branch-opt">'
            + '<input type="checkbox" value="' + esc(b.id) + '" />'
            + '<span><span class="branch-opt-name">' + esc(b.name) + '</span> '
            + '<span class="branch-opt-org">' + esc(b.ga_org_name || '') + '</span></span>'
            + '</label>';
        }).join('');
        bl.querySelectorAll('.branch-opt input').forEach(function (cb) {
          cb.addEventListener('change', function () {
            cb.closest('.branch-opt').classList.toggle('checked', cb.checked);
          });
        });
      }

      document.getElementById('modalErr').className = 'modal-err';
      var confirmBtn = document.getElementById('btnConfirm');
      confirmBtn.disabled = false;
      confirmBtn.textContent = '승인 확정';
      document.getElementById('modalOverlay').classList.add('on');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('on');
      state.selectedUser = null;
    }

    function modalError(msg) {
      var el = document.getElementById('modalErr');
      el.textContent = msg;
      el.className = 'modal-err on';
    }

    async function confirmApprove() {
      var u = state.selectedUser;
      if (!u) return;

      var ids = Array.prototype.slice.call(
        document.querySelectorAll('#branchList input:checked')
      ).map(function (cb) { return cb.value; });

      if (ids.length === 0) { modalError('담당 지점을 하나 이상 선택해 주세요.'); return; }

      var btn = document.getElementById('btnConfirm');
      btn.disabled = true;
      btn.textContent = '승인 중…';

      try {
        var res = await window.db.fetch('/rest/v1/rpc/approve_insurer_user', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ p_user_id: u.id, p_branch_ids: ids })
        });

        if (!res.ok) {
          var msg = '승인 실패 (' + res.status + ')';
          try { var j = await res.json(); if (j && (j.message || j.hint)) msg = j.message || j.hint; } catch (e) {}
          modalError(msg);
          btn.disabled = false;
          btn.textContent = '승인 확정';
          return;
        }

        // 성공 → 목록에서 제거
        state.pending = state.pending.filter(function (x) { return x.id !== u.id; });
        closeModal();
        renderList();
        toast('✅ ' + (u.name || '') + ' 승인 완료');
      } catch (e) {
        modalError('네트워크 오류: ' + (e && e.message ? e.message : e));
        btn.disabled = false;
        btn.textContent = '승인 확정';
      }
    }

    // ── admin 가드 + 초기화 ────────────────────────────
    function init() {
      var osUser = {};
      try { osUser = JSON.parse(localStorage.getItem('os_user') || '{}'); } catch (e) {}

      if (!window.osIsAdmin || !window.osIsAdmin(osUser)) {
        document.getElementById('deniedRoot').hidden = false;
        return;
      }

      document.getElementById('appRoot').hidden = false;
      document.getElementById('btnCancel').addEventListener('click', closeModal);
      document.getElementById('btnConfirm').addEventListener('click', confirmApprove);
      document.getElementById('modalOverlay').addEventListener('click', function (e) {
        if (e.target === document.getElementById('modalOverlay')) closeModal();
      });
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') closeModal();
      });

      loadBranches();
      loadPending();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else { init(); }
  })();
  </script>
</body>
</html>
