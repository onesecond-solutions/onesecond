<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보험사 소식지 검색 — 원세컨드</title>
<link rel="stylesheet" href="/css/tokens.css">
<style>
/* ============================================================================
   원세컨드 — 보험사 소식지 검색 페이지
   2026-05-21 작성
   본진 6건: 씹기 카드 / 줍기 모드 / 헛웃음 라벨 / 카테고리 색 / 인라인 더보기 / 카톡 공유
============================================================================ */
* { box-sizing: border-box; }
body {
  margin: 0; padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Pretendard, sans-serif;
  background: var(--color-bg, #FBF8F3);
  color: var(--color-text-primary, #2D2418);
  min-height: 100vh;
}

/* ── 헤더 ────────────────────────────────────────────────────── */
.search-header {
  background: linear-gradient(180deg, #FBF8F3 0%, #FDF9F2 100%);
  padding: 48px 24px 32px;
  text-align: center;
  border-bottom: 1px solid var(--color-border, #E5E0D8);
}
.search-header h1 {
  margin: 0 0 8px;
  font-size: 1.65em;
  font-weight: 800;
  color: var(--color-text-primary, #2D2418);
  letter-spacing: -0.02em;
}
.search-header .subtitle {
  margin: 0 0 24px;
  font-size: 0.85em;
  color: var(--color-text-secondary, #6B5D45);
  line-height: 1.5;
}
.search-header .subtitle strong { color: var(--color-brand, #A0522D); font-weight: 700; }

/* ── 검색기 (큼지막) ─────────────────────────────────────────── */
.search-box-wrap {
  max-width: 640px;
  margin: 0 auto;
  position: relative;
}
.search-box {
  display: flex;
  align-items: center;
  background: #FFFFFF;
  border: 2px solid var(--color-border, #E5E0D8);
  border-radius: 14px;
  padding: 4px 6px 4px 18px;
  box-shadow: 0 2px 12px rgba(60, 40, 20, 0.06);
  transition: border-color 0.18s, box-shadow 0.18s;
}
.search-box:focus-within {
  border-color: var(--color-brand, #A0522D);
  box-shadow: 0 4px 18px rgba(160, 82, 45, 0.12);
}
.search-icon {
  font-size: 1.2em;
  color: var(--color-text-tertiary, #9B8B6E);
  margin-right: 8px;
}
.search-input {
  flex: 1;
  border: none;
  outline: none;
  background: transparent;
  font-size: 1.05em;
  padding: 14px 0;
  font-family: inherit;
  color: var(--color-text-primary);
}
.search-input::placeholder { color: var(--color-text-tertiary, #9B8B6E); font-weight: 400; }
.search-btn {
  background: var(--color-brand, #A0522D);
  color: #FFFFFF;
  border: none;
  border-radius: 10px;
  padding: 10px 20px;
  font-size: 0.9em;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.15s, transform 0.08s;
  font-family: inherit;
}
.search-btn:hover { background: #8B4621; }
.search-btn:active { transform: scale(0.97); }

/* ── 검색 칩 (빠른 시도) ────────────────────────────────────── */
.search-chips {
  max-width: 640px;
  margin: 16px auto 0;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
}
.chip {
  background: rgba(160, 82, 45, 0.08);
  color: var(--color-brand, #A0522D);
  border: 1px solid transparent;
  border-radius: 9999px;
  padding: 5px 12px;
  font-size: 0.72em;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
}
.chip:hover { background: rgba(160, 82, 45, 0.18); }

/* ── 본문 컨테이너 ──────────────────────────────────────────── */
.search-main {
  max-width: 980px;
  margin: 0 auto;
  padding: 24px 16px 80px;
}

/* ── 헛웃음 라벨 ────────────────────────────────────────────── */
.fun-label {
  text-align: center;
  font-size: 0.95em;
  color: var(--color-text-secondary, #6B5D45);
  padding: 28px 12px;
  line-height: 1.6;
}
.fun-label strong { color: var(--color-brand, #A0522D); font-weight: 700; }
.fun-label .emoji { font-size: 1.4em; display: block; margin-bottom: 6px; }

/* ── 카테고리 그룹 ──────────────────────────────────────────── */
.category-group {
  margin-bottom: 32px;
}
.category-group-head {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 4px;
  margin-bottom: 8px;
  border-bottom: 1px solid var(--color-border, #E5E0D8);
}
.category-bar {
  width: 5px;
  height: 22px;
  border-radius: 2px;
}
.category-title {
  font-size: 0.95em;
  font-weight: 700;
  color: var(--color-text-primary);
}
.category-count {
  font-size: 0.75em;
  color: var(--color-text-tertiary, #9B8B6E);
  font-weight: 500;
}

/* 카테고리 색 — 5px 줄 (6 색 본진) */
.cat-life       .category-bar { background: #3B82F6; }   /* 생명 = 파랑 */
.cat-non_life   .category-bar { background: #F97316; }   /* 손해 = 주황 */
.cat-etc        .category-bar { background: #8B5CF6; }   /* 기타 = 보라 */
.cat-life       .card { border-left-color: #3B82F6; }
.cat-non_life   .card { border-left-color: #F97316; }
.cat-etc        .card { border-left-color: #8B5CF6; }

/* ── 씹기 카드 (한 카드 = 짧고 컴팩트) ──────────────────────── */
.card-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.card {
  background: #FFFFFF;
  border: 1px solid var(--color-border, #E5E0D8);
  border-left: 5px solid var(--color-border, #E5E0D8);
  border-radius: 8px;
  padding: 12px 14px;
  cursor: pointer;
  transition: border-color 0.15s, box-shadow 0.15s, transform 0.08s;
}
.card:hover {
  box-shadow: 0 4px 14px rgba(60, 40, 20, 0.08);
}
.card:active { transform: scale(0.998); }
.card-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 4px;
}
.card-meta {
  font-size: 0.7em;
  color: var(--color-text-tertiary, #9B8B6E);
  font-weight: 600;
}
.card-insurer {
  color: var(--color-brand, #A0522D);
  font-weight: 700;
  font-size: 0.78em;
}
.card-date { opacity: 0.7; }
.card-title {
  font-size: 0.88em;
  font-weight: 600;
  color: var(--color-text-primary);
  line-height: 1.4;
  margin-bottom: 4px;
}
.card-snippet {
  font-size: 0.78em;
  color: var(--color-text-secondary, #6B5D45);
  line-height: 1.5;
  max-height: 3em;
  overflow: hidden;
}
.card-snippet mark {
  background: rgba(245, 158, 11, 0.28);
  color: inherit;
  padding: 0 2px;
  border-radius: 2px;
  font-weight: 700;
}

/* ── 인라인 더보기 (페이지 이동 없음) ───────────────────────── */
.card.is-expanded { box-shadow: 0 6px 20px rgba(60, 40, 20, 0.10); }
.card-detail {
  display: none;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px dashed var(--color-border, #E5E0D8);
  font-size: 0.78em;
  line-height: 1.6;
  color: var(--color-text-secondary, #6B5D45);
}
.card.is-expanded .card-detail { display: block; }
.card.is-expanded .card-snippet { max-height: none; }
.card-detail-snippets { display: flex; flex-direction: column; gap: 6px; }
.card-detail-snippets div {
  background: rgba(245, 158, 11, 0.06);
  padding: 8px 10px;
  border-radius: 6px;
  border-left: 2px solid var(--color-warning, #F59E0B);
}

/* ── 카드 액션 (줍기·카톡 공유) ─────────────────────────────── */
.card-actions {
  display: flex;
  gap: 6px;
  margin-top: 10px;
}
.card-action-btn {
  flex: 1;
  padding: 6px 10px;
  background: rgba(160, 82, 45, 0.06);
  border: 1px solid rgba(160, 82, 45, 0.15);
  border-radius: 6px;
  color: var(--color-text-secondary, #6B5D45);
  font-size: 0.72em;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
  font-family: inherit;
}
.card-action-btn:hover { background: rgba(160, 82, 45, 0.14); }
.card-action-btn.is-saved {
  background: var(--color-brand, #A0522D);
  color: #FFFFFF;
  border-color: var(--color-brand, #A0522D);
}

/* ── 빈 상태 ────────────────────────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 60px 16px;
  color: var(--color-text-tertiary, #9B8B6E);
}
.empty-state .emoji { font-size: 2.2em; margin-bottom: 8px; }
.empty-state-title { font-size: 0.95em; font-weight: 700; color: var(--color-text-secondary, #6B5D45); margin-bottom: 4px; }
.empty-state-desc { font-size: 0.8em; }

/* ── 로딩 ───────────────────────────────────────────────────── */
.loading {
  text-align: center;
  padding: 40px 16px;
  color: var(--color-text-tertiary);
  font-size: 0.85em;
}
.loading .spinner {
  display: inline-block;
  width: 18px; height: 18px;
  border: 2px solid rgba(160, 82, 45, 0.2);
  border-top-color: var(--color-brand, #A0522D);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  vertical-align: middle;
  margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── 줍기 모드 (저장한 자료 영역) ──────────────────────────── */
.saved-section {
  margin-top: 48px;
  padding-top: 24px;
  border-top: 2px dashed var(--color-border, #E5E0D8);
}
.saved-section-head {
  font-size: 0.95em;
  font-weight: 700;
  color: var(--color-text-primary);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.saved-section-empty {
  font-size: 0.8em;
  color: var(--color-text-tertiary);
  padding: 16px 0;
}

/* ── 뒤로 가기 ──────────────────────────────────────────────── */
.back-link {
  position: fixed;
  top: 16px; left: 16px;
  background: rgba(255,255,255,0.95);
  border: 1px solid var(--color-border, #E5E0D8);
  border-radius: 8px;
  padding: 8px 14px;
  text-decoration: none;
  color: var(--color-text-secondary, #6B5D45);
  font-size: 0.8em;
  font-weight: 600;
  z-index: 10;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}
.back-link:hover { background: #FFFFFF; }

/* ── 반응형 ────────────────────────────────────────────────── */
@media (max-width: 640px) {
  .search-header { padding: 36px 16px 24px; }
  .search-header h1 { font-size: 1.35em; }
  .search-btn { padding: 8px 14px; font-size: 0.82em; }
  .search-input { font-size: 1em; padding: 12px 0; }
  .search-chips { padding: 0 12px; }
}
</style>
</head>
<body>

<a href="/app.html" class="back-link">← 돌아가기</a>

<header class="search-header">
  <h1>📰 보험사 소식지 검색</h1>
  <p class="subtitle">
    <strong>460건</strong> 통째 검색 박힙니다. 인수기준·신상품·상품안내·캠페인 한 번에.
  </p>
  <div class="search-box-wrap">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="search-input"
             placeholder="간편 / 한도 / 암 / 실손 / 흥국 / 한화 ..."
             autocomplete="off" autofocus>
      <button class="search-btn" id="search-btn">검색</button>
    </div>
    <div class="search-chips" id="search-chips">
      <span class="chip" data-q="간편">간편</span>
      <span class="chip" data-q="한도">한도</span>
      <span class="chip" data-q="암">암</span>
      <span class="chip" data-q="실손">실손</span>
      <span class="chip" data-q="흥국">흥국</span>
      <span class="chip" data-q="한화">한화</span>
      <span class="chip" data-q="단기납">단기납</span>
      <span class="chip" data-q="청약">청약</span>
    </div>
  </div>
</header>

<main class="search-main">

  <!-- 헛웃음 라벨 + 결과 박힐 자리 -->
  <div id="result-area">
    <div class="fun-label" id="initial-state">
      <span class="emoji">📚</span>
      검색어 하나만 입력하시면<br>
      <strong>460건 소식지</strong>에서 한 번에 박힙니다.
    </div>
  </div>

  <!-- 줍기 모드 (저장한 자료) -->
  <section class="saved-section" id="saved-section" style="display:none;">
    <div class="saved-section-head">
      🪣 줍기 박은 자리 <span class="card-meta" id="saved-count"></span>
    </div>
    <div class="card-list" id="saved-list"></div>
  </section>
</main>

<script src="/js/db.js"></script>
<script>
(function () {
  'use strict';

  // ── 1. 상태 ────────────────────────────────────────────────
  var state = {
    isLoading: false,
    lastQuery: '',
    results: [],          // [{ category, id, insurer, issue_date, source_filename, pages, snippet, rank, group_rank }, ...]
    saved: JSON.parse(localStorage.getItem('onesecond_newsletter_saved') || '[]')
  };

  // ── 2. 유틸 ────────────────────────────────────────────────
  function escapeHtml(s) {
    if (s == null) return '';
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  // snippet은 서버에서 이미 <mark> 박혀 있어서 escape 박지 X
  function safeSnippet(s) { return s || ''; }

  var CATEGORY_LABEL = {
    life:     '생명보험',
    non_life: '손해보험',
    etc:      '기타'
  };
  var CATEGORY_ORDER = ['life', 'non_life', 'etc'];

  function funLabel(query, total) {
    var qEsc = escapeHtml(query);
    if (total === 0) {
      return '<span class="emoji">🤔</span>' +
             '<strong>' + qEsc + '</strong> 박힌 자리 없네요.<br>' +
             '<span style="font-size:0.85em;opacity:0.7;">다른 단어로 한 번 더 박아보세요.</span>';
    }
    var phrases = [
      '<strong>' + total + '건</strong> 박혔어요.',
      '한 입에 박을 만한 자료 <strong>' + total + '건</strong>!',
      '<strong>' + total + '건</strong>이나 박혀 있네요. 골라 보세요.'
    ];
    return '<span class="emoji">📦</span>' + phrases[Math.floor(Math.random() * phrases.length)];
  }

  // ── 3. Supabase 검색 RPC 호출 ─────────────────────────────
  async function searchNewsletters(q) {
    if (!q || !q.trim()) return [];
    state.isLoading = true;
    renderLoading();

    try {
      var res = await window.db.fetch('/rest/v1/rpc/search_newsletters_grouped', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          q: q.trim(),
          per_category: 10,
          total_limit: 60
        })
      });

      if (!res.ok) {
        var txt = await res.text();
        console.error('[search] HTTP ' + res.status, txt);
        // newsletters 테이블 박지 X 박힌 자리 = "Could not find the function" 격차
        if (txt.indexOf('search_newsletters_grouped') >= 0 || res.status === 404) {
          renderError('검색 인프라 준비 중 (Supabase 박는 자리 박지 X). 잠시 후 다시 박아보세요.');
        } else {
          renderError('검색 격차: ' + res.status);
        }
        return [];
      }

      return await res.json();
    } catch (err) {
      console.error('[search] 예외', err);
      renderError('검색 격차: ' + err.message);
      return [];
    } finally {
      state.isLoading = false;
    }
  }

  // ── 4. 렌더링 ──────────────────────────────────────────────
  function renderLoading() {
    document.getElementById('result-area').innerHTML =
      '<div class="loading"><span class="spinner"></span>검색 박는 중...</div>';
  }

  function renderError(msg) {
    document.getElementById('result-area').innerHTML =
      '<div class="empty-state">' +
        '<div class="emoji">⚠️</div>' +
        '<div class="empty-state-title">' + escapeHtml(msg) + '</div>' +
        '<div class="empty-state-desc">콘솔(F12) 박은 자리 상세 격차 박혀 있어요.</div>' +
      '</div>';
  }

  function renderResults(rows, query) {
    state.results = rows;
    if (!rows || rows.length === 0) {
      document.getElementById('result-area').innerHTML =
        '<div class="empty-state">' +
          '<div class="emoji">🤔</div>' +
          '<div class="empty-state-title"><strong>' + escapeHtml(query) + '</strong> 박힌 자리 없네요</div>' +
          '<div class="empty-state-desc">다른 단어로 한 번 더 박아보세요.</div>' +
        '</div>';
      return;
    }

    // 카테고리별 그룹
    var groups = { life: [], non_life: [], etc: [] };
    rows.forEach(function (r) {
      var cat = groups[r.category] ? r.category : 'etc';
      groups[cat].push(r);
    });

    var html = '<div class="fun-label">' + funLabel(query, rows.length) + '</div>';

    CATEGORY_ORDER.forEach(function (cat) {
      var items = groups[cat];
      if (!items || items.length === 0) return;
      html += '<section class="category-group cat-' + cat + '">';
      html +=   '<div class="category-group-head">';
      html +=     '<div class="category-bar"></div>';
      html +=     '<div class="category-title">' + CATEGORY_LABEL[cat] + '</div>';
      html +=     '<div class="category-count">' + items.length + '건</div>';
      html +=   '</div>';
      html +=   '<div class="card-list">';
      items.forEach(function (it) { html += renderCard(it, cat); });
      html +=   '</div>';
      html += '</section>';
    });

    document.getElementById('result-area').innerHTML = html;
    bindCardEvents();
  }

  function renderCard(it, cat) {
    var isSaved = state.saved.some(function (s) { return s.id === it.id; });
    return (
      '<div class="card" data-id="' + escapeHtml(it.id) + '">' +
        '<div class="card-head">' +
          '<div class="card-meta">' +
            '<span class="card-insurer">' + escapeHtml(it.insurer || '?') + '</span>' +
            (it.issue_date ? ' · <span class="card-date">' + escapeHtml(it.issue_date) + '</span>' : '') +
            (it.pages ? ' · <span class="card-date">' + it.pages + 'p</span>' : '') +
          '</div>' +
        '</div>' +
        '<div class="card-title">' + escapeHtml(it.source_filename || '') + '</div>' +
        '<div class="card-snippet">' + safeSnippet(it.snippet) + '</div>' +
        '<div class="card-detail">' +
          '<div class="card-detail-snippets">' +
            '<div>' + safeSnippet(it.snippet) + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="card-actions">' +
          '<button type="button" class="card-action-btn js-save' + (isSaved ? ' is-saved' : '') + '" data-id="' + escapeHtml(it.id) + '">' +
            (isSaved ? '🪣 줍은 자리' : '🪣 줍기') +
          '</button>' +
          '<button type="button" class="card-action-btn js-share" data-id="' + escapeHtml(it.id) + '">' +
            '💬 카톡 공유' +
          '</button>' +
        '</div>' +
      '</div>'
    );
  }

  function bindCardEvents() {
    // 카드 클릭 = 인라인 더보기 (페이지 이동 없음)
    document.querySelectorAll('.card').forEach(function (card) {
      card.addEventListener('click', function (ev) {
        if (ev.target.closest('.card-action-btn')) return;
        card.classList.toggle('is-expanded');
      });
    });

    // 줍기
    document.querySelectorAll('.js-save').forEach(function (btn) {
      btn.addEventListener('click', function (ev) {
        ev.stopPropagation();
        toggleSaved(this.getAttribute('data-id'), this);
      });
    });

    // 카톡 공유 (Web Share API)
    document.querySelectorAll('.js-share').forEach(function (btn) {
      btn.addEventListener('click', function (ev) {
        ev.stopPropagation();
        shareCard(this.getAttribute('data-id'));
      });
    });
  }

  // ── 5. 줍기 (localStorage) ─────────────────────────────────
  function toggleSaved(id, btn) {
    var item = state.results.find(function (r) { return r.id === id; });
    if (!item) return;
    var idx = state.saved.findIndex(function (s) { return s.id === id; });
    if (idx >= 0) {
      state.saved.splice(idx, 1);
      btn.classList.remove('is-saved');
      btn.textContent = '🪣 줍기';
    } else {
      state.saved.unshift({
        id: id,
        insurer: item.insurer,
        issue_date: item.issue_date,
        source_filename: item.source_filename,
        pages: item.pages,
        category: item.category,
        snippet: item.snippet,
        saved_at: new Date().toISOString()
      });
      btn.classList.add('is-saved');
      btn.textContent = '🪣 줍은 자리';
    }
    localStorage.setItem('onesecond_newsletter_saved', JSON.stringify(state.saved));
    renderSaved();
  }

  function renderSaved() {
    var section = document.getElementById('saved-section');
    var list = document.getElementById('saved-list');
    var count = document.getElementById('saved-count');
    if (state.saved.length === 0) {
      section.style.display = 'none';
      return;
    }
    section.style.display = 'block';
    count.textContent = state.saved.length + '건';
    list.innerHTML = state.saved.slice(0, 10).map(function (it) {
      return renderCard(it, it.category || 'etc');
    }).join('');
    bindCardEvents();
  }

  // ── 6. 카톡 공유 (Web Share API) ───────────────────────────
  async function shareCard(id) {
    var item = state.results.find(function (r) { return r.id === id; }) ||
               state.saved.find(function (r) { return r.id === id; });
    if (!item) return;

    var text = item.insurer + ' 소식지 (' + (item.issue_date || '') + ')\n' +
               item.source_filename + '\n\n' +
               '원세컨드 검색 박은 자리: ' + window.location.origin + '/pages/search.html?q=' +
               encodeURIComponent(state.lastQuery || item.insurer);

    if (navigator.share) {
      try {
        await navigator.share({
          title: '원세컨드 — ' + item.insurer + ' 소식지',
          text: text,
          url: window.location.origin + '/pages/search.html?q=' + encodeURIComponent(state.lastQuery || item.insurer)
        });
      } catch (e) { /* 사용자 취소 = 무시 */ }
    } else {
      // Web Share 박지 X 박은 자리 = 클립보드 복사 fallback
      try {
        await navigator.clipboard.writeText(text);
        alert('카톡 공유 박지 X 박힌 자리 = 클립보드 복사 박혔어요. 카톡 박은 자리에 붙여넣으세요.');
      } catch (e) {
        prompt('아래 자리 복사 박은 자리 카톡 박음:', text);
      }
    }
  }

  // ── 7. 이벤트 바인딩 ───────────────────────────────────────
  function doSearch(q) {
    var query = q != null ? q : document.getElementById('search-input').value;
    if (!query || !query.trim()) return;
    state.lastQuery = query.trim();
    document.getElementById('search-input').value = query.trim();

    // URL 박은 자리 q 박음 (공유·새로고침 본진)
    var newUrl = window.location.pathname + '?q=' + encodeURIComponent(query.trim());
    window.history.replaceState(null, '', newUrl);

    searchNewsletters(query).then(function (rows) {
      renderResults(rows || [], query);
    });
  }

  document.getElementById('search-btn').addEventListener('click', function () { doSearch(); });
  document.getElementById('search-input').addEventListener('keydown', function (ev) {
    if (ev.key === 'Enter') doSearch();
  });
  document.querySelectorAll('.chip').forEach(function (chip) {
    chip.addEventListener('click', function () { doSearch(this.getAttribute('data-q')); });
  });

  // ── 8. 초기 진입 ───────────────────────────────────────────
  // URL ?q=박힌 자리 = 자동 검색
  var urlParams = new URLSearchParams(window.location.search);
  var initialQ = urlParams.get('q');
  renderSaved();
  if (initialQ) {
    doSearch(initialQ);
  }
})();
</script>

</body>
</html>
