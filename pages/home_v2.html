<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<script src="/js/maintenance-guard.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- 2026-05-17 박음: home_v2.html 본문 = index.html 박은 자리로 이동
     본 자리 = 옛 link(/pages/home_v2.html) 호환 redirect 박음
     URL 본진 정합 박힘 = onesecond.solutions/ 박힘 (도메인만) -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>원세컨드 — 통화 중 1초 실행 도구</title>
<link rel="canonical" href="https://onesecond.solutions/">
<meta http-equiv="refresh" content="0; url=/">
<script>
  /* 2026-05-17 박음: 옛 link 호환 — home_v2.html 박힌 자리 = 본진 메인(/)으로 redirect
     쿼리 스트링 보존 (invite={token} 등 박힌 자리 정합) */
  var qs = window.location.search || '';
  var hash = window.location.hash || '';
  window.location.replace('/' + qs + hash);
</script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Pretendard, sans-serif; background: #FAFAF9; color: #111827; margin: 0; padding: 80px 24px; text-align: center; }
  a { color: #A0522D; font-weight: 700; text-decoration: none; }
  a:hover { text-decoration: underline; }
</style>
</head>
<body>
  <p>잠시 후 메인 페이지로 이동합니다.</p>
  <p><a href="/">바로 이동하기 →</a></p>
</body>
</html>
