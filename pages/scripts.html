<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
:root {
  --brown-dark:#3d2b1f; --brown-mid:#6b4226; --brown-light:#a0724a;
  --brown-pale:#f5ede4; --cream:#f7f2ec; --accent:#c8753a;
  --text-dark:#1a1008; --text-mid:#5a3e2b; --text-light:#9a7a62;
  --line:#ddc8b4;
}
* { box-sizing:border-box; margin:0; padding:0; }
.sc-tab-bar {
  display:flex; gap:0; flex-wrap:wrap;
  padding:4px 16px 0;
  border-top:1px solid rgba(200,117,58,0.15);
  border-bottom:1px solid #ddc8b4;
  background:#faf8f5;
  flex-shrink:0;
}
.sc-tab {
  padding:13px 16px; border-radius:0;
  border:none; border-bottom:3px solid transparent;
  background:transparent;
  font-size:0.8947em; font-weight:600; color:#9a7a62;
  font-family:inherit; cursor:pointer; white-space:nowrap; transition:all .15s;
}
.sc-tab:hover { color:#3b2416; border-bottom-color:rgba(200,117,58,0.4); }
.sc-tab.active { color:#3b2416; border-bottom-color:#c8753a; font-weight:700; }
.sc-tab:hover { background:#f3e4d6; }

.sc-sub-bar {
  display:none; align-items:center; gap:0; flex-wrap:wrap;
  padding:3px 16px 0;
  border-top:1px solid #ede0d0;
  border-bottom:1px solid #ddc8b4;
  background:#f5f0ea;
}
.sc-sub-bar.visible { display:flex; }
.sc-sub-bar.visible { display:flex; }
.sc-sub {
  padding:11px 16px; border-radius:0;
  border:none; border-bottom:2px solid transparent;
  background:transparent;
  font-size:0.8947em; font-weight:600; color:#9a7a62;
  font-family:inherit; cursor:pointer; white-space:nowrap; transition:all .15s;
}
.sc-sub:hover { color:#3b2416; border-bottom-color:rgba(200,117,58,0.4); }
.sc-sub.active { color:#3b2416; border-bottom-color:#c8753a; font-weight:700; }
.sc-sub:hover { background:#f3e4d6; }

.sc-content { padding:12px 14px; background:#f3eee8; }
.sc-chip {
  display:inline-block; padding:4px 10px; border-radius:999px;
  background:#f5e7c9; color:#8a5a18; font-size:0.7895em; font-weight:800; margin-bottom:10px;
}
.sc-grid { display:grid; grid-template-columns:300px minmax(0,1fr); gap:12px; }
.sc-left { display:flex; flex-direction:column; gap:12px; }
.sc-summary-card { background:#fff; border:1px solid #dbc8b5; border-radius:14px; padding:14px; }
.sc-summary-label { font-size:0.7895em; font-weight:800; color:#9b7f68; margin-bottom:8px; }
.sc-summary-badge {
  display:inline-block; padding:6px 12px; border-radius:16px;
  font-size:0.7895em; font-weight:800; background:#e8e7fb; color:#4155c7; margin-bottom:10px;
}
.sc-summary-box {
  background:#f7f2ec; border-left:3px solid #d07f45; border-radius:8px;
  padding:12px; font-size:0.7895em; line-height:1.85; color:#3b2d21; white-space:pre-line;
}
.sc-accordion { background:#fff; border:1px solid #dbc8b5; border-radius:14px; overflow:hidden; margin-bottom:8px; }
.sc-acc-header {
  background:#f4ece4; padding:10px 14px;
  display:flex; align-items:center; justify-content:space-between;
  cursor:pointer; border-bottom:1px solid #e5d4c4;
}
.sc-acc-title { font-size:0.7895em; font-weight:900; color:#2d2016; }
.sc-acc-sub { font-size:0.7895em; color:#a18369; margin-top:2px; }
.sc-acc-arrow { font-size:0.7895em; color:#9b7f68; flex-shrink:0; }
.sc-acc-body { padding:14px; background:#fff; }
.sc-acc-body.closed { display:none; }
.sc-html { font-size:0.8421em; color:#2a2018; line-height:1.9; }
.sc-html div, .sc-html p { max-width:100%; }
.sc-bottom-bar {
  margin-top:12px; background:var(--brown-dark); color:#fff6ef;
  text-align:center; font-size:0.7895em; font-weight:800; padding:10px 14px; border-radius:8px;
}
.sc-loading { padding:40px; text-align:center; color:var(--text-light); font-size:0.8em; }
.sc-empty { padding:30px; text-align:center; color:var(--text-light); font-size:0.75em; }
@media (max-width:900px) { .sc-grid { grid-template-columns:1fr; } }
/* ── 페이지 헤더 ── */
.sc-page-header {
  height:120px;
  background:linear-gradient(135deg, var(--brown-dark) 0%, #6b4226 100%);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 24px;
  flex-shrink:0;
  margin-bottom:0;
}
.sc-page-header-left {}
.sc-page-title {
  font-family:Pretendard,'Noto Sans KR',sans-serif;
  font-size:1.5em; font-weight:800;
  color:#fff; letter-spacing:-0.5px;
  margin-bottom:6px;
}
.sc-page-desc {
  font-family:Pretendard,'Noto Sans KR',sans-serif;
  font-size:0.75em; font-weight:400;
  color:rgba(255,255,255,0.65);
  letter-spacing:-0.2px;
}
.sc-page-icon {
  font-size:2.8em; opacity:0.15;
}
</style>

<div>
<div class="sc-page-header">
  <div class="sc-page-header-left">
    <div class="sc-page-title">📞 스크립트</div>
    <div class="sc-page-desc">TM 상담 흐름에 맞는 멘트를 1초 안에 꺼내세요</div>
  </div>
  <div class="sc-page-icon">📋</div>
</div>
<div class="sc-tab-bar">
  <button class="sc-tab active" data-stages="opening,opening_rejection" onclick="window.selectTab(this)">📞 도입인사</button>
  <button class="sc-tab" data-stages="need_emphasis,need_emphasis_2" onclick="window.selectTab(this)">🔥 필요성강조</button>
  <button class="sc-tab" data-stages="situation_check" onclick="window.selectTab(this)">🔎 상황확인</button>
  <button class="sc-tab" data-stages="analysis" onclick="window.selectTab(this)">📊 보장분석</button>
  <button class="sc-tab" data-stages="product" onclick="window.selectTab(this)">📦 상품설명</button>
  <button class="sc-tab" data-stages="closing,closing_second" onclick="window.selectTab(this)">✅ 클로징</button>
  <button class="sc-tab" data-stages="objection" onclick="window.selectTab(this)">⚡ 반론대응</button>
</div>
<div class="sc-sub-bar" id="sc-sub-bar"></div>
<div class="sc-content">
  <div class="sc-chip" id="sc-chip"></div>
  <div class="sc-grid">
    <div class="sc-left">
      <div class="sc-summary-card">
        <div class="sc-summary-label">카드 요약</div>
        <div class="sc-summary-badge" id="sc-badge">요약</div>
        <div class="sc-summary-box" id="sc-summary">스크립트를 선택하세요.</div>
      </div>
    </div>
    <div id="sc-right"><div class="sc-loading">로딩 중...</div></div>
  </div>
  <div class="sc-bottom-bar">- 지금 멈추지 마세요. 한 문장이 전체 흐름을 바꿉니다 -</div>
</div>
</div>

<script>
// SUPABASE_URL, SUPABASE_KEY는 app.html에 이미 선언됨
// window 전역 변수 사용 (재실행 시 중복 선언 방지)
if (!window._sc_cache) window._sc_cache = {};
if (!window._sc_scripts) window._sc_scripts = [];
if (window._sc_idx === undefined) window._sc_idx = 0;

async function _fetchScripts(stages) {
  var key = stages.join(',');
  if (window._sc_cache[key]) return window._sc_cache[key];
  var stageList = stages.join(',');
  var url = SUPABASE_URL + '/rest/v1/scripts?stage=in.(' + stageList + ')&order=stage,title&select=id,title,stage,top_category,highlight_text,script_text';
  try {
    var res = await fetch(url, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + (window._userToken || SUPABASE_KEY)
      }
    });
    if (!res.ok) {
      document.getElementById('sc-summary').textContent = 'HTTP ' + res.status;
      return [];
    }
    var data = await res.json();
    window._sc_cache[key] = data;
    return data;
  } catch(e) {
    document.getElementById('sc-summary').textContent = '로드 실패: ' + e.message;
    return [];
  }
}

window.selectTab = async function(btn) {
  document.querySelectorAll('.sc-tab').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  var stages = btn.dataset.stages.split(',');
  document.getElementById('sc-sub-bar').innerHTML = '';
  document.getElementById('sc-sub-bar').classList.remove('visible');
  document.getElementById('sc-right').innerHTML = '<div class="sc-loading">불러오는 중...</div>';
  document.getElementById('sc-chip').textContent = '';
  document.getElementById('sc-summary').textContent = '스크립트를 선택하세요.';
  var scripts = await _fetchScripts(stages);
  window._sc_scripts = scripts;
  if (!scripts.length) {
    document.getElementById('sc-right').innerHTML = '<div class="sc-empty">스크립트가 없습니다.</div>';
    return;
  }
  var bar = document.getElementById('sc-sub-bar');
  bar.innerHTML = scripts.map(function(sc, i) {
    return '<button class="sc-sub' + (i===0?' active':'') + '" onclick="window.selectScript(' + i + ')">' + sc.title + '</button>';
  }).join('');
  bar.classList.add('visible');
  window.selectScript(0);
};

window.selectScript = function(idx) {
  window._sc_idx = idx;
  var sc = window._sc_scripts[idx];
  if (!sc) return;
  document.querySelectorAll('.sc-sub').forEach(function(b, i) { b.classList.toggle('active', i === idx); });
  document.getElementById('sc-chip').textContent = sc.title;
  document.getElementById('sc-badge').textContent = sc.top_category || sc.title;
  document.getElementById('sc-summary').textContent = sc.highlight_text || '상담 중 바로 활용하세요.';
  var right = document.getElementById('sc-right');
  if (sc.script_text) {
    right.innerHTML =
      '<div class="sc-accordion">' +
        '<div class="sc-acc-header" onclick="window.toggleAcc(this)">' +
          '<div>' +
            '<div class="sc-acc-title">' + sc.title + '</div>' +
            '<div class="sc-acc-sub">' + (sc.top_category || '') + '</div>' +
          '</div>' +
          '<div class="sc-acc-arrow">▲</div>' +
        '</div>' +
        '<div class="sc-acc-body"><div class="sc-html">' + sc.script_text + '</div></div>' +
      '</div>';
  } else {
    right.innerHTML = '<div class="sc-empty">스크립트 내용이 없습니다.</div>';
  }
};

window.toggleAcc = function(header) {
  var body = header.nextElementSibling;
  body.classList.toggle('closed');
  header.querySelector('.sc-acc-arrow').textContent = body.classList.contains('closed') ? '▼' : '▲';
};

(function init() {
  setTimeout(function() {
    var firstTab = document.querySelector('.sc-tab');
    if (firstTab) window.selectTab(firstTab);
  }, 300);
})();
</script>
