<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>home-content | D영역 콘텐츠</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
:root {
  --brown-dark: #3d2b1f;
  --brown-mid: #6b4226;
  --brown-light: #a0724a;
  --brown-pale: #f5ede4;
  --cream: #f7f2ec;
  --cream-2:#f4ece3;
  --accent: #c8753a;
  --accent-dark: #b5642e;
  --text-dark: #1a1008;
  --text-mid: #5a3e2b;
  --text-light: #9a7a62;
  --white: #ffffff;
  --line:#ddc8b4;
}
* { box-sizing:border-box; margin:0; padding:0; }
html, body { width:100%; min-height:100%; }
body {
  font-family:'Noto Sans KR',sans-serif;
  background:#f3eee8;
  color:var(--text-dark);
  overflow:auto;
}



/* ── 페이지 헤더 ── */
.page-header {
  height:120px;
  background:var(--brown-dark);
  display:flex; align-items:center;
  padding:0 20px;
  border-bottom:1px solid var(--line);
}
.page-header-title {
  font-size:26px;
  font-weight:900;
  color:#fff;
  letter-spacing:-0.5px;
}

/* ── 버튼 행 ── */
.step1, .step2, .step3 {
  border-bottom:1px solid var(--line);
  padding:8px 12px 7px;
  background:#faf8f5;
}
.step2, .step3 { background:#f3ebe3; }
.button-row { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.main-btn, .sub-btn, .cat-btn {
  font-family:'Noto Sans KR',sans-serif;
  border:1px solid #d5bda8;
  background:#fffaf4;
  color:#5d4533;
  border-radius:11px;
  font-size:0.68em;
  font-weight:700;
  white-space:nowrap;
  cursor:pointer;
  transition:all .15s ease;
}
.main-btn { height:32px; padding:0 14px; }
.sub-btn, .cat-btn { height:28px; padding:0 12px; border-radius:14px; font-size:0.63em; }
.main-btn:hover, .sub-btn:hover, .cat-btn:hover { background:#f3e4d6; }
.main-btn.active, .sub-btn.active, .cat-btn.active {
  background:var(--brown-dark); color:#fff; border-color:var(--brown-dark);
}
.sub-btn.active, .cat-btn.active { background:var(--accent); border-color:var(--accent); }
.step2.hidden, .step3.hidden { display:none; }

/* ── 콘텐츠 스크롤 영역 ── */
.content-scroll {
  overflow:visible;
  background:#f3eee8;
  padding:10px 14px 18px;
}
.screen-chip {
  display:inline-block;
  padding:4px 10px;
  border-radius:999px;
  background:#f5e7c9;
  color:#8a5a18;
  font-size:0.61em;
  font-weight:800;
  margin-bottom:10px;
}

/* ── 스크립트 작성 버튼 ── */
.script-write-btn {
  font-family:'Noto Sans KR',sans-serif;
  cursor:pointer;
  transition:all .15s ease;
}
.script-write-btn:hover { transform:translateY(-1px); }
.script-write-btn.top {
  height:32px; padding:0 14px; border-radius:11px;
  border:1px solid #d5bda8; background:#fff3e7; color:#8a5522;
  font-size:0.67em; font-weight:800;
}
.script-write-btn.top:hover { background:#f7e5d2; }
.script-write-btn.main {
  width:100%; min-height:52px; padding:14px 18px;
  border-radius:14px; border:1px solid #cd9a69;
  background:#fff3e7; color:#7b4b1e;
  font-size:0.72em; font-weight:800;
  box-shadow:0 2px 6px rgba(103,66,38,.08);
}
.script-write-btn.main:hover { background:#f8e6d4; }
.script-write-btn.side {
  width:100%; margin-top:2px; height:34px; border-radius:8px;
  border:1px solid #d8c6b3; background:#fff8f2; color:#7c5d44;
  font-size:0.63em; font-weight:800;
}
.script-write-btn.side:hover { background:#f4e8dc; }

/* ── 콘텐츠 그리드 ── */
.content-grid {
  display:grid;
  grid-template-columns: 320px minmax(0, 1fr);
  gap:12px;
  align-items:start;
}
.left-col { display:flex; flex-direction:column; gap:14px; }
.left-card, .right-card, .accordion-section {
  background:#fff; border:1px solid #dbc8b5; border-radius:14px;
}
.left-card { padding:14px; }
.left-label { font-size:0.61em; font-weight:800; color:#9b7f68; margin-bottom:10px; }
.summary-badge {
  display:inline-block; padding:7px 12px; border-radius:16px;
  font-size:0.61em; font-weight:800; color:#4155c7; background:#e8e7fb; margin-bottom:12px;
}
.summary-box {
  background:#f7f2ec; border-left:3px solid #d07f45;
  border-radius:8px; padding:14px 12px;
  font-size:0.67em; line-height:1.85; color:#3b2d21; white-space:pre-line;
}

/* ── CTA 카드 ── */
.left-cta-card {
  margin-top:14px; background:#fff; border:1px solid #e1d2c3;
  border-radius:16px; padding:14px;
  box-shadow:0 4px 12px rgba(103,66,38,.05);
}

/* ── 아코디언 ── */
.center-col { min-width:0; }
.accordion-section { overflow:auto; margin-bottom:8px; }
.accordion-header {
  background:#f4ece4; padding:10px 14px;
  display:flex; align-items:center; justify-content:space-between;
  cursor:pointer; border-bottom:1px solid #e5d4c4;
}
.acc-title { font-size:0.72em; font-weight:900; color:#2d2016; }
.acc-sub { font-size:0.61em; color:#a18369; margin-top:2px; }
.acc-arrow { font-size:0.61em; color:#9b7f68; }
.accordion-body { display:block; background:#fff; padding:14px 14px 12px; }
.accordion-body.closed { display:none; }
.section-html { font-size:0.78em; color:#2a2018; line-height:1.9; }
.section-html div, .section-html p { max-width:100%; }
.section-html img { max-width:100%; height:auto; }
.section-html [style*="font-size:15px"][style*="font-weight:700"] {
  font-size:15px !important; font-weight:800 !important; color:#1e1610 !important;
}
.section-html [style*="font-size:14px"][style*="color:#333"] { color:#7a685b !important; }
.tip-box {
  margin-top:12px; padding:8px 12px; border-radius:6px;
  background:#f8ebca; color:#7a4e13; font-size:0.67em; font-weight:800;
}



/* ── 하단 바 ── */
.bottom-bar {
  margin-top:14px; background:var(--brown-dark); color:#fff6ef;
  text-align:center; font-size:0.67em; font-weight:800;
  padding:10px 14px; border-radius:8px;
}

/* ── 오버레이 모달 ── */
.overlay {
  display:none; position:fixed; inset:0;
  background:rgba(26,16,8,.7);
  z-index:200; align-items:center; justify-content:center; backdrop-filter:blur(4px);
}
.overlay.active { display:flex; }
.quick-modal {
  background:#fff; border-radius:16px; width:100%; max-width:760px;
  box-shadow:0 24px 60px rgba(0,0,0,.3); overflow:hidden;
}
.quick-modal-header {
  background:var(--brown-dark); padding:16px 20px;
  display:flex; align-items:center; justify-content:space-between;
}
.quick-modal-title { font-size:15px; font-weight:800; color:#fff; }
.quick-close {
  width:28px; height:28px; border-radius:50%; background:rgba(255,255,255,.12); border:none;
  color:#fff; font-size:14px; cursor:pointer;
}
.quick-modal-body { padding:20px 24px; max-height:70vh; overflow:auto; background:#fff; }
.quick-modal-footer { padding:12px 20px; border-top:1px solid #f0e4d8; display:flex; justify-content:flex-end; }
.modal-close-btn {
  padding:8px 20px; border-radius:8px; border:1px solid #e0d0c0; background:var(--brown-dark);
  color:#fff; font-size:13px; font-family:'Noto Sans KR',sans-serif;
}

/* ── 반응형 ── */
@media (max-width: 1180px) {
  .content-grid { grid-template-columns: 220px minmax(0,1fr); }
}
@media (max-width: 900px) {
  .content-grid { grid-template-columns: 1fr; }
}

/* ── page-scale-root: app.html 폰트 크기 상속 지원 ── */
.page-scale-root { font-size: inherit; }
</style>
</head>

<script>
/* ─── Supabase 설정 (app.html에서 주입 시 덮어씌워짐) ─── */
const SUPABASE_URL = window.SUPABASE_URL || 'https://qursjteiovcylqiepmlo.supabase.co';
const SUPABASE_KEY = window.SUPABASE_KEY || '';

/* ─── fetchWithAuth 헬퍼 ─── */
async function fetchWithAuth(url, options = {}) {
  const token = window._userToken
    || localStorage.getItem('os_token')
    || sessionStorage.getItem('os_token')
    || '';
  const headers = {
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${token}`,
    ...(options.headers || {})
  };
  return fetch(url, { ...options, headers });
}

/* ※ CONTENT_MAP은 원본 home.html의 전체 내용과 동일합니다.
      파일 용량이 크므로 실제 배포 시 별도 content-map.js로 분리를 권장합니다. */

/* ─── 상태 ─── */
let state = { main: "도입인사", sub: "도입인사", cat: "보험 점검형" };

/* ─── overlayContent (Quick 메뉴 HTML, 원본과 동일) ─── */
const overlayContent = {
  '가입설계 / 선심사 동의 녹취 스크립트': `<div style="font-size:13px;color:#5a3e2b;padding:8px 0;">준비 중입니다.</div>`,
  '회사별 BMI 심사기준': `<div style="font-size:13px;color:#5a3e2b;padding:8px 0;">준비 중입니다.</div>`,
  '보험연령표': `<div style="font-size:13px;color:#5a3e2b;padding:8px 0;">준비 중입니다.</div>`,
  '보험회사 결제정보': `<div style="font-size:13px;color:#5a3e2b;padding:8px 0;">준비 중입니다.</div>`,
  '미러링 전 녹취 스크립트': `<div style="font-size:13px;color:#5a3e2b;padding:8px 0;">준비 중입니다.</div>`,
  '원전산 설계 바로가기': `<div style="font-size:13px;color:#5a3e2b;padding:8px 0;">준비 중입니다.</div>`,
  '보험회사 (모니터링) 연락처': `<div style="font-size:13px;color:#5a3e2b;padding:8px 0;">준비 중입니다.</div>`
};

/* ─── 렌더링 함수 ─── */
function renderMainBtns() {
  const row = document.getElementById('main-row');
  row.innerHTML = '';
  MAIN_KEYS.forEach(key => {
    const btn = document.createElement('button');
    btn.className = 'main-btn' + (state.main === key ? ' active' : '');
    btn.textContent = MENU_CONFIG[key].label;
    btn.onclick = () => selectMain(key);
    row.appendChild(btn);
  });
}

function selectMain(key) {
  state.main = key;
  const cfg = MENU_CONFIG[key];
  if (cfg.groups) {
    state.sub = cfg.default_group;
    renderSubBtns();
    document.getElementById('step2').classList.remove('hidden');
    const firstGroup = cfg.groups[state.sub];
    state.cat = firstGroup[0][1];
    renderCatBtns();
    document.getElementById('step3').classList.remove('hidden');
  } else {
    document.getElementById('step2').classList.add('hidden');
    document.getElementById('step3').classList.add('hidden');
    state.sub = key;
    state.cat = cfg.default_screen;
    renderCatBtnsFlat();
    document.getElementById('step2').classList.remove('hidden');
    document.getElementById('step3').classList.add('hidden');
  }
  renderMainBtns();
  renderContent();
}

function renderSubBtns() {
  const cfg = MENU_CONFIG[state.main];
  if (!cfg.groups) return;
  const row = document.getElementById('sub-row');
  row.innerHTML = '';
  Object.keys(cfg.groups).forEach(grp => {
    const btn = document.createElement('button');
    btn.className = 'sub-btn' + (state.sub === grp ? ' active' : '');
    btn.textContent = grp;
    btn.onclick = () => selectSub(grp);
    row.appendChild(btn);
  });
}

function selectSub(grp) {
  state.sub = grp;
  const cfg = MENU_CONFIG[state.main];
  const firstCat = cfg.groups[grp][0][1];
  state.cat = firstCat;
  renderSubBtns();
  renderCatBtns();
  document.getElementById('step3').classList.remove('hidden');
  renderContent();
}

function renderCatBtns() {
  const cfg = MENU_CONFIG[state.main];
  if (!cfg.groups) return;
  const screens = cfg.groups[state.sub];
  const row = document.getElementById('cat-row');
  row.innerHTML = '';
  screens.forEach(([_main, cat]) => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (state.cat === cat ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => selectCat(cat);
    row.appendChild(btn);
  });
}

function renderCatBtnsFlat() {
  const cfg = MENU_CONFIG[state.main];
  const screens = cfg.screens;
  const row = document.getElementById('sub-row');
  row.innerHTML = '';
  screens.forEach(([_main, cat]) => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (state.cat === cat ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => { state.cat = cat; renderCatBtnsFlat(); renderContent(); };
    row.appendChild(btn);
  });
}

function selectCat(cat) {
  state.cat = cat;
  renderCatBtns();
  renderContent();
}

function renderContent() {
  const cfg = MENU_CONFIG[state.main];
  let mainKey, catKey;
  if (cfg.groups) {
    const screens = cfg.groups[state.sub];
    const match = screens.find(s => s[1] === state.cat);
    mainKey = match ? match[0] : screens[0][0];
    catKey = state.cat;
  } else {
    const screens = cfg.screens;
    const match = screens.find(s => s[1] === state.cat);
    mainKey = match ? match[0] : screens[0][0];
    catKey = state.cat;
  }
  const contentKey = `${mainKey}|${catKey}`;
  const data = CONTENT_MAP[contentKey];

  document.getElementById('screen-chip').textContent = data ? data.pill : contentKey;
  document.getElementById('summary-badge').textContent = data ? data.summary_title : '요약';
  document.getElementById('summary-box').textContent = data ? data.summary_text : '내용 준비 중입니다.';
  if (data) {
    document.getElementById('summary-badge').style.color = data.summary_color;
    document.getElementById('summary-badge').style.background = data.summary_color + '22';
  }

  const wrap = document.getElementById('accordion-wrap');
  wrap.innerHTML = '';
  if (data && data.sections && data.sections.length) {
    data.sections.forEach((sec, i) => {
      const el = document.createElement('div');
      el.className = 'accordion-section';
      el.innerHTML = `
        <div class="accordion-header" onclick="toggleAcc(this)">
          <div>
            <div class="acc-title">${sec.title}</div>
            ${sec.subtitle ? `<div class="acc-sub">${sec.subtitle}</div>` : ''}
          </div>
          <div class="acc-arrow">${i === 0 ? '▲' : '▼'}</div>
        </div>
        <div class="accordion-body${i === 0 ? '' : ' closed'}">
          <div class="section-html">${sec.content_html || ''}</div>
          ${sec.tip ? `<div class="tip-box">${sec.tip}</div>` : ''}
        </div>`;
      wrap.appendChild(el);
    });
  } else {
    wrap.innerHTML = '<div style="padding:16px;font-size:13px;color:#9a7a62;">준비 중입니다.</div>';
  }

  logScriptUsage(state.main, state.sub, state.cat);
}

function toggleAcc(header) {
  const body = header.nextElementSibling;
  const arrow = header.querySelector('.acc-arrow');
  body.classList.toggle('closed');
  arrow.textContent = body.classList.contains('closed') ? '▼' : '▲';
}

/* ─── 사용자 정보 로드 ─── */
async function loadUserInfo() {
  const raw = localStorage.getItem('os_user') || sessionStorage.getItem('os_user');
  if (raw) {
    try {
      const u = JSON.parse(raw);
      window._userId = u.id;
    } catch(e) {}
  }
  window._userToken = localStorage.getItem('os_token') || sessionStorage.getItem('os_token') || '';
}



/* ─── 스크립트 클릭 로그 ─── */
async function logScriptUsage(main, sub, cat) {
  if (!window._userToken || !window._userId) return;
  try {
    await fetchWithAuth(`${SUPABASE_URL}/rest/v1/script_usage_logs`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ user_id: window._userId, script_main: main, script_screen: sub, script_title: cat })
    });
  } catch(e) { /* 로그 실패는 무시 */ }
}

/* ─── 나만의 스크립트 작성 ─── */
function goToMyScriptWriter() {
  if (window.parent && window.parent !== window) {
    window.parent.postMessage({ action: 'navigate', page: 'myspace' }, '*');
  } else {
    window.location.href = 'myspace.html';
  }
}

/* ─── 초기화 ─── */
window.addEventListener('DOMContentLoaded', async () => {
  await loadUserInfo();
  renderMainBtns();
  selectMain('도입인사');
});
</script>
