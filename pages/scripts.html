<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
:root {
  --brown-dark:#3d2b1f; --brown-mid:#6b4226; --brown-light:#a0724a;
  --brown-pale:#f5ede4; --cream:#f7f2ec; --accent:#c8753a;
  --text-dark:#1a1008; --text-mid:#5a3e2b; --text-light:#9a7a62;
  --line:#ddc8b4;
}
* { box-sizing:border-box; margin:0; padding:0; }
.sc-tab-bar {
  display:flex; align-items:center; gap:6px; flex-wrap:wrap;
  padding:8px 14px 7px; border-bottom:1px solid var(--line); background:#faf8f5;
}
.sc-tab {
  height:32px; padding:0 14px; border:1px solid #d5bda8; border-radius:11px;
  background:#fffaf4; color:#5d4533; font-family:'Noto Sans KR',sans-serif;
  font-size:0.68em; font-weight:700; cursor:pointer; white-space:nowrap; transition:all .15s;
}
.sc-tab:hover { background:#f3e4d6; }
.sc-tab.active { background:var(--brown-dark); color:#fff; border-color:var(--brown-dark); }
.sc-sub-bar {
  display:none; align-items:center; gap:6px; flex-wrap:wrap;
  padding:6px 14px; border-bottom:1px solid var(--line); background:#f3ebe3;
}
.sc-sub-bar.visible { display:flex; }
.sc-sub {
  height:28px; padding:0 12px; border-radius:14px;
  border:1px solid #d5bda8; background:#fffaf4; color:#5d4533;
  font-family:'Noto Sans KR',sans-serif; font-size:0.63em; font-weight:700;
  cursor:pointer; white-space:nowrap; transition:all .15s;
}
.sc-sub:hover { background:#f3e4d6; }
.sc-sub.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.sc-content { padding:12px 14px; background:#f3eee8; }
.sc-chip {
  display:inline-block; padding:4px 10px; border-radius:999px;
  background:#f5e7c9; color:#8a5a18; font-size:0.61em; font-weight:800; margin-bottom:10px;
}
.sc-grid { display:grid; grid-template-columns:300px minmax(0,1fr); gap:12px; }
.sc-left { display:flex; flex-direction:column; gap:12px; }
.sc-summary-card { background:#fff; border:1px solid #dbc8b5; border-radius:14px; padding:14px; }
.sc-summary-label { font-size:0.61em; font-weight:800; color:#9b7f68; margin-bottom:8px; }
.sc-summary-badge {
  display:inline-block; padding:6px 12px; border-radius:16px;
  font-size:0.61em; font-weight:800; background:#e8e7fb; color:#4155c7; margin-bottom:10px;
}
.sc-summary-box {
  background:#f7f2ec; border-left:3px solid #d07f45; border-radius:8px;
  padding:12px; font-size:0.68em; line-height:1.85; color:#3b2d21; white-space:pre-line;
}
.sc-accordion { background:#fff; border:1px solid #dbc8b5; border-radius:14px; overflow:hidden; margin-bottom:8px; }
.sc-acc-header {
  background:#f4ece4; padding:10px 14px;
  display:flex; align-items:center; justify-content:space-between;
  cursor:pointer; border-bottom:1px solid #e5d4c4;
}
.sc-acc-title { font-size:0.72em; font-weight:900; color:#2d2016; }
.sc-acc-sub { font-size:0.61em; color:#a18369; margin-top:2px; }
.sc-acc-arrow { font-size:0.61em; color:#9b7f68; flex-shrink:0; }
.sc-acc-body { padding:14px; background:#fff; }
.sc-acc-body.closed { display:none; }
.sc-html { font-size:0.78em; color:#2a2018; line-height:1.9; }
.sc-html div, .sc-html p { max-width:100%; }
.sc-bottom-bar {
  margin-top:12px; background:var(--brown-dark); color:#fff6ef;
  text-align:center; font-size:0.68em; font-weight:800; padding:10px 14px; border-radius:8px;
}
.sc-loading { padding:40px; text-align:center; color:var(--text-light); font-size:0.8em; }
.sc-empty { padding:30px; text-align:center; color:var(--text-light); font-size:0.75em; }
@media (max-width:900px) { .sc-grid { grid-template-columns:1fr; } }
.page-scale-root { font-size:calc(1em * var(--page-scale, 1)); }
</style>

<div class="page-scale-root">
<div class="sc-tab-bar">
  <button class="sc-tab active" data-stages="opening,opening_rejection" onclick="selectTab(this)">📞 도입인사</button>
  <button class="sc-tab" data-stages="need_emphasis,need_emphasis_2" onclick="selectTab(this)">🔥 필요성강조</button>
  <button class="sc-tab" data-stages="situation_check" onclick="selectTab(this)">🔎 상황확인</button>
  <button class="sc-tab" data-stages="analysis" onclick="selectTab(this)">📊 보장분석</button>
  <button class="sc-tab" data-stages="product" onclick="selectTab(this)">📦 상품설명</button>
  <button class="sc-tab" data-stages="closing,closing_second" onclick="selectTab(this)">✅ 클로징</button>
  <button class="sc-tab" data-stages="objection" onclick="selectTab(this)">⚡ 반론대응</button>
</div>
<div class="sc-sub-bar" id="sc-sub-bar"></div>
<div class="sc-content">
  <div class="sc-chip" id="sc-chip"></div>
  <div class="sc-grid">
    <div class="sc-left">
      <div class="sc-summary-card">
        <div class="sc-summary-label">카드 요약</div>
        <div class="sc-summary-badge" id="sc-badge">요약</div>
        <div class="sc-summary-box" id="sc-summary">스크립트를 선택하세요.</div>
      </div>
    </div>
    <div id="sc-right"><div class="sc-loading">로딩 중...</div></div>
  </div>
  <div class="sc-bottom-bar">- 지금 멈추지 마세요. 한 문장이 전체 흐름을 바꿉니다 -</div>
</div>
</div>

<script>
// SUPABASE_URL, SUPABASE_KEY는 app.html에 이미 선언됨
const _cache = {};
let _scripts = [], _currentIdx = 0;

async function _fetchScripts(stages) {
  const key = stages.join(',');
  if (_cache[key]) return _cache[key];
  const stageList = stages.join(',');
  const url = SUPABASE_URL + '/rest/v1/scripts?stage=in.(' + stageList + ')&order=stage,title&select=id,title,stage,top_category,highlight_text,script_text';
  try {
    const res = await fetch(url, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + (window._userToken || SUPABASE_KEY)
      }
    });
    if (!res.ok) {
      document.getElementById('sc-summary').textContent = 'HTTP ' + res.status;
      return [];
    }
    const data = await res.json();
    _cache[key] = data;
    return data;
  } catch(e) {
    document.getElementById('sc-summary').textContent = '로드 실패: ' + e.message;
    return [];
  }
}

window.selectTab = async function(btn) {
  document.querySelectorAll('.sc-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const stages = btn.dataset.stages.split(',');
  document.getElementById('sc-sub-bar').innerHTML = '';
  document.getElementById('sc-sub-bar').classList.remove('visible');
  document.getElementById('sc-right').innerHTML = '<div class="sc-loading">불러오는 중...</div>';
  document.getElementById('sc-chip').textContent = '';
  document.getElementById('sc-summary').textContent = '스크립트를 선택하세요.';
  const scripts = await _fetchScripts(stages);
  _scripts = scripts;
  if (!scripts.length) {
    document.getElementById('sc-right').innerHTML = '<div class="sc-empty">스크립트가 없습니다.</div>';
    return;
  }
  const bar = document.getElementById('sc-sub-bar');
  bar.innerHTML = scripts.map(function(s, i) {
    return '<button class="sc-sub' + (i===0?' active':'') + '" onclick="window.selectScript(' + i + ')">' + s.title + '</button>';
  }).join('');
  bar.classList.add('visible');
  window.selectScript(0);
};

window.selectScript = function(idx) {
  _currentIdx = idx;
  const s = _scripts[idx];
  if (!s) return;
  document.querySelectorAll('.sc-sub').forEach(function(b, i) { b.classList.toggle('active', i === idx); });
  document.getElementById('sc-chip').textContent = s.title;
  document.getElementById('sc-badge').textContent = s.top_category || s.title;
  document.getElementById('sc-summary').textContent = s.highlight_text || '상담 중 바로 활용하세요.';
  const right = document.getElementById('sc-right');
  if (s.script_text) {
    right.innerHTML =
      '<div class="sc-accordion">' +
        '<div class="sc-acc-header" onclick="window.toggleAcc(this)">' +
          '<div>' +
            '<div class="sc-acc-title">' + s.title + '</div>' +
            '<div class="sc-acc-sub">' + (s.top_category || '') + '</div>' +
          '</div>' +
          '<div class="sc-acc-arrow">▲</div>' +
        '</div>' +
        '<div class="sc-acc-body"><div class="sc-html">' + s.script_text + '</div></div>' +
      '</div>';
  } else {
    right.innerHTML = '<div class="sc-empty">스크립트 내용이 없습니다.</div>';
  }
};

window.toggleAcc = function(header) {
  const body = header.nextElementSibling;
  body.classList.toggle('closed');
  header.querySelector('.sc-acc-arrow').textContent = body.classList.contains('closed') ? '▼' : '▲';
};

(function init() {
  setTimeout(function() {
    var firstTab = document.querySelector('.sc-tab');
    if (firstTab) window.selectTab(firstTab);
  }, 100);
})();
</script>
