var _state = {
  activeStage: 1,        /* 현재 단계 (1~10) */
  activeScript: -1,      /* 선택된 스크립트 인덱스 */
  activeBlock: -1,       /* 선택된 블록 인덱스 */
  step: 1                /* STEP 1/2/3 (열 확장 단계) */
};

/* 모바일 상태 */
var _mState = {
  step: 1,               /* 1: 단계 / 2: 스크립트 / 3: 블록 / 4: 본문 */
  stage: 0,
  scIdx: -1,
  blIdx: -1
};

/* 10단계 GROUPS (확정 사양) */
/* label: 탭바 표시용 — 공백 포함해서 좁은 화면에서 자동 2줄 줄바꿈 / labelFull: 열1·모바일용 긴 라벨 */
var GROUPS = [
  { color: 1,  icon: '📞', label: '도입 인사',   labelFull: '도입인사',      stage: 'opening' },
  { color: 2,  icon: '💬', label: '도입 반론',   labelFull: '도입반론',      stage: 'opening_rejection' },
  { color: 3,  icon: '🔥', label: '필요성 ①',    labelFull: '필요성 강조 1', stage: 'need_emphasis' },
  { color: 4,  icon: '🔎', label: '상황 확인',   labelFull: '상황 확인',     stage: 'situation_check' },
  { color: 5,  icon: '📊', label: '보장 분석',   labelFull: '보장 분석',     stage: 'analysis' },
  { color: 6,  icon: '📦', label: '상품 설명',   labelFull: '상품 설명',     stage: 'product' },
  { color: 7,  icon: '🔥', label: '필요성 ②',    labelFull: '필요성 강조 2', stage: 'need_emphasis_2' },
  { color: 8,  icon: '✅', label: '클로징',      labelFull: '클로징',        stage: 'closing' },
  { color: 9,  icon: '⚡', label: '반론 대응',   labelFull: '반론 대응',     stage: 'objection' },
  { color: 10, icon: '🔚', label: '2차 클로징', labelFull: '2차 클로징',    stage: 'closing_second' }
];
window._SC_GROUPS = GROUPS;

/* ════════════════════════════════════════════════════════════════
   유틸리티
   ▸ 2026-04-29 v2 승격: --stg-* 단계 팔레트 + applyStageVars/scGv 제거
     (단색 brand 시스템으로 통일, CSS가 직접 var(--brand-500/50) 참조)
═══════════════════════════════════════════════════════════════════ */

/* Supabase fetch (단일 stage) */
window.scFetch = async function(stage) {
  if (_cache[stage]) return _cache[stage];
  var path = '/rest/v1/scripts?stage=eq.' + encodeURIComponent(stage) +
             '&is_active=eq.true&order=sort_order.asc,title.asc' +
             '&select=id,title,stage,top_category,highlight_text,script_text';
  try {
    var res = await window.db.fetch(path);
    if (!res.ok) return [];
    var data = await res.json();
    _cache[stage] = data;
    return data;
  } catch (e) {
    return [];
  }
};

/* 스크립트 HTML에서 블록 파싱 */
window.scParseBlocks = function(html) {
  if (!html) return [];
  var tmp = document.createElement('div');
  tmp.innerHTML = html;
  var blocks = [];
  tmp.querySelectorAll('div[style*="border:1.5px solid #DCDCDC"]').forEach(function(el) {
    var rows = el.querySelectorAll('div[style*="font-size:13px"][style*="font-weight:700"]');
    var title = rows[0] ? rows[0].textContent.trim() : '';
    var sub   = rows[1] ? rows[1].textContent.trim() : '';
    if (title) blocks.push({ title: title, sub: sub, html: el.outerHTML });
  });
  if (!blocks.length) blocks.push({ title: '전체 스크립트', sub: '', html: html });
  return blocks;
};

/* ════════════════════════════════════════════════════════════════
   세로 탭바 렌더링 & 제어 (v2 — sc-vtab-*)
═══════════════════════════════════════════════════════════════════ */

function renderTabs() {
  var wrap = document.getElementById('sc-vtab-wrap');
  if (!wrap) return;
  wrap.innerHTML = GROUPS.map(function(g) {
    /* count는 prefetch 후 updateTabCounts()에서 갱신 */
    return '<div class="sc-vtab-item" data-color="' + g.color + '" ' +
           'role="button" tabindex="0" ' +
           'onclick="window.scSelectStage(' + g.color + ')" ' +
           'onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();window.scSelectStage(' + g.color + ');}">' +
           '<span class="sc-vtab-label">' + g.labelFull + '</span>' +
           '<span class="sc-vtab-count" data-count-color="' + g.color + '">-</span>' +
           '</div>';
  }).join('');
}

/* prefetch 완료 후 각 vtab의 count 갱신 */
function updateTabCounts() {
  GROUPS.forEach(function(g) {
    var el = document.querySelector('.sc-vtab-count[data-count-color="' + g.color + '"]');
    if (!el) return;
    var scripts = _cache['group_' + g.color] || [];
    el.textContent = scripts.length;
  });
}

function updateActiveTab(color) {
  document.querySelectorAll('.sc-vtab-item').forEach(function(x) {
    x.classList.toggle('active', parseInt(x.dataset.color) === color);
  });
}

/* ════════════════════════════════════════════════════════════════
   3열 그리드 렌더링 (v2: col-1 제거, col-2/3/4만)
═══════════════════════════════════════════════════════════════════ */

/* STEP 상태에 따라 클래스 & 열 활성/흐림 전환 */
function applyStepState() {
  var grid = document.getElementById('sc-grid');
  if (!grid) return;
  grid.classList.remove('step-2', 'step-3');
  if (_state.step === 2) grid.classList.add('step-2');
  if (_state.step === 3) grid.classList.add('step-3');

  var col2 = document.getElementById('sc-col-2');
  var col3 = document.getElementById('sc-col-3');
  var col4 = document.getElementById('sc-col-4');

  [col2, col3, col4].forEach(function(c) {
    if (c) c.classList.remove('now', 'dim', 'done');
  });

  if (_state.step === 1) {
    if (col2) col2.classList.add('now');
    if (col3) col3.classList.add('dim');
    if (col4) col4.classList.add('dim');
  } else if (_state.step === 2) {
    if (col2) col2.classList.add('done');
    if (col3) col3.classList.add('now');
    if (col4) col4.classList.add('dim');
  } else if (_state.step === 3) {
    if (col2) col2.classList.add('done');
    if (col3) col3.classList.add('done');
    if (col4) col4.classList.add('now');
  }
}

/* 열 2: 스크립트 목록 */
function renderCol2(scripts) {
  var col2 = document.getElementById('sc-col-2');
  if (!col2) return;
  if (!scripts.length) {
    col2.innerHTML = '<div class="sc-empty">이 단계에는<br>등록된 스크립트가 없습니다</div>';
    return;
  }
  col2.innerHTML = '<div class="sc-list">' +
    scripts.map(function(sc, i) {
      var sub = (sc.highlight_text || '').replace(/<[^>]+>/g, '').slice(0, 40);
      return '<div class="sc-list-item" data-idx="' + i + '" ' +
             'onclick="window.scSelectScript(' + i + ')">' +
             '<div class="sc-list-title">' + sc.title + '</div>' +
             (sub ? '<div class="sc-list-sub">' + sub + '</div>' : '') +
             '</div>';
    }).join('') + '</div>';
}

/* 열 3: 블록 목록 */
function renderCol3(blocks) {
  var col3 = document.getElementById('sc-col-3');
  if (!col3) return;
  if (!blocks || !blocks.length) {
    col3.innerHTML = '<div class="sc-empty">← 스크립트 선택</div>';
    return;
  }
  var numLabels = ['①','②','③','④','⑤','⑥','⑦','⑧'];
  col3.innerHTML = '<div class="sc-list">' +
    blocks.map(function(bl, i) {
      var numMatch   = bl.title.match(/^[①②③④⑤⑥⑦⑧]/);
      var num        = numMatch ? numMatch[0] : (numLabels[i] || (i + 1) + '');
      var cleanTitle = bl.title.replace(/^[①②③④⑤⑥⑦⑧]\s*/, '');
      var sub        = (bl.sub || '').slice(0, 30);
      return '<div class="sc-list-item" data-idx="' + i + '" ' +
             'onclick="window.scSelectBlock(' + i + ')">' +
             '<span class="sc-num">' + num + '</span>' +
             '<div class="sc-list-title">' + cleanTitle + '</div>' +
             (sub ? '<div class="sc-list-sub">' + sub + '</div>' : '') +
             '</div>';
    }).join('') + '</div>';
}

/* 열 4: 상세 본문 */
function renderCol4(sc, bl) {
  var col4 = document.getElementById('sc-col-4');
  if (!col4) return;
  if (!bl) {
    col4.innerHTML = '<div class="sc-empty">← 세부 항목 선택</div>';
    return;
  }
  var tipText = sc && sc.highlight_text
    ? sc.highlight_text
    : '<strong>현장 팁:</strong> 문장 하나가 흐름을 바꿉니다. 고객 반응에 맞춰 속도 조절하세요.';

  col4.innerHTML =
    '<div class="sc-detail">' +
      '<div class="sc-detail-tag">' + (sc ? sc.title : '') + '</div>' +
      '<div class="sc-detail-title">' + bl.title + '</div>' +
      (bl.sub ? '<div class="sc-detail-sub">' + bl.sub + '</div>' : '') +
      '<div class="sc-detail-body"><div class="sc-html">' + bl.html + '</div></div>' +
      '<div class="sc-tip">' + tipText + '</div>' +
    '</div>';
}

/* 활성 리스트 아이템 표시 */
function markActiveItem(colEl, idx) {
  if (!colEl) return;
  colEl.querySelectorAll('.sc-list-item').forEach(function(x) {
    x.classList.toggle('active', parseInt(x.dataset.idx) === idx);
  });
}

/* ════════════════════════════════════════════════════════════════
   사용자 인터랙션
═══════════════════════════════════════════════════════════════════ */

/* 단계 선택 (세로 탭 클릭) */
window.scSelectStage = async function(color) {
  if (color < 1 || color > 10) return;
  _state.activeStage = color;
  _state.activeScript = -1;
  _state.activeBlock = -1;
  _state.step = 1;

  updateActiveTab(color);

  var g = GROUPS[color - 1];
  var col2 = document.getElementById('sc-col-2');
  if (col2) col2.innerHTML = '<div class="sc-loading">불러오는 중...</div>';

  var scripts = await window.scFetch(g.stage);
  _cache['group_' + color] = scripts;

  /* count 갱신 (해당 vtab만) */
  var countEl = document.querySelector('.sc-vtab-count[data-count-color="' + color + '"]');
  if (countEl) countEl.textContent = scripts.length;

  renderCol2(scripts);
  renderCol3([]);
  renderCol4(null, null);
  applyStepState();
  /* 자동 선택 제거: 사용자가 직접 스크립트를 클릭해야 STEP 2로 전환됨 */
};

/* 스크립트 선택 */
window.scSelectScript = function(idx) {
  var color = _state.activeStage;
  var scripts = _cache['group_' + color] || [];
  var sc = scripts[idx];
  if (!sc) return;

  _state.activeScript = idx;
  _state.activeBlock = -1;
  _state.step = 2;

  /* activity_log */
  var userId = window.AppState && window.AppState.userId;
  if (userId) {
    window.db.fetch('/rest/v1/activity_logs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({
        user_id: userId,
        event_type: 'script_view',
        target_type: 'script',
        target_id: String(sc.id)
      })
    }).catch(function() {});
  }

  var blocks = window.scParseBlocks(sc.script_text);
  _cache['blocks_' + color] = blocks;
  _cache['cursc_'  + color] = sc;

  markActiveItem(document.getElementById('sc-col-2'), idx);
  renderCol3(blocks);
  renderCol4(null, null);
  applyStepState();
  /* 자동 선택 제거: 사용자가 직접 블록을 클릭해야 STEP 3로 전환됨 */
};

/* 블록 선택 */
window.scSelectBlock = function(idx) {
  var color  = _state.activeStage;
  var blocks = _cache['blocks_' + color] || [];
  var sc     = _cache['cursc_'  + color];
  var bl     = blocks[idx];
  if (!bl) return;

  _state.activeBlock = idx;
  _state.step = 3;

  markActiveItem(document.getElementById('sc-col-3'), idx);
  renderCol4(sc, bl);
  applyStepState();
};

/* ════════════════════════════════════════════════════════════════
   모바일 렌더링
═══════════════════════════════════════════════════════════════════ */

function mLabel(color) {
  var g = GROUPS[color - 1];
  return g ? g.labelFull : '';
}

function mRenderHeader(step, color) {
  var stepNames = ['', '단계 선택', '스크립트 선택', '세부 항목 선택', '스크립트 본문'];
  var showBack = step > 1;
  var title = step === 1
    ? '스크립트 단계 선택'
    : mLabel(color) + ' · ' + stepNames[step];
  return '<div class="sc-m-header">' +
    (showBack ? '<button class="sc-m-back" onclick="window.scMBack()">◀</button>' : '') +
    '<div class="sc-m-title">' + title + '</div>' +
    '<div class="sc-m-step-count">' + step + ' / 4</div>' +
  '</div>';
}

/* STEP 1: 10단계 2열 그리드 (v2 — brand 단색 통일, 인라인 색상 주입 제거) */
function mRenderStep1() {
  var html = mRenderHeader(1, 0) + '<div class="sc-m-stage-grid">';
  GROUPS.forEach(function(g) {
    var scripts = _cache['group_' + g.color] || [];
    html +=
      '<div class="sc-m-stage-card" onclick="window.scMStep2(' + g.color + ')">' +
        '<div class="sc-m-stage-card-icon">' + g.icon + '</div>' +
        '<div class="sc-m-stage-card-info">' +
          '<div class="sc-m-stage-card-name">' + g.labelFull + '</div>' +
          '<div class="sc-m-stage-card-cnt">' + scripts.length + '개</div>' +
        '</div>' +
      '</div>';
  });
  html += '</div>';
  return html;
}

/* STEP 2: 스크립트 목록 */
function mRenderStep2(color) {
  var scripts = _cache['group_' + color] || [];
  var html = mRenderHeader(2, color);
  if (scripts.length) {
    html += '<div>';
    scripts.forEach(function(sc, i) {
      var sub = (sc.highlight_text || '').replace(/<[^>]+>/g, '').slice(0, 40);
      html +=
        '<div class="sc-m-list-item" onclick="window.scMStep3(' + color + ',' + i + ')">' +
          '<div class="sc-m-item-title">' + sc.title + '</div>' +
          (sub ? '<div class="sc-m-item-sub">' + sub + '</div>' : '') +
        '</div>';
    });
    html += '</div>';
  } else {
    html += '<div class="sc-empty">이 단계에는<br>등록된 스크립트가 없습니다</div>';
  }
  return html;
}

/* STEP 3: 블록 목록 */
function mRenderStep3(color, scIdx) {
  var scripts = _cache['group_' + color] || [];
  var sc = scripts[scIdx];
  if (!sc) return mRenderStep2(color);
  var blocks = window.scParseBlocks(sc.script_text);
  _cache['blocks_m_' + color] = blocks;
  _cache['cursc_m_'  + color] = sc;
  var numLabels = ['①','②','③','④','⑤','⑥','⑦','⑧'];
  var html = mRenderHeader(3, color) + '<div>';
  blocks.forEach(function(bl, i) {
    var numMatch   = bl.title.match(/^[①②③④⑤⑥⑦⑧]/);
    var num        = numMatch ? numMatch[0] : (numLabels[i] || (i + 1) + '');
    var cleanTitle = bl.title.replace(/^[①②③④⑤⑥⑦⑧]\s*/, '');
    var sub        = (bl.sub || '').slice(0, 30);
    html +=
      '<div class="sc-m-list-item" onclick="window.scMStep4(' + color + ',' + i + ')">' +
        '<span class="sc-m-item-num">' + num + '</span>' +
        '<div class="sc-m-item-title">' + cleanTitle + '</div>' +
        (sub ? '<div class="sc-m-item-sub">' + sub + '</div>' : '') +
      '</div>';
  });
  html += '</div>';
  return html;
}

/* STEP 4: 본문 + 현장 팁 */
function mRenderStep4(color, blIdx) {
  var blocks = _cache['blocks_m_' + color] || [];
  var sc     = _cache['cursc_m_'  + color];
  var bl     = blocks[blIdx];
  if (!bl) return mRenderStep3(color, _mState.scIdx);
  var tipText = sc && sc.highlight_text
    ? sc.highlight_text
    : '<strong>현장 팁:</strong> 문장 하나가 흐름을 바꿉니다.';
  // bl.html(outerHTML)에 타이틀/sub가 이미 포함되어 있어 바깥 title/sub 제거 (중복 방지)
  return mRenderHeader(4, color) +
    '<div class="sc-m-detail">' +
      '<div class="sc-m-detail-tag">' + (sc ? sc.title : '') + '</div>' +
      '<div class="sc-m-detail-body"><div class="sc-html">' + bl.html + '</div></div>' +
      '<div class="sc-tip" style="margin-top:var(--space-3);">' + tipText + '</div>' +
    '</div>';
}

/* 모바일 네비게이션 (v2 — 단색 brand 통일, mApplyStageVars 호출 제거) */
window.scMStep2 = async function(color) {
  _mState.step = 2; _mState.stage = color;
  var m = document.getElementById('sc-mobile');
  if (m) m.innerHTML = '<div class="sc-loading">불러오는 중...</div>';
  var scripts = await window.scFetch(GROUPS[color - 1].stage);
  _cache['group_' + color] = scripts;
  if (m) m.innerHTML = mRenderStep2(color);
};

window.scMStep3 = function(color, scIdx) {
  _mState.step = 3; _mState.scIdx = scIdx;
  var m = document.getElementById('sc-mobile');
  if (m) m.innerHTML = mRenderStep3(color, scIdx);
};

window.scMStep4 = function(color, blIdx) {
  _mState.step = 4; _mState.blIdx = blIdx;
  var m = document.getElementById('sc-mobile');
  if (m) m.innerHTML = mRenderStep4(color, blIdx);

  /* activity_log */
  var sc = _cache['cursc_m_' + color];
  var userId = window.AppState && window.AppState.userId;
  if (userId && sc) {
    window.db.fetch('/rest/v1/activity_logs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({
        user_id: userId,
        event_type: 'script_view',
        target_type: 'script',
        target_id: String(sc.id)
      })
    }).catch(function() {});
  }
};

window.scMBack = function() {
  var m = document.getElementById('sc-mobile');
  if (!m) return;
  if (_mState.step === 2) {
    _mState.step = 1;
    m.innerHTML = mRenderStep1();
  } else if (_mState.step === 3) {
    _mState.step = 2;
    m.innerHTML = mRenderStep2(_mState.stage);
  } else if (_mState.step === 4) {
    _mState.step = 3;
    m.innerHTML = mRenderStep3(_mState.stage, _mState.scIdx);
  }
};

/* ════════════════════════════════════════════════════════════════
   전체 부트
═══════════════════════════════════════════════════════════════════ */

window.scRenderAll = async function() {
  var body = document.getElementById('page-scripts');
  if (!body) return;

  /* 1. 세로 탭바 렌더 (count는 - placeholder) */
  renderTabs();

  /* 2. 모든 단계 스크립트 병렬 pre-fetch (vtab count + 모바일 카운트 표시용) */
  await Promise.all(GROUPS.map(function(g) {
    return window.scFetch(g.stage).then(function(scripts) {
      _cache['group_' + g.color] = scripts;
    });
  }));

  /* 2-1. prefetch 완료 → 모든 vtab count 갱신 */
  updateTabCounts();

  /* 3. 첫 단계 데스크탑 활성화 — 스크립트 목록까지만 표시 (STEP 1) */
  await window.scSelectStage(1);

  /* 4. 모바일 초기 렌더 */
  var mobile = document.getElementById('sc-mobile');
  if (mobile) mobile.innerHTML = mRenderStep1();

  /* 5. 검색에서 넘어온 경우 처리 */
  if (window._pendingScript) {
    var ps = window._pendingScript;
    window._pendingScript = null;
    var targetColor = ps.color;
    var targetTitle = ps.title;
    if (targetColor) {
      await window.scSelectStage(targetColor);
      var groupScripts = _cache['group_' + targetColor] || [];
      var matchIdx = -1;
      for (var i = 0; i < groupScripts.length; i++) {
        if (groupScripts[i].title === targetTitle) { matchIdx = i; break; }
      }
      if (matchIdx >= 0) {
        window.scSelectScript(matchIdx);
      } else if (groupScripts.length) {
        window.scSelectScript(0);
      }
    }
  }
};

/* ── 초기화: AppState 패턴 ── */
function _boot() {
  window.scRenderAll();
}

if (window.AppState && window.AppState.ready) {
  _boot();
} else {
  document.addEventListener('appstate:ready', function() { _boot(); }, { once: true });
}

})();
</script>
