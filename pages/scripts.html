<style>
/* ══════════════════════════════════════════════════════════════════
   scripts.html — 시선 유도형 4열 동적 확장 레이아웃
   10단계 상담 흐름 × STEP별 열 너비 애니메이션
   ──────────────────────────────────────────────────────────────────
   v1.0.1 — 2026.04.18
   - 탭바 자동 줄바꿈 수정 (.sc-tab-btn flex: 1 1 0)
   - 상품설명 정렬 기준 변경 (sort_order 우선)
════════════════════════════════════════════════════════════════════ */

:root {
  /* 10단계 웜브라운 그라데이션 (밝음→어두움) */
  --stg-1-fg:  #D4845A;  --stg-1-bg:  #FBEEE5;   /* 도입인사 */
  --stg-2-fg:  #B5673E;  --stg-2-bg:  #F5E4D5;   /* 도입반론 */
  --stg-3-fg:  #A0522D;  --stg-3-bg:  #F0D9C2;   /* 필요성1 */
  --stg-4-fg:  #8B4513;  --stg-4-bg:  #E8CDB0;   /* 상황확인 */
  --stg-5-fg:  #7B3F1E;  --stg-5-bg:  #E0C29A;   /* 보장분석 */
  --stg-6-fg:  #6B3410;  --stg-6-bg:  #D4B088;   /* 상품설명 */
  --stg-7-fg:  #A0522D;  --stg-7-bg:  #F0D9C2;   /* 필요성2 */
  --stg-8-fg:  #5C2A0A;  --stg-8-bg:  #C89E76;   /* 클로징 */
  --stg-9-fg:  #4A2108;  --stg-9-bg:  #B88C64;   /* 반론대응 */
  --stg-10-fg: #3D1A05;  --stg-10-bg: #A87A52;   /* 2차 클로징 */
}

/* ── 최상위 래퍼 ───────────────────────────────────────────────── */
.sc-outer {
  display: flex; flex-direction: column; width: 100%;
  gap: var(--space-2);
}

/* ── 탭바 (10개 균등 분할) ─────────────────────────────────────── */
.sc-tab-wrap {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  overflow: visible;  /* 양각 그림자 표시용 */
  flex-shrink: 0;
  padding-bottom: 2px;  /* 하단 그림자 공간 */
}
.sc-tab-bar {
  display: flex; width: 100%;
  border-top: 1px solid rgba(200,117,58,0.15);
  padding-top: 4px;
}
.sc-tab-btn {
  flex: 1 1 0; min-width: 0;
  padding: var(--space-3) var(--space-1);
  margin: 4px 2px 0;  /* 양각 그림자 공간 확보 */
  border: none;
  background: var(--color-surface);
  border-radius: var(--radius-sm) var(--radius-sm) 0 0;
  display: flex; align-items: center; justify-content: center;
  font-family: inherit; cursor: pointer;
  border-bottom: 3px solid transparent;
  /* 기본 양각 (약) */
  box-shadow: 0 2px 4px rgba(101, 66, 38, 0.08),
              0 1px 2px rgba(101, 66, 38, 0.06);
  transform: translateY(0);
  transition: all var(--transition-fast);
}
.sc-tab-label {
  font-size: 0.8947em;  /* ≈17px 고정 — 좁은 화면에선 자동 2줄로 줄바꿈 */
  font-weight: var(--fw-semibold);
  color: var(--color-text-secondary);
  letter-spacing: -0.3px;
  line-height: 1.25;
  text-align: center;
  white-space: normal;        /* flex 자식 강제 줄바꿈 허용 (핵심) */
  word-break: keep-all;       /* 한국어 단어 단위 줄바꿈 */
  overflow-wrap: break-word;  /* 공백 기준 줄바꿈 보강 */
  min-width: 0;               /* flex 자식 줄바꿈 허용 */
  width: 100%;                /* 부모 너비 100% 써서 줄바꿈 트리거 */
  transition: color var(--transition-fast),
              font-weight var(--transition-fast),
              font-size var(--transition-fast);
}
.sc-tab-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 8px rgba(101, 66, 38, 0.12),
              0 2px 4px rgba(101, 66, 38, 0.08);
}
.sc-tab-btn:hover .sc-tab-label { color: var(--color-text-primary); }
.sc-tab-btn.active {
  border-bottom-color: var(--stg-fg, var(--color-accent));
  background: var(--stg-bg-soft, var(--color-surface));
  /* 활성 양각 (약) — 1px 위로 */
  transform: translateY(-1px);
  box-shadow: 0 6px 14px rgba(101, 66, 38, 0.18),
              0 3px 6px rgba(101, 66, 38, 0.10);
  z-index: 2;
}
.sc-tab-btn.active .sc-tab-label {
  color: var(--stg-fg, var(--color-brand));
  font-weight: var(--fw-black);
  font-size: 0.9474em;   /* ≈18px — active 시 1px 키움 */
}

/* ── 4열 동적 확장 그리드 ──────────────────────────────────────── */
.sc-grid-wrap {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  overflow: visible;  /* 양각 그림자 표시용 */
  flex-shrink: 0;
  padding: 2px;  /* 그림자 공간 */
}
.sc-grid {
  display: grid;
  /* STEP 1: 스크립트 고르는 중 — 열2 최대 확장 */
  grid-template-columns: 130px 3.5fr 1.5fr 2.5fr;
  transition: grid-template-columns 0.35s ease;
  min-height: 460px;
}
/* STEP 2: 블록 고르는 중 — 열3 최대 확장 */
.sc-grid.step-2 {
  grid-template-columns: 130px 1.2fr 3.5fr 2.8fr;
}
/* STEP 3: 본문 읽는 중 — 열4 최대 확장 */
.sc-grid.step-3 {
  grid-template-columns: 130px 0.8fr 1.0fr 5.0fr;
}

.sc-col {
  border-right: 1px solid var(--color-border);
  overflow: visible;  /* 양각 그림자 표시용 */
  transition: opacity 0.25s ease;
  display: flex; flex-direction: column;
}
.sc-col:last-child { border-right: none; }

/* 활성/흐림 상태 */
.sc-col.dim  { opacity: 0.55; }
.sc-col.now  { opacity: 1; background: #FFFBF5; }
.sc-col.done { opacity: 0.85; }

/* ── 열 1: 현재 단계 표시 ──────────────────────────────────────── */
.sc-col-1 {
  background: var(--color-surface);
  padding: var(--space-3) var(--space-2);
  overflow: visible;  /* 양각 그림자 표시용 */
}
.sc-stage-cell {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: var(--space-4) var(--space-2);
  gap: var(--space-2);
  min-height: 120px;
  background: var(--stg-bg, var(--color-surface-2));
  border-left: 4px solid var(--stg-fg, var(--color-accent));
  border-radius: var(--radius-sm);
  text-align: center;
  /* 활성 양각 (약) — 1px 위로 */
  box-shadow: 0 6px 14px rgba(101, 66, 38, 0.18),
              0 3px 6px rgba(101, 66, 38, 0.10);
  transform: translateY(-1px);
}
.sc-stage-icon { font-size: 1.6em; line-height: 1; }
.sc-stage-name {
  font-size: var(--text-body);
  font-weight: var(--fw-black);
  color: var(--stg-fg, var(--color-text-primary));
  white-space: nowrap;
  display: block;
  letter-spacing: -0.3px;
}
.sc-stage-count {
  font-size: var(--text-xs);
  font-weight: var(--fw-bold);
  padding: 2px 8px;
  border-radius: var(--radius-full);
  background: var(--stg-fg, var(--color-brand));
  color: #fff;
}

/* ── 열 2·3 공통 리스트 ───────────────────────────────────────── */
.sc-list {
  display: flex; flex-direction: column;
  padding: var(--space-2);
  gap: var(--space-2);
}
.sc-list-item {
  padding: var(--space-3) var(--space-4);
  border-radius: var(--radius-sm);
  border-left: 3px solid transparent;
  cursor: pointer;
  background: var(--color-surface);
  min-height: 56px;
  display: flex; flex-direction: column; justify-content: center;
  /* 기본 양각 (약) */
  box-shadow: 0 2px 4px rgba(101, 66, 38, 0.08),
              0 1px 2px rgba(101, 66, 38, 0.06);
  transform: translateY(0);
  transition: background var(--transition-fast),
              border-color var(--transition-fast),
              color var(--transition-fast),
              transform var(--transition-fast),
              box-shadow var(--transition-fast);
}
.sc-list-item:hover {
  background: var(--color-surface-2);
  transform: translateY(-1px);
  box-shadow: 0 4px 8px rgba(101, 66, 38, 0.12),
              0 2px 4px rgba(101, 66, 38, 0.08);
}
.sc-list-item.active {
  border-left-color: var(--stg-fg, var(--color-accent));
  background: var(--stg-bg, var(--color-surface-2));
  /* 활성 양각 (약) — 1px 위로 */
  transform: translateY(-1px);
  box-shadow: 0 6px 14px rgba(101, 66, 38, 0.18),
              0 3px 6px rgba(101, 66, 38, 0.10);
  z-index: 1;
}
.sc-list-item.active .sc-list-title {
  color: var(--stg-fg, var(--color-brand));
}
.sc-list-item .sc-num {
  display: inline-block;
  font-size: var(--text-xs);
  font-weight: var(--fw-bold);
  padding: 2px 7px;
  border-radius: var(--radius-full);
  background: var(--color-text-tertiary);
  color: #fff;
  margin-bottom: 4px;
  width: fit-content;
  transition: background var(--transition-fast);
}
.sc-list-item.active .sc-num {
  background: var(--stg-fg, var(--color-brand));
}
.sc-list-title {
  font-size: var(--text-body);   /* 기본값 — 각 열에서 오버라이드 */
  font-weight: var(--fw-bold);
  color: var(--color-text-primary);
  line-height: 1.4;
}
.sc-list-sub {
  font-size: var(--text-xs);
  color: var(--color-text-secondary);
  margin-top: 3px;
  line-height: 1.4;
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 1;
  -webkit-box-orient: vertical;
}

/* ── 열 2·3·4 폰트 점진 확대 (시선 유도) ──────────────────────── */
/* 열 2: 스크립트 목록 — 가장 작음 (15px) */
.sc-col-2 .sc-list-title { font-size: var(--text-label); }    /* 0.790em ≈15px */
.sc-col-2 .sc-list-sub   { font-size: 0.632em; }              /* ≈12px */
.sc-col-2 .sc-list-item.active .sc-list-title { font-size: 0.842em; }  /* ≈16px — active +1px */

/* 열 3: 세부 항목 — 중간 (17px) */
.sc-col-3 .sc-list-title { font-size: var(--text-tab); }      /* 0.895em ≈17px */
.sc-col-3 .sc-list-sub   { font-size: var(--text-xs); }       /* 0.684em ≈13px */
.sc-col-3 .sc-list-item .sc-num { font-size: var(--text-xs); padding: 2px 8px; }
.sc-col-3 .sc-list-item.active .sc-list-title { font-size: 0.9474em; } /* ≈18px — active +1px */

/* 축소된 열의 완료된 항목 (.done 상태) */
.sc-col.done .sc-list-item:not(.active) { opacity: 0.5; }
.sc-col.done .sc-list-item:not(.active) .sc-list-title { color: var(--color-text-secondary); }

/* ── 열 4: 상세 ────────────────────────────────────────────────── */
.sc-col-4 { background: var(--color-surface-2); }
.sc-detail {
  padding: var(--space-5);
  overflow-y: auto;
  height: 100%;
}
.sc-detail-tag {
  display: inline-block;
  font-size: var(--text-xs);
  font-weight: var(--fw-bold);
  padding: 3px 10px;
  border-radius: var(--radius-full);
  background: var(--stg-fg, var(--color-brand));
  color: #fff;
  margin-bottom: var(--space-2);
  /* 태그도 살짝 떠있게 */
  box-shadow: 0 2px 4px rgba(101, 66, 38, 0.15);
}
.sc-detail-title {
  font-size: var(--text-h2);       /* 1.0em ≈19px — 최대 강조 */
  font-weight: var(--fw-black);
  color: var(--color-text-primary);
  margin-bottom: 4px;
  line-height: 1.4;
  letter-spacing: -0.3px;
}
.sc-detail-sub {
  font-size: var(--text-xs);
  color: var(--color-text-secondary);
  margin-bottom: var(--space-3);
  line-height: 1.5;
}
.sc-detail-body {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: var(--space-5);         /* 패딩 var(--space-4)→var(--space-5) 확대 */
  margin-bottom: var(--space-3);
  /* 활성 양각 (약) — 1px 위로 */
  box-shadow: 0 6px 14px rgba(101, 66, 38, 0.18),
              0 3px 6px rgba(101, 66, 38, 0.10);
  transform: translateY(-1px);
}
.sc-detail-body .sc-html {
  font-size: var(--text-tab);      /* 0.895em ≈17px — 통화 중 가독성 최우선 */
  color: var(--color-text-primary);
  line-height: 1.9;
}
.sc-detail-body .sc-html strong {
  color: var(--stg-fg, var(--color-brand));
  font-weight: var(--fw-black);
}
.sc-detail-body .sc-html div,
.sc-detail-body .sc-html p { max-width: 100%; }

/* 현장 팁 박스 (단계 색상 연동) */
.sc-tip {
  background: var(--stg-bg, var(--color-surface-2));
  border-left: 3px solid var(--stg-fg, var(--color-accent));
  border-radius: var(--radius-sm);
  padding: var(--space-3) var(--space-4);
  font-size: var(--text-xs);
  color: var(--color-text-secondary);
  line-height: 1.6;
}
.sc-tip strong {
  color: var(--stg-fg, var(--color-brand));
  font-weight: var(--fw-bold);
}

/* 빈 상태 */
.sc-empty {
  display: flex; align-items: center; justify-content: center;
  color: var(--color-text-tertiary);
  font-size: var(--text-xs);
  padding: var(--space-6) var(--space-3);
  text-align: center; line-height: 1.8;
  min-height: 80px;
}
.sc-loading {
  display: flex; align-items: center; justify-content: center;
  padding: var(--space-10);
  color: var(--color-text-secondary);
  font-size: var(--text-body);
}

/* ── 푸터 ───────────────────────────────────────────────────────── */
.sc-footer {
  background: var(--color-text-primary);
  color: #FFF6EF;
  text-align: center;
  font-size: var(--text-label);
  font-weight: var(--fw-black);
  padding: var(--space-3) var(--space-4);
  border-radius: var(--radius-md);
}

/* ══════════════════════════════════════════════════════════════════
   모바일 (900px 이하) — 10단계 최적 플로우
   2열 그리드로 단계 선택 → 스크립트 → 본문 3-스텝
════════════════════════════════════════════════════════════════════ */
.sc-mobile { display: none; }

@media (max-width: 900px) {
  .sc-tab-wrap  { display: none; }
  .sc-grid-wrap { display: none; }
  .sc-mobile {
    display: block;
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    overflow: hidden;
  }
}

/* 모바일 스텝 헤더 */
.sc-m-header {
  display: flex; align-items: center; gap: var(--space-2);
  padding: var(--space-3) var(--space-4);
  background: var(--color-surface-2);
  border-bottom: 1px solid var(--color-border);
}
.sc-m-back {
  border: none; background: transparent;
  font-size: 1.1em; cursor: pointer;
  color: var(--color-text-secondary);
  padding: 4px 6px;
  display: flex; align-items: center;
  border-radius: var(--radius-sm);
}
.sc-m-back:hover { background: var(--color-border); }
.sc-m-title {
  font-size: var(--text-body);
  font-weight: var(--fw-bold);
  color: var(--color-text-primary);
  flex: 1;
  min-width: 0;
  word-break: keep-all;
  overflow-wrap: break-word;
  line-height: 1.35;
}
.sc-m-step-count {
  font-size: var(--text-xs);
  color: var(--color-text-secondary);
  font-weight: var(--fw-semibold);
}

/* 모바일 STEP 1 — 10단계 2열 그리드 */
.sc-m-stage-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--color-border);
}
.sc-m-stage-card {
  background: var(--color-surface);
  padding: var(--space-4) var(--space-3);
  cursor: pointer;
  display: flex; align-items: center; gap: var(--space-3);
  transition: background var(--transition-fast);
  border-left: 3px solid var(--stg-fg, transparent);
  min-width: 0;
  overflow: hidden;
}
.sc-m-stage-card:hover { background: var(--color-surface-2); }
/* 초소형 뷰포트(갤럭시 기본형 등)에선 1열 강제 */
@media (max-width: 380px) {
  .sc-m-stage-grid { grid-template-columns: 1fr; }
}
.sc-m-stage-card-icon {
  width: 38px; height: 38px;
  border-radius: var(--radius-full);
  background: var(--stg-bg, var(--color-surface-2));
  color: var(--stg-fg, var(--color-brand));
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2em; flex-shrink: 0;
}
.sc-m-stage-card-info { flex: 1; min-width: 0; }
.sc-m-stage-card-name {
  font-size: var(--text-xs);
  font-weight: var(--fw-black);
  color: var(--color-text-primary);
  line-height: 1.3;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.sc-m-stage-card-cnt {
  font-size: 0.65em;
  color: var(--color-text-secondary);
  margin-top: 2px;
  font-weight: var(--fw-semibold);
}

/* 모바일 STEP 2·3 — 리스트 */
.sc-m-list-item {
  padding: var(--space-3) var(--space-4);
  cursor: pointer;
  border-bottom: 1px solid var(--color-border);
  border-left: 3px solid transparent;
  background: var(--color-surface);
  display: flex; flex-direction: column; justify-content: center;
  transition: background var(--transition-fast);
}
.sc-m-list-item:last-child { border-bottom: none; }
.sc-m-list-item:hover { background: var(--color-surface-2); }
.sc-m-list-item.active {
  border-left-color: var(--stg-fg, var(--color-accent));
  background: var(--stg-bg, var(--color-surface-2));
}
.sc-m-item-num {
  display: inline-block;
  font-size: var(--text-xs);
  font-weight: var(--fw-bold);
  padding: 2px 7px;
  border-radius: var(--radius-full);
  background: var(--stg-fg, var(--color-brand));
  color: #fff;
  margin-bottom: 4px;
  width: fit-content;
}
.sc-m-item-title {
  font-size: var(--text-body);
  font-weight: var(--fw-bold);
  color: var(--color-text-primary);
  line-height: 1.4;
}
.sc-m-item-sub {
  font-size: var(--text-xs);
  color: var(--color-text-secondary);
  margin-top: 3px;
  line-height: 1.4;
}

/* 모바일 STEP 4 — 상세 본문 */
.sc-m-detail {
  padding: var(--space-4);
  background: var(--color-surface-2);
  min-height: 240px;
}
.sc-m-detail-tag {
  display: inline-block;
  font-size: var(--text-xs);
  font-weight: var(--fw-bold);
  padding: 3px 10px;
  border-radius: var(--radius-full);
  background: var(--stg-fg, var(--color-brand));
  color: #fff;
  margin-bottom: var(--space-2);
}
.sc-m-detail-title {
  font-size: var(--text-body);
  font-weight: var(--fw-black);
  color: var(--color-text-primary);
  margin-bottom: 4px;
  line-height: 1.4;
}
.sc-m-detail-sub {
  font-size: var(--text-xs);
  color: var(--color-text-secondary);
  margin-bottom: var(--space-3);
  line-height: 1.5;
}
.sc-m-detail-body {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: var(--space-4);
}
.sc-m-detail-body .sc-html {
  font-size: var(--text-body);
  color: var(--color-text-primary);
  line-height: 1.9;
}
.sc-m-detail-body .sc-html strong {
  color: var(--stg-fg, var(--color-brand));
  font-weight: var(--fw-black);
}

/* ── 반응형 중간 구간 ─────────────────────────────────────────── */
/* 탭 라벨은 17px 고정, 좁은 화면에선 자동 2줄 줄바꿈으로 대응 */
@media (max-width: 1000px) and (min-width: 901px) {
  .sc-grid { min-height: 420px; }
  .sc-detail { padding: var(--space-4); }
  /* 좁은 화면에선 열 2·3 폰트 한 단계씩 축소 */
  .sc-col-2 .sc-list-title { font-size: 0.72em; }
  .sc-col-3 .sc-list-title { font-size: 0.82em; }
}
</style>

<div class="sc-outer" id="page-scripts">

  <!-- 배너 슬롯 (app.html이 관리자 배너 이미지 자동 주입) -->
  <div id="page-banner-slot" style="display:none;flex-shrink:0;"></div>

  <!-- 탭바 (10개 단계 균등 분할) -->
  <div class="sc-tab-wrap">
    <div class="sc-tab-bar" id="sc-tab-bar">
      <!-- JS에서 렌더링 -->
    </div>
  </div>

  <!-- 4열 동적 확장 그리드 (데스크탑) -->
  <div class="sc-grid-wrap">
    <div class="sc-grid" id="sc-grid">
      <div class="sc-col sc-col-1" id="sc-col-1"></div>
      <div class="sc-col sc-col-2 now"  id="sc-col-2">
        <div class="sc-loading">스크립트를 불러오는 중...</div>
      </div>
      <div class="sc-col sc-col-3 dim"  id="sc-col-3">
        <div class="sc-empty">← 스크립트 선택</div>
      </div>
      <div class="sc-col sc-col-4 dim"  id="sc-col-4">
        <div class="sc-empty">← 세부 항목 선택</div>
      </div>
    </div>
  </div>

  <!-- 모바일 -->
  <div class="sc-mobile" id="sc-mobile">
    <div class="sc-loading">스크립트를 불러오는 중...</div>
  </div>

  <!-- 푸터 -->
  <div class="sc-footer">
    - 지금 멈추지 마세요. 한 문장이 전체 흐름을 바꿉니다 -
  </div>

</div>

<script>
(function() {

/* ════════════════════════════════════════════════════════════════
   상태 & 설정
═══════════════════════════════════════════════════════════════════ */

var _cache = {};         /* 단계별 스크립트 캐시 */
var _state = {
  activeStage: 1,        /* 현재 단계 (1~10) */
  activeScript: -1,      /* 선택된 스크립트 인덱스 */
  activeBlock: -1,       /* 선택된 블록 인덱스 */
  step: 1                /* STEP 1/2/3 (열 확장 단계) */
};

/* 모바일 상태 */
var _mState = {
  step: 1,               /* 1: 단계 / 2: 스크립트 / 3: 블록 / 4: 본문 */
  stage: 0,
  scIdx: -1,
  blIdx: -1
};

/* 10단계 GROUPS (확정 사양) */
/* label: 탭바 표시용 — 공백 포함해서 좁은 화면에서 자동 2줄 줄바꿈 / labelFull: 열1·모바일용 긴 라벨 */
var GROUPS = [
  { color: 1,  icon: '📞', label: '도입 인사',   labelFull: '도입인사',      stage: 'opening' },
  { color: 2,  icon: '💬', label: '도입 반론',   labelFull: '도입반론',      stage: 'opening_rejection' },
  { color: 3,  icon: '🔥', label: '필요성 ①',    labelFull: '필요성 강조 1', stage: 'need_emphasis' },
  { color: 4,  icon: '🔎', label: '상황 확인',   labelFull: '상황 확인',     stage: 'situation_check' },
  { color: 5,  icon: '📊', label: '보장 분석',   labelFull: '보장 분석',     stage: 'analysis' },
  { color: 6,  icon: '📦', label: '상품 설명',   labelFull: '상품 설명',     stage: 'product' },
  { color: 7,  icon: '🔥', label: '필요성 ②',    labelFull: '필요성 강조 2', stage: 'need_emphasis_2' },
  { color: 8,  icon: '✅', label: '클로징',      labelFull: '클로징',        stage: 'closing' },
  { color: 9,  icon: '⚡', label: '반론 대응',   labelFull: '반론 대응',     stage: 'objection' },
  { color: 10, icon: '🔚', label: '2차 클로징', labelFull: '2차 클로징',    stage: 'closing_second' }
];
window._SC_GROUPS = GROUPS;

/* ════════════════════════════════════════════════════════════════
   유틸리티
═══════════════════════════════════════════════════════════════════ */

/* 단계 CSS 변수 값 가져오기 */
window.scGv = function(color, kind) {
  return getComputedStyle(document.documentElement)
    .getPropertyValue('--stg-' + color + '-' + kind).trim();
};

/* 그리드에 현재 단계의 색상 변수 주입 */
function applyStageVars(color) {
  var grid = document.getElementById('sc-grid');
  if (!grid) return;
  var fg = window.scGv(color, 'fg');
  var bg = window.scGv(color, 'bg');
  grid.style.setProperty('--stg-fg', fg);
  grid.style.setProperty('--stg-bg', bg);
  grid.style.setProperty('--stg-bg-soft', bg);

  /* 모바일에도 동일 주입 */
  var mobile = document.getElementById('sc-mobile');
  if (mobile) {
    mobile.style.setProperty('--stg-fg', fg);
    mobile.style.setProperty('--stg-bg', bg);
  }

  /* 탭바의 활성 탭에도 주입 */
  var tabBar = document.getElementById('sc-tab-bar');
  if (tabBar) {
    tabBar.style.setProperty('--stg-fg', fg);
    tabBar.style.setProperty('--stg-bg-soft', bg);
  }
}

/* Supabase fetch (단일 stage) */
window.scFetch = async function(stage) {
  if (_cache[stage]) return _cache[stage];
  var path = '/rest/v1/scripts?stage=eq.' + encodeURIComponent(stage) +
             '&is_active=eq.true&order=sort_order.asc,title.asc' +
             '&select=id,title,stage,top_category,highlight_text,script_text';
  try {
    var res = await window.db.fetch(path);
    if (!res.ok) return [];
    var data = await res.json();
    _cache[stage] = data;
    return data;
  } catch (e) {
    return [];
  }
};

/* 스크립트 HTML에서 블록 파싱 */
window.scParseBlocks = function(html) {
  if (!html) return [];
  var tmp = document.createElement('div');
  tmp.innerHTML = html;
  var blocks = [];
  tmp.querySelectorAll('div[style*="border:1.5px solid #DCDCDC"]').forEach(function(el) {
    var rows = el.querySelectorAll('div[style*="font-size:13px"][style*="font-weight:700"]');
    var title = rows[0] ? rows[0].textContent.trim() : '';
    var sub   = rows[1] ? rows[1].textContent.trim() : '';
    if (title) blocks.push({ title: title, sub: sub, html: el.outerHTML });
  });
  if (!blocks.length) blocks.push({ title: '전체 스크립트', sub: '', html: html });
  return blocks;
};

/* ════════════════════════════════════════════════════════════════
   탭바 렌더링 & 제어
═══════════════════════════════════════════════════════════════════ */

function renderTabs() {
  var bar = document.getElementById('sc-tab-bar');
  if (!bar) return;
  bar.innerHTML = GROUPS.map(function(g) {
    return '<button class="sc-tab-btn" data-color="' + g.color + '" ' +
           'onclick="window.scSelectStage(' + g.color + ')">' +
           '<span class="sc-tab-label">' + g.label + '</span>' +
           '</button>';
  }).join('');
}

function updateActiveTab(color) {
  document.querySelectorAll('.sc-tab-btn').forEach(function(x) {
    x.classList.toggle('active', parseInt(x.dataset.color) === color);
  });
}

/* ════════════════════════════════════════════════════════════════
   4열 그리드 렌더링
═══════════════════════════════════════════════════════════════════ */

/* STEP 상태에 따라 클래스 & 열 활성/흐림 전환 */
function applyStepState() {
  var grid = document.getElementById('sc-grid');
  if (!grid) return;
  grid.classList.remove('step-2', 'step-3');
  if (_state.step === 2) grid.classList.add('step-2');
  if (_state.step === 3) grid.classList.add('step-3');

  var col2 = document.getElementById('sc-col-2');
  var col3 = document.getElementById('sc-col-3');
  var col4 = document.getElementById('sc-col-4');

  [col2, col3, col4].forEach(function(c) {
    if (c) c.classList.remove('now', 'dim', 'done');
  });

  if (_state.step === 1) {
    if (col2) col2.classList.add('now');
    if (col3) col3.classList.add('dim');
    if (col4) col4.classList.add('dim');
  } else if (_state.step === 2) {
    if (col2) col2.classList.add('done');
    if (col3) col3.classList.add('now');
    if (col4) col4.classList.add('dim');
  } else if (_state.step === 3) {
    if (col2) col2.classList.add('done');
    if (col3) col3.classList.add('done');
    if (col4) col4.classList.add('now');
  }
}

/* 열 1: 현재 단계 셀 렌더링 */
function renderCol1(color, count) {
  var col1 = document.getElementById('sc-col-1');
  if (!col1) return;
  var g = GROUPS[color - 1];
  if (!g) return;
  col1.innerHTML =
    '<div class="sc-stage-cell">' +
      '<span class="sc-stage-icon">' + g.icon + '</span>' +
      '<span class="sc-stage-name">' + g.labelFull + '</span>' +
      '<span class="sc-stage-count">' + count + '개</span>' +
    '</div>';
}

/* 열 2: 스크립트 목록 */
function renderCol2(scripts) {
  var col2 = document.getElementById('sc-col-2');
  if (!col2) return;
  if (!scripts.length) {
    col2.innerHTML = '<div class="sc-empty">이 단계에는<br>등록된 스크립트가 없습니다</div>';
    return;
  }
  col2.innerHTML = '<div class="sc-list">' +
    scripts.map(function(sc, i) {
      var sub = (sc.highlight_text || '').replace(/<[^>]+>/g, '').slice(0, 40);
      return '<div class="sc-list-item" data-idx="' + i + '" ' +
             'onclick="window.scSelectScript(' + i + ')">' +
             '<div class="sc-list-title">' + sc.title + '</div>' +
             (sub ? '<div class="sc-list-sub">' + sub + '</div>' : '') +
             '</div>';
    }).join('') + '</div>';
}

/* 열 3: 블록 목록 */
function renderCol3(blocks) {
  var col3 = document.getElementById('sc-col-3');
  if (!col3) return;
  if (!blocks || !blocks.length) {
    col3.innerHTML = '<div class="sc-empty">← 스크립트 선택</div>';
    return;
  }
  var numLabels = ['①','②','③','④','⑤','⑥','⑦','⑧'];
  col3.innerHTML = '<div class="sc-list">' +
    blocks.map(function(bl, i) {
      var numMatch   = bl.title.match(/^[①②③④⑤⑥⑦⑧]/);
      var num        = numMatch ? numMatch[0] : (numLabels[i] || (i + 1) + '');
      var cleanTitle = bl.title.replace(/^[①②③④⑤⑥⑦⑧]\s*/, '');
      var sub        = (bl.sub || '').slice(0, 30);
      return '<div class="sc-list-item" data-idx="' + i + '" ' +
             'onclick="window.scSelectBlock(' + i + ')">' +
             '<span class="sc-num">' + num + '</span>' +
             '<div class="sc-list-title">' + cleanTitle + '</div>' +
             (sub ? '<div class="sc-list-sub">' + sub + '</div>' : '') +
             '</div>';
    }).join('') + '</div>';
}

/* 열 4: 상세 본문 */
function renderCol4(sc, bl) {
  var col4 = document.getElementById('sc-col-4');
  if (!col4) return;
  if (!bl) {
    col4.innerHTML = '<div class="sc-empty">← 세부 항목 선택</div>';
    return;
  }
  var tipText = sc && sc.highlight_text
    ? sc.highlight_text
    : '<strong>현장 팁:</strong> 문장 하나가 흐름을 바꿉니다. 고객 반응에 맞춰 속도 조절하세요.';

  col4.innerHTML =
    '<div class="sc-detail">' +
      '<div class="sc-detail-tag">' + (sc ? sc.title : '') + '</div>' +
      '<div class="sc-detail-title">' + bl.title + '</div>' +
      (bl.sub ? '<div class="sc-detail-sub">' + bl.sub + '</div>' : '') +
      '<div class="sc-detail-body"><div class="sc-html">' + bl.html + '</div></div>' +
      '<div class="sc-tip">' + tipText + '</div>' +
    '</div>';
}

/* 활성 리스트 아이템 표시 */
function markActiveItem(colEl, idx) {
  if (!colEl) return;
  colEl.querySelectorAll('.sc-list-item').forEach(function(x) {
    x.classList.toggle('active', parseInt(x.dataset.idx) === idx);
  });
}

/* ════════════════════════════════════════════════════════════════
   사용자 인터랙션
═══════════════════════════════════════════════════════════════════ */

/* 단계 선택 (탭 클릭) */
window.scSelectStage = async function(color) {
  if (color < 1 || color > 10) return;
  _state.activeStage = color;
  _state.activeScript = -1;
  _state.activeBlock = -1;
  _state.step = 1;

  applyStageVars(color);
  updateActiveTab(color);

  var g = GROUPS[color - 1];
  var col2 = document.getElementById('sc-col-2');
  if (col2) col2.innerHTML = '<div class="sc-loading">불러오는 중...</div>';

  var scripts = await window.scFetch(g.stage);
  _cache['group_' + color] = scripts;

  renderCol1(color, scripts.length);
  renderCol2(scripts);
  renderCol3([]);
  renderCol4(null, null);
  applyStepState();
  /* 자동 선택 제거: 사용자가 직접 스크립트를 클릭해야 STEP 2로 전환됨 */
};

/* 스크립트 선택 */
window.scSelectScript = function(idx) {
  var color = _state.activeStage;
  var scripts = _cache['group_' + color] || [];
  var sc = scripts[idx];
  if (!sc) return;

  _state.activeScript = idx;
  _state.activeBlock = -1;
  _state.step = 2;

  /* activity_log */
  var userId = window.AppState && window.AppState.userId;
  if (userId) {
    window.db.fetch('/rest/v1/activity_logs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({
        user_id: userId,
        event_type: 'script_view',
        target_type: 'script',
        target_id: String(sc.id)
      })
    }).catch(function() {});
  }

  var blocks = window.scParseBlocks(sc.script_text);
  _cache['blocks_' + color] = blocks;
  _cache['cursc_'  + color] = sc;

  markActiveItem(document.getElementById('sc-col-2'), idx);
  renderCol3(blocks);
  renderCol4(null, null);
  applyStepState();
  /* 자동 선택 제거: 사용자가 직접 블록을 클릭해야 STEP 3로 전환됨 */
};

/* 블록 선택 */
window.scSelectBlock = function(idx) {
  var color  = _state.activeStage;
  var blocks = _cache['blocks_' + color] || [];
  var sc     = _cache['cursc_'  + color];
  var bl     = blocks[idx];
  if (!bl) return;

  _state.activeBlock = idx;
  _state.step = 3;

  markActiveItem(document.getElementById('sc-col-3'), idx);
  renderCol4(sc, bl);
  applyStepState();
};

/* ════════════════════════════════════════════════════════════════
   모바일 렌더링
═══════════════════════════════════════════════════════════════════ */

function mLabel(color) {
  var g = GROUPS[color - 1];
  return g ? g.labelFull : '';
}

function mApplyStageVars(color) {
  var mobile = document.getElementById('sc-mobile');
  if (!mobile) return;
  mobile.style.setProperty('--stg-fg', window.scGv(color, 'fg'));
  mobile.style.setProperty('--stg-bg', window.scGv(color, 'bg'));
}

function mRenderHeader(step, color) {
  var stepNames = ['', '단계 선택', '스크립트 선택', '세부 항목 선택', '스크립트 본문'];
  var showBack = step > 1;
  var title = step === 1
    ? '스크립트 단계 선택'
    : mLabel(color) + ' · ' + stepNames[step];
  return '<div class="sc-m-header">' +
    (showBack ? '<button class="sc-m-back" onclick="window.scMBack()">◀</button>' : '') +
    '<div class="sc-m-title">' + title + '</div>' +
    '<div class="sc-m-step-count">' + step + ' / 4</div>' +
  '</div>';
}

/* STEP 1: 10단계 2열 그리드 */
function mRenderStep1() {
  var html = mRenderHeader(1, 0) + '<div class="sc-m-stage-grid">';
  GROUPS.forEach(function(g) {
    var scripts = _cache['group_' + g.color] || [];
    html +=
      '<div class="sc-m-stage-card" ' +
           'style="--stg-fg:' + window.scGv(g.color,'fg') + ';' +
           '--stg-bg:' + window.scGv(g.color,'bg') + ';" ' +
           'onclick="window.scMStep2(' + g.color + ')">' +
        '<div class="sc-m-stage-card-icon">' + g.icon + '</div>' +
        '<div class="sc-m-stage-card-info">' +
          '<div class="sc-m-stage-card-name">' + g.labelFull + '</div>' +
          '<div class="sc-m-stage-card-cnt">' + scripts.length + '개</div>' +
        '</div>' +
      '</div>';
  });
  html += '</div>';
  return html;
}

/* STEP 2: 스크립트 목록 */
function mRenderStep2(color) {
  var scripts = _cache['group_' + color] || [];
  var html = mRenderHeader(2, color);
  if (scripts.length) {
    html += '<div>';
    scripts.forEach(function(sc, i) {
      var sub = (sc.highlight_text || '').replace(/<[^>]+>/g, '').slice(0, 40);
      html +=
        '<div class="sc-m-list-item" onclick="window.scMStep3(' + color + ',' + i + ')">' +
          '<div class="sc-m-item-title">' + sc.title + '</div>' +
          (sub ? '<div class="sc-m-item-sub">' + sub + '</div>' : '') +
        '</div>';
    });
    html += '</div>';
  } else {
    html += '<div class="sc-empty">이 단계에는<br>등록된 스크립트가 없습니다</div>';
  }
  return html;
}

/* STEP 3: 블록 목록 */
function mRenderStep3(color, scIdx) {
  var scripts = _cache['group_' + color] || [];
  var sc = scripts[scIdx];
  if (!sc) return mRenderStep2(color);
  var blocks = window.scParseBlocks(sc.script_text);
  _cache['blocks_m_' + color] = blocks;
  _cache['cursc_m_'  + color] = sc;
  var numLabels = ['①','②','③','④','⑤','⑥','⑦','⑧'];
  var html = mRenderHeader(3, color) + '<div>';
  blocks.forEach(function(bl, i) {
    var numMatch   = bl.title.match(/^[①②③④⑤⑥⑦⑧]/);
    var num        = numMatch ? numMatch[0] : (numLabels[i] || (i + 1) + '');
    var cleanTitle = bl.title.replace(/^[①②③④⑤⑥⑦⑧]\s*/, '');
    var sub        = (bl.sub || '').slice(0, 30);
    html +=
      '<div class="sc-m-list-item" onclick="window.scMStep4(' + color + ',' + i + ')">' +
        '<span class="sc-m-item-num">' + num + '</span>' +
        '<div class="sc-m-item-title">' + cleanTitle + '</div>' +
        (sub ? '<div class="sc-m-item-sub">' + sub + '</div>' : '') +
      '</div>';
  });
  html += '</div>';
  return html;
}

/* STEP 4: 본문 + 현장 팁 */
function mRenderStep4(color, blIdx) {
  var blocks = _cache['blocks_m_' + color] || [];
  var sc     = _cache['cursc_m_'  + color];
  var bl     = blocks[blIdx];
  if (!bl) return mRenderStep3(color, _mState.scIdx);
  var tipText = sc && sc.highlight_text
    ? sc.highlight_text
    : '<strong>현장 팁:</strong> 문장 하나가 흐름을 바꿉니다.';
  // bl.html(outerHTML)에 타이틀/sub가 이미 포함되어 있어 바깥 title/sub 제거 (중복 방지)
  return mRenderHeader(4, color) +
    '<div class="sc-m-detail">' +
      '<div class="sc-m-detail-tag">' + (sc ? sc.title : '') + '</div>' +
      '<div class="sc-m-detail-body"><div class="sc-html">' + bl.html + '</div></div>' +
      '<div class="sc-tip" style="margin-top:var(--space-3);">' + tipText + '</div>' +
    '</div>';
}

/* 모바일 네비게이션 */
window.scMStep2 = async function(color) {
  _mState.step = 2; _mState.stage = color;
  mApplyStageVars(color);
  var m = document.getElementById('sc-mobile');
  if (m) m.innerHTML = '<div class="sc-loading">불러오는 중...</div>';
  var scripts = await window.scFetch(GROUPS[color - 1].stage);
  _cache['group_' + color] = scripts;
  if (m) m.innerHTML = mRenderStep2(color);
};

window.scMStep3 = function(color, scIdx) {
  _mState.step = 3; _mState.scIdx = scIdx;
  mApplyStageVars(color);
  var m = document.getElementById('sc-mobile');
  if (m) m.innerHTML = mRenderStep3(color, scIdx);
};

window.scMStep4 = function(color, blIdx) {
  _mState.step = 4; _mState.blIdx = blIdx;
  mApplyStageVars(color);
  var m = document.getElementById('sc-mobile');
  if (m) m.innerHTML = mRenderStep4(color, blIdx);

  /* activity_log */
  var sc = _cache['cursc_m_' + color];
  var userId = window.AppState && window.AppState.userId;
  if (userId && sc) {
    window.db.fetch('/rest/v1/activity_logs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({
        user_id: userId,
        event_type: 'script_view',
        target_type: 'script',
        target_id: String(sc.id)
      })
    }).catch(function() {});
  }
};

window.scMBack = function() {
  var m = document.getElementById('sc-mobile');
  if (!m) return;
  if (_mState.step === 2) {
    _mState.step = 1;
    m.innerHTML = mRenderStep1();
  } else if (_mState.step === 3) {
    _mState.step = 2;
    m.innerHTML = mRenderStep2(_mState.stage);
  } else if (_mState.step === 4) {
    _mState.step = 3;
    m.innerHTML = mRenderStep3(_mState.stage, _mState.scIdx);
  }
};

/* ════════════════════════════════════════════════════════════════
   전체 부트
═══════════════════════════════════════════════════════════════════ */

window.scRenderAll = async function() {
  var body = document.getElementById('page-scripts');
  if (!body) return;

  /* 1. 탭바 렌더 */
  renderTabs();

  /* 2. 모든 단계 스크립트 병렬 pre-fetch (모바일 카운트 표시용) */
  await Promise.all(GROUPS.map(function(g) {
    return window.scFetch(g.stage).then(function(scripts) {
      _cache['group_' + g.color] = scripts;
    });
  }));

  /* 3. 첫 단계 데스크탑 활성화 — 스크립트 목록까지만 표시 (STEP 1) */
  await window.scSelectStage(1);

  /* 4. 모바일 초기 렌더 */
  var mobile = document.getElementById('sc-mobile');
  if (mobile) mobile.innerHTML = mRenderStep1();

  /* 5. 검색에서 넘어온 경우 처리 */
  if (window._pendingScript) {
    var ps = window._pendingScript;
    window._pendingScript = null;
    var targetColor = ps.color;
    var targetTitle = ps.title;
    if (targetColor) {
      await window.scSelectStage(targetColor);
      var groupScripts = _cache['group_' + targetColor] || [];
      var matchIdx = -1;
      for (var i = 0; i < groupScripts.length; i++) {
        if (groupScripts[i].title === targetTitle) { matchIdx = i; break; }
      }
      if (matchIdx >= 0) {
        window.scSelectScript(matchIdx);
      } else if (groupScripts.length) {
        window.scSelectScript(0);
      }
    }
  }
};

/* ── 초기화: AppState 패턴 ── */
function _boot() {
  window.scRenderAll();
}

if (window.AppState && window.AppState.ready) {
  _boot();
} else {
  document.addEventListener('appstate:ready', function() { _boot(); }, { once: true });
}

})();
</script>
