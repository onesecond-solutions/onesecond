<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');

:root {
  --brown-dark: #3d2b1f;
  --brown-mid: #6b4226;
  --brown-light: #a0724a;
  --brown-pale: #f5ede4;
  --cream: #f7f2ec;
  --cream-2:#f4ece3;
  --accent: #c8753a;
  --accent-dark: #b5642e;
  --text-dark: #1a1008;
  --text-mid: #5a3e2b;
  --text-light: #9a7a62;
  --white: #ffffff;
  --sidebar-w: 230px;
  --line:#ddc8b4;
}
* { box-sizing:border-box; margin:0; padding:0; }









 50%{opacity:.35} }






















.step1, .step2, .step3 {
  border-bottom:1px solid var(--line);
  padding:8px 12px 7px;
  background:#faf8f5;
}
.step2, .step3 {
  background:#f3ebe3;
}
.button-row { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.main-btn, .sub-btn, .cat-btn {
  font-family:'Noto Sans KR',sans-serif;
  border:1px solid #d5bda8;
  background:#fffaf4;
  color:#5d4533;
  border-radius:11px;
  font-size:0.68em;
  font-weight:700;
  white-space:nowrap;
  cursor:pointer;
  transition:all .15s ease;
}
.main-btn { height:32px; padding:0 14px; }
.sub-btn, .cat-btn { height:28px; padding:0 12px; border-radius:14px; font-size:0.63em; }
.main-btn:hover, .sub-btn:hover, .cat-btn:hover { background:#f3e4d6; }
.main-btn.active, .sub-btn.active, .cat-btn.active {
  background:var(--brown-dark);
  color:#fff;
  border-color:var(--brown-dark);
}
.sub-btn.active, .cat-btn.active {
  background:var(--accent);
  border-color:var(--accent);
}
.step2.hidden, .step3.hidden { display:none; }

.content-scroll {
  overflow:visible;
  background:#f3eee8;
  padding:10px 14px 18px;
}
.screen-chip {
  display:inline-block;
  padding:4px 10px;
  border-radius:999px;
  background:#f5e7c9;
  color:#8a5a18;
  font-size:0.61em;
  font-weight:800;
  margin-bottom:10px;
}
.content-top-actions {
  display:flex; justify-content:flex-end; gap:8px; margin-bottom:8px;
}
.small-action {
  height:28px; padding:0 12px; border-radius:7px;
  border:1px solid #d8c6b3; background:#fff8f2;
  font-size:0.63em; font-weight:700; color:#7c5d44;
}

.script-write-btn {
  font-family:'Noto Sans KR',sans-serif;
  cursor:pointer;
  transition:all .15s ease;
}
.script-write-btn:hover { transform:translateY(-1px); }
.script-write-btn.top {
  height:32px;
  padding:0 14px;
  border-radius:11px;
  border:1px solid #d5bda8;
  background:#fff3e7;
  color:#8a5522;
  font-size:0.68em;
  font-weight:800;
}
.script-write-btn.top:hover {
  background:#f7e5d2;
}
.left-cta-card {
  margin-top:14px;
  background:#fff;
  border:1px solid #e1d2c3;
  border-radius:16px;
  padding:14px;
  box-shadow:0 4px 12px rgba(103,66,38,.05);
}
.script-write-btn
.script-write-btn.main:hover {
  background:#f8e6d4;
}
.script-write-btn.side {
  width:100%;
  margin-top:2px;
  height:34px;
  border-radius:8px;
  border:1px solid #d8c6b3;
  background:#fff8f2;
  color:#7c5d44;
  font-size:0.63em;
  font-weight:800;
}
.script-write-btn.side:hover {
  background:#f4e8dc;
}

.content-grid {
  display:grid;
  grid-template-columns: 320px minmax(0, 1fr);
  gap:12px;
  align-items:start;
}
.left-col {
  display:flex;
  flex-direction:column;
  gap:14px;
}
.left-card, .accordion-section {
  background:#fff;
  border:1px solid #dbc8b5;
  border-radius:14px;
}
.left-card {
  padding:14px;
}
.left-label {
  font-size:0.61em; font-weight:800; color:#9b7f68; margin-bottom:10px;
}
.summary-badge {
  display:inline-block;
  padding:7px 12px;
  border-radius:16px;
  font-size:0.61em;
  font-weight:800;
  color:#4155c7;
  background:#e8e7fb;
  margin-bottom:12px;
}
.summary-box {
  background:#f7f2ec;
  border-left:3px solid #d07f45;
  border-radius:8px;
  padding:14px 12px;
  font-size:0.68em;
  line-height:1.85;
  color:#3b2d21;
  white-space:pre-line;
}

.center-col { min-width:0; }
.accordion-section {
  overflow:auto;
  margin-bottom:8px;
}
.accordion-header {
  background:#f4ece4;
  padding:10px 14px;
  display:flex; align-items:center; justify-content:space-between;
  cursor:pointer;
  border-bottom:1px solid #e5d4c4;
}
.acc-title { font-size:0.72em; font-weight:900; color:#2d2016; }
.acc-sub { font-size:0.61em; color:#a18369; margin-top:2px; }
.acc-arrow { font-size:0.61em; color:#9b7f68; }
.accordion-
.accordion-body.closed { display:none; }
.section-
.section-html div, .section-html p { max-width:100%; }
.section-html img { max-width:100%; height:auto; }
.section-html [style*="font-size:0.84em"][style*="font-weight:700"] {
  font-size:0.84em !important;
  font-weight:800 !important;
  color:#1e1610 !important;
}
.section-html [style*="font-size:0.78em"][style*="color:#333"] {
  color:#7a685b !important;
}
.tip-box {
  margin-top:12px;
  padding:8px 12px;
  border-radius:6px;
  background:#f8ebca;
  color:#7a4e13;
  font-size:0.68em;
  font-weight:800;
}
.bottom-bar {
  margin-top:14px;
  background:var(--brown-dark);
  color:#fff6ef;
  text-align:center;
  font-size:0.68em;
  font-weight:800;
  padding:10px 14px;
  border-radius:8px;
}










.overlay {
  display:none; position:fixed; inset:0;
  background:rgba(26,16,8,.7);
  z-index:200; align-items:center; justify-content:center; backdrop-filter:blur(4px);
}
.overlay.active { display:flex; }
.quick-modal {
  background:#fff; border-radius:16px; width:100%; max-width:760px;
  box-shadow:0 24px 60px rgba(0,0,0,.3); overflow:hidden;
}
.quick-modal-header {
  background:var(--brown-dark); padding:16px 20px;
  display:flex; align-items:center; justify-content:space-between;
}
.quick-modal-title { font-size:0.84em; font-weight:800; color:#fff; }
.quick-close {
  width:28px; height:28px; border-radius:50%; background:rgba(255,255,255,.12); border:none;
  color:#fff; font-size:0.78em; cursor:pointer;
}
.quick-modal-
.quick-modal-footer {
  padding:12px 20px; border-top:1px solid #f0e4d8; display:flex; justify-content:flex-end;
}
.modal-close-btn {
  padding:8px 20px; border-radius:8px; border:1px solid #e0d0c0; background:var(--brown-dark);
  color:#fff; font-size:0.72em; font-family:'Noto Sans KR',sans-serif;
}

@media (max-width: 1180px) {
  .content-grid {
    grid-template-columns: 220px minmax(0,1fr);
  }
    }
@media (max-width: 900px) {
  
  .content-grid {
    grid-template-columns: 1fr;
  }
    
  
  
}

 나옵니다", "summary_color": "#3A2FA0", "sections": [{"title": "① 공감 — 보험료 부담 인정", "subtitle": "비용 부담 느끼는 고객 심리에서 시작", "content_html": "고객님, 보험료가 매달 나가다 보면<br/>솔직히 부담이 크실 수 있습니다.<br/>보험이 여러 개면 합쳐서 월 10~20만 원 이상<br/>나가시는 분들도 많거든요.그런데 보험료가 많다고 보장이 좋은 것도 아니고,<br/>적다고 무조건 나쁜 것도 아닙니다.<br/>중요한 건 지금 내시는 보험료가<br/>제대로 된 보장에 쓰이고 있냐는 거거든요.", "tip": "⚡ 부담 공감 → \"그런데 구조가 문제다\"로 전환"}, {"title": "② 핵심 멘트 — 구조 정리의 가능성", "subtitle": "줄이면서 보강 가능하다는 인식", "content_html": "보험은 구조를 정리하면<br/>지금 보험료를 그대로 유지하거나 줄이면서도<br/>필요한 보장은 오히려 강화할 수 있습니다.<br/>무조건 더 넣는 게 아니라<br/>지금 구조에서 불필요한 건 줄이고<br/>부족한 건 채우는 방식입니다.실제로 중복된 항목을 정리하면<br/>월 3~5만 원 절감이 되는 경우가 있고,<br/>그 금액으로 더 중요한 보장을 채우실 수 있거든요.", "tip": "⚡ \"줄이면서 강화\" → 비용 부담 없다는 인식 심어주기"}, {"title": "③ 보험료 구조 점검 3가지", "subtitle": "무엇을 확인해야 하는지 구체적으로", "content_html": "보험료 구조에서 확인하는 세 가지가 있습니다.<br/>첫째, 갱신형 비중 — 나이 들수록 보험료가 오르는 구조인지<br/>둘째, 중복 항목 — 같은 보장이 여러 곳에 겹쳐 있는지<br/>셋째, 보장 공백 — 보험료 대비 보장이 충분한지<br/>이 세 가지만 보면 지금 보험료가<br/>효율적으로 쓰이고 있는지 바로 보입니다.지금 고객님 보험료 구조가<br/>어떻게 되어 있는지 확인해드릴게요.", "tip": "⚡ 3가지 체크포인트 제시 → 전문성 어필"}, {"title": "④ 연결 질문", "subtitle": "보험료 금액으로 자연스럽게 현황 파악", "content_html": "혹시 고객님, 한 달에 보험료가<br/>대략 얼마 정도 나가고 계세요?<br/>정확하지 않아도 됩니다.<br/>\"한 5~6만 원 정도요\" 이런 식으로<br/>대략만 말씀해 주셔도 바로 확인해드릴 수 있습니다.금액만 알아도 지금 구조가 적절한지<br/>방향이 바로 보입니다.", "tip": "⚡ 구체적 예시 제시 → 답변 방법 안내로 부담 낮추기"}]}, "📦 상품 설명|3대질환 설명형": {"pill": "상품 설명: 3대질환(암+뇌+심장)", "summary_title": "상품 정의", "summary_text": "암·뇌혈관·심장 세 가지 진단비를 묶어서 보는 핵심 보장 영역입니다.\n치료비 규모가 가장 크고 발생 빈도도 높아 보험 점검의 기준이 됩니다.\n세 가지 보장이 각각 어느 수준인지 전체 합산으로 확인합니다.", "summary_color": "#3B6D11", "sections": [{"title": "① 니즈환기 — 3대질환 발생 확률", "subtitle": "통계 기반으로 현실감 전달", "content_html": "고객님, 우리나라 사망 원인 1·2·3위가<br/>암·심장질환·뇌혈관질환입니다.<br/>평생 암 발생률이 남성 5명 중 2명, 여성 3명 중 1명 수준이고요.<br/>뇌·심장 질환 합치면 사실상 누구나 한 번은 마주할 수 있는 위험입니다.그러면서 치료비는 세 가지 합쳐서 최소 수천만 원에서<br/>억 단위까지 나올 수 있거든요.<br/>그래서 이 세 가지 보장이 제대로 잡혀 있는지가<br/>전체 보험 구성의 기준이 되는 겁니다.", "tip": "⚡ 통계 수치 → 남 얘기가 아님을 인식시킴"}, {"title": "② 연예인 사례 — 세 가지 각각", "subtitle": "각 질환별 실제 사례로 현실감 극대화", "content_html": "암: 김철민 씨 폐암 → 면역항암제 월 1,000만 원 이상<br/>뇌: 강원래 씨 뇌출혈 → 수년간 재활, 가족 전체 생활 변화<br/>심장: 이윤석 씨 심근경색 → 갑작스러운 응급 시술<br/>이분들이 공개하셨기 때문에 우리가 알고 있는 거고요.공개 안 된 분들이 훨씬 더 많습니다.<br/>이분들처럼 유명인이면 후원이라도 있지만<br/>일반 분들은 가족이 전부 감당해야 하거든요.<br/>그래서 3대 질환 보장이 충분한지가 가장 먼저입니다.", "tip": "⚡ 세 가지 각각 실명 사례 → 하나씩 공감 포인트 제공"}, {"title": "③ 현재 3대 질환 합산 확인 및 제안", "subtitle": "합산 금액 기준으로 보강 여부 판단", "content_html": "고객님 3대 질환 합산 진단비를 보면<br/>암: ○천만 원 / 뇌: ○천만 원 / 심장: ○천만 원<br/>합계 약 ○천만 원 수준입니다.최소 권장 합산 금액은 1억 원 이상입니다.<br/>현재 [충분 / 부족] 수준이며<br/>가장 취약한 항목은 [○○ 보장]입니다.<br/>이 부분부터 먼저 보강하시는 게 좋습니다.", "tip": "⚡ 합산 금액 vs 권장 1억 비교 → 보강 필요성 수치로 납득"}]}, "🔥 필요성 강조|보험료 대비 가치형": {"pill": "필요성 강조 2차: 보험료 대비 가치형", "summary_title": "핵심 포인트", "summary_text": "월 보험료가 얼마인지보다 그 금액으로 얼마를 커버하는지가 중요합니다\n보험료를 일상 지출과 비교하면 부담이 아니라는 걸 실감하게 됩니다\n가성비로 설득하는 단계입니다", "summary_color": "#C8793A", "sections": [{"title": "① 전환 멘트 — 비용에서 가치로", "subtitle": "보험료 부담 심리 미리 차단", "content_html": "고객님, 보험료 얘기를 들으시면<br/>\"또 돈 나가는 거 아니야\" 하는 생각이 드실 수 있습니다.<br/>그런데 한 가지만 같이 계산해보시겠습니까?<br/>이 보험료로 실제로 얼마를 커버하는지요.보험은 비용이 아니라<br/>위험을 대비하는 가장 저렴한 방법입니다.", "tip": "⚡ 부담 심리 인정 → \"계산해보자\"로 전환"}, {"title": "② 일상 지출과 비교", "subtitle": "친근한 비유로 보험료 체감 낮추기", "content_html": "월 [○만 원]짜리 보험이라고 하면<br/>하루로 나누면 [○원]입니다.<br/>아메리카노 한 잔 값도 안 되거든요.<br/>그런데 이 금액으로<br/>암 진단 시 [○천만 원],<br/>뇌·심장 진단 시 [○천만 원]을<br/>보장받으시는 겁니다.커피 한 잔 값으로<br/>수천만 원 리스크를 커버하는 구조입니다.<br/>이게 보험의 본질이거든요.", "tip": "⚡ \"하루 커피 한 잔\" 비유 → 보험료가 부담 아니라는 인식"}, {"title": "③ 미가입 시 직접 비용과 비교", "subtitle": "보험료 vs 직접 부담 금액 대조", "content_html": "반대로 이 보험이 없으셨을 때<br/>직접 감당하셔야 하는 금액을 보면,<br/>암 치료 총 비용 평균 3천만~1억 원,<br/>뇌졸중 치료·재활 총 비용 평균 2천만~5천만 원,<br/>간병 10년이면 2억~3억 원.월 [○만 원] 보험료와<br/>수천만~수억 원 직접 부담 중<br/>어느 쪽이 현실적인 선택인지<br/>숫자로 보시면 바로 답이 나오시죠?", "tip": "⚡ 보험료 vs 직접 부담 대조표 → 논리적 설득"}, {"title": "④ 결정 유도", "subtitle": "가성비 확인 후 자연스럽게 연결", "content_html": "고객님, 월 [○만 원]으로<br/>[보장 항목] 위험을 커버하시는 겁니다.<br/>이것보다 가성비 좋은 선택이 없습니다.<br/>오늘 이 한 가지만 진행해보시겠습니까?지금 이 금액이 나중에<br/>수천만 원을 아껴드리는 선택이 될 수 있습니다.", "tip": "⚡ 가성비 최종 확인 + 결정 유도"}]}, "📦 상품 설명|치아보험 설명형": {"pill": "상품 설명: 치아보험", "summary_title": "상품 정의", "summary_text": "충치 치료·임플란트·틀니 등 치과 치료비를 보장하는 상품입니다.\n실비보험이 치과 비급여를 거의 보장하지 않기 때문에 별도로 준비해야 합니다.\n보험료는 낮지만 실생활 체감이 빠른 편이며, 대기기간 조건 확인이 중요합니다.", "summary_color": "#3B6D11", "sections": [{"title": "① 니즈환기 — 치과 비용 실제 사례", "subtitle": "치과 치료비의 현실적 부담 전달", "content_html": "고객님, 임플란트 하나에 얼마나 드는지 아세요?<br/>치과마다 다르지만 100~150만 원이 기본입니다.<br/>위아래 다 하면 400~600만 원,<br/>뼈이식까지 들어가면 200만 원이 넘는 경우도 있습니다.충치 치료도 신경치료에 크라운까지 하면<br/>한 개에 60~100만 원 나오는 경우가 많거든요.<br/>그런데 실비보험은 치과 비급여를 거의 안 됩니다.<br/>그래서 치아보험을 별도로 갖고 계셔야 하는 거예요.", "tip": "⚡ 실비 = 치과 안 됨 → 별도 필요성 명확히"}, {"title": "② 실제 경험 사례", "subtitle": "주변 사례로 공감 유도", "content_html": "제가 상담 중에 자주 듣는 얘기가,<br/>\"치아보험 없어서 임플란트 비용 카드 할부로 냈다\"는 분들이요.<br/>한 번에 150만 원이 나가면 부담이 크잖아요.반대로 치아보험 있으신 분들은<br/>\"이거 가입하고 나서 치과 가는 게 전혀 부담이 없어졌다\"고 하십니다.<br/>실생활에서 가장 빠르게 체감할 수 있는 보험 중 하나입니다.", "tip": "⚡ 체감 빠른 보험 → 가성비 포인트로 어필"}, {"title": "③ 현재 치아 보장 확인 및 제안", "subtitle": "대기기간·보장 항목 확인", "content_html": "고객님 치아보험을 확인하면<br/>임플란트 보장 여부 / 대기기간 / 연간 한도 / 보장 횟수가 확인됩니다.대기기간이 없거나 짧은 상품이 유리하고,<br/>임플란트 연 2개 이상 보장되는지 확인이 중요합니다.<br/>현재 없으시거나 보장이 약하시면 바로 보강하실 수 있습니다.", "tip": "⚡ 대기기간 = 가장 중요한 조건 → 전문성 어필"}]}, "⚡ 반론 대응|생각해볼게요형": {"pill": "반론 대응: 생각해볼게요형", "summary_title": "핵심 포인트", "summary_text": "\"생각해볼게요\" 반응 전용입니다\n생각하시는 것은 당연하되 무엇을 기준으로 생각하실지 잡아드립니다\n기준 없이 생각하시면 결론이 안 나올 수 있다는 점을 안내합니다", "summary_color": "#0F6E56", "sections": [{"title": "① 수용 — 생각하는 것 당연", "subtitle": "거절로 받지 않기", "content_html": "고객님, 네 충분히 생각해보시는 게 맞습니다.<br/>보험은 장기 결정이니까 신중하게 하시는 게 맞거든요.다만 생각하실 때 기준이 있어야<br/>결론이 나오거든요.<br/>오늘 확인된 내용 중에서 딱 하나만 기억해 주시면 됩니다.", "tip": "⚡ 생각 자체를 막지 않고 — 기준만 제공"}, {"title": "② 생각의 기준 제시", "subtitle": "고객이 혼자 판단할 수 있는 기준 제공", "content_html": "생각하실 때 이것만 기준으로 보시면 됩니다.<br/>\"지금 내가 [보장 항목] 위험이 생기면 어떻게 되나?\"<br/>이 질문 하나만 생각해보시면 됩니다.대비가 되어 있으면 그냥 넘어가시면 되고,<br/>대비가 안 되어 있다는 느낌이 드시면<br/>그게 바로 지금 챙겨야 한다는 신호입니다.", "tip": "⚡ 고객 스스로 판단하게 하는 질문 제시 — 강요 없이 결론 유도"}, {"title": "③ 재연락 약속 설정", "subtitle": "생각 후 연락할 기준 잡아두기", "content_html": "생각해보시고 나서 언제쯤 결론이 나오실 것 같으세요?<br/>며칠 안에 연락드릴까요, 아니면 먼저 연락 주시겠습니까?어떻게 결정하셔도 괜찮으니까,<br/>편하게 연락 주시면 바로 도와드리겠습니다.", "tip": "⚡ 재연락 기준 설정 — 흐지부지되지 않도록"}]}, "🔥 필요성 강조|보장 누락 안내": {"pill": "필요성 강조: 보장 누락 안내형", "summary_title": "핵심 멘트", "summary_text": "보험은 있는 것보다 빠진 보장이 없는지가 더 중요합니다\n가입된 보험이 있어도 정작 필요한 보장이 빠진 경우가 많습니다\n지금 가입된 보장 한번만 확인해보시면 빠진 부분이 바로 보입니다", "summary_color": "#3A2FA0", "sections": [{"title": "① 공감 — 보험이 있다는 안도감이 오히려 위험", "subtitle": "\"있으니 괜찮다\"는 심리에서 시작", "content_html": "고객님, 보험이 있으시다는 거 알고 있습니다.<br/>그런데 한 가지만 여쭤봐도 될까요?<br/>지금 가입된 보험에서<br/>어떤 상황이 됐을 때 얼마를 받으실 수 있는지<br/>정확하게 파악하고 계세요?대부분 고객님들이 \"보험이 있으니 괜찮겠지\" 하고 계시는데<br/>막상 필요한 상황이 오면 생각보다 보장이 안 되는 경우가 많거든요.", "tip": "⚡ \"있으니 괜찮다\"는 착각을 흔들기 → 점검 필요성 인식"}, {"title": "② 핵심 멘트 — 누락의 현실", "subtitle": "실제로 빠진 보장이 어떤 피해를 주는지", "content_html": "보험에서 가장 위험한 게<br/>중요한 보장이 빠져 있는 줄 모르고 있는 겁니다.<br/>암 진단을 받았는데 소액암이라 보험금이 적게 나왔다거나,<br/>뇌경색이 왔는데 뇌출혈 보장만 있어서<br/>보험금을 못 받으셨다는 분들이 실제로 있습니다.보험이 있었는데도 보장을 못 받는 상황이 생기는 거거든요.<br/>이게 바로 누락된 보장 때문입니다.", "tip": "⚡ 실제 사례 언급 → 추상적 위험이 현실감 있게 전달됨"}, {"title": "③ 핵심 3가지 보장 체크", "subtitle": "무엇을 확인해야 하는지 구체적으로", "content_html": "보장에서 가장 먼저 확인하는 세 가지가 있습니다.<br/>첫째, 실비 — 병원비 직접 보장<br/>둘째, 3대 질환 진단비 — 암·뇌·심장<br/>셋째, 생활비 보장 — 입원일당·수술비<br/>이 세 가지가 기본 축이고<br/>하나라도 빠지면 큰 구멍이 생깁니다.지금 고객님 보험에 이 세 가지가<br/>제대로 잡혀 있는지 확인해드릴게요.", "tip": "⚡ 3가지 체크리스트 제시 → 고객이 \"내 건 다 있나\" 스스로 생각하게 됨"}, {"title": "④ 연결 질문", "subtitle": "3대 질환으로 바로 연결", "content_html": "혹시 고객님,<br/>암·뇌혈관·심장 이 3대 질환 보장이<br/>어떻게 잡혀 있는지 확인해보신 적 있으세요?<br/>이 세 가지만 봐도<br/>전체 보장 수준이 어느 정도인지 바로 파악이 됩니다.지금 바로 확인해드릴 수 있습니다.", "tip": "⚡ 3대 질환 구체 언급 → 고객이 즉시 관심 갖는 영역"}]}, "🔥 필요성 강조|위험 인식 안내": {"pill": "필요성 강조: 위험 인식 안내형", "summary_title": "핵심 멘트", "summary_text": "보험은 필요할 때 가입하려고 하면 이미 늦은 경우가 많습니다\n지금 건강하실 때가 가장 좋은 조건으로 가입할 수 있는 시점입니다\n나중에 후회하지 않으려면 지금 한번 확인해두시는 게 현실적입니다", "summary_color": "#3A2FA0", "sections": [{"title": "① 공감 — 지금 당장 필요 없다는 심리", "subtitle": "건강할 때 보험이 와닿지 않는 게 당연하다는 인정", "content_html": "고객님, 지금 건강하시면<br/>보험이 당장 필요하다는 느낌이 안 드실 수 있습니다.<br/>건강할 때 보험 생각하는 사람이 어디 있겠어요.<br/>그게 사람 심리상 당연한 겁니다.그런데 보험의 특성이 하나 있습니다.<br/>필요할 때 가입하려고 하면<br/>이미 가입이 어려워져 있는 경우가 많다는 거거든요.", "tip": "⚡ 공감에서 시작 → \"그런데\" 반전"}, {"title": "② 핵심 멘트 — 타이밍의 현실", "subtitle": "지금이 가장 유리한 이유 구체적으로", "content_html": "보험은 건강 상태를 심사합니다.<br/>지금 건강하시면 아무 조건 없이 가입이 가능하지만,<br/>나중에 건강검진에서 뭔가 나오거나<br/>혈압약·당뇨약 같은 걸 드시기 시작하면<br/>그때부터 부담보가 붙거나 가입이 거절될 수 있거든요.실제로 가입하려고 알아봤더니<br/>고혈압 이력 때문에 심장·뇌 보장에 부담보가 붙었다거나,<br/>당뇨 진단 후에 실비 가입이 거절됐다는 분들이<br/>생각보다 많습니다.", "tip": "⚡ 구체적 사례 제시 → \"나도 그럴 수 있다\"는 인식"}, {"title": "③ 비용 관점 — 지금이 가장 저렴", "subtitle": "나이가 올라갈수록 보험료가 올라가는 구조", "content_html": "거기다 보험료도 나이가 올라갈수록 높아집니다.<br/>지금 이 상품을 1년 뒤에 가입하시면<br/>보험료가 5~15% 더 올라가 있을 수 있고,<br/>10년 뒤엔 훨씬 더 오릅니다.<br/>지금 가입하시면 낮은 보험료로<br/>오래 유지하실 수 있습니다.지금 건강하실 때,<br/>조건이 좋을 때가<br/>가장 유리한 조건으로 가입하실 수 있는 시점입니다.", "tip": "⚡ 보험료 인상 구체화 → 미루면 손해라는 인식"}, {"title": "④ 연결 질문", "subtitle": "현재 가입 여부 확인으로 시작", "content_html": "혹시 고객님, 지금 보험은<br/>어느 정도 가입이 되어 있으세요?<br/>현재 어느 정도 준비되어 있는지 기준으로<br/>추가로 필요한 부분이 있는지 확인해드리겠습니다.지금 건강하실 때 한번 확인해두시는 게<br/>가장 현실적인 방법입니다.", "tip": ""}]}, "🔎 고객 상황 확인 (보험 조회 유도)|가입 갯수 확인형": {"pill": "고객 상황 확인: 가입 개수 확인형", "summary_title": "핵심 질문", "summary_text": "몇 개 정도 가입되어 있으신지만 보면 됩니다\n많고 적음보다 구조가 어떻게 되어 있는지가 더 중요합니다\n대략적인 개수만 말씀 주셔도 방향 확인이 됩니다", "summary_color": "#0F6E56", "sections": [{"title": "① 질문 전 포지셔닝", "subtitle": "개수가 많고 적음은 중요하지 않다는 안심 제공", "content_html": "고객님, 보험이 많다고 좋은 것도 아니고<br/>적다고 나쁜 것도 아닙니다.<br/>현재 구조가 어떻게 되어 있는지가 더 중요하거든요.그래서 대략적인 개수만 알아도<br/>지금 방향을 바로 볼 수 있습니다.", "tip": "⚡ \"많다 / 적다\" 판단 없다는 안심 → 솔직한 답변 유도"}, {"title": "② 핵심 질문", "subtitle": "부담 없는 단답형 질문", "content_html": "혹시 고객님, 지금 보험이<br/>대략 몇 개 정도 가입되어 있으세요?정확한 개수가 아니어도 됩니다.<br/>대략 몇 개인지만 말씀해 주셔도 충분합니다.", "tip": "⚡ \"정확하지 않아도 된다\" — 답변 부담 완전 제거"}, {"title": "③ 반응별 대응", "subtitle": "개수에 따라 다음 흐름으로 자연스럽게 연결", "content_html": "1~2개 → 보장 구성 점검으로 연결<br/>3~5개 → 중복·누락 확인으로 연결<br/>잘 모름 → 가입 내역 조회 안내로 연결\"1~2개요\" → \"그러면 보장이 충분히 잡혀 있는지 먼저 확인해드릴게요.\"<br/>\"잘 모르겠어요\" → \"그러면 지금 바로 조회해서 확인해드릴 수 있습니다.\"", "tip": "⚡ 어떤 답이든 다음 단계로 연결 — 막히지 않는 흐름"}]}, "📦 상품 설명|치매보험 설명형": {"pill": "상품 설명: 치매보험", "summary_title": "상품 정의", "summary_text": "치매 진단 시 진단비 + 매월 생활비를 장기간 받는 구조입니다.\n경증·중증 치매 구분에 따라 지급 조건이 다르며 고령화로 수요가 급증하고 있습니다.\n치료비보다 돌봄·간병 기간이 더 길어 장기적인 현금 흐름이 핵심입니다.", "summary_color": "#3B6D11", "sections": [{"title": "① 니즈환기 — 치매 치료·간병 비용", "subtitle": "치매의 경제적 부담 구체적으로", "content_html": "고객님, 치매는 완치가 없는 병입니다.<br/>평균 치매 진행 기간이 8~10년이고요.<br/>그 기간 동안 전문 요양시설 이용하면<br/>월 150~250만 원, 10년이면 2억 원이 넘는 비용이 나옵니다.그러면서 환자 본인은 의사표현을 못 하게 되고,<br/>가족 중 누군가는 일을 줄이거나 그만둬야 하는 상황이 오거든요.<br/>치매보험이 있으면 매달 현금이 나와서 그 기간을 버틸 수 있습니다.", "tip": "⚡ 8~10년이라는 기간 + 2억 → 고객이 충격 받을 수 있는 수치"}, {"title": "② 연예인·실제 사례", "subtitle": "공개된 사례로 현실감 전달", "content_html": "방송에서 나왔던 얘기인데요,<br/>유명 연예인 가족분 중에 치매로 오랫동안 고생하셨다는 분들이 계시잖아요.<br/>가족이 번갈아가며 돌보다가 결국 요양원에 모셨다는 얘기들이요.제 주변에도 어머니 치매 때문에<br/>10년 가까이 간병하신 분이 있거든요.<br/>그분은 결국 자기 노후 준비를 못 하셨어요.<br/>부모님 치매가 자녀 노후까지 흔들 수 있다는 게 현실입니다.", "tip": "⚡ 주변 실제 사례 → 연예인보다 더 공감됨"}, {"title": "③ 현재 치매 보장 확인 및 제안", "subtitle": "경증·중증 범위 및 지급액 확인", "content_html": "고객님 치매 보장을 확인하면<br/>경증(CDR 1단계)부터 보장되는지, 중증만 해당되는지 확인됩니다.<br/>경증부터 보장되는 게 실제로 받을 가능성이 훨씬 높습니다.현재 치매 진단비: ○만 원 / 월 생활비: ○만 원<br/>이 수준으로 10년이면 총 ○천만 원입니다.<br/>실제 필요 비용 대비 [충분 / 부족] 수준이며<br/>보강이 필요하시면 말씀드리겠습니다.", "tip": "⚡ 경증 vs 중증 범위 → 고객이 모르는 핵심 차이 포인트"}]}, "| 회사별 BMI 심사기준|": {"pill": "", "summary_title": "", "summary_text": "", "summary_color": "#c8753a", "sections": []}, "🔎 고객 상황 확인 (보험 조회 유도)|관심 보장 확인형": {"pill": "고객 상황 확인: 관심 보장 확인형", "summary_title": "핵심 질문", "summary_text": "요즘 가장 신경 쓰이는 보장이 어느 쪽인지만 보면 됩니다\n고객님이 민감하게 보는 부분부터 확인하는 게 더 빠릅니다\n병원비 쪽인지, 큰 질병 쪽인지만 말씀 주시면 됩니다", "summary_color": "#0F6E56", "sections": [{"title": "① 질문 전 포지셔닝", "subtitle": "전체 다 볼 필요 없이 관심 영역부터 시작", "content_html": "고객님, 보험은 전체를 다 보는 것도 중요하지만<br/>지금 고객님이 가장 신경 쓰이는 부분부터<br/>먼저 확인해드리는 게 더 빠르거든요.어느 보장을 더 중요하게 생각하시는지만 말씀 주시면<br/>그 부분부터 바로 확인해드릴 수 있습니다.", "tip": "⚡ \"전부 다\" 부담 제거 → 관심 영역 한 가지로 집중"}, {"title": "② 핵심 질문", "subtitle": "두 가지 선택지로 답변 유도", "content_html": "혹시 고객님, 요즘 가장 걱정되시는 게<br/>병원비 쪽이세요, 아니면 암·뇌·심장 같은 큰 질병 쪽이세요?둘 중 하나만 말씀해 주셔도 그 부분부터 먼저 확인해드리겠습니다.", "tip": "⚡ 선택지 2개 제시 → 단답 유도, 질문이 구체적일수록 답변율 높음"}, {"title": "③ 반응별 대응", "subtitle": "관심 보장에 따라 맞춤 흐름으로 연결", "content_html": "병원비 쪽 → 실비 중심으로 보장 점검<br/>큰 질병 쪽 → 3대 질환 보장 중심으로 점검<br/>둘 다 → 전체 보장 구성 순서대로 점검\"병원비요\" → \"그러면 실비 보장이 어떻게 잡혀 있는지부터 확인해드릴게요.\"<br/>\"암 같은 큰 병이요\" → \"그러면 3대 질환 보장 기준으로 먼저 확인해드리겠습니다.\"", "tip": "⚡ 관심사 맞춤 연결 — 고객 입장에서 '나를 위한 상담'으로 느껴짐"}]}, "| 보험연령표|": {"pill": "", "summary_title": "", "summary_text": "", "summary_color": "#c8753a", "sections": []}, "📦 상품 설명|정기보험 설명형": {"pill": "상품 설명: 정기보험", "summary_title": "상품 정의", "summary_text": "일정 기간 동안만 사망 보장을 제공하는 순수 보장형 상품입니다.\n같은 보험금 기준으로 종신보험보다 보험료가 훨씬 낮아 비용 효율이 높습니다.\n자녀 독립·대출 상환 완료 등 특정 기간에 집중 보장이 필요한 분들에게 적합합니다.", "summary_color": "#3B6D11", "sections": [{"title": "① 니즈환기 — 정기보험의 역할", "subtitle": "보장이 가장 필요한 시기에 집중", "content_html": "고객님, 보험이 가장 필요한 시기가 언제인지 아세요?<br/>자녀가 어리고 대출이 있는 40~50대입니다.<br/>이 시기에 가장이 없어지면 가족 피해가 가장 크거든요.정기보험은 이 시기에 집중적으로 큰 보장을 제공하고,<br/>자녀가 독립하고 대출이 갚히면 보험료도 없어지는 구조입니다.<br/>종신보험보다 보험료가 5~10배 이상 저렴하기 때문에<br/>같은 보험료로 훨씬 큰 보장을 받으실 수 있거든요.", "tip": "⚡ \"필요한 시기에 집중\" — 합리적 소비자에게 효과적"}, {"title": "② 비용 비교 사례", "subtitle": "종신보험 대비 가성비 구체적으로", "content_html": "예를 들어서 5억 원 사망 보장을 원하신다면,<br/>종신보험은 월 20~30만 원이 들거든요.<br/>정기보험 20년 만기로 하시면 월 3~5만 원으로 가능합니다.<br/>이 차액을 저축하시는 게 더 유리한 경우도 있습니다.물론 종신보험이 더 좋은 경우도 있습니다.<br/>어느 쪽이 고객님 상황에 맞는지는<br/>지금 대출 규모·자녀 나이·예산을 보고 같이 판단해드리겠습니다.", "tip": "⚡ 종신 vs 정기 비교 → 두 가지 다 열어놓고 상황별 판단"}, {"title": "③ 현재 보장 확인 및 제안", "subtitle": "사망 보장 기간 및 금액 확인", "content_html": "고객님 현재 사망 보장을 보면<br/>종신형 ○억 원 / 정기형 ○억 원으로 확인됩니다.<br/>만기 기간이 언제인지, 현재 상황과 맞는지 확인이 필요합니다.대출이 15년 남으셨으면 15~20년 만기 정기보험으로 커버하시고,<br/>이후에는 기본 보장만 유지하시는 방향도 있습니다.<br/>고객님 상황에 맞는 방향으로 같이 정리해드리겠습니다.", "tip": "⚡ 대출 잔존 기간 = 정기보험 만기 기준 → 실용적 제안"}]}, "| 미러링 전 녹취 스크립트|": {"pill": "", "summary_title": "", "summary_text": "", "summary_color": "#c8753a", "sections": [{"title": "미러링 전 동의 녹취 (핵심만)", "subtitle": "고객님 안녕하세요. ○○○ 입니다. [미러링 청약] 진행을 위해 미러링(화면 공유) 전 동의 녹취 먼저 읽어 드리겠습니다 아래 회사별 동의 녹취 스크립트 선택 후 녹취 진행 가능합니다.", "content_html": "", "tip": ""}]}, "| 원전산 설계 바로가기|": {"pill": "", "summary_title": "", "summary_text": "", "summary_color": "#c8753a", "sections": []}, "⚡ 반론 대응|보험료 부담형": {"pill": "반론 대응: 보험료 부담형", "summary_title": "핵심 포인트", "summary_text": "\"보험료가 부담돼요\" 반응 전용입니다\n부담을 인정하되 구조 정리로 줄일 수 있다는 방향으로 전환합니다\n새로 추가하는 게 아니라 기존 구조를 정리하는 것임을 강조합니다", "summary_color": "#0F6E56", "sections": [{"title": "① 공감 — 부담 먼저 인정", "subtitle": "방어 반응 없애는 첫 문장", "content_html": "고객님, 보험료 부담이 크시다는 거 충분히 이해합니다.<br/>보험을 여러 개 유지하다 보면<br/>매달 나가는 금액이 적지 않으시잖아요.그런데 한 가지만 말씀드리면,<br/>보험료 부담이 크신 분들일수록<br/>구조를 한번 정리하시면 줄어드는 경우가 많거든요.<br/>무조건 더 넣는 게 아니라 정리하는 겁니다.", "tip": "⚡ \"더 넣는 게 아니라 정리\" — 부담 증가 우려 차단"}, {"title": "② 보험료 절감 가능성 제시", "subtitle": "구조 정리로 절감 가능한 금액 구체화", "content_html": "지금 가입된 보험 중에서<br/>중복되거나 불필요한 항목을 정리하면<br/>월 ○~○만 원 절감이 가능한 경우가 있습니다.<br/>이 금액으로 지금 부족한 [보장 항목]을 채우시면<br/>실질적으로 보험료는 그대로이거나 줄어들 수 있습니다.즉, 지금보다 보험료를 더 내시는 게 아니라<br/>구조를 바꿔서 같은 금액으로 더 좋은 보장을 받으시는 겁니다.", "tip": "⚡ 절감 + 보강 = 비용 중립 → 고객이 손해 없다고 느낌"}, {"title": "③ 결정 유도 — 구조 정리만 제안", "subtitle": "부담 없는 방향으로 마무리", "content_html": "고객님, 오늘 제가 드리는 제안은<br/>보험료를 더 내시라는 게 아닙니다.<br/>지금 구조를 한번 정리해보자는 겁니다.<br/>정리해보고 절감 가능한 부분이 있으면 알려드리고,<br/>없으면 그냥 유지하시면 됩니다.<br/>한번 확인해보시겠습니까?부담이 더 생기는 방향이 아니라<br/>오히려 줄어들 수 있는 방향입니다.", "tip": "⚡ \"부담 줄어들 수 있다\" — 반론이 오히려 진행 이유가 됨"}]}, "📦 상품 설명|2대질환 설명형": {"pill": "상품 설명: 2대질환(뇌·심장)", "summary_title": "상품 정의", "summary_text": "암을 제외한 뇌혈관·심장 질환 진단 시 지급되는 진단비입니다.\n뇌출혈·급성심근경색의 좁은 범위부터 뇌졸중·허혈성심장질환 넓은 범위까지 상품마다 다릅니다.\n발생 시 치료비·회복 기간이 길어 소득 공백이 가장 큰 보장 영역입니다.", "summary_color": "#3B6D11", "sections": [{"title": "① 니즈환기 — 뇌·심장 치료 실제 비용", "subtitle": "뇌졸중·심근경색 치료비 구체적으로", "content_html": "고객님, 뇌졸중이 오면 응급 스텐트 시술 하나에<br/>300~500만 원이 기본으로 나옵니다.<br/>거기에 중환자실 하루 50~100만 원,<br/>재활치료까지 합치면 총 치료비가 수천만 원 수준이 됩니다.심근경색 스텐트 시술은 한 번에 200~400만 원,<br/>이후 약값만 한 달에 10~20만 원씩 평생 나오는 경우도 있습니다.<br/>게다가 뇌졸중은 후유 장애가 남는 경우가 많아서<br/>회복 기간 동안 간병비까지 추가됩니다.", "tip": "⚡ 뇌·심장은 암보다 더 갑작스러움 — 준비 없으면 가족 전체가 흔들림"}, {"title": "② 연예인·실제 사례", "subtitle": "갑작스러운 발병 사례로 현실감 전달", "content_html": "이병헌 씨 부친분이나, 운동선수 분들이<br/>갑자기 쓰러지셨다는 뉴스 보신 적 있으시잖아요.<br/>뇌혈관 질환은 예고 없이 오는 게 특징이거든요.<br/>아침에 멀쩡했다가 점심에 응급실 가는 경우가 진짜 있습니다.제가 상담하다 보면 40~50대 남성 고객 중에<br/>갑자기 쓰러지셔서 치료비 수천만 원 나오고<br/>6개월~1년 회사를 못 나가셨다는 분들을 꽤 봤거든요.<br/>그때 진단비가 없으면 가족이 다 감당하게 됩니다.", "tip": "⚡ 40~50대 타깃에게 특히 효과적 — 본인 연령대 사례"}, {"title": "③ 보장 범위 확인 및 제안", "subtitle": "넓은 범위 vs 좁은 범위 차이 설명", "content_html": "고객님 현재 뇌·심장 보장을 확인하면<br/>뇌출혈만 / 뇌졸중까지 / 뇌혈관 전체 중 어느 범위인지 확인됩니다.<br/>범위가 좁을수록 실제 지급되는 경우가 적어집니다.뇌출혈은 전체 뇌졸중의 약 20%만 해당되고<br/>나머지 80%는 뇌경색입니다.<br/>뇌출혈만 보장된다면 실제 사고 시 받지 못할 가능성이 높습니다.<br/>넓은 범위로 보강하시는 게 현실적으로 더 유리합니다.", "tip": "⚡ 좁은 범위의 허점 설명 → 보강 필요성 납득"}]}, "✅ 클로징|기존 보험 비교형": {"pill": "클로징: 기존 보험 비교형", "summary_title": "핵심 포인트", "summary_text": "지금 보험을 해지하고 새로 가입하라는 게 아닙니다\n기존 보험을 유지하면서 부족한 부분만 추가하는 방향입니다\n기존 보험 기준으로 한번만 비교해보시면 방향이 나옵니다", "summary_color": "#0F6E56", "sections": [{"title": "① 기존 보험 유지 전제 확인", "subtitle": "교체 아님을 명확히", "content_html": "고객님, 오늘 제가 드리는 제안은<br/>지금 보험을 해지하고 새로 가입하라는 게 아닙니다.<br/>지금 보험은 그대로 유지하시면서,<br/>부족한 [보장 항목] 부분만 추가하시는 겁니다.이렇게 하면 기존 보험의 좋은 부분은 그대로 살리면서,<br/>지금 빠진 보장만 채우실 수 있습니다.<br/>해지 없이 추가하는 구조라서 리스크가 없습니다.", "tip": "⚡ \"해지 없이 추가\" — 기존 보험 상실 불안 완전 해소"}, {"title": "② 비교 결과 요약", "subtitle": "유지할 것과 추가할 것 명확히 구분", "content_html": "오늘 확인된 내용 기준으로 정리하면,<br/>[유지]: 기존 보험 중 충분한 보장 → 그대로 유지<br/>[추가]: [보장 항목] → 이 부분만 보강추가 보험료는 월 ○만 원 수준이고요.<br/>이 금액으로 [보장 항목] 위험을<br/>커버하실 수 있습니다.", "tip": "⚡ 유지/추가 명확히 구분 + 추가 보험료 구체화"}, {"title": "③ 최종 제안", "subtitle": "한 가지 추가만 결정", "content_html": "고객님, 오늘 결정하실 건 딱 하나입니다.<br/>기존 보험은 그대로 두시고,<br/>[보장 항목] 이것 하나만 추가하시는 겁니다.<br/>지금 진행하시겠습니까?진행하시면 기존 보험 건드리지 않고,<br/>추가 서류만 간단히 처리해드리겠습니다.<br/>15분이면 충분합니다.", "tip": "⚡ \"기존 건드리지 않음\" 재확인 — 마지막 저항 제거"}]}, "🔎 고객 상황 확인 (보험 조회 유도)|최근 점검 여부 확인형": {"pill": "고객 상황 확인: 최근 점검 여부 확인형", "summary_title": "핵심 질문", "summary_text": "최근에 보험 점검 받아보신 적 있으신지 확인드립니다\n점검 시점만 알아도 현재 상태를 가늠할 수 있습니다\n오래됐으면 기준이 바뀐 부분이 있을 수 있습니다", "summary_color": "#0F6E56", "sections": [{"title": "① 질문 전 포지셔닝", "subtitle": "점검이 당연히 필요한 것임을 자연스럽게", "content_html": "고객님, 보험은 가입하고 나서<br/>한 번도 점검 안 하시는 분들이 생각보다 많습니다.<br/>시간이 지나면 기준이 바뀌거나<br/>상황에 안 맞는 보장이 생기는 경우가 있거든요.그래서 최근에 점검을 해보셨는지만 확인드리는 겁니다.", "tip": "⚡ 점검 안 한 게 이상한 게 아님 — 공감에서 시작"}, {"title": "② 핵심 질문", "subtitle": "부담 없는 시점 확인 질문", "content_html": "혹시 고객님, 보험 점검을<br/>최근에 받아보신 적 있으세요?언제 하셨는지만 알아도 지금 상태를 가늠하는 데 도움이 됩니다.", "tip": ""}, {"title": "③ 반응별 대응", "subtitle": "점검 시점에 따라 다음 흐름으로 연결", "content_html": "최근에 했다 → 어떤 부분 점검했는지로 연결<br/>오래됐다 → 기준 변경 이유로 지금 점검 제안<br/>한 번도 안 했다 → 지금이 처음 점검 타이밍\"작년에 했어요\" → \"그러면 최근에 기준이 좀 바뀐 부분만 확인해드릴게요.\"<br/>\"한 번도 안 했어요\" → \"그러면 지금 처음 한번 확인해보시는 게 좋겠습니다.\"", "tip": "⚡ 어떤 답이든 지금 점검이 필요한 이유로 연결 가능"}]}, "📊 보장 분석|누락 확인형": {"pill": "보장 분석: 누락 확인형", "summary_title": "분석 포인트", "summary_text": "보험은 있는 것보다 빠진 보장이 없는지가 더 중요합니다\n실비·3대 질환·생활비 이 세 축이 모두 있는지 확인합니다\n빠진 항목만 찾아드려도 현재 보장 상태가 바로 보입니다", "summary_color": "#185FA5", "sections": [{"title": "① 누락 확인 시작 멘트", "subtitle": "조회 결과를 보면서 빠진 항목 찾기", "content_html": "고객님, 지금 조회된 내용을 보면서<br/>빠진 보장이 없는지부터 확인해드리겠습니다.<br/>보험은 있는 것보다 없는 게 더 위험하거든요.보장에서 가장 먼저 확인하는 세 가지가 있습니다.<br/>① 실비 — 병원비 직접 보장<br/>② 3대 질환 진단비 — 암·뇌·심장<br/>③ 생활비 보장 — 입원일당·수술비<br/>이 세 가지가 기본 축인데 하나라도 빠지면 구멍이 생기거든요.", "tip": "⚡ 세 가지 기준 먼저 제시 → 고객이 스스로 \"내 건 다 있나\" 생각하게 됨"}, {"title": "② 실비 누락 확인", "subtitle": "실비 없는 경우 가장 먼저 짚기", "content_html": "고객님, 우선 실비가 있으신지부터 확인했는데요.<br/>실비는 보험의 가장 기본 축입니다.<br/>이게 없으면 병원 치료비 전체를 본인이 부담해야 해서<br/>다른 보장보다 먼저 챙겨야 하는 항목이거든요.현재 실비가 [있음 / 없음] 확인됩니다.<br/>※ 없는 경우 → \"실비가 없으시네요. 이게 가장 먼저 챙기셔야 하는 보장입니다.\"<br/>※ 있는 경우 → \"실비는 있으신데, 몇 세대 상품인지 보겠습니다.\"", "tip": "⚡ 있다/없다 각각 대응 멘트 포함 — 어떤 상황이든 바로 쓸 수 있게"}, {"title": "③ 3대 질환 누락 확인", "subtitle": "진단비 보장 빠진 항목 찾기", "content_html": "다음으로 3대 질환 진단비입니다.<br/>암·뇌혈관·심장 이 세 가지 진단비가<br/>각각 어떻게 잡혀 있는지 확인합니다.암 진단비: [있음 ○천만 원 "title": "① 공감 — 있다는 사실 인정", "subtitle": "부정하지 않고 수용", "content_html": "고객님, 네 보험이 있으시다는 거 알겠습니다.<br/>보험을 챙기고 계신다는 게 잘 하고 계신 겁니다.다만 한 가지만 여쭤봐도 될까요?<br/>지금 가입된 보험이 어떤 보장이 되는지<br/>정확히 파악하고 계신가요?", "tip": "⚡ 있다 인정 → 내용 파악 여부 질문으로 자연스럽게 전환"}, {"title": "② 있어도 안 되는 경우 설명", "subtitle": "\"있다\"는 안도감이 오히려 위험", "content_html": "보험은 가입이 되어 있다고 해서<br/>모든 상황이 다 보장되는 건 아닙니다.<br/>실제로 암 진단을 받으셨는데 소액암이라서<br/>일반암 보험금을 못 받으신 분들이 있고요.<br/>뇌경색인데 뇌출혈 보장만 있어서 못 받으신 분들도 있습니다.보험이 있어도 내용이 맞지 않으면<br/>막상 필요한 순간에 보장이 안 될 수 있거든요.<br/>그래서 있다는 것보다 제대로 잡혀 있는지가 더 중요합니다.", "tip": "⚡ \"있어도 안 된다\" 실제 사례 — 가장 강력한 반론 해소"}, {"title": "③ 결정 유도 — 확인만 제안", "subtitle": "있는 보험이 제대로인지 확인만", "content_html": "고객님, 그러면 오늘 제가 드리는 제안은<br/>지금 보험이 제대로 잡혀 있는지<br/>딱 한번만 확인해보시는 겁니다.<br/>가입 여부는 확인 결과 보고 결정하시면 됩니다.확인해봤더니 충분하면 그냥 유지하시면 되고요,<br/>부족한 부분이 있으면 그때 결정하시면 됩니다.<br/>확인 한번 해보시겠습니까?", "tip": "⚡ \"확인만\" — 있는 보험을 지키면서 검증하는 느낌"}]}, "| 가입설계 / 선심사 동의 녹취 스크립트|": {"pill": "", "summary_title": "", "summary_text": "", "summary_color": "#c8753a", "sections": []}, "✅ 클로징|상담 진행형": {"pill": "클로징: 상담 진행형", "summary_title": "핵심 포인트", "summary_text": "지금 확인된 내용 기준으로 진행해보시는 게 좋습니다\n오늘 말씀드린 보장 한 가지부터 시작하시면 됩니다\n결정은 고객님이 하시는 것이고 저는 방향만 잡아드리겠습니다", "summary_color": "#0F6E56", "sections": [{"title": "① 자연스러운 마무리 멘트", "subtitle": "결정을 강요하지 않고 자연스럽게", "content_html": "고객님, 오늘 같이 보험 현황을 확인해봤는데요.<br/>말씀드린 것처럼 [보장 항목] 부분이<br/>현재 고객님 상황에서 가장 필요한 부분으로 보입니다.지금 당장 결정하시라는 건 아니고요.<br/>오늘 말씀드린 내용을 기준으로<br/>한번 같이 진행해보시는 게 어떻겠습니까?", "tip": "⚡ 강요 없이 제안 형식 — 고객이 자발적으로 결정한 느낌"}, {"title": "② 진행 절차 간단히 안내", "subtitle": "복잡하지 않다는 것을 인식시키기", "content_html": "진행하시면 절차가 복잡하지 않습니다.<br/>간단한 건강 고지 몇 가지 확인하고,<br/>서류는 제가 다 준비해드리거든요.<br/>고객님은 동의만 해주시면 됩니다.보통 15~20분 안에 다 처리가 되고요.<br/>가입 확정되면 그날부터 바로 보장이 시작됩니다.<br/>어렵게 생각하실 게 없습니다.", "tip": "⚡ 절차 간소화 설명 — \"복잡하다\"는 마지막 저항 제거"}, {"title": "③ 최종 결정 유도", "subtitle": "가장 작은 동의로 시작", "content_html": "고객님, 오늘 딱 한 가지만 결정하시면 됩니다.<br/>[보장 항목] 이것 하나만요.<br/>나머지는 나중에 여유 되실 때 추가하시면 됩니다.지금 이 한 가지만 챙겨두시면<br/>막상 필요한 순간에 보장이 안 된다는 상황을<br/>막을 수 있습니다.<br/>진행해보시겠습니까?", "tip": "⚡ \"한 가지만\" 반복 강조 — 결정 부담 최소화"}]}, "🔥 필요성 강조|결정 미루면 손해형": {"pill": "필요성 강조 2차: 결정 미루면 손해형", "summary_title": "핵심 포인트", "summary_text": "나중에 하겠다는 생각이 실제로 얼마나 손해인지 보여줍니다\n건강 조건·보험료·보장 세 가지가 모두 불리해집니다\n강요가 아니라 사실을 알려드리는 방식입니다", "summary_color": "#C8793A", "sections": [{"title": "① 공감 — 미루는 게 당연하다는 인정", "subtitle": "결정 안 하는 심리를 먼저 수용", "content_html": "고객님, \"좀 더 생각해보고 싶다\"는 마음<br/>충분히 이해합니다.<br/>보험이 장기 결정이니까 신중하게 하시는 게 맞거든요.<br/>그런데 한 가지만 사실대로 말씀드려도 될까요?<br/>나중에 하시려고 할 때<br/>지금이랑 달라지는 게 세 가지 있습니다.강요가 아니라 나중에 후회하지 않으시려면<br/>알고 계셔야 하는 내용입니다.", "tip": "⚡ \"사실을 알려드린다\" 포지셔닝 → 강요 아님을 전제"}, {"title": "② 달라지는 것 첫 번째 — 건강 조건", "subtitle": "건강 상태 변화로 가입 조건이 달라짐", "content_html": "첫 번째는 건강 조건입니다.<br/>지금 건강하시면 아무 조건 없이 가입이 가능하지만,<br/>나중에 건강검진에서 뭔가 나오거나<br/>약을 드시기 시작하면<br/>부담보가 붙거나 일부 보장이 제한될 수 있습니다.<br/>심한 경우 가입 자체가 거절될 수도 있고요.오늘 건강하시다는 게<br/>내일도 똑같이 건강하다는 보장은 없습니다.", "tip": "⚡ 건강 조건 변화 → 가장 강력한 타이밍 근거"}, {"title": "③ 달라지는 것 두 번째 — 보험료", "subtitle": "나이 올라갈수록 보험료 인상", "content_html": "두 번째는 보험료입니다.<br/>1년 후에 같은 상품 가입하시면<br/>보험료가 5~10% 올라가 있습니다.<br/>월 3만 원이면 1년 뒤 3만 3천 원,<br/>10년 유지하면 누적으로 36만 원을 더 내시는 겁니다.지금 가입하시면 낮은 보험료로<br/>오래 유지하실 수 있습니다.", "tip": "⚡ 구체적 금액 차이 제시 → 미루는 것의 실제 비용"}, {"title": "④ 달라지는 것 세 번째 — 보장 공백 기간", "subtitle": "미루는 동안 보장이 없는 기간이 생김", "content_html": "세 번째는 보장 공백입니다.<br/>지금 결정을 미루시는 동안<br/>그 기간에 만약 [위험 상황]이 생기시면<br/>보장을 받으실 수 없습니다.<br/>보험은 가입한 이후부터 보장이 시작되거든요.한 달을 미루시면 한 달,<br/>1년을 미루시면 1년 동안<br/>보장 없이 지내시는 겁니다.", "tip": "⚡ 보장 공백 기간 개념 → 미루는 것의 직접적 위험"}, {"title": "⑤ 결정 유도 — 사실 확인 후 선택", "subtitle": "강요 없이 선택권을 드리는 방식", "content_html": "고객님, 지금 말씀드린 세 가지를<br/>알고 계신 상태에서 결정하시면 됩니다.<br/>오늘 진행하시거나,<br/>아니면 이 세 가지를 감안하시고 나중에 하시거나.<br/>결정은 고객님이 하시는 겁니다.다만 지금이 가장 좋은 조건이라는 것만<br/>기억해두시면 좋겠습니다.", "tip": "⚡ \"결정은 고객님\" — 역설적으로 결정 유도"}]}, "🔥 필요성 강조|실제비용 체감형": {"pill": "필요성 강조 2차: 실제 비용 체감형", "summary_title": "핵심 포인트", "summary_text": "보장이 없을 때 실제로 얼마가 나오는지 알아야 필요성이 실감됩니다\n숫자로 말해야 고객이 머릿속에 그림이 그려집니다\n상품 설명 후 비용 현실을 한번 더 짚어주는 단계입니다", "summary_color": "#C8793A", "sections": [{"title": "① 전환 멘트 — 상품 설명에서 비용으로", "subtitle": "방금 설명한 상품이 없으면 어떻게 되는지", "content_html": "고객님, 방금 설명드린 [보장 항목]이<br/>없을 때 실제로 어떤 상황이 되는지<br/>한번 구체적으로 보시겠습니까?<br/>숫자로 보시면 훨씬 와닿으실 거거든요.보험이 필요한 이유는 결국 하나입니다.<br/>없을 때 내가 직접 감당해야 하는 비용이 너무 크기 때문입니다.", "tip": "⚡ 추상적 필요성 → 구체적 비용으로 전환"}, {"title": "② 비용 현실 — 보장 항목별 실제 금액", "subtitle": "상품별 미가입 시 발생 비용 구체화", "content_html": "[암보험 없을 때]<br/>항암치료 한 번에 100~200만 원,<br/>면역항암제는 한 달에 500만~1,000만 원,<br/>치료 기간 1~2년 동안 소득도 끊깁니다.<br/>[실비 없을 때]<br/>MRI 한 번에 50~80만 원, 입원 2주에 150~200만 원,<br/>이게 전부 본인 부담이 됩니다.<br/>[간병보험 없을 때]<br/>전문 간병인 월 200~300만 원,<br/>10년이면 2억~3억 원이 나옵니다.이 금액을 준비해두신 분들은 괜찮습니다.<br/>그런데 대부분은 그렇지 않으시거든요.", "tip": "⚡ 상품에 맞는 항목 선택해서 사용 — 전부 읽지 않아도 됨"}, {"title": "③ 보험료 vs 위험 비교", "subtitle": "월 보험료가 얼마나 가성비 있는지", "content_html": "방금 말씀드린 [보장 항목] 보험료가<br/>월 [○만 원]입니다.<br/>이 금액으로 [위험 상황] 발생 시<br/>[○천만 원~○억 원]을 보장받으시는 겁니다.<br/>하루 [○원] 수준으로<br/>수천만 원 리스크를 커버하는 구조입니다.없을 때 내야 하는 금액과<br/>있을 때 내는 보험료를 비교하면<br/>어느 쪽이 현실적인지 바로 보이시잖아요.", "tip": "⚡ 일일 환산 금액 → 보험료가 부담 아니라는 인식"}, {"title": "④ 결정 유도", "subtitle": "비용 현실 확인 후 자연스럽게 연결", "content_html": "고객님, 지금 말씀드린 비용이<br/>남 얘기가 아닙니다.<br/>언제든 생길 수 있는 상황이거든요.<br/>지금 [보장 항목] 하나만 챙겨두시겠습니까?준비해두시면 그 상황이 와도<br/>비용 때문에 치료를 망설이는 일이 없어집니다.", "tip": "⚡ \"남 얘기 아님\" — 감정적 공감 + 결정 유도"}]}, "📦 상품 설명|종신보험 설명형": {"pill": "상품 설명: 종신보험", "summary_title": "상품 정의", "summary_text": "사망 시 유족에게 사망보험금을 지급하는 장기 보장 상품입니다.\n가족 보호·상속·노후 재원 등 목적에 따라 다양하게 활용됩니다.\n순수 보장형과 저축·환급형으로 나뉘며 목적에 따라 선택이 달라집니다.", "summary_color": "#3B6D11", "sections": [{"title": "① 니즈환기 — 가족 보호의 현실", "subtitle": "가장이 갑자기 없어졌을 때의 현실", "content_html": "고객님, 만약 가장이 갑자기 사고로 돌아가시면<br/>남은 가족이 어떻게 되는지 생각해보신 적 있으세요?<br/>주택 대출이 있으면 대출 상환이 계속 나가야 하고,<br/>아이 교육비, 생활비는 그대로 필요하거든요.종신보험 사망보험금 3억 원이 있으면<br/>대출 갚고, 아이 교육시키고, 배우자 생활비 10년치가 나오거든요.<br/>없으면 남은 가족이 그 부담을 다 감당해야 합니다.", "tip": "⚡ 가족이 남겨졌을 때의 현실 → 가장에게 가장 강하게 작용"}, {"title": "② 연예인·실제 사례", "subtitle": "갑작스러운 사망 사례로 현실감 전달", "content_html": "뉴스에서도 종종 나오잖아요,<br/>유명 연예인 분이 갑작스럽게 돌아가셨을 때<br/>유족 생활이 어떻게 됐다는 얘기들이요.<br/>그분들도 준비가 충분하지 않으면 가족이 힘들어지거든요.제가 상담하다 보면<br/>\"아버지가 보험 하나 없이 돌아가셔서<br/>어머니가 너무 힘드셨다\"는 분들을 꽤 봤거든요.<br/>종신보험은 내가 없어졌을 때 가족을 위한 최소한의 준비입니다.", "tip": "⚡ \"내가 없어졌을 때\" — 감정적으로 강하게 자극하는 멘트"}, {"title": "③ 현재 사망 보장 확인 및 제안", "subtitle": "사망보험금 금액 기준으로 적정성 확인", "content_html": "고객님 현재 사망 보장 합산 금액은 ○억 원입니다.<br/>적정 수준은 연소득의 5~10배, 또는<br/>남은 대출 + 가족 생활비 5~10년치를 기준으로 합니다.현재 기준으로 [충분 / 부족] 수준이며,<br/>특히 [대출 / 자녀 교육기간] 고려 시 추가 보강을 권장드립니다.<br/>어떻게 하시겠습니까?", "tip": "⚡ 연소득의 5~10배 기준 제시 → 객관적 판단 가능"}]}, "📦 상품 설명|태아보험 설명형": {"pill": "상품 설명: 태아보험", "summary_title": "상품 정의", "summary_text": "임신 중 태아기부터 출생 후 어린이 시기까지 보장하는 상품입니다.\n선천성 이상·저체중아·인큐베이터 비용 등 출생 전후 리스크를 커버합니다.\n임신 16~22주 사이에 가입해야 태아 담보가 적용되며, 이 시기를 놓치면 일반 어린이보험으로만 가입됩니다.", "summary_color": "#3B6D11", "sections": [{"title": "① 니즈환기 — 태아보험이 왜 임신 중에 가입해야 하는가", "subtitle": "가입 타이밍을 놓치면 안 되는 이유", "content_html": "고객님, 태아보험은 아이가 태어난 후에는 가입할 수 없는 담보가 있습니다.<br/>선천성 이상 진단비, 저체중아 입원비,<br/>인큐베이터 사용 비용이 태아 담보에 포함되거든요.<br/>이건 출생 전에 가입해야만 보장이 됩니다.실제로 신생아 10명 중 1명은 인큐베이터 치료를 받는다는 통계가 있고,<br/>인큐베이터 하루 비용이 20~50만 원, 2~4주 사용하면<br/>300~500만 원이 나옵니다.<br/>태아보험 없으면 이게 전부 본인 부담이 됩니다.", "tip": "⚡ 타이밍 강조 — \"지금 안 하면 못 한다\"는 긴박감 전달"}, {"title": "② 연예인·실제 사례", "subtitle": "임신·출산 관련 공개 사례로 공감 유도", "content_html": "방송에서 연예인 분들이 출산 후 아이가 인큐베이터에 있었다는 얘기를<br/>간간이 공개하시는 경우가 있잖아요.<br/>쌍둥이나 조산인 경우 NICU(신생아 중환자실) 입원이<br/>한 달 이상 이어지는 경우도 있거든요.NICU 하루 비용이 50~100만 원 수준인데,<br/>한 달이면 150~300만 원이 훌쩍 넘습니다.<br/>여기에 선천성 이상 수술비까지 더해지면<br/>수백만~수천만 원이 한꺼번에 나올 수 있습니다.<br/>태아보험 하나로 이 금액이 대부분 해결됩니다.", "tip": "⚡ NICU 비용 구체화 → 임산부·가족에게 강한 설득력"}, {"title": "③ 태아보험 핵심 가입 조건 설명", "subtitle": "가입 시기·담보 구성 핵심 포인트", "content_html": "태아보험 가입 시 꼭 확인하셔야 할 3가지입니다.<br/>① 가입 시기: 임신 16~22주 이내 (이후엔 태아 담보 불가)<br/>② 선천성 이상 담보 포함 여부<br/>③ 출생 후 어린이보험으로 자동 전환 여부선천성 이상 담보는 상품마다 금액이 다르고,<br/>일부 상품은 포함이 안 되는 경우도 있어서 꼭 확인이 필요합니다.<br/>출생 후에는 별도 전환 없이 어린이보험으로 계속 유지되는 구조가<br/>가장 편리하고 보장도 끊기지 않습니다.", "tip": "⚡ 3가지 체크포인트 제시 → 전문성 + 신뢰감"}, {"title": "④ 가입 시점 현재 상황 확인 및 제안", "subtitle": "현재 임신 주수와 가입 가능 여부 확인", "content_html": "고객님, 현재 임신 몇 주차이신지에 따라<br/>가입 가능한 담보와 상품이 달라집니다.<br/>16주 이전이라면 태아 담보 전체 가입 가능하고,<br/>22주가 넘으시면 태아 담보 일부가 제한될 수 있습니다.지금 바로 확인해드릴 수 있으니,<br/>현재 임신 주수 말씀해 주시면 최적 상품으로 안내드리겠습니다.<br/>태아보험은 빠를수록 유리하고,<br/>나중에 후회하시는 분들이 정말 많습니다.", "tip": "⚡ \"빠를수록 유리\" + \"나중에 후회\" — 결정 유도"}]}, "📞 도입 인사 + 관심 형성|보험 조회 안내형": {"pill": "각도: 키워드 검색 고객 DB → 확인 안내", "summary_title": "카드 요약", "summary_text": "고객이 검색한 보험 키워드 기반으로 안내 전화\n가입 권유가 아닌 조회 안내 목적임을 먼저 전달\n검색한 보험이 현재 어떻게 준비되어 있는지 확인", "summary_color": "#3A2FA0", "sections": [{"title": "① 오프닝", "subtitle": "고객이 검색한 키워드로 첫 문장 시작 — 낯설지 않게", "content_html": "안녕하세요 고객님, 전체보험 비교 담당자 ○○○입니다.<br/>\n인터넷으로 ○○보험 조회해보셔서<br/>\n안내차 전화드렸습니다.\n\n보험 가입을 권유하는 전화가 아니고요,<br/>\n고객님이 조회해보신 ○○보험이<br/>\n현재 어떻게 준비되어 있는지<br/>\n간단히 확인해드리려고 연락드렸습니다.", "tip": "⚡ ○○보험 자리에 실비 / 암보험 / 간병보험 등 고객 검색 키워드 그대로 넣기"}, {"title": "② 관심 형성", "subtitle": "검색한 이유가 있을 거라는 공감 → 필요성 자연스럽게 연결", "content_html": "고객님이 ○○보험을 검색해보셨다는 건<br/>\n그쪽 보장이 필요하시거나<br/>\n현재 준비가 어떻게 되어 있는지<br/>\n확인해보고 싶으셨던 거잖아요.\n\n그래서 지금 ○○보험이 현재 어떻게 준비되어 있는지,<br/>\n부족한 부분은 없는지<br/>\n간단히 한번 확인해드리려고 연락드린 겁니다.<br/>\n가입을 강요하는 게 아니라<br/>\n현황 파악만 해드리는 거거든요.", "tip": "⚡ \"검색하셨다는 건 필요하셨던 것\" — 고객 행동을 근거로 필요성 연결, 방어 반응 낮음"}, {"title": "③ 연결 질문", "subtitle": "검색 키워드 기반으로 현재 준비 상태 확인", "content_html": "혹시 고객님, 검색해보신 ○○보험이<br/>\n현재 어떻게 준비되어 있으세요?<br/>\n있으신지 없으신지만 말씀해 주셔도<br/>\n지금 상태를 바로 확인해드릴 수 있거든요.\n\n있으시면 → 현재 보장 수준이 충분한지 확인해드리고요,<br/>\n없으시면 → 지금 준비하시는 게 유리한 이유를 말씀드리겠습니다.", "tip": "⚡ 있다 / 없다 어느 쪽 대답이든 다음 흐름으로 바로 연결 가능"}]}, "🔥 필요성 강조|가족보호환기형": {"pill": "필요성 강조 2차: 가족 보호 환기형", "summary_title": "핵심 포인트", "summary_text": "보험은 나를 위한 것이기도 하지만 남은 가족을 위한 것이기도 합니다\n내가 없거나 아팠을 때 가족이 어떻게 되는지를 생각하게 합니다\n가장이나 부양자에게 가장 강하게 작용하는 각도입니다", "summary_color": "#C8793A", "sections": [{"title": "① 전환 멘트 — 나에서 가족으로", "subtitle": "상품 설명 후 관점을 바꾸는 첫 문장", "content_html": "고객님, 방금 설명드린 보장이<br/>고객님 본인한테도 중요하지만<br/>사실 더 중요한 분들이 있습니다.<br/>고객님 가족이거든요.보험은 내가 아팠을 때,<br/>또는 내가 없어졌을 때<br/>남은 가족이 어떻게 되느냐의 문제이기도 합니다.", "tip": "⚡ \"나\" → \"가족\" 관점 전환 — 감정적 설득력 극대화"}, {"title": "② 아팠을 때 시나리오", "subtitle": "치료 기간 동안 가족 생활이 어떻게 되는지", "content_html": "예를 들어 암 진단을 받으셨다고 해보겠습니다.<br/>치료 기간이 보통 6개월~2년입니다.<br/>그 동안 직장을 못 나가시면 소득이 끊기고,<br/>치료비는 계속 나가고,<br/>가족 생활비도 그대로 필요합니다.<br/>이 세 가지가 동시에 터지는 거거든요.진단비 5천만 원이 있으면<br/>치료비 내고도 가족 생활비가 남습니다.<br/>없으면 가족이 그 부담을 전부 감당해야 합니다.", "tip": "⚡ 3가지 동시 지출 구조 설명 → 현실적 위기감"}, {"title": "③ 없어졌을 때 시나리오", "subtitle": "사망 시 가족이 어떻게 되는지", "content_html": "더 극단적인 상황을 가정해보면,<br/>가장이 갑자기 없어지셨을 때<br/>남은 가족이 감당해야 하는 것들이 있습니다.<br/>주택 대출 상환, 아이 교육비, 배우자 생활비.<br/>이게 한꺼번에 가족 몫이 됩니다.사망보험금 3억 원이 있으면<br/>대출 갚고, 교육비 내고, 10년 생활비가 나옵니다.<br/>없으면 남은 가족이 전부 감당해야 하는 거거든요.<br/>보험은 나를 위한 것이기도 하지만<br/>결국 가족을 위한 준비입니다.", "tip": "⚡ 구체적 금액 시뮬레이션 → 가장에게 강하게 작용"}, {"title": "④ 결정 유도", "subtitle": "가족을 위한 결정으로 프레이밍", "content_html": "고객님, 오늘 결정하시는 건<br/>고객님 자신을 위한 것이기도 하지만<br/>가족을 위한 선택이기도 합니다.<br/>지금 [보장 항목] 하나만 챙겨두시면<br/>가족이 흔들리는 상황을 막을 수 있습니다.<br/>진행해보시겠습니까?이 한 가지가 나중에 가족한테<br/>가장 큰 선물이 될 수 있습니다.", "tip": "⚡ \"가족을 위한 선택\" 프레이밍 → 이타적 결정 유도"}]}, "🔁 2차 클로징|재상담 연결형": {"pill": "2차 클로징: 재상담 연결형", "summary_title": "핵심 포인트", "summary_text": "오늘 결정이 안 됐을 때 다음 상담을 자연스럽게 연결합니다\n재연락 날짜와 시간을 구체적으로 잡아두는 게 핵심입니다\n좋은 인상으로 끝내야 다음 상담이 가능합니다", "summary_color": "#0F6E56", "sections": [{"title": "① 오늘 상담 마무리 — 강요 없이 정리", "subtitle": "결정 못 하신 것을 자연스럽게 수용", "content_html": "고객님, 오늘 바로 결정하기 어려우시면<br/>\n충분히 생각해보시고 결정하시는 게 맞습니다.<br/>\n보험은 장기 계약이니까요.\n\n오늘 말씀드린 내용 중에서<br/>\n가장 기억해두셔야 할 건 딱 하나입니다.<br/>\n[보장 항목]이 현재 고객님 보험에서<br/>\n가장 취약한 부분이라는 것만요.", "tip": "⚡ 결정 못 한 것을 탓하지 않음 — 다음 상담 가능성 유지"}, {"title": "② 재연락 날짜 설정 — 구체적으로 잡기", "subtitle": "날짜를 열어두면 흐지부지됨 — 반드시 날짜 확정", "content_html": "그러면 제가 며칠 후에 다시 한번 연락드려도 될까요?<br/>\n이번 주 안으로 생각해보시고,<br/>\n○요일 오전이 괜찮으세요,<br/>\n아니면 ○요일 오후가 나으세요?\n\n고객님이 편하신 시간으로 맞춰드릴게요.<br/>\n그때 다시 한번 간단히 확인해드리겠습니다.", "tip": "⚡ \"언제 연락드릴까요?\" 보다 선택지 2개 제시 — 날짜 확정률 높아짐"}, {"title": "③ 재상담 전 준비 사항 — 기대감 남기기", "subtitle": "다음 상담이 더 구체적으로 도움 된다는 인식", "content_html": "다음에 연락드릴 때는<br/>\n오늘보다 더 구체적으로 정리해드릴 수 있거든요.<br/>\n가능하시면 지금 가입된 보험 증권이나<br/>\n보험료 이체 내역을 한번 확인해두시면<br/>\n다음 상담이 훨씬 정확해집니다.\n\n어렵게 준비하실 필요 없고요,<br/>\n그냥 어느 보험사에 어떤 게 있는지<br/>\n대략만 기억해 두셔도 충분합니다.", "tip": "⚡ 숙제 부여 → 고객이 다음 상담에 더 적극적으로 참여하게 됨"}, {"title": "④ 마무리 — 좋은 인상으로 끝내기", "subtitle": "결정 못 해도 기분 좋게 끝나야 재연락 가능", "content_html": "오늘 바쁘신 시간에 함께해 주셔서 감사합니다.<br/>\n제가 ○요일에 다시 연락드리겠습니다.<br/>\n그때 뵙겠습니다.\n\n혹시 그 전에 궁금하신 게 생기시면<br/>\n먼저 연락 주셔도 됩니다.<br/>\n언제든지 바로 도와드리겠습니다.", "tip": "⚡ 재연락 날짜 재확인 + 먼저 연락 가능성 열어두기 — 고객 주도 재연락 유도"}]}, "🔥 필요성 강조|지금이 최적시점형": {"pill": "필요성 강조 2차: 지금이 최적 시점형", "summary_title": "핵심 포인트", "summary_text": "지금 이 순간이 가장 좋은 조건으로 가입할 수 있는 시점입니다\n건강 조건과 나이 두 가지가 지금이 가장 유리합니다\n나중에 하려고 하면 조건이 달라져 있는 경우가 많습니다", "summary_color": "#C8793A", "sections": [{"title": "① 핵심 전제 — 보험은 타이밍이 전부", "subtitle": "상품 설명을 들은 직후 결정 시점 연결", "content_html": "고객님, 방금 설명드린 내용이<br/>고객님한테 필요한 보장인 건 이해가 되셨죠?<br/>그러면 한 가지만 더 말씀드려도 될까요.<br/>이게 언제 가입하시느냐에 따라<br/>조건이 완전히 달라집니다.보험은 내용이 좋다는 걸 알아도<br/>나중에 하려고 하면 이미 상황이 바뀌어 있는 경우가 많거든요.", "tip": "⚡ 상품 설명 직후 연결 — \"필요하다는 건 아셨죠?\"로 시작"}, {"title": "② 건강 조건 — 지금이 가장 유리", "subtitle": "건강할 때 가입이 왜 유리한지 구체적으로", "content_html": "보험은 건강 상태를 심사합니다.<br/>지금 건강하시면 아무 조건 없이 가입이 가능하지만,<br/>나중에 혈압약·당뇨약 같은 걸 드시기 시작하거나<br/>건강검진에서 뭔가 나오면<br/>그때부터 부담보가 붙거나 가입이 거절될 수 있습니다.실제로 작년까지 건강했는데<br/>올해 검진에서 혈당 수치가 나와서<br/>실비 가입이 거절됐다는 분들이 생각보다 많습니다.<br/>지금 건강하실 때가 가장 좋은 조건입니다.", "tip": "⚡ 건강 조건 변화 실사례 → \"나도 그럴 수 있다\"는 인식"}, {"title": "③ 나이 조건 — 1년만 지나도 보험료 오름", "subtitle": "보험료 인상 구체적 수치로", "content_html": "거기다 나이가 올라갈수록 보험료도 높아집니다.<br/>지금 이 상품을 1년 뒤에 가입하시면<br/>보험료가 5~10% 더 올라가 있을 수 있고,<br/>5년 뒤엔 훨씬 더 오릅니다.<br/>지금 가입하시면 낮은 보험료로 오래 유지하실 수 있거든요.예를 들어 월 3만 원짜리 상품이<br/>1년 뒤엔 3만 3천 원,<br/>10년이면 누적으로 36만 원을 더 내시는 겁니다.<br/>지금 결정하시는 게 장기적으로 훨씬 유리합니다.", "tip": "⚡ 구체적 금액 계산 → 미루면 손해라는 수치 인식"}, {"title": "④ 결정 유도 — 오늘 한 가지만", "subtitle": "부담 없이 한 가지만 결정하도록", "content_html": "고객님, 오늘 전부 다 결정하실 필요 없습니다.<br/>방금 말씀드린 [보장 항목] 이것 하나만요.<br/>지금 건강하시고, 지금 나이에<br/>가장 좋은 조건으로 가입하실 수 있는 시점이 바로 지금입니다.<br/>진행해보시겠습니까?이 한 가지만 챙겨두시면<br/>나머지는 여유 되실 때 추가하셔도 됩니다.", "tip": "⚡ \"전부 다\" → \"한 가지만\" — 결정 부담 최소화"}]}, "📦 상품 설명|간병보험 설명형": {"pill": "상품 설명: 간병보험", "summary_title": "상품 정의", "summary_text": "치료 후 일상생활이 어려워졌을 때 간병·돌봄 비용을 보장합니다.\n장기요양 1~2등급 또는 ADL 기준으로 지급되며 장기간 현금으로 받는 구조입니다.\n고령화로 수요가 급증하고 있지만 가장 많이 빠져 있는 보장 중 하나입니다.", "summary_color": "#3B6D11", "sections": [{"title": "① 니즈환기 — 간병비 실제 비용", "subtitle": "요양원·간병인 비용 구체적으로", "content_html": "고객님, 혹시 요양원 비용이 한 달에 얼마인지 아세요?<br/>시설에 따라 다르지만 월 100~200만 원이 기본이고요.<br/>전문 간병인을 집에 고용하면 월 200~300만 원 수준입니다.<br/>이게 몇 년씩 이어지면 가족 부담이 엄청나지거든요.실제로 뇌졸중 후유 장애로 3~5년간 간병이 필요한 경우,<br/>치료비보다 간병비가 더 많이 나오는 경우도 있습니다.<br/>간병보험이 있으면 매달 현금이 나와서<br/>그 비용을 충당할 수 있거든요.", "tip": "⚡ 치료비보다 간병비가 더 클 수 있음 — 충격적이지만 사실"}, {"title": "② 연예인·실제 사례", "subtitle": "간병의 현실을 아는 사람 이야기로", "content_html": "방송에서 간간이 나오잖아요,<br/>부모님 치매·뇌졸중 때문에 가족이 일을 그만두고 간병하게 됐다는 얘기요.<br/>연예인 분들도 부모님 병원비·간병비로<br/>수억 원이 들었다는 인터뷰를 공개하시는 분들이 있거든요.그분들은 그래도 형편이 되니까 감당하지만<br/>일반 분들은 형제자매 사이에 갈등이 생기는 경우도 많습니다.<br/>간병보험 하나가 가족 관계를 지키는 역할을 하기도 합니다.", "tip": "⚡ 가족 갈등 포인트 → 정서적 공감 극대화"}, {"title": "③ 현재 간병 보장 확인 및 제안", "subtitle": "조회 결과 기반 보강 제안", "content_html": "고객님 현재 간병 관련 보장을 확인하면<br/>[있음 / 없음] 확인됩니다.<br/>있더라도 월 지급액이 얼마인지 확인이 필요합니다.월 30만 원 수준이면 실제 간병비의 10~15%밖에 안 됩니다.<br/>최소 월 50~100만 원 수준은 잡혀 있어야<br/>실질적인 도움이 됩니다.<br/>현재 수준에서 보강이 필요한지 같이 확인해드리겠습니다.", "tip": "⚡ 월 지급액 기준 제시 → \"있다\"는 것에 안심하지 않게"}]}, "📦 상품 설명|주택화재 설명형": {"pill": "상품 설명: 주택화재보험", "summary_title": "상품 정의", "summary_text": "화재·폭발·누수 등으로 인한 주택 및 가재도구 손해를 보장하는 상품입니다.\n임차인도 가입 가능하며 제3자 배상책임까지 포함되는 경우가 많습니다.\n보험료가 매우 낮지만 한 번 발생하면 수천만 원의 손해를 막아주는 보장입니다.", "summary_color": "#3B6D11", "sections": [{"title": "① 니즈환기 — 화재·누수 실제 비용", "subtitle": "주택 사고 발생 시 실제 피해액", "content_html": "고객님, 집에 화재가 나거나 윗집에서 물이 새면<br/>피해 보상이 얼마나 나오는지 아세요?<br/>작은 화재라도 수리비가 500만~1,000만 원이 기본이고,<br/>가재도구 피해까지 합치면 수천만 원이 되는 경우도 있습니다.특히 전세나 월세 사시는 분들은<br/>내가 실수로 아랫집에 피해를 줬을 때<br/>본인이 배상해야 하거든요.<br/>주택화재보험은 이 배상책임까지 포함된 경우가 많습니다.", "tip": "⚡ 임차인도 해당되는 배상책임 → 전세·월세 고객에게 필수"}, {"title": "② 실제 사례", "subtitle": "주변에서 일어난 일처럼 전달", "content_html": "얼마 전에 아파트 누수로 아랫집에 천장이 다 망가졌다는 사례가 있었는데요,<br/>수리비만 800만 원이 나왔고,<br/>보험 없으신 분이 전부 개인 부담으로 처리하셨습니다.<br/>반면 보험 있으셨던 분은 전액 처리가 됐고요.월 보험료가 몇 천 원 수준인데<br/>수백만~수천만 원 리스크를 커버하는 보험이거든요.<br/>가입 안 하실 이유가 없는 보험 중 하나입니다.", "tip": "⚡ 월 몇 천 원 → 수천만 원 커버 — 가성비 최고"}, {"title": "③ 현재 보장 확인 및 제안", "subtitle": "현재 주택화재 보장 여부 확인", "content_html": "고객님 주택화재 관련 보장을 확인하면<br/>[있음 / 없음] 확인됩니다.<br/>있더라도 임차인 배상책임이 포함되어 있는지 확인이 필요합니다.전세나 월세 거주 중이시면 배상책임 특약이 꼭 필요하고요,<br/>건물 소유자이시면 건물 + 가재도구 보장 범위를 확인해드리겠습니다.", "tip": "⚡ 소유자 vs 임차인 구분 → 상황별 맞춤 제안"}]}, "| 보험회사 결제정보|": {"pill": "ABL생명 초회 · 은행: 모두 가능 / 카드: 불가 계속분 · 은행: 모두 가능 / 이체일 : 5, 10, 15, 20, 25 납입 가능 관계 : 계약자(본인), 직계(배우자/자녀) 카드/승인 : 불가", "summary_title": "", "summary_text": "", "summary_color": "#c8753a", "sections": [{"title": "메리츠화재", "subtitle": "초회 · 은행: 모두 가능 / 카드: 계약자 명의 카드 가능", "content_html": "<b style=\"color:#6F4428;\">계속분</b> · 은행: 모든 은행 / <b>이체일</b>: 5, 10, 15, 20, 25<br/>\n<b style=\"color:#6F4428;\">납입 가능 관계(은행)</b>: 계약자(본인) · 직계(배우자/부모/자녀) 및 제3자 가능 (조건: 제3자 동의서/모바일-계약자만)<br/>\n<b style=\"color:#6F4428;\">카드(등록)</b>: 모든 카드 등록 가능 (계약자 명의 or 직계 가족 명의 등록 가능 / 직계 등록 시 제3자 동의 필수)<br/>\n<b style=\"color:#6F4428;\">승인일</b>: 5, 11, 15, 21, 25", "tip": ""}, {"title": "DB손보", "subtitle": "초회 · 은행: 모두 가능 (개인사업자: 이율연계 / 사업자명 계좌 불가) 카드: 계약자 명의 카드 가능 (초회만 가능, 2회차부터 계좌등록 필수)", "content_html": "<b style=\"color:#6F4428;\">계속분</b> · 은행: 모든 은행 / <b>이체일</b>: 5, 11, 15, 21<br/>\n<b style=\"color:#6F4428;\">납입 가능 관계(은행)</b>: 계약자(본인), 제3자 가능 (조건: 제3자 동의서/모바일-계약자만)<br/>\n<b style=\"color:#6F4428;\">카드(등록)</b>: 모든 카드 등록 가능 <span style=\"color:#2563EB;\">(고객이 콜센터로 직접 등록 후 담당배서)</span><br/>\n<b style=\"color:#6F4428;\">승인일</b>: <b>TM</b> 11, 15, 21", "tip": ""}, {"title": "흥국화재", "subtitle": "초회 · 은행: 모두 가능 / 카드: 계약자 명의 카드 가능", "content_html": "<b style=\"color:#6F4428;\">계속분</b> · 은행: 모든 은행 / <b>이체일</b>: 5, 10, 15, 20, 25<br/>\n<b style=\"color:#6F4428;\">납 lor:#6F4428;\">납입 가능 관계</b>: 계약자, 피보험자, 수익자 / 카드: 계약자만 가능<br/>\n<b style=\"color:#6F4428;\">카드사</b>: 신한, 삼성, 롯데, 현대, 비씨, 국민, 우리\n\n<span style=\"color:#6B7280;\">(메인미래 BC, 동양생명 제휴 카드만 가능)</span><br/>\n<b style=\"color:#6F4428;\">승인일</b>: 5, 10, 15, 20, 25", "tip": ""}, {"title": "KB라이프", "subtitle": "초회 · 은행: 모두 가능 / 카드: 불가", "content_html": "<b style=\"color:#6F4428;\">계속분</b> · 은행: 모두 가능 / <b>이체일</b>: 10, 15, 20, 25, 말일<br/>\n<b style=\"color:#6F4428;\">납입 가능 관계</b>: 계약자, 직계존비속\n\n<span style=\"color:#2563EB;\">(형제자매 및 배우자부모: 지정서/가족관계확인서류 첨부)</span><br/>\n<b style=\"color:#6F4428;\">카드/승인</b>: 불가", "tip": ""}, {"title": "신한라이프", "subtitle": "초회 · 은행: 모두 가능 / 카드사: 신한, BC, 국민, 외환, 삼성, 현대, 롯데, 수협, 하나, 농협, 제주, 광주, 전북, 씨티, 우리BC (종신보험 제외)", "content_html": "<b style=\"color:#6F4428;\">계속분</b> · 은행: 초회와 동일 / <b>이체일</b>: 5, 10, 15, 20, 25<br/>\n<b style=\"color:#6F4428;\">납입 가능 관계</b>: 계약자, 피보험자 / 카드: 계약자, 직계가족 및 제3자 가능<br/>\n<b style=\"color:#6F4428;\">승인일</b>: 10, 20", "tip": ""}, {"title": "농협생명", "subtitle": "초회 · 은행: 모두 가능 / 카드사: BC, 현대, 롯데, NH", "content_html": "<b style=\"color:#6F4428;\">계속분</b> · 은행: 모두 가능 / <b>이체일</b>: 5, 10, 15, 20, 25, 말일<br/>\n<b style=\"color:#6F4428;\">납입 가능 관계</b>: 계약자, 피보험자 / 카드: 계약자 명의만 가능<br/>\n<b style=\"color:#6F4428;\">카드사</b>: BC, 현대, 롯데, NH<br/>\n<b style=\"color:#6F4428;\">승인일</b>: 10, 20, 30일", "tip": ""}]}, "🔁 2차 클로징|간단 점검형": {"pill": "2차 클로징: 간단 점검형", "summary_title": "핵심 포인트", "summary_text": "1차 클로징에서 결정이 안 됐을 때 사용합니다\n복잡하게 생각하지 않아도 되는 것만 남겨서 다시 제안합니다\n오늘 딱 하나만 결정하시면 된다는 것을 다시 한번 강조합니다", "summary_color": "#0F6E56", "sections": [{"title": "① 간소화 — 오늘의 결정을 최소로", "subtitle": "이미 충분히 설명됐음을 활용", "content_html": "고객님, 오늘 제가 여러 가지 말씀드렸는데요.<br/>사실 오늘 결정하실 건 딱 하나입니다.<br/>[보장 항목] 이것 하나만요.<br/>나머지는 다 나중에 하셔도 됩니다.복잡하게 생각하실 필요 없이,<br/>이 한 가지만 지금 챙겨두시면<br/>오늘 상담 목적은 다 달성되는 겁니다.", "tip": "⚡ 복잡함 → 단순화 → 결정 부담 최소화"}, {"title": "② 최종 제안 — 가장 작은 결정", "subtitle": "한 가지만 결정하도록 유도", "content_html": "고객님, 지금 이 한 가지만 결정해주십시오.<br/>[보장 항목] — 월 ○만 원입니다.<br/>이것 하나만 챙겨두시면 오늘은 충분합니다.진행하시겠습니까?", "tip": "⚡ 가장 짧은 클로징 멘트 — 침묵을 유도"}, {"title": "③ 침묵 대응 — 기다리기", "subtitle": "고객이 생각할 시간 드리기", "content_html": "(고객 반응을 기다립니다.)<br/>고객이 침묵하면 먼저 말하지 마세요.<br/>침묵 자체가 고민 중이라는 신호입니다.고객이 \"어떻게 하면 되나요?\"라고 물으시면 → 진행<br/>\"좀 더 생각해볼게요\"라고 하시면 → 재연락 약속<br/>\"그냥 됐어요\"라고 하시면 → 부담 완화형으로 마무리", "tip": "⚡ 침묵 = 고민 중 → 먼저 말하면 오히려 역효과"}]}, "📞 도입 인사 + 관심 형성|보장 분석 안내형": {"pill": "각도: 보장 누락 공감 → 분석 제안", "summary_title": "카드 요약", "summary_text": "보험료는 내시는데 보장이 제대로 잡혀 있는지 모르시는 분들이 많습니다\n빠진 보장이 있는지 기준으로만 간단히 분석해드리겠습니다\n3대 질환 보장이 어떻게 잡혀 있는지부터 확인해드릴게요", "summary_color": "#3A2FA0", "sections": [{"title": "① 오프닝", "subtitle": "분석 담당자 포지셔닝 — 가입 아님을 명확히", "content_html": "안녕하세요 고객님, ○○보험 보장분석 담당자 ○○○입니다.<br/>\n지금 보험을 새로 가입하시라는 연락이 아니라,<br/>\n현재 가입된 보험 보장이 제대로 구성되어 있는지 확인해드리는 연락입니다.\n\n저희 쪽에서 고객님 보험 확인 요청이 들어와서 도움드리려고 연락드렸습니다.", "tip": ""}, {"title": "② 관심 형성", "subtitle": "공감에서 시작 — 고객이 이미 느끼는 불안 건드리기", "content_html": "요즘 고객님들 보면 보험료는 많이 내시는데,<br/>\n정작 중요한 보장이 빠져 있는 경우가 생각보다 많거든요.\n\n가입된 보험을 기준으로 보장 구성이 제대로 되어 있는지만 간단히 분석해서 안내드리고 있습니다.", "tip": "⚡ \"많이 내는데 빠져 있다\" — 보험료 아깝다는 감정 자극, 방어보다 궁금증 유도"}, {"title": "③ 연결 질문", "subtitle": "3대 질환으로 구체적 필요성 즉시 인식", "content_html": "혹시 고객님, 보험은 현재 몇 개 정도 가입되어 있으세요?<br/>\n암, 뇌혈관, 심장 이 3대 질환 기준으로<br/>\n보장이 어떻게 잡혀 있는지 먼저 확인해드리겠습니다.\n\n3대 질환 쪽만 봐도 전체 보장 수준이 어느 정도인지 바로 파악이 됩니다.", "tip": ""}]}, "💬 도입 반론|상담 거부형": {"pill": "반론 유형: 상담 거부형", "summary_title": "고객 반응 패턴", "summary_text": "\"이미 보험 있어요\"  ·  \"보험료 비싸요\"\n\"생각해볼게요\"", "summary_color": "#7A4400", "sections": [{"title": "① \"이미 보험 있어요\" 대응", "subtitle": "있다는 사실을 인정하되 점검 필요성으로 전환", "content_html": "네, 그래서 확인드리는 겁니다.<br/>\n이미 가입이 되어 있으셔도<br/>\n보장 누락이나 중복 여부는 따로 확인이 필요하거든요.\n\n혹시 최근에 보험 점검해보신 적 있으세요?", "tip": "⚡ \"그래서 확인드리는 겁니다\" — 반박이 아니라 동의에서 시작"}, {"title": "② \"보험료 비싸요\" 대응", "subtitle": "비용 부담 공감 후 구조 점검으로 연결", "content_html": "맞습니다, 보험료 부담이 크실 수 있어요.<br/>\n그런데 보험은 구조를 정리하면<br/>\n보험료를 줄일 수도 있거든요.\n\n지금 보험료 흐름만 간단히 확인해보시면<br/>\n조정 방향이 바로 보일 수 있습니다.", "tip": "⚡ \"줄일 수도 있다\" — 비용 절감 가능성으로 관심 전환"}, {"title": "③ \"생각해볼게요\" 대응", "subtitle": "결정 미루기 → 지금 확인만 하면 된다고 재정의", "content_html": "지금 바로 결정하시라는 게 아닙니다.<br/>\n현재 보험 구조만 한번 확인해보시고<br/>\n필요한 부분이 있는지 판단하셔도 충분합니다.\n\n지금 가입된 내용 기준으로 한번 확인해보시겠습니까?", "tip": "⚡ \"결정 아님 → 확인만\"으로 재정의 — 부담 제거"}]}, "📞 도입 인사 + 관심 형성|보험 점검형": {"pill": "각도: 시간 경과 → 현재 기준 점검 제안", "summary_title": "카드 요약", "summary_text": "보험 가입 권유 아닙니다\n지금 기준으로 맞게 잡혀 있는지 간단히 점검만 해드리겠습니다\n가입하신 지 얼마나 됐는지만 알아도 바로 확인이 됩니다", "summary_color": "#3A2FA0", "sections": [{"title": "① 오프닝", "subtitle": "점검 담당자 포지셔닝 — 부담 최소화", "content_html": "안녕하세요 고객님, 보험 보장 점검 담당자 ○○○입니다.<br/>\n보험 가입 권유 전화는 아니고요,<br/>\n지금 가입하신 보험을 한번 점검해드리려고 연락드렸습니다.\n\n고객님 보험 간단히 확인 요청이 있어서 안내차 연락드렸습니다.", "tip": ""}, {"title": "② 관심 형성", "subtitle": "시간 경과 = 자연스러운 점검 필요 이유", "content_html": "보험이라는 게 가입하고 나서 한 번도 안 보시는 분들이 많은데요,<br/>\n시간이 지나면서 지금 기준이랑 안 맞는 보장이 생기는 경우가 있거든요.\n\n새로 가입하시라는 게 아니라, 지금 보험이 현재 상황에 맞게 제대로 잡혀 있는지만 확인해드리는 겁니다.", "tip": "⚡ \"새 가입 아님\"을 ②에서 한 번 더 짚으면 경계심이 풀림"}, {"title": "③ 연결 질문", "subtitle": "가입 시점으로 연결 — 자연스럽게 현황 파악", "content_html": "혹시 고객님, 보험 가입하신 지 얼마나 되셨어요?<br/>\n가입하신 지 얼마나 됐는지만 알아도<br/>\n지금 점검이 필요한지 바로 확인이 됩니다.\n\n오래되셨으면 기준이 바뀐 부분이 있을 수 있고, 최근이면 구성만 간단히 확인해드리면 됩니다.", "tip": ""}]}, "| 보험회사 (모니터링) 연락처|": {"pill": "", "summary_title": "", "summary_text": "", "summary_color": "#c8753a", "sections": []}, "📊 보장 분석|중복 정리형": {"pill": "보장 분석: 중복 정리형", "summary_title": "분석 포인트", "summary_text": "같은 성격의 보장이 겹쳐 있으면 보험료만 높아집니다\n중복 정리만 해도 보험료를 줄이고 보장을 강화할 수 있습니다\n어떤 항목이 겹쳐 있는지부터 확인해드리겠습니다", "summary_color": "#185FA5", "sections": [{"title": "① 중복 확인 시작 멘트", "subtitle": "여러 보험 가입자에게 효과적인 시작", "content_html": "고객님, 보험이 여러 개 가입되어 있으시면<br/>중복으로 보장이 겹쳐 있는 경우가 종종 있습니다.<br/>중복 보장은 실제로 두 배로 받는 게 아니라<br/>보험료만 이중으로 나가는 구조가 되거든요.지금 가입된 보험들을 같이 보면서<br/>어떤 항목이 겹쳐 있는지 먼저 확인해드리겠습니다.", "tip": "⚡ 중복 = 낭비라는 인식 먼저 심어주기 — 정리 필요성 자연스럽게 유도"}, {"title": "② 실비 중복 확인", "subtitle": "실비는 중복 가입해도 한 곳에서만 지급", "content_html": "우선 실비 중복부터 확인합니다.<br/>실비는 여러 개 가입해도<br/>실제 나간 의료비만큼만 지급이 되거든요.<br/>두 개 가입하면 두 배를 받는 게 아닙니다.현재 실비가 [○개] 가입되어 있습니다.<br/>실비가 2개 이상이면 나중에 갱신 시<br/>중복 해지를 고려하시는 게 좋습니다.<br/>다만 나이나 건강 상태에 따라 다시 가입이 어려울 수 있어서<br/>해지 전에 꼭 확인이 필요합니다.", "tip": "⚡ \"무조건 해지\" 아님 강조 — 고객 불안 방지"}, {"title": "③ 진단비 중복 확인", "subtitle": "진단비는 중복 수령 가능한 항목", "content_html": "진단비는 실비와 달리 중복으로 받을 수 있습니다.<br/>암 진단비를 두 군데서 받으면 두 배로 받을 수 있거든요.<br/>그래서 진단비는 중복이 무조건 나쁜 게 아닙니다.다만 같은 보험사에서 비슷한 상품을 두 개 가입한 경우는<br/>보험료 낭비일 수 있으니 확인이 필요합니다.<br/>현재 암 진단비 합계: ○천만 원 / 뇌 진단비 합계: ○천만 원<br/>이 정도면 [적정 / 과다 / 부족] 수준입니다.", "tip": "⚡ 진단비 중복은 유리할 수 있음 — 고객에게 정확한 정보 제공으로 신뢰 확보"}, {"title": "④ 특약 중복 확인", "subtitle": "비슷한 특약이 여러 상품에 붙어 있는 경우", "content_html": "마지막으로 특약 중복입니다.<br/>입원일당, 수술비, 골절 보장 같은 특약이<br/>여러 보험에 각각 붙어 있는 경우가 많습니다.특약은 진단비처럼 중복 수령이 가능한 경우도 있고,<br/>상품마다 지급 조건이 달라서<br/>어느 쪽이 더 유리한지 확인이 필요합니다.<br/>지금 겹쳐 있는 특약 중에서 정리가 가능한 항목을 찾아드리겠습니다.", "tip": "⚡ 특약 중복은 유불리가 다양 — 섣불리 정리 권유하지 않도록 주의"}, {"title": "⑤ 중복 정리 결과 및 제안", "subtitle": "정리 가능한 항목과 절감 가능 보험료 제시", "content_html": "고객님, 지금까지 중복 항목을 확인해드렸는데요.<br/>정리가 가능한 항목: ___________<br/>예상 절감 보험료: 월 ○만 원 수준이 보험료를 줄이는 대신에<br/>지금 부족한 보장 쪽을 보강하시면<br/>같은 비용으로 더 알찬 구성이 될 수 있습니다.<br/>어떻게 하시겠어요?", "tip": "⚡ 정리 후 절감 금액을 보강 재원으로 연결 — 고객이 손해 없다고 느낌"}]}, "✅ 클로징|부담 완화형": {"pill": "클로징: 부담 완화형", "summary_title": "핵심 포인트", "summary_text": "지금 바로 가입하시라는 게 아닙니다\n현재 보험 구조만 한번 정리해보시고 필요한 부분이 있는지 판단하셔도 충분합니다\n필요한 부분이 없으면 그냥 넘어가시면 됩니다", "summary_color": "#0F6E56", "sections": [{"title": "① 결정 압박 완전 제거", "subtitle": "고객이 느끼는 마지막 저항 해소", "content_html": "고객님, 제가 오늘 드리는 제안은<br/>가입을 강요하는 게 아닙니다.<br/>현재 보험 구조에서 빠진 부분이 있는지 확인해드린 거고,<br/>그 부분을 어떻게 하실지는 전적으로 고객님이 결정하시면 됩니다.필요한 부분이 없다고 느끼시면 그냥 유지하시면 되고요,<br/>필요한 부분이 있다고 느끼시면 그때 챙기시면 됩니다.<br/>오늘 제가 드릴 수 있는 건 여기까지입니다.", "tip": "⚡ 결정권을 고객에게 완전히 드리기 — 역설적으로 신뢰 형성"}, {"title": "② 핵심 포인트만 남기기", "subtitle": "기억에 남을 한 가지만 강조", "content_html": "오늘 말씀드린 것 중에서 딱 하나만 기억해 주세요.<br/>[보장 항목]이 지금 고객님 보험에서 가장 취약한 부분입니다.<br/>이 부분만 챙겨두시면 나머지는 걱정 안 하셔도 됩니다.이게 있고 없고의 차이가<br/>실제 상황이 왔을 때 크게 느껴지거든요.<br/>기억해두셨다가 편하실 때 챙기시면 됩니다.", "tip": "⚡ \"딱 하나만 기억\" — 기억 부담 줄이고 핵심만 남기기"}, {"title": "③ 자연스러운 마무리", "subtitle": "부담 없이 통화 마무리", "content_html": "오늘 시간 내주셔서 감사합니다.<br/>제가 설명드린 게 도움이 되셨으면 좋겠습니다.나중에 보험 관련해서 궁금하신 게 생기시거나,<br/>다시 한번 확인해보고 싶으시면 언제든지 연락 주십시오.<br/>편하게 도와드리겠습니다.", "tip": "⚡ 거부감 없는 마무리 — 재연락 가능성 열어두기"}]}, "🔎 고객 상황 확인 (보험 조회 유도)|가입 여부 확인형": {"pill": "고객 상황 확인: 가입 여부 확인형", "summary_title": "핵심 질문", "summary_text": "보험이 조금이라도 있으신지 여부만 확인드립니다\n있다 / 없다 한 마디면 바로 현황 파악이 됩니다\n지금 바로 상품 설명으로 넘어가는 게 아닙니다", "summary_color": "#0F6E56", "sections": [{"title": "① 질문 전 포지셔닝", "subtitle": "가입 권유가 아님을 한 번 더 짚기", "content_html": "고객님, 지금 바로 가입을 권유드리려는 게 아니라<br/>현재 보험이 어느 정도 있으신지만<br/>간단히 확인해드리려고 합니다.있으신지 여부만 알아도 현재 상태를<br/>어느 정도 바로 볼 수 있거든요.", "tip": "⚡ 질문 전 한 번 더 부담 제거 — 경계심 낮추기"}, {"title": "② 핵심 질문", "subtitle": "가장 답하기 쉬운 단답형 질문", "content_html": "혹시 고객님, 보험은 현재<br/>조금이라도 가입되어 있으세요?가입 여부만 알아도 지금 상태를 바로 확인해드릴 수 있습니다.", "tip": "⚡ 단답 가능한 질문 → 대화 참여 유도"}, {"title": "③ 반응별 대응", "subtitle": "있다 / 없다 각각 다음 흐름으로 연결", "content_html": "있다고 하시면 → 몇 개 정도 되시는지로 연결<br/>없다고 하시면 → 지금이 점검 시작 타이밍으로 연결\"있어요\" → \"혹시 몇 개 정도 가입되어 있으세요?\"<br/>\"없어요\" → \"그러면 지금부터 간단히 확인해드릴게요.\"", "tip": "⚡ 대답이 무엇이든 다음 단계로 연결 가능"}]}, "🔁 2차 클로징|확인 제안형": {"pill": "2차 클로징: 확인 제안형", "summary_title": "핵심 포인트", "summary_text": "\"생각해볼게요\" 이후 2차 클로징으로 사용합니다\n결정이 아닌 확인만 다시 한번 제안합니다\n오늘 확인한 것만 기억해두시도록 마무리합니다", "summary_color": "#0F6E56", "sections": [{"title": "① 재제안 — 결정 아닌 확인만", "subtitle": "가장 작은 동의만 구하기", "content_html": "고객님, 그러면 오늘 결정은 나중에 하시고요.<br/>오늘 확인된 것만 한 가지 기억해주십시오.<br/>[보장 항목]이 지금 부족하다는 것만요.이것만 기억해두셨다가,<br/>나중에 여유 되실 때 챙기시면 됩니다.<br/>오늘은 그것만으로 충분합니다.", "tip": "⚡ 결정 압박 없이 — 기억만 남기기"}, {"title": "② 문자 요약 제안", "subtitle": "기억에 남도록 문자 발송", "content_html": "오늘 말씀드린 내용을 간단히 문자로 정리해서 보내드릴게요.<br/>나중에 다시 보실 수 있게요.<br/>[보장 항목]: 현재 부족 / 월 ○만 원 보강 권장문자 받으시고 나서 생각해보시다가,<br/>결정하시면 연락 주십시오.<br/>기다리겠습니다.", "tip": "⚡ 문자 = 기억 보조 + 재연락 명분"}, {"title": "③ 마무리 — 좋은 인상으로 끝내기", "subtitle": "오늘 결정 없어도 긍정적으로 마무리", "content_html": "고객님, 오늘 시간 내주셔서 감사합니다.<br/>제가 드린 정보가 도움이 되셨으면 좋겠습니다.<br/>나중에 궁금하신 게 생기시면 언제든지 연락 주십시오.편하게 도와드리겠습니다.<br/>좋은 하루 되십시오.", "tip": "⚡ 결정 없이 끝나도 — 좋은 인상이 나중 재연락으로 이어짐"}]}, "⚡ 반론 대응|다음에 할게요형": {"pill": "반론 대응: 다음에 할게요형", "summary_title": "핵심 포인트", "summary_text": "\"다음에 할게요\" 반응 전용입니다\n다음에 하면 어떤 점이 달라지는지 구체적으로 알려드립니다\n결정을 강요하지 않되 미루는 것의 현실적 불이익을 남겨둡니다", "summary_color": "#0F6E56", "sections": [{"title": "① 수용 — 강요하지 않기", "subtitle": "\"다음에\"를 막지 않고 수용", "content_html": "고객님, 네 괜찮습니다.<br/>지금 당장 결정하지 않으셔도 됩니다.<br/>편하실 때 결정하시는 게 맞거든요.다만 한 가지만 말씀드려도 될까요?<br/>나중에 하시려고 할 때 달라질 수 있는 부분이 있어서요.", "tip": "⚡ 수용 후 \"다만 한 가지만\" — 자연스럽게 이어가기"}, {"title": "② 미루면 달라지는 것 설명", "subtitle": "보험료·건강 조건 변화 구체적으로", "content_html": "보험은 나이가 올라갈수록 보험료가 올라갑니다.<br/>지금 이 상품 기준으로<br/>1년 뒤에 가입하시면 월 ○~○만 원이 더 나올 수 있거든요.<br/>10년이면 ○~○만 원 차이가 생깁니다.거기다 건강 상태도 고려하셔야 합니다.<br/>지금 건강하시면 아무 조건 없이 가입이 가능하지만,<br/>나중에 건강검진에서 뭔가 나오거나 약을 드시게 되면<br/>부담보가 붙거나 거절될 수 있거든요.<br/>지금이 가장 좋은 조건으로 가입하실 수 있는 시점입니다.", "tip": "⚡ 금액 손실 + 건강 조건 변화 = 미루면 손해라는 인식"}, {"title": "③ 마무리 — 부담 없이 재결정 유도", "subtitle": "오늘 한 번만 더 생각해보시도록", "content_html": "고객님, 그러면 오늘은 이렇게 하시겠습니까?<br/>\"다음에\" 하시기 전에,<br/>오늘 딱 한 가지만 확인해보시는 건 어떨까요?<br/>[보장 항목] 이것 하나만요.지금 가장 필요한 한 가지만 챙겨두시고,<br/>나머지는 정말 나중에 하셔도 됩니다.<br/>이 한 가지만 오늘 진행해보시겠습니까?", "tip": "⚡ \"다음에\" → \"한 가지만 오늘\" 로 범위 줄이기"}]}, "🔥 필요성 강조|간단 확인 안내": {"pill": "필요성 강조: 간단 확인 안내형", "summary_title": "핵심 멘트", "summary_text": "지금 바로 가입 결정을 하시라는 게 아닙니다\n현재 보험 상태만 간단히 확인해보자는 취지입니다\n확인해보시고 필요하면 그때 결정하셔도 충분합니다", "summary_color": "#3A2FA0", "sections": [{"title": "① 결정 압박 완전 제거", "subtitle": "고객이 느끼는 부담감 직접 해소", "content_html": "고객님, 보험 얘기를 들으면<br/>뭔가 결정을 강요받는 것 같아서<br/>불편하게 느끼시는 분들이 많습니다.<br/>그 불편함을 드리려는 게 아닙니다.오늘 제가 드리는 건 딱 하나입니다.<br/>지금 보험이 고객님 상황에 맞게 잡혀 있는지<br/>현황만 확인해드리는 겁니다.<br/>가입 여부 결정은 전적으로 고객님이 하시면 됩니다.", "tip": "⚡ 불편함을 먼저 인정 → \"이 사람은 다르다\"는 신뢰 형성"}, {"title": "② 핵심 멘트 — 확인의 가치", "subtitle": "확인 자체가 손해 없다는 논리", "content_html": "확인해보면 세 가지 중 하나입니다.<br/>첫째, 충분하다 — 그냥 안심하고 유지하시면 됩니다.<br/>둘째, 부족한 게 있다 — 그때 보강하시면 됩니다.<br/>셋째, 중복이 있다 — 정리해서 보험료를 줄이실 수 있습니다.어느 경우든 확인 자체가 손해가 없습니다.<br/>오히려 확인 안 하고 넘어갔다가<br/>필요한 순간에 보장이 안 되는 게 진짜 손해거든요.", "tip": "⚡ 3가지 결과 모두 고객에게 유리 → 확인 자체에 거부감 없애기"}, {"title": "③ 간단하다는 것 강조", "subtitle": "복잡하지 않다는 인식 심어주기", "content_html": "보험을 전부 다 꺼내서 볼 필요도 없고요.<br/>딱 세 가지만 확인하면 됩니다.<br/>실비가 있는지,<br/>3대 질환 진단비가 얼마인지,<br/>빠진 보장이 있는지.<br/>이 세 가지만 보면 지금 상태의 80%가 보입니다.3~5분이면 충분합니다.<br/>복잡하게 생각하실 필요 없습니다.", "tip": "⚡ \"3~5분\" + \"3가지만\" → 시간·복잡성 부담 동시 제거"}, {"title": "④ 연결 질문 — 가장 작은 동의", "subtitle": "확인만 동의받는 방식", "content_html": "혹시 고객님, 지금 보험이<br/>몇 개 정도 가입되어 있으세요?<br/>개수만 말씀해 주셔도<br/>현재 구조가 어떻게 되어 있는지 바로 볼 수 있습니다.필요한 부분이 있으면 말씀드리고,<br/>없으면 그냥 안심하고 넘어가시면 됩니다.", "tip": "⚡ \"없으면 넘어가도 된다\" → 마지막 부담 제거"}]}, "⚡ 반론 대응|배우자 상의형": {"pill": "반론 대응: 배우자 상의형", "summary_title": "핵심 포인트", "summary_text": "\"배우자랑 상의해볼게요\" 반응 전용입니다\n상의하는 것은 당연하되 기준을 먼저 잡아드리는 방향으로 전환합니다\n상의 전에 현재 상태만 공유해드리는 것으로 대화를 이어갑니다", "summary_color": "#0F6E56", "sections": [{"title": "① 공감 — 상의는 당연한 것", "subtitle": "거절로 받지 않고 자연스럽게 수용", "content_html": "고객님, 배우자분과 상의하시는 건 당연한 일입니다.<br/>특히 보험처럼 장기적인 결정은<br/>가족이 함께 결정하시는 게 맞거든요.다만 상의하실 때 기준이 있어야<br/>대화가 더 수월하게 되거든요.<br/>오늘 확인된 내용을 기준으로<br/>배우자분께 설명해드릴 수 있게 정리해드릴게요.", "tip": "⚡ 상의를 막지 않고 — 기준 제공으로 역할 전환"}, {"title": "② 상의 기준 정리 — 핵심만 전달", "subtitle": "배우자에게 전달할 내용 요약", "content_html": "배우자분께 이렇게 말씀해 주시면 됩니다.<br/>\"현재 우리 보험에서 [보장 항목]이 부족한 상태야.<br/>월 ○만 원으로 이 부분을 채울 수 있는데 어떻게 생각해?\"<br/>딱 이것만 말씀해 주시면 됩니다.보험 내용을 자세히 설명하지 않으셔도 되고,<br/>오늘 확인된 핵심 한 가지만 공유하시면 됩니다.<br/>제가 문자로 요약해서 보내드릴게요.", "tip": "⚡ 배우자에게 전달할 말 그대로 제공 — 고객 부담 최소화"}, {"title": "③ 다음 연락 기준 설정", "subtitle": "상의 후 재연락 약속", "content_html": "상의하시고 나서 언제쯤 다시 연락드릴까요?<br/>며칠 안에 결정하시는 경우가 많아서요,<br/>○일 후에 한번 연락드려도 될까요?상의 결과 어떻게 되든 부담 없이 연락 주십시오.<br/>진행하시면 바로 안내해드리고,<br/>더 생각해보시겠다면 그것도 괜찮습니다.", "tip": "⚡ 재연락 날짜 구체적으로 설정 — 흐지부지되지 않게"}]}, "📦 상품 설명|운전자보험 설명형": {"pill": "상품 설명: 운전자보험", "summary_title": "상품 정의", "summary_text": "자동차보험으로 처리 안 되는 교통사고 관련 법률비용·벌금·형사합의금을 보장합니다.\n운전 중 발생한 부상 치료비·입원비도 보장 범위에 포함됩니다.\n차량 보험과는 별개이며, 운전자 개인을 보호하는 목적의 상품입니다.", "summary_color": "#3B6D11", "sections": [{"title": "① 니즈환기 — 교통사고 법률비용 실제 사례", "subtitle": "자동차보험으로 안 되는 부분 구체적으로", "content_html": "고객님, 교통사고가 나면 자동차보험이 다 해결해준다고 생각하시는 분들이 많은데요.<br/>실제로는 그렇지 않습니다.<br/>자동차보험은 피해자 보상이 목적이고,<br/>운전자 본인이 형사처벌 받을 때 드는 비용은 별도거든요.교통사고로 사람이 다치면 형사합의금이 수백만 원에서 수천만 원,<br/>변호사 비용이 수백만 원,<br/>벌금이 수백만 원이 한꺼번에 나오는 경우가 있습니다.<br/>운전자보험이 있으면 이게 전부 보장됩니다.", "tip": "⚡ 자동차보험 ≠ 운전자보험 — 고객이 가장 많이 착각하는 부분"}, {"title": "② 실제 사례 — 운전자 형사처벌 케이스", "subtitle": "실제 발생 케이스로 현실감 전달", "content_html": "얼마 전에 뉴스에도 나왔는데요,<br/>횡단보도 사고 하나에 합의금 5천만 원,<br/>벌금 500만 원, 변호사 비용 300만 원 해서<br/>6천만 원 넘게 나온 케이스가 있었거든요.이게 남 얘기가 아닌 게,<br/>운전을 하다 보면 아무리 조심해도<br/>예측 못 한 상황이 생길 수 있잖아요.<br/>운전자보험 월 보험료가 1~3만 원이거든요.<br/>이 금액으로 수천만 원 리스크를 커버하는 겁니다.", "tip": "⚡ 보험료 대비 커버 금액 → 가성비 최고 포인트"}, {"title": "③ 현재 운전자 보장 확인 및 제안", "subtitle": "조회 결과 기반 보강 제안", "content_html": "고객님 운전자보험을 확인하면<br/>형사합의금 한도 / 벌금 한도 / 변호사 비용 / 면허정지 위로금<br/>각 항목이 얼마나 잡혀 있는지 확인됩니다.형사합의금은 최소 3,000~5,000만 원 이상 권장되고,<br/>12대 중과실 항목도 포함되어 있는지 확인이 중요합니다.<br/>현재 구조에서 부족한 부분이 있으면 바로 보강하실 수 있습니다.", "tip": "⚡ 12대 중과실 포함 여부 → 전문 용어로 신뢰감 형성"}]}, "📦 상품 설명|어린이보험 설명형": {"pill": "상품 설명: 어린이보험", "summary_title": "상품 정의", "summary_text": "0세부터 15~30세까지 자녀를 대상으로 하는 종합 보장 상품입니다.\n어린이 특화 질병·상해 보장 외에 성인 이후까지 보장이 이어지는 구조입니다.\n어릴 때 가입할수록 보험료가 낮고, 건강 상태 관계없이 보장이 가능해 유리합니다.", "summary_color": "#3B6D11", "sections": [{"title": "① 니즈환기 — 어린이 보험의 필요성", "subtitle": "아이에게 실제로 발생하는 위험 사례", "content_html": "고객님, 아이들은 어른보다 사고 발생 빈도가 훨씬 높습니다.<br/>골절 치료 한 번에 50~150만 원,<br/>응급실 방문 한 번에 20~50만 원이 기본으로 나오거든요.<br/>아이들은 넘어지고 다치는 게 일상이라<br/>이런 비용이 1년에 몇 번씩 반복됩니다.거기다 소아암 발생률이 생각보다 높아서,<br/>소아 백혈병 치료비는 3년 기준 수천만 원에서 억 단위까지 나옵니다.<br/>어린이보험 하나로 이 모든 상황을 커버할 수 있거든요.", "tip": "⚡ 골절·응급 등 일상 사고 + 소아암 → 빈번한 것부터 심각한 것까지 커버"}, {"title": "② 연예인·실제 사례", "subtitle": "자녀 질병·사고 공개 사례로 공감 형성", "content_html": "방송에서 연예인 자녀분이 갑자기 큰 병에 걸리셨다는 얘기 나오잖아요.<br/>소아암 진단 받으신 아이 부모님들이<br/>치료비뿐 아니라 치료 기간 동안 직장을 못 나가셔서<br/>이중으로 힘드셨다는 인터뷰를 보신 분들 계실 거예요.제가 상담하다 보면,<br/>아이 어릴 때 보험 안 들었다가<br/>중학생 때 아프고 나서 가입하려니까<br/>이미 건강 고지 때문에 거절되거나 부담보가 붙어서<br/>제대로 가입을 못 하셨다는 분들을 종종 봤거든요.<br/>어릴 때 건강할 때 가입해둬야 하는 이유입니다.", "tip": "⚡ 건강할 때 가입 = 조건 없이 풀보장 → 나중엔 거절·부담보 가능성"}, {"title": "③ 어린이보험 핵심 구성 설명", "subtitle": "보장 구성 및 성인 전환 시 장점", "content_html": "어린이보험은 크게 세 가지 보장이 핵심입니다.<br/>① 상해 보장: 골절·화상·응급실 등 사고 관련<br/>② 질병 보장: 소아암·입원비·수술비<br/>③ 성인 전환 보장: 성인이 된 후에도 계속 유지특히 세 번째가 중요한데요,<br/>좋은 어린이보험은 성인이 된 후에도<br/>암·뇌·심장 보장이 그대로 이어지는 구조입니다.<br/>나중에 성인이 돼서 새로 가입하면 보험료가 훨씬 비싸지거든요.<br/>지금 아이 때 가입해두면 낮은 보험료로 평생 보장이 됩니다.", "tip": "⚡ 성인 전환 후 보장 유지 = 장기적 가성비 → 부모 입장에서 강한 설득"}, {"title": "④ 현재 자녀 보장 확인 및 제안", "subtitle": "자녀 나이·현재 가입 여부 기준으로 제안", "content_html": "자녀분 연령과 현재 보험 가입 여부를 확인해드리겠습니다.<br/>0~5세: 지금이 가장 유리한 가입 시기<br/>6~12세: 아직 충분히 유리, 빠를수록 좋음<br/>13세 이상: 가입 가능하나 보험료 올라가기 시작현재 자녀분 보험이 [있음 / 없음] 상태이고,<br/>있더라도 보장 금액과 성인 전환 여부를 같이 확인해드리겠습니다.<br/>아이 나이가 어릴수록 유리하니까<br/>빠르게 확인해두시는 게 좋습니다.", "tip": "⚡ 나이대별 체크 → 부모가 지금 결정해야 한다는 긴박감"}]}, "📦 상품 설명|종합보험 설명형": {"pill": "상품 설명: 종합보험", "summary_title": "상품 정의", "summary_text": "실비·진단비·생활비 보장을 하나의 상품 안에 묶어놓은 구조입니다.\n각각 따로 가입하는 것보다 보험료가 효율적이지만 보장 범위는 상품마다 다릅니다.\n전체 구조가 한눈에 보인다는 장점이 있어 점검 기준으로 활용하기 좋습니다.", "summary_color": "#3B6D11", "sections": [{"title": "① 니즈환기 — 따로 가입 vs 묶어서 가입", "subtitle": "종합보험의 효율성을 비용 관점에서 설명", "content_html": "고객님, 실비·암·뇌·심장 보장을<br/>각각 따로 가입하면 보험료가 얼마나 될 것 같으세요?<br/>잘 짜면 월 10~15만 원 수준이지만<br/>따로따로 넣다 보면 20~30만 원 넘어가는 경우도 많습니다.종합보험은 이걸 하나로 묶어서<br/>보험료 중복을 줄이면서 보장은 유지하는 구조입니다.<br/>지금 여러 개 가입하고 계신 분들은<br/>종합보험으로 정리하면 월 보험료가 줄어드는 경우도 있거든요.", "tip": "⚡ 비용 효율 강조 → 보험료 부담 있는 고객에게 효과적"}, {"title": "② 구조 확인 — 지금 종합보험 안에 뭐가 있는지", "subtitle": "종합보험 내 보장 항목 점검", "content_html": "고객님 현재 종합보험을 열어보면<br/>실비 / 암 진단비 / 뇌·심장 진단비 / 입원일당 / 수술비가<br/>각각 얼마씩 들어가 있는지 확인이 됩니다.이 중에서 금액이 충분한 항목과 부족한 항목을 구분해드리겠습니다.<br/>종합보험 안에 다 있어 보여도<br/>각 보장 금액이 낮으면 실제로 필요할 때 부족할 수 있거든요.", "tip": "⚡ \"다 있다\" 착각 → 실제 금액 확인으로 보강 필요성 발견"}, {"title": "③ 제안 — 종합보험 유지 or 리모델링", "subtitle": "현재 구조 기준으로 방향 제시", "content_html": "고객님 종합보험 구조를 보면<br/>[유지 권장 주시면 됩니다.제 연락처 문자로 남겨드릴게요.<br/>편하실 때 연락 주십시오.", "tip": "⚡ 결정 안 해도 좋은 인상 — 나중에 다시 연락할 가능성 높임"}]}, "🔥 필요성 강조|보험 점검 안내": {"pill": "필요성 강조: 보험 점검 안내형", "summary_title": "핵심 멘트", "summary_text": "보험은 가입보다 점검이 중요합니다\n가입은 되어 있어도 현재 상황에 맞는지 확인이 필요합니다\n지금 가입된 내용만 간단히 확인해보시면 됩니다", "summary_color": "#3A2FA0", "sections": [{"title": "① 공감 — 점검 안 하는 게 당연하다는 인식", "subtitle": "고객이 방어적으로 반응하지 않도록", "content_html": "고객님, 보험은 가입하고 나서<br/>한 번도 들여다보지 않으시는 분들이 정말 많습니다.<br/>처음 가입할 때 설계사가 권유한 대로 넣어두고<br/>그냥 유지하고 계신 경우가 대부분이거든요.그게 잘못된 게 아니라 원래 그런 겁니다.<br/>그런데 문제는 그 사이에 기준도 바뀌고<br/>고객님 상황도 달라졌을 수 있다는 거거든요.", "tip": "⚡ 잘못됐다고 하지 않음 → 공감 후 필요성 자연스럽게 연결"}, {"title": "② 핵심 멘트 — 점검 vs 가입 차이 명확히", "subtitle": "새로 가입하라는 게 아님을 강조", "content_html": "보험은 가입 여부보다<br/>지금 가입된 내용이 현재 상황에 맞게<br/>제대로 잡혀 있는지가 더 중요합니다.<br/>새로 가입하시라는 게 아니라<br/>지금 것이 맞는지 확인해드리는 겁니다.보장 내용이 현재 상황에 맞는지,<br/>빠진 부분은 없는지,<br/>중복으로 낭비되는 부분은 없는지<br/>이 세 가지만 확인해드리면 됩니다.", "tip": "⚡ \"새 가입 아님\" 반복 강조 → 방어 반응 차단"}, {"title": "③ 필요성 강화 — 점검 안 하면 생기는 일", "subtitle": "구체적인 위험 상황으로 필요성 실감", "content_html": "실제로 보험이 필요한 상황이 왔을 때<br/>\"이 보험이 이걸 보장해주는 줄 알았는데<br/>약관을 보니까 아니더라\"는 경우가 생깁니다.<br/>보험이 있어도 보장이 안 되는 상황이 생기는 거거든요.그래서 지금 건강하실 때,<br/>조건이 좋을 때 한번 점검해두시는 게<br/>나중에 후회를 막는 가장 현실적인 방법입니다.", "tip": "⚡ \"있어도 안 된다\" 사례 → 점검의 긴박성 부여"}, {"title": "④ 연결 질문 — 대화 이어가기", "subtitle": "가장 답하기 쉬운 질문으로 참여 유도", "content_html": "혹시 고객님, 지금 가입된 보험이<br/>언제 가입하신 건지 혹시 기억하세요?<br/>가입하신 지 얼마나 됐는지만 알아도<br/>지금 점검이 필요한지 바로 확인이 됩니다.오래되셨으면 기준이 바뀐 부분이 있을 수 있고,<br/>최근이면 구성이 제대로 됐는지 확인해드리면 됩니다.", "tip": "⚡ 연도 질문은 단답 가능 → 대화 참여 유도"}]}, "🔎 고객 상황 확인 (보험 조회 유도)|보험료 확인형": {"pill": "고객 상황 확인: 보험료 확인형", "summary_title": "핵심 질문", "summary_text": "한 달 보험료 수준만 알아도 점검 방향이 보입니다\n많고 적음이 아니라 구조가 맞는지가 중요합니다\n대략적인 금액만 말씀해 주셔도 됩니다", "summary_color": "#0F6E56", "sections": [{"title": "① 질문 전 포지셔닝", "subtitle": "금액 판단이 아님을 먼저 안심시키기", "content_html": "고객님, 보험료가 많다고 좋은 것도 아니고<br/>적다고 무조건 부족한 것도 아닙니다.<br/>현재 보험료가 제대로 된 보장에 쓰이고 있는지가 더 중요하거든요.그래서 대략적인 보험료 수준만 알아도<br/>지금 구조가 맞는지 바로 확인이 됩니다.", "tip": "⚡ 금액 판단 없다는 안심 → 솔직한 답변 유도"}, {"title": "② 핵심 질문", "subtitle": "단답형 질문으로 부담 없이", "content_html": "혹시 고객님, 한 달에 보험료가<br/>대략 얼마 정도 나가세요?정확한 금액이 아니어도 됩니다.<br/>\"한 5~6만 원 정도요\" 이런 식으로 대략만 말씀해 주셔도 됩니다.", "tip": "⚡ 구체적 예시 제시 → 답변 방법 자연스럽게 안내"}, {"title": "③ 반응별 대응", "subtitle": "금액대에 따라 다음 흐름으로 연결", "content_html": "낮은 금액 → 보장 구성 점검으로 연결<br/>높은 금액 → 구조 정리·절감 가능성으로 연결<br/>모름 → 통장 이체 내역 확인 제안\"3만 원 정도요\" → \"그러면 보장이 충분히 잡혀 있는지 먼저 확인해드릴게요.\"<br/>\"10만 원 넘어요\" → \"그러면 구조 정리로 보험료를 줄일 수도 있거든요.\"", "tip": "⚡ 금액대별 맞춤 반응 — 상담 흐름이 자연스럽게 이어짐"}]}, "💬 도입 반론|통화 차단형": {"pill": "반론 유형: 통화 차단형", "summary_title": "고객 반응 패턴", "summary_text": "\"잘못 눌렀어요\"  ·  \"괜찮아요\"  ·  \"필요 없어요\"\n\"어디서 번호 알았어요?\"", "summary_color": "#7A4400", "sections": [{"title": "① 즉시 안심 멘트", "subtitle": "끊기 전 1~2초 안에 전달", "content_html": "고객님, 잠깐만요.<br/>\n보험 가입 권유 전화가 아니라<br/>\n기존 보험 확인 안내 때문에 연락드렸습니다.\n\n10초만 들어보시면 됩니다.<br/>\n지금 가입된 보험만 간단히 확인해드리는 안내 전화입니다.", "tip": "⚡ \"10초\"라는 구체적 시간 제시 — 부담 즉시 해소"}, {"title": "② 연결 질문", "subtitle": "통화 유지 후 현황 파악으로 전환", "content_html": "혹시 보험은 현재 몇 개 정도 가입되어 있으세요?<br/>\n몇 개인지만 알아도 현재 상태 바로 확인이 됩니다.", "tip": ""}, {"title": "③ 번호 출처 질문 대응", "subtitle": "\"어디서 번호 알았어요?\" 반응 전용", "content_html": "고객님, 저희 ○○ 사이트에서 보험 조회 이력이 있어서<br/>\n안내차 연락드렸습니다.\n\n보험 가입 강요나 개인정보 수집 전화가 아니고요,<br/>\n기존 보험 현황만 간단히 확인해드리는 안내입니다.", "tip": "⚡ 번호 출처를 명확히 밝히면 불신 → 안심으로 전환됨"}]}, "📦 상품 설명|실비 설명형": {"pill": "상품 설명: 실비보험", "summary_title": "상품 정의", "summary_text": "병원 치료 시 실제로 나간 의료비를 돌려받는 보장입니다.\n급여·비급여 항목 모두 보장되며, 세대에 따라 본인 부담률이 다릅니다.\n보험의 가장 기본 축으로, 없으면 치료비 전액을 본인이 부담합니다.", "summary_color": "#3B6D11", "sections": [{"title": "① 니즈환기 — 실제 치료비 사례", "subtitle": "실비 없을 때 실제로 얼마나 나오는지", "content_html": "고객님, 혹시 요즘 MRI 한 번 찍으면<br/>얼마 나오는지 아세요?<br/>비급여 MRI는 기본 50~80만 원입니다.<br/>실비 없으면 이게 전부 본인 부담이 됩니다.입원을 하게 되면 하루에 병실료·식대·처치비 합쳐서<br/>10~30만 원씩 나오는 경우가 많거든요.<br/>2주 입원이면 최소 150~200만 원 수준입니다.<br/>실비 하나로 이 금액의 80~90%가 돌아오니까<br/>없으면 정말 부담이 크거든요.", "tip": "⚡ 구체적 금액 제시 → 고객이 실감함"}, {"title": "② 연예인·실제 사례", "subtitle": "주변에서 일어난 일처럼 공감대 형성", "content_html": "얼마 전에 방송에서도 나왔는데요,<br/>유명 연예인 분이 갑자기 응급실 가셨을 때<br/>치료비가 수백만 원 나왔다는 얘기 있잖아요.<br/>그분들은 돈이 있으니까 괜찮지만<br/>일반 분들은 그게 정말 부담이 되거든요.실제로 제가 상담하다 보면<br/>실비 없이 큰 병 걸리신 분들이<br/>치료는 했는데 빚이 생기는 경우를 종종 봤거든요.<br/>그래서 실비는 가장 먼저 확인하는 겁니다.", "tip": "⚡ 연예인 사례 + 실제 경험담 → 남 얘기가 아닌 것처럼 느끼게"}, {"title": "③ 현재 실비 확인 및 세대 설명", "subtitle": "조회 결과 기반으로 실비 세대 설명", "content_html": "고객님 실비는 현재 ○세대로 확인됩니다.<br/>1·2세대: 비급여 90% 보장, 보험료 높아짐<br/>3세대: 비급여 일부 제한, 갱신 시 할증<br/>4세대: 비급여 본인부담 30~50%, 보험료 안정지금 세대가 어느 쪽인지에 따라<br/>실제 병원 치료 시 얼마나 돌려받는지가 달라집니다.<br/>현재 세대 기준으로 부족한 부분이 있으면 말씀드리겠습니다.", "tip": "⚡ 세대별 차이 설명 → 고객이 자기 실비의 가치를 인식"}]}, "📊 보장 분석|전체 점검형": {"pill": "보장 분석: 전체 점검형", "summary_title": "분석 포인트", "summary_text": "보험은 하나씩보다 전체 구조를 같이 봐야 합니다\n각각은 괜찮아 보여도 전체로 보면 중복·누락이 나옵니다\n지금 가입된 내용 기준으로 전체 흐름만 확인해드리겠습니다", "summary_color": "#185FA5", "sections": [{"title": "① 분석 시작 멘트", "subtitle": "조회 결과를 보면서 전체 구조 설명 시작", "content_html": "고객님, 지금 조회된 내용을 같이 보시면서<br/>전체 보장 구조를 한번 정리해드리겠습니다.<br/>각각의 보험이 어떤 역할을 하고 있는지<br/>전체 흐름으로 보시는 게 더 이해가 쉬우거든요.지금 가입된 보험을 크게 세 가지로 나눠서 보면<br/>실비 / 진단비(3대 질환) / 생활비 보장 이렇게 구분이 됩니다.<br/>각 영역이 어떻게 잡혀 있는지 순서대로 확인해드리겠습니다.", "tip": "⚡ 전체 → 세부 순서로 설명 — 고객이 구조를 먼저 이해하면 이후 설명 수용도 높아짐"}, {"title": "② 실비 보장 확인", "subtitle": "가장 기본이 되는 실비부터 확인", "content_html": "고객님, 우선 실비 보장부터 보겠습니다.<br/>실비는 병원 치료 시 실제 나간 의료비를<br/>보장해주는 가장 기본 보장이거든요.지금 가입된 실비가 몇 세대 상품인지가 중요합니다.<br/>1~3세대는 보장 범위가 다르고,<br/>4세대 실비는 비급여 본인 부담이 올라가 있어서<br/>현재 내용을 확인해봐야 합니다.", "tip": "⚡ 실비 세대별 차이 설명 → 고객이 자신의 보장 상태에 관심 갖게 됨"}, {"title": "③ 3대 질환 보장 확인", "subtitle": "핵심 진단비 보장 점검", "content_html": "다음으로 암·뇌혈관·심장 이 3대 질환 보장입니다.<br/>이 세 가지는 치료비가 가장 크게 나오는 영역이라<br/>보장 수준이 얼마나 잡혀 있는지가 중요합니다.암 진단비는 최소 3천만 원 이상이 권장되고,<br/>뇌·심장 쪽은 뇌출혈/급성심근경색 범위인지<br/>아니면 뇌졸중/허혈성심장질환까지 포함인지 확인이 필요합니다.<br/>지금 고객님 것은 어떻게 잡혀 있는지 보겠습니다.", "tip": "⚡ 구체적 기준 제시 → 고객이 \"내 건 어떠냐\"고 자연스럽게 궁금해함"}, {"title": "④ 생활비 보장 확인", "subtitle": "치료 후 소득 공백 대비 보장", "content_html": "마지막으로 치료 기간 동안 생활비를<br/>대비할 수 있는 보장이 있는지 확인합니다.<br/>입원일당, 수술비, 간병비 같은 항목이 여기 해당됩니다.실비는 병원비를 돌려받는 거고,<br/>생활비 보장은 치료 기간 동안 소득이 줄었을 때<br/>현금으로 받을 수 있는 보장입니다.<br/>이 부분이 빠져 있으면 치료 후 생활이 어려워질 수 있거든요.", "tip": "⚡ 실비와 생활비 보장의 차이를 명확히 — 고객이 두 가지를 혼동하는 경우 많음"}, {"title": "⑤ 전체 요약 및 다음 단계 연결", "subtitle": "분석 결과 정리 후 상품 설명으로 연결", "content_html": "고객님, 지금까지 전체 보장 구조를 보면<br/>실비 / 3대 질환 / 생활비 보장이<br/>어떻게 잡혀 있는지 확인해드렸는데요.[실비]: 현재 ○세대 가입 → 보장 범위 확인 필요<br/>[3대 질환]: 암 진단비 ○천만 원 / 뇌·심장 범위 확인 필요<br/>[생활비]: 입원일당 ○만 원 / 수술비 ○ → 보강 여부 판단<br/>이 중에서 가장 시급하게 보강이 필요한 부분부터 말씀드리겠습니다.", "tip": "⚡ 분석 결과를 항목별로 요약 → 상품 설명 단계로 자연스럽게 전환"}]}, "📊 보장 분석|보험료 구조 점검형": {"pill": "보장 분석: 보험료 구조 점검형", "summary_title": "분석 포인트", "summary_text": "보험료는 금액보다 구조가 제대로 되어 있는지가 중요합니다\n보험료가 높아도 구조가 맞으면 유지가 가능하고 낮아도 구멍이 있으면 문제입니다\n현재 보험료 흐름과 보장 구성을 같이 보시면 조정 방향이 나옵니다", "summary_color": "#185FA5", "sections": [{"title": "① 보험료 구조 분석 시작", "subtitle": "납입 보험료 대비 보장 가치 확인", "content_html": "고객님, 지금 한 달에 보험료를 ○만 원 내고 계신데요.<br/>이 금액이 많다 적다를 떠나서<br/>보험료가 어디에 어떻게 쓰이고 있는지를<br/>먼저 확인해드리겠습니다.보험료는 크게 세 곳으로 나뉩니다.<br/>① 보장 보험료 — 실제 보장을 위해 쓰이는 금액<br/>② 저축 보험료 — 만기 환급이나 적립을 위한 금액<br/>③ 사업비 — 보험사 운영비용<br/>이 구조를 이해하면 지금 보험료가 합리적인지 바로 보입니다.", "tip": "⚡ 보험료 구조 설명 → 고객이 \"내가 뭘 사고 있나\" 인식하게 됨"}, {"title": "② 갱신형 vs 비갱신형 확인", "subtitle": "보험료 변동 위험 구간 체크", "content_html": "다음으로 갱신형 보장이 얼마나 있는지 확인합니다.<br/>갱신형은 일정 기간마다 보험료가 오르는 구조라서<br/>지금은 보험료가 낮아도 나중에 부담이 커질 수 있거든요.현재 갱신형 보장 비중: ○% 수준입니다.<br/>갱신형이 많은 경우 → 나이 들수록 보험료 급증 구간이 옵니다.<br/>비갱신형으로 전환 시 지금은 보험료가 높을 수 있지만<br/>장기적으로 안정적인 구조가 됩니다.<br/>어느 쪽이 더 유리한지는 나이와 건강 상태에 따라 다릅니다.", "tip": "⚡ 갱신형 비중이 높으면 고객이 모르는 미래 위험 — 알려주는 것만으로 신뢰 형성"}, {"title": "③ 보험료 대비 보장 적정성 확인", "subtitle": "납입 보험료가 보장에 비해 많은지 적은지", "content_html": "고객님이 지금 내시는 보험료 ○만 원 기준으로<br/>보장 가치가 어느 정도인지 간단히 보겠습니다.[보장 수준 요약]<br/>실비: ○세대 / 3대 질환 합계: ○천만 원 / 생활비 보장: 월 ○만 원<br/>이 구성 기준으로 지금 보험료 ○만 원은<br/>[적정 / 다소 높음 / 낮은 편] 수준입니다.<br/>조정이 필요한 부분이 있다면 구체적으로 말씀드리겠습니다.", "tip": "⚡ 객관적 평가 제시 → 고객이 \"내 보험이 합리적인지\" 알게 됨"}, {"title": "④ 절감 가능 구간 확인", "subtitle": "줄일 수 있는 보험료 항목 찾기", "content_html": "고객님 function getCurrentBlockKey() {
  const conf = MENU_CONFIG[state.main];
  if (conf.groups) {
    const item = conf.groups[state.sub].find(([title, screen]) => screen === state.cat);
    return item ? `${item[0]}|${item[1]}` : null;
  }
  const item = conf.screens.find(([title, screen]) => screen === state.cat);
  return item ? `${item[0]}|${item[1]}` : null;
}

function renderMain() {

    "도입인사":"📞 도입인사",

  return map[name] || name;

function selectMain(name) {
  state.main = name;
  const conf = MENU_CONFIG[name];
  if (conf.groups) {
    state.sub = conf.default_group;
    state.cat = conf.default_screen;
  } else {
    state.sub = "";
    state.cat = conf.default_screen;
  }
  renderAll();
}

function selectSub(name) {
  state.sub = name;
  const conf = MENU_CONFIG[state.main];
  state.cat = conf.groups[name][0][1];
  renderAll();
}

function selectCat(name) {
  state.cat = name;
  renderAll();
}

function renderSub() {
  const step2 = document.getElementById('step2');
  const subRow = document.getElementById('sub-row');
  const conf = MENU_CONFIG[state.main];
  if (!conf.groups) {
    step2.classList.add('hidden');
    subRow.innerHTML = '';
    return;
  }
  step2.classList.remove('hidden');
  const groups = Object.keys(conf.groups);
  subRow.innerHTML = groups.map(name => `
    <button class="sub-btn ${state.sub===name?'active':''}" onclick="selectSub('${name}')">${name}</button>
  `).join('');
}

function renderCat() {
  const step3 = document.getElementById('step3');
  const catRow = document.getElementById('cat-row');
  const conf = MENU_CONFIG[state.main];
  let items = [];
  if (conf.groups) {
    items = conf.groups[state.sub].map(x => x[1]);
  } else {
    items = conf.screens.map(x => x[1]);
  }
  if (!items.length) {
    step3.classList.add('hidden');
    catRow.innerHTML = '';
    return;
  }
  step3.classList.remove('hidden');
  catRow.innerHTML = items.map(name => `
    <button class="cat-btn ${state.cat===name?'active':''}" onclick="selectCat('${name}')">${name}</button>
  `).join('');
}

// URL 파라미터로 스크립트 자동 선택
function selectScriptByName(scriptName) {
  if (!scriptName) return;
  // MENU_CONFIG 전체 순회하며 cat 이름 매칭
  for (const mainKey of MAIN_KEYS) {
    const conf = MENU_CONFIG[mainKey];
    if (conf.groups) {
      for (const subKey of Object.keys(conf.groups)) {
        for (const [title, screen] of conf.groups[subKey]) {
          if (screen === scriptName) {
            state.main = mainKey;
            state.sub = subKey;
            state.cat = screen;
            renderAll();
            return;
          }
        }
      }
    } else {
      for (const [title, screen] of conf.screens) {
        if (screen === scriptName) {
          state.main = mainKey;
          state.sub = '';
          state.cat = screen;
          renderAll();
          return;
        }
      }
    }
  }
}

  window.location.href = 'login.html';
}


const ROLE_LABEL = {
  member: '팀장',
  manager: '실장',
  branch_manager: '지점장',
  staff: '스텝'
};


// ── 스크립트 클릭 로그 ──
async function logScriptUsage(main, sub, cat) {
  if (!window._userToken || !window._userId) return;
  try {
    await fetchWithAuth(`${SUPABASE_URL}/rest/v1/script_usage_logs`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ user_id: window._userId, script_main: main, script_screen: sub, script_title: cat })
    });
  } catch(e) { /* 로그 실패는 무시 */ }
}
