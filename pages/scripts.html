<style>
:root {
  --s1bg:#f5ede4; --s1t:#6b4226; --s1b:#c8a080;
  --s2bg:#edddd0; --s2t:#5e3820; --s2b:#b08060;
  --s3bg:#e0c9b8; --s3t:#52301a; --s3b:#966840;
  --s4bg:#cfb09a; --s4t:#3d2214; --s4b:#7a5030;
  --s5bg:#bc9478; --s5t:#ffffff; --s5b:#5e3820;
  --s6bg:#a67858; --s6t:#ffffff; --s6b:#3d2b1f;
  --s7bg:#3d2b1f; --s7t:#fff6ef; --s7b:#c8a080;
  --tab-text:#6b4226;
  --tab-text-active:#3d2b1f;
  --tab-underline:#c8753a;
  --line:#ddc8b4;
  --line-item:#e8d8c8;
}
* { box-sizing:border-box; margin:0; padding:0; }

.sc-page-header {
  height:120px; background:#3d2b1f;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 24px; flex-shrink:0;
}
.sc-page-title { font-family:Pretendard,'Noto Sans KR',sans-serif; font-size:1.5em; font-weight:800; color:#fff; letter-spacing:-0.5px; margin-bottom:6px; }
.sc-page-desc  { font-family:Pretendard,'Noto Sans KR',sans-serif; font-size:0.842em; color:rgba(255,255,255,0.65); }
.sc-page-icon  { font-size:2.8em; opacity:0.15; }

.sc-tab-bar {
  flex-shrink:0; display:flex; flex-direction:row; gap:0; flex-wrap:nowrap;
  border-bottom:2px solid var(--line); background:var(--s1bg); overflow-x:auto;
}
.sc-tab-btn {
  padding:11px 16px; border:none; background:transparent;
  font-size:0.8421em; font-weight:600; font-family:Pretendard,inherit;
  cursor:pointer; white-space:nowrap; color:var(--tab-text);
  border-bottom:3px solid transparent; margin-bottom:-2px; transition:all .15s; flex-shrink:0;
}
.sc-tab-btn:hover { color:var(--tab-text-active); }
.sc-tab-btn.active { font-weight:800; color:var(--tab-text-active); border-bottom-color:var(--tab-underline); }

.sc-content { display:flex; flex-direction:column; }
.sc-body { border-top:1px solid var(--line); }

/* ── 그룹 블록 ── */
.sc-group-block { border-bottom:1px solid var(--line); }

/* 아코디언 헤더: 1열 빈칸 | 2~4열 레이블 */
.sc-acc-header {
  display:grid;
  grid-template-columns:300px 1fr;
  border-bottom:1px solid var(--line);
  cursor:pointer; user-select:none;
}
.sc-acc-header-blank { border-right:1px solid var(--line); }
.sc-acc-header-label {
  display:flex; align-items:center; justify-content:flex-end;
  padding:7px 14px; gap:8px;
  font-size:0.842em; font-weight:700;
  font-family:Pretendard,'Noto Sans KR',sans-serif;
}
.sc-acc-arrow { font-size:0.85em; transition:transform .2s; display:inline-block; }
.sc-acc-header.open .sc-acc-arrow { transform:rotate(180deg); }

/* 아코디언 콘텐츠: 4열 그리드 */
.sc-acc-content {
  display:grid;
  grid-template-columns:300px 300px 300px 1fr;
  overflow:hidden;
  max-height:4000px;
  transition:max-height .3s ease;
}
.sc-acc-content.collapsed { max-height:0; }

/* 1열 */
.sc-col1 { border-right:1px solid var(--line); }
.sc-group-cell {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; padding:14px 10px; border-left:4px solid;
  font-size:0.842em; font-weight:900; line-height:1.4;
  font-family:Pretendard,'Noto Sans KR',sans-serif;
  letter-spacing:-0.3px; gap:5px; height:100%; min-height:64px;
}
.sc-g-icon  { font-size:1.4em; }
.sc-g-count { font-size:0.75em; font-weight:700; padding:1px 5px; border-radius:20px; color:white; margin-top:2px; }

/* 2열 */
.sc-col2 { border-right:1px solid var(--line); }
.sc-script-item {
  padding:13px 16px; cursor:pointer;
  border-bottom:1px solid var(--line-item); border-left:4px solid transparent;
  transition:background .1s; min-height:56px;
  display:flex; flex-direction:column; justify-content:center; background:#fff;
}
.sc-script-item:last-child { border-bottom:none; }
.sc-script-item:hover { filter:brightness(0.97); }
.sc-script-title { font-size:0.947em; font-weight:700; line-height:1.5; color:#3d2b1f; }
.sc-script-sub   { font-size:0.842em; color:#9a7a62; margin-top:3px; line-height:1.4; }

/* 3열 */
.sc-col3 { border-right:1px solid var(--line); }
.sc-block-item {
  padding:13px 16px; cursor:pointer;
  border-bottom:1px solid var(--line-item); border-left:4px solid transparent;
  transition:background .1s; min-height:56px;
  display:flex; flex-direction:column; justify-content:center; background:#fff;
}
.sc-block-item:last-child { border-bottom:none; }
.sc-block-item:hover { filter:brightness(0.97); }
.sc-block-num   { font-size:0.75em; font-weight:700; padding:2px 6px; border-radius:20px; display:inline-block; margin-bottom:3px; color:white; }
.sc-block-title { font-size:0.947em; font-weight:700; line-height:1.5; color:#3d2b1f; }
.sc-block-sub   { font-size:0.842em; color:#9a7a62; margin-top:3px; line-height:1.4; }

/* 4열 */
.sc-col4 { background:#f7f2ec; }
.sc-detail-panel { padding:18px; min-height:56px; border-bottom:1px solid var(--line); }
.sc-detail-tag   { font-size:0.75em; font-weight:700; padding:2px 8px; border-radius:20px; display:inline-block; margin-bottom:7px; color:white; }
.sc-detail-title { font-size:0.947em; font-weight:800; margin-bottom:4px; line-height:1.4; color:#3d2b1f; }
.sc-detail-sub   { font-size:0.842em; color:#9a7a62; margin-bottom:10px; line-height:1.6; }
.sc-detail-body  { background:#fff; border:1px solid var(--line); border-radius:10px; overflow:hidden; }
.sc-html { font-size:0.947em; color:#2a2018; line-height:1.9; }
.sc-html div, .sc-html p { max-width:100%; }
.sc-detail-empty {
  display:flex; align-items:center; justify-content:center;
  color:#c0a898; font-size:0.842em; padding:18px 12px;
  text-align:center; line-height:1.8; min-height:56px;
}

.sc-loading { display:flex; align-items:center; justify-content:center; padding:40px; color:#9a7a62; font-size:0.842em; }
.sc-bottom-bar { background:#3d2b1f; color:#fff6ef; text-align:center; font-size:0.7895em; font-weight:800; padding:10px 14px; flex-shrink:0; }

/* 반응형 */
@media (max-width:1200px) {
  .sc-acc-header { grid-template-columns:220px 1fr; }
  .sc-acc-content { grid-template-columns:220px 220px 220px 1fr; }
}
@media (max-width:900px) {
  .sc-acc-header { grid-template-columns:180px 1fr; }
  .sc-acc-content { grid-template-columns:180px 1fr 1fr; }
  .sc-col4 { display:none; }
}
@media (max-width:600px) {
  .sc-tab-bar { display:none; }
  .sc-acc-header { grid-template-columns:140px 1fr; }
  .sc-acc-content { grid-template-columns:140px 1fr; }
  .sc-col3, .sc-col4 { display:none; }
}
</style>

<div style="display:flex;flex-direction:column;width:100%;">

  <div class="sc-page-header">
    <div>
      <div class="sc-page-title">📞 스크립트</div>
      <div class="sc-page-desc">TM 상담 흐름에 맞는 멘트를 1초 안에 꺼내세요</div>
    </div>
    <div class="sc-page-icon">📋</div>
  </div>

  <div class="sc-tab-bar" id="sc-tab-bar">
    <button class="sc-tab-btn active" data-color="1" onclick="window.scScrollToGroup(1)">📞 도입인사</button>
    <button class="sc-tab-btn" data-color="2" onclick="window.scScrollToGroup(2)">🔥 필요성강조</button>
    <button class="sc-tab-btn" data-color="3" onclick="window.scScrollToGroup(3)">🔎 상황확인</button>
    <button class="sc-tab-btn" data-color="4" onclick="window.scScrollToGroup(4)">📊 보장분석</button>
    <button class="sc-tab-btn" data-color="5" onclick="window.scScrollToGroup(5)">📦 상품설명</button>
    <button class="sc-tab-btn" data-color="6" onclick="window.scScrollToGroup(6)">✅ 클로징</button>
    <button class="sc-tab-btn" data-color="7" onclick="window.scScrollToGroup(7)">⚡ 반론대응</button>
  </div>

  <div class="sc-content">
    <div class="sc-body" id="sc-body">
      <div class="sc-loading">스크립트를 불러오는 중...</div>
    </div>
    <div class="sc-bottom-bar">- 지금 멈추지 마세요. 한 문장이 전체 흐름을 바꿉니다 -</div>
  </div>

</div>

<script>
if (!window._sc_cache) window._sc_cache = {};

window._SC_GROUPS = [
  { color:1, icon:'📞', label:'도입\n인사',   stages:['opening','opening_rejection'] },
  { color:2, icon:'🔥', label:'필요성\n강조', stages:['need_emphasis','need_emphasis_2'] },
  { color:3, icon:'🔎', label:'상황\n확인',   stages:['situation_check'] },
  { color:4, icon:'📊', label:'보장\n분석',   stages:['analysis'] },
  { color:5, icon:'📦', label:'상품\n설명',   stages:['product'] },
  { color:6, icon:'✅', label:'클로징',        stages:['closing','closing_second'] },
  { color:7, icon:'⚡', label:'반론\n대응',   stages:['objection'] }
];

window.scGv = function(n, t) {
  return getComputedStyle(document.documentElement).getPropertyValue('--s' + n + t).trim();
};

window.scFetch = async function(stages) {
  var key = stages.join(',');
  if (window._sc_cache[key]) return window._sc_cache[key];
  var url = window.SUPABASE_URL + '/rest/v1/scripts?stage=in.(' + stages.join(',') + ')&is_active=eq.true&order=stage,title&select=id,title,stage,top_category,highlight_text,script_text';
  try {
    var res = await fetch(url, { headers: { 'apikey': window.SUPABASE_KEY, 'Authorization': 'Bearer ' + (window._userToken || window.SUPABASE_KEY) } });
    if (!res.ok) return [];
    var data = await res.json();
    window._sc_cache[key] = data;
    return data;
  } catch(e) { return []; }
};

window.scParseBlocks = function(html) {
  if (!html) return [];
  var tmp = document.createElement('div');
  tmp.innerHTML = html;
  var blocks = [];
  tmp.querySelectorAll('div[style*="border:1.5px solid #DCDCDC"]').forEach(function(el) {
    var rows = el.querySelectorAll('div[style*="font-size:13px"][style*="font-weight:700"]');
    var title = rows[0] ? rows[0].textContent.trim() : '';
    var sub   = rows[1] ? rows[1].textContent.trim() : '';
    if (title) blocks.push({ title:title, sub:sub, html:el.outerHTML });
  });
  if (!blocks.length) blocks.push({ title:'전체 스크립트', sub:'', html:html });
  return blocks;
};

window.scUpdateTab = function(color) {
  document.querySelectorAll('.sc-tab-btn').forEach(function(x) {
    x.classList.toggle('active', parseInt(x.dataset.color) === color);
  });
};

window.scScrollToGroup = function(color) {
  var block = document.getElementById('sc-block-' + color);
  if (!block) return;
  var content = document.getElementById('sc-content-' + color);
  var header  = document.getElementById('sc-header-' + color);
  if (content && content.classList.contains('collapsed')) {
    content.classList.remove('collapsed');
    if (header) header.classList.add('open');
    var col2 = document.getElementById('sc-scripts-' + color);
    if (col2 && !col2.querySelector('.sc-script-item.active')) {
      var first = col2.querySelector('.sc-script-item');
      if (first) window.scSelectScript(first, color, 0);
    }
  }
  var dArea = block.closest('.d') || document.querySelector('.d');
  if (dArea) {
    var dRect = dArea.getBoundingClientRect();
    var bRect = block.getBoundingClientRect();
    dArea.scrollTop += (bRect.top - dRect.top) - 4;
  } else {
    block.scrollIntoView({ behavior:'smooth', block:'start' });
  }
  window.scUpdateTab(color);
};

window.scToggleGroup = function(color) {
  var content = document.getElementById('sc-content-' + color);
  var header  = document.getElementById('sc-header-' + color);
  if (!content) return;
  var isOpen = !content.classList.contains('collapsed');
  if (isOpen) {
    content.classList.add('collapsed');
    if (header) header.classList.remove('open');
  } else {
    content.classList.remove('collapsed');
    if (header) header.classList.add('open');
    window.scUpdateTab(color);
    var col2 = document.getElementById('sc-scripts-' + color);
    if (col2 && !col2.querySelector('.sc-script-item.active')) {
      var first = col2.querySelector('.sc-script-item');
      if (first) window.scSelectScript(first, color, 0);
    }
  }
};

window.scSelectScript = function(el, color, idx) {
  var scripts = window._sc_cache['group_' + color] || [];
  var sc = scripts[idx];
  if (!sc) return;
  // 스크립트 사용 로그 INSERT
  if (window._userId && window._userToken) {
    fetch(window.SUPABASE_URL + '/rest/v1/activity_logs', {
      method: 'POST',
      headers: {
        'apikey': window.SUPABASE_KEY,
        'Authorization': 'Bearer ' + window._userToken,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({
        user_id: window._userId,
        event_type: 'script_view',
        target_type: 'script',
        target_id: String(sc.id)
      })
    }).catch(function(){});
  }
  window.scUpdateTab(color);
  var col2 = document.getElementById('sc-scripts-' + color);
  if (col2) {
    col2.querySelectorAll('.sc-script-item').forEach(function(x) { x.classList.remove('active'); x.style.background=''; });
    el.classList.add('active');
    el.style.background = window.scGv(color,'bg');
  }
  var col3 = document.getElementById('sc-blocks-' + color);
  var col4 = document.getElementById('sc-detail-' + color);
  if (!col3) return;
  var blocks = window.scParseBlocks(sc.script_text);
  window._sc_cache['blocks_' + color] = blocks;
  window._sc_cache['cursc_'  + color] = sc;
  var numLabels = ['①','②','③','④','⑤','⑥','⑦','⑧'];
  var t = window.scGv(color,'t'), b = window.scGv(color,'b');
  col3.innerHTML = blocks.map(function(bl, i) {
    var numMatch   = bl.title.match(/^[①②③④⑤⑥⑦⑧]/);
    var num        = numMatch ? numMatch[0] : (numLabels[i] || (i+1)+'');
    var cleanTitle = bl.title.replace(/^[①②③④⑤⑥⑦⑧]\s*/,'');
    return '<div class="sc-block-item" style="border-left-color:' + b + ';" onclick="window.scSelectBlock(this,' + color + ',' + i + ')">' +
      '<span class="sc-block-num" style="background:' + b + ';">' + num + '</span>' +
      '<div class="sc-block-title">' + cleanTitle + '</div>' +
      '<div class="sc-block-sub">' + (bl.sub||'').slice(0,24) + '</div>' +
    '</div>';
  }).join('');
  if (col4) col4.innerHTML = '<div class="sc-detail-empty">← 세부 항목을 선택하세요</div>';
  var first = col3.querySelector('.sc-block-item');
  if (first) window.scSelectBlock(first, color, 0);
};

window.scSelectBlock = function(el, color, idx) {
  var blocks = window._sc_cache['blocks_' + color] || [];
  var sc     = window._sc_cache['cursc_'  + color];
  var bl     = blocks[idx];
  if (!bl) return;
  var col3 = document.getElementById('sc-blocks-' + color);
  if (col3) {
    col3.querySelectorAll('.sc-block-item').forEach(function(x) { x.classList.remove('active'); x.style.background=''; });
    el.classList.add('active');
    el.style.background = window.scGv(color,'bg');
  }
  var col4 = document.getElementById('sc-detail-' + color);
  if (!col4) return;
  var t = window.scGv(color,'t'), b = window.scGv(color,'b');
  col4.innerHTML =
    '<div class="sc-detail-panel">' +
      '<div class="sc-detail-tag" style="background:' + b + ';">' + (sc ? sc.title : '') + '</div>' +
      '<div class="sc-detail-title">' + bl.title + '</div>' +
      '<div class="sc-detail-sub">' + (bl.sub||'') + '</div>' +
      '<div class="sc-detail-body"><div class="sc-html">' + bl.html + '</div></div>' +
    '</div>';
};

window.scRenderAll = async function() {
  var body = document.getElementById('sc-body');
  if (!body) return;
  body.innerHTML = '';

  for (var gi = 0; gi < window._SC_GROUPS.length; gi++) {
    var g = window._SC_GROUPS[gi];
    var color = g.color;
    var isFirst = (gi === 0);
    var bg = window.scGv(color,'bg'), t = window.scGv(color,'t'), b = window.scGv(color,'b');

    var scripts = await window.scFetch(g.stages);
    window._sc_cache['group_' + color] = scripts;

    /* 그룹 블록 */
    var block = document.createElement('div');
    block.className = 'sc-group-block';
    block.id = 'sc-block-' + color;

    /* 아코디언 헤더 */
    var header = document.createElement('div');
    header.className = 'sc-acc-header' + (isFirst ? ' open' : '');
    header.id = 'sc-header-' + color;
    header.onclick = (function(c){ return function(){ window.scToggleGroup(c); }; })(color);
    header.innerHTML =
      '<div class="sc-acc-header-blank"></div>' +
      '<div class="sc-acc-header-label" style="background:' + bg + ';color:' + t + ';">' +
        '<span>' + g.icon + ' ' + g.label.replace('\n','') + '</span>' +
        '<span class="sc-acc-arrow">▲</span>' +
      '</div>';

    /* 아코디언 콘텐츠 */
    var content = document.createElement('div');
    content.className = 'sc-acc-content' + (isFirst ? '' : ' collapsed');
    content.id = 'sc-content-' + color;

    /* 1열 */
    var cell1 = document.createElement('div');
    cell1.className = 'sc-col1';
    cell1.innerHTML =
      '<div class="sc-group-cell" style="background:' + bg + ';color:' + t + ';border-left-color:' + b + ';">' +
        '<span class="sc-g-icon">' + g.icon + '</span>' +
        '<span>' + g.label.replace('\n','<br>') + '</span>' +
        '<span class="sc-g-count" style="background:' + b + ';">' + scripts.length + '개</span>' +
      '</div>';

    /* 2열 */
    var cell2 = document.createElement('div');
    cell2.className = 'sc-col2';
    cell2.id = 'sc-scripts-' + color;
    cell2.innerHTML = scripts.length
      ? scripts.map(function(sc, i) {
          return '<div class="sc-script-item" style="border-left-color:' + b + ';" onclick="window.scSelectScript(this,' + color + ',' + i + ')">' +
            '<div class="sc-script-title">' + sc.title + '</div>' +
            '<div class="sc-script-sub">' + (sc.highlight_text||'').replace(/<[^>]+>/g,'').slice(0,30) + '</div>' +
          '</div>';
        }).join('')
      : '<div class="sc-detail-empty">스크립트 없음</div>';

    /* 3열 */
    var cell3 = document.createElement('div');
    cell3.className = 'sc-col3';
    cell3.id = 'sc-blocks-' + color;
    cell3.innerHTML = '<div class="sc-detail-empty">← 선택하세요</div>';

    /* 4열 */
    var cell4 = document.createElement('div');
    cell4.className = 'sc-col4';
    cell4.id = 'sc-detail-' + color;
    cell4.innerHTML = '<div class="sc-detail-empty">← 선택하세요</div>';

    content.appendChild(cell1);
    content.appendChild(cell2);
    content.appendChild(cell3);
    content.appendChild(cell4);
    block.appendChild(header);
    block.appendChild(content);
    body.appendChild(block);

    if (isFirst && scripts.length) {
      var firstItem = cell2.querySelector('.sc-script-item');
      if (firstItem) window.scSelectScript(firstItem, color, 0);
    }
  }

  /* IntersectionObserver */
  var dArea = document.querySelector('.d');
  if (dArea && 'IntersectionObserver' in window) {
    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          var c = parseInt(entry.target.id.replace('sc-block-',''));
          if (!isNaN(c)) window.scUpdateTab(c);
        }
      });
    }, { root: dArea, threshold: 0.3 });
    window._SC_GROUPS.forEach(function(g) {
      var el = document.getElementById('sc-block-' + g.color);
      if (el) observer.observe(el);
    });
  }

  /* ── 검색에서 넘어온 경우: _pendingScript 처리 ── */
  if (window._pendingScript) {
    var ps = window._pendingScript;
    window._pendingScript = null; // 소비 후 초기화

    var targetColor = ps.color;
    var targetTitle = ps.title;

    if (targetColor) {
      // 해당 그룹 스크립트 목록에서 title 매칭
      var groupScripts = window._sc_cache['group_' + targetColor] || [];
      var matchIdx = -1;
      for (var mi = 0; mi < groupScripts.length; mi++) {
        if (groupScripts[mi].title === targetTitle) { matchIdx = mi; break; }
      }

      // 해당 그룹 펼치기
      var targetContent = document.getElementById('sc-content-' + targetColor);
      var targetHeader  = document.getElementById('sc-header-'  + targetColor);
      if (targetContent && targetContent.classList.contains('collapsed')) {
        targetContent.classList.remove('collapsed');
        if (targetHeader) targetHeader.classList.add('open');
      }

      // 첫 번째 그룹(도입인사) 닫기 — 다른 그룹으로 이동할 때
      if (targetColor !== 1) {
        var firstContent = document.getElementById('sc-content-1');
        var firstHeader  = document.getElementById('sc-header-1');
        if (firstContent && !firstContent.classList.contains('collapsed')) {
          firstContent.classList.add('collapsed');
          if (firstHeader) firstHeader.classList.remove('open');
        }
      }

      // 스크립트 항목 선택
      if (matchIdx >= 0) {
        var col2 = document.getElementById('sc-scripts-' + targetColor);
        if (col2) {
          var items = col2.querySelectorAll('.sc-script-item');
          if (items[matchIdx]) window.scSelectScript(items[matchIdx], targetColor, matchIdx);
        }
      } else if (groupScripts.length) {
        // title 매칭 실패 시 첫 번째 항목 선택
        var col2fb = document.getElementById('sc-scripts-' + targetColor);
        if (col2fb) {
          var firstItem = col2fb.querySelector('.sc-script-item');
          if (firstItem) window.scSelectScript(firstItem, targetColor, 0);
        }
      }

      // 해당 그룹으로 스크롤
      window.scScrollToGroup(targetColor);
    }
  }
};

setTimeout(function() { window.scRenderAll(); }, 150);
</script>
