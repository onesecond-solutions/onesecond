<style>
:root {
  --s1bg:#f5ede4; --s1t:#6b4226; --s1b:#c8a080;
  --s2bg:#edddd0; --s2t:#5e3820; --s2b:#b08060;
  --s3bg:#e0c9b8; --s3t:#52301a; --s3b:#966840;
  --s4bg:#cfb09a; --s4t:#3d2214; --s4b:#7a5030;
  --s5bg:#bc9478; --s5t:#ffffff; --s5b:#5e3820;
  --s6bg:#a67858; --s6t:#ffffff; --s6b:#3d2b1f;
  --s7bg:#3d2b1f; --s7t:#fff6ef; --s7b:#c8a080;
}
* { box-sizing:border-box; margin:0; padding:0; }

/* 페이지 헤더 */
.sc-page-header {
  height:120px;
  background:linear-gradient(135deg,#3d2b1f 0%,#6b4226 100%);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 24px; flex-shrink:0;
}
.sc-page-title { font-family:Pretendard,'Noto Sans KR',sans-serif; font-size:1.5em; font-weight:800; color:#fff; letter-spacing:-0.5px; margin-bottom:6px; }
.sc-page-desc  { font-family:Pretendard,'Noto Sans KR',sans-serif; font-size:0.75em; color:rgba(255,255,255,0.65); }
.sc-page-icon  { font-size:2.8em; opacity:0.15; }

/* 탭바 */
.sc-tab-bar {
  flex-shrink:0;
  display:flex; gap:0; flex-wrap:nowrap;
  border-bottom:2px solid #ddc8b4;
  background:#f5ede4;
  overflow-x:auto;
}
.sc-tab-btn {
  padding:11px 16px; border:none; background:transparent;
  font-size:0.8421em; font-weight:600;
  font-family:Pretendard,inherit; cursor:pointer; white-space:nowrap;
  border-bottom:3px solid transparent; margin-bottom:-2px;
  transition:all .15s; flex-shrink:0;
}
.sc-tab-btn:hover { filter:brightness(0.9); }
.sc-tab-btn.active { font-weight:800; }

/* 4컬럼 메인 레이아웃 */
.sc-main {
  display:grid;
  grid-template-columns:220px 1fr 1fr 1fr;
  flex:1;
  min-height:0;
  overflow:hidden;
}

/* 1열 — 아코디언 그룹 목록 */
.sc-col1 {
  border-right:2px solid #ddc8b4;
  background:#faf5f0;
  overflow-y:auto;
  height:100%;
}

/* 아코디언 헤더 */
.sc-group-header {
  display:flex; align-items:center; gap:10px;
  padding:14px 16px;
  cursor:pointer;
  border-left:5px solid;
  border-bottom:1px solid rgba(0,0,0,0.07);
  user-select:none;
  transition:filter .15s;
}
.sc-group-header:hover { filter:brightness(0.93); }
.sc-group-header.active { filter:brightness(0.88); }
.sc-gh-icon  { font-size:1.3em; flex-shrink:0; }
.sc-gh-label { font-size:0.88em; font-weight:800; font-family:Pretendard,'Noto Sans KR',sans-serif; flex:1; }
.sc-gh-count { font-size:0.68em; font-weight:700; padding:2px 6px; border-radius:20px; color:white; flex-shrink:0; }
.sc-gh-arrow { font-size:0.8em; flex-shrink:0; transition:transform .2s; }
.sc-group-header.active .sc-gh-arrow { transform:rotate(180deg); }

/* 2열 — 스크립트 목록 */
.sc-col2 {
  border-right:1px solid #ddc8b4;
  background:#fff;
  overflow-y:auto;
  height:100%;
}
.sc-script-item {
  padding:13px 16px; cursor:pointer;
  border-bottom:1px solid #ede0d4;
  border-left:4px solid transparent;
  transition:background .1s;
  min-height:56px;
  display:flex; flex-direction:column; justify-content:center;
}
.sc-script-item:hover { background:#faf5f0; }
.sc-script-title { font-size:0.88em; font-weight:700; line-height:1.5; }
.sc-script-sub   { font-size:0.76em; color:#9a7a62; margin-top:3px; line-height:1.4; }

/* 3열 — 세부항목 */
.sc-col3 {
  border-right:1px solid #ddc8b4;
  background:#fff;
  overflow-y:auto;
  height:100%;
}
.sc-block-item {
  padding:13px 16px; cursor:pointer;
  border-bottom:1px solid #ede0d4;
  border-left:4px solid transparent;
  transition:background .1s;
  min-height:56px;
  display:flex; flex-direction:column; justify-content:center;
}
.sc-block-item:hover { background:#faf5f0; }
.sc-block-num   { font-size:0.68em; font-weight:700; padding:2px 6px; border-radius:20px; display:inline-block; margin-bottom:3px; color:white; }
.sc-block-title { font-size:0.88em; font-weight:700; line-height:1.5; }
.sc-block-sub   { font-size:0.76em; color:#9a7a62; margin-top:3px; line-height:1.4; }

/* 4열 — 상세멘트 */
.sc-col4 {
  background:#f7f2ec;
  overflow-y:auto;
  height:100%;
}
.sc-detail-panel { padding:18px; border-bottom:1px solid #e0d0c0; }
.sc-detail-tag   { font-size:0.68em; font-weight:700; padding:2px 8px; border-radius:20px; display:inline-block; margin-bottom:7px; color:white; }
.sc-detail-title { font-size:0.95em; font-weight:800; margin-bottom:4px; line-height:1.4; }
.sc-detail-sub   { font-size:0.76em; color:#9a7a62; margin-bottom:10px; line-height:1.6; }
.sc-detail-body  { background:#fff; border:1px solid #ddc8b4; border-radius:10px; overflow:hidden; }
.sc-html { font-size:0.84em; color:#2a2018; line-height:1.9; }
.sc-html div, .sc-html p { max-width:100%; }
.sc-detail-empty { display:flex; align-items:center; justify-content:center; color:#c0a898; font-size:0.76em; padding:18px 12px; text-align:center; line-height:1.8; min-height:80px; }

.sc-loading { display:flex; align-items:center; justify-content:center; padding:40px; color:#9a7a62; font-size:0.85em; }
.sc-bottom-bar { background:#3d2b1f; color:#fff6ef; text-align:center; font-size:0.7895em; font-weight:800; padding:10px 14px; flex-shrink:0; }

/* 반응형 */
@media (max-width:1100px) { .sc-main { grid-template-columns:200px 1fr 1fr; } .sc-col4 { display:none; } }
@media (max-width:800px)  { .sc-main { grid-template-columns:160px 1fr; } .sc-col3,.sc-col4 { display:none; } }
@media (max-width:600px)  { .sc-tab-bar { display:none; } .sc-main { grid-template-columns:1fr; } .sc-col2,.sc-col3,.sc-col4 { display:none; } }
</style>

<div style="display:flex;flex-direction:column;height:100%;min-height:0;">

  <!-- 페이지 헤더 -->
  <div class="sc-page-header">
    <div>
      <div class="sc-page-title">📞 스크립트</div>
      <div class="sc-page-desc">TM 상담 흐름에 맞는 멘트를 1초 안에 꺼내세요</div>
    </div>
    <div class="sc-page-icon">📋</div>
  </div>

  <!-- 탭바 -->
  <div class="sc-tab-bar" id="sc-tab-bar">
    <button class="sc-tab-btn active" data-color="1" style="color:var(--s1t);border-bottom-color:var(--s1b);" onclick="window.scSelectGroup(1)">📞 도입인사</button>
    <button class="sc-tab-btn" data-color="2" style="color:var(--s2t);" onclick="window.scSelectGroup(2)">🔥 필요성강조</button>
    <button class="sc-tab-btn" data-color="3" style="color:var(--s3t);" onclick="window.scSelectGroup(3)">🔎 상황확인</button>
    <button class="sc-tab-btn" data-color="4" style="color:var(--s4t);" onclick="window.scSelectGroup(4)">📊 보장분석</button>
    <button class="sc-tab-btn" data-color="5" style="color:var(--s5t);" onclick="window.scSelectGroup(5)">📦 상품설명</button>
    <button class="sc-tab-btn" data-color="6" style="color:var(--s6t);" onclick="window.scSelectGroup(6)">✅ 클로징</button>
    <button class="sc-tab-btn" data-color="7" style="color:var(--s7t);" onclick="window.scSelectGroup(7)">⚡ 반론대응</button>
  </div>

  <!-- 4컬럼 메인 -->
  <div class="sc-main" id="sc-main">
    <!-- 1열: 아코디언 그룹 목록 -->
    <div class="sc-col1" id="sc-col1"></div>
    <!-- 2열: 스크립트 목록 -->
    <div class="sc-col2" id="sc-col2"><div class="sc-detail-empty">← 단계를 선택하세요</div></div>
    <!-- 3열: 세부항목 -->
    <div class="sc-col3" id="sc-col3"><div class="sc-detail-empty">← 선택하세요</div></div>
    <!-- 4열: 상세멘트 -->
    <div class="sc-col4" id="sc-col4"><div class="sc-detail-empty">← 선택하세요</div></div>
  </div>

  <div class="sc-bottom-bar">- 지금 멈추지 마세요. 한 문장이 전체 흐름을 바꿉니다 -</div>

</div>

<script>
if (!window._sc_cache) window._sc_cache = {};

window._SC_GROUPS = [
  { color:1, icon:'📞', label:'도입인사',   stages:['opening','opening_rejection'] },
  { color:2, icon:'🔥', label:'필요성강조', stages:['need_emphasis','need_emphasis_2'] },
  { color:3, icon:'🔎', label:'상황확인',   stages:['situation_check'] },
  { color:4, icon:'📊', label:'보장분석',   stages:['analysis'] },
  { color:5, icon:'📦', label:'상품설명',   stages:['product'] },
  { color:6, icon:'✅', label:'클로징',      stages:['closing','closing_second'] },
  { color:7, icon:'⚡', label:'반론대응',   stages:['objection'] }
];

window._sc_activeColor = 1;

window.scGv = function(n, t) {
  return getComputedStyle(document.documentElement).getPropertyValue('--s' + n + t).trim();
};

window.scFetch = async function(stages) {
  var key = stages.join(',');
  if (window._sc_cache[key]) return window._sc_cache[key];
  var url = window.SUPABASE_URL + '/rest/v1/scripts?stage=in.(' + stages.join(',') + ')&is_active=eq.true&order=stage,title&select=id,title,stage,top_category,highlight_text,script_text';
  try {
    var res = await fetch(url, { headers: { 'apikey': window.SUPABASE_KEY, 'Authorization': 'Bearer ' + (window._userToken || window.SUPABASE_KEY) } });
    if (!res.ok) return [];
    var data = await res.json();
    window._sc_cache[key] = data;
    return data;
  } catch(e) { return []; }
};

window.scParseBlocks = function(html) {
  if (!html) return [];
  var tmp = document.createElement('div');
  tmp.innerHTML = html;
  var blocks = [];
  tmp.querySelectorAll('div[style*="border:1.5px solid #DCDCDC"]').forEach(function(el) {
    var rows = el.querySelectorAll('div[style*="font-size:13px"][style*="font-weight:700"]');
    var title = rows[0] ? rows[0].textContent.trim() : '';
    var sub   = rows[1] ? rows[1].textContent.trim() : '';
    if (title) blocks.push({ title:title, sub:sub, html:el.outerHTML });
  });
  if (!blocks.length) blocks.push({ title:'전체 스크립트', sub:'', html:html });
  return blocks;
};

/* 탭바 활성 버튼 업데이트 */
window.scUpdateTab = function(color) {
  document.querySelectorAll('.sc-tab-btn').forEach(function(x) {
    var c = parseInt(x.dataset.color);
    var match = c === color;
    x.classList.toggle('active', match);
    x.style.borderBottomColor = match ? window.scGv(c,'b') : 'transparent';
    x.style.fontWeight = match ? '800' : '600';
  });
};

/* 1열 아코디언 헤더 활성 업데이트 */
window.scUpdateCol1Active = function(color) {
  document.querySelectorAll('.sc-group-header').forEach(function(h) {
    h.classList.toggle('active', parseInt(h.dataset.color) === color);
  });
};

/* 그룹 선택 (탭바 or 1열 클릭) */
window.scSelectGroup = async function(color) {
  window._sc_activeColor = color;
  window.scUpdateTab(color);
  window.scUpdateCol1Active(color);

  /* 2열 로딩 표시 */
  var col2 = document.getElementById('sc-col2');
  var col3 = document.getElementById('sc-col3');
  var col4 = document.getElementById('sc-col4');
  col2.innerHTML = '<div class="sc-loading">불러오는 중...</div>';
  col3.innerHTML = '<div class="sc-detail-empty">← 선택하세요</div>';
  col4.innerHTML = '<div class="sc-detail-empty">← 선택하세요</div>';

  var g = window._SC_GROUPS.find(function(x){ return x.color === color; });
  if (!g) return;

  var scripts = await window.scFetch(g.stages);
  window._sc_cache['group_' + color] = scripts;

  /* 1열 개수 업데이트 */
  var countEl = document.querySelector('.sc-group-header[data-color="' + color + '"] .sc-gh-count');
  if (countEl) countEl.textContent = scripts.length + '개';

  /* 2열 렌더 */
  var bg = window.scGv(color,'bg'), t = window.scGv(color,'t'), b = window.scGv(color,'b');
  col2.innerHTML = scripts.length
    ? scripts.map(function(sc, i) {
        return '<div class="sc-script-item" style="border-left-color:' + b + ';" onclick="window.scSelectScript(this,' + color + ',' + i + ')">' +
          '<div class="sc-script-title" style="color:' + t + ';">' + sc.title + '</div>' +
          '<div class="sc-script-sub">' + (sc.highlight_text||'').replace(/<[^>]+>/g,'').slice(0,30) + '</div>' +
        '</div>';
      }).join('')
    : '<div class="sc-detail-empty">스크립트 없음</div>';

  /* 첫 스크립트 자동 선택 */
  var first = col2.querySelector('.sc-script-item');
  if (first) window.scSelectScript(first, color, 0);
};

/* 2열 스크립트 클릭 */
window.scSelectScript = function(el, color, idx) {
  var scripts = window._sc_cache['group_' + color] || [];
  var sc = scripts[idx];
  if (!sc) return;

  var col2 = document.getElementById('sc-col2');
  var col3 = document.getElementById('sc-col3');
  var col4 = document.getElementById('sc-col4');
  var b = window.scGv(color,'b'), bg = window.scGv(color,'bg'), t = window.scGv(color,'t');

  /* 2열 활성 표시 */
  if (col2) {
    col2.querySelectorAll('.sc-script-item').forEach(function(x) { x.classList.remove('active'); x.style.background=''; });
    el.classList.add('active');
    el.style.background = bg;
  }

  /* 3열 렌더 */
  var blocks = window.scParseBlocks(sc.script_text);
  window._sc_cache['blocks_' + color] = blocks;
  window._sc_cache['cursc_'  + color] = sc;

  var numLabels = ['①','②','③','④','⑤','⑥','⑦','⑧'];
  col3.innerHTML = blocks.map(function(bl, i) {
    var numMatch   = bl.title.match(/^[①②③④⑤⑥⑦⑧]/);
    var num        = numMatch ? numMatch[0] : (numLabels[i] || (i+1)+'');
    var cleanTitle = bl.title.replace(/^[①②③④⑤⑥⑦⑧]\s*/,'');
    return '<div class="sc-block-item" style="border-left-color:' + b + ';" onclick="window.scSelectBlock(this,' + color + ',' + i + ')">' +
      '<span class="sc-block-num" style="background:' + b + ';">' + num + '</span>' +
      '<div class="sc-block-title" style="color:' + t + ';">' + cleanTitle + '</div>' +
      '<div class="sc-block-sub">' + (bl.sub||'').slice(0,24) + '</div>' +
    '</div>';
  }).join('');

  col4.innerHTML = '<div class="sc-detail-empty">← 세부 항목을 선택하세요</div>';
  var first = col3.querySelector('.sc-block-item');
  if (first) window.scSelectBlock(first, color, 0);
};

/* 3열 블록 클릭 */
window.scSelectBlock = function(el, color, idx) {
  var blocks = window._sc_cache['blocks_' + color] || [];
  var sc     = window._sc_cache['cursc_'  + color];
  var bl     = blocks[idx];
  if (!bl) return;

  var col3 = document.getElementById('sc-col3');
  var col4 = document.getElementById('sc-col4');
  var bg = window.scGv(color,'bg'), t = window.scGv(color,'t'), b = window.scGv(color,'b');

  if (col3) {
    col3.querySelectorAll('.sc-block-item').forEach(function(x) { x.classList.remove('active'); x.style.background=''; });
    el.classList.add('active');
    el.style.background = bg;
  }

  if (!col4) return;
  col4.innerHTML =
    '<div class="sc-detail-panel">' +
      '<div class="sc-detail-tag" style="background:' + b + ';">' + (sc ? sc.title : '') + '</div>' +
      '<div class="sc-detail-title" style="color:' + t + ';">' + bl.title + '</div>' +
      '<div class="sc-detail-sub">' + (bl.sub||'') + '</div>' +
      '<div class="sc-detail-body"><div class="sc-html">' + bl.html + '</div></div>' +
    '</div>';
};

/* 1열 렌더 */
window.scRenderCol1 = function() {
  var col1 = document.getElementById('sc-col1');
  if (!col1) return;
  col1.innerHTML = '';
  window._SC_GROUPS.forEach(function(g) {
    var color = g.color;
    var bg = window.scGv(color,'bg'), t = window.scGv(color,'t'), b = window.scGv(color,'b');
    var header = document.createElement('div');
    header.className = 'sc-group-header' + (color === 1 ? ' active' : '');
    header.dataset.color = color;
    header.style.cssText = 'background:' + bg + ';color:' + t + ';border-left-color:' + b + ';';
    header.innerHTML =
      '<span class="sc-gh-icon">' + g.icon + '</span>' +
      '<span class="sc-gh-label">' + g.label + '</span>' +
      '<span class="sc-gh-count" style="background:' + b + ';">…</span>' +
      '<span class="sc-gh-arrow" style="color:' + t + ';">▼</span>';
    header.onclick = function() { window.scSelectGroup(color); };
    col1.appendChild(header);
  });
};

/* 초기화 */
setTimeout(function() {
  window.scRenderCol1();
  window.scSelectGroup(1);
}, 150);
</script>
