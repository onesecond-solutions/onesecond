<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');

:root {
  --brown-dark: #3d2b1f;
  --brown-mid: #6b4226;
  --brown-light: #a0724a;
  --brown-pale: #f5ede4;
  --cream: #f7f2ec;
  --cream-2:#f4ece3;
  --accent: #c8753a;
  --accent-dark: #b5642e;
  --text-dark: #1a1008;
  --text-mid: #5a3e2b;
  --text-light: #9a7a62;
  --white: #ffffff;
  --sidebar-w: 230px;
  --line:#ddc8b4;
}
* { box-sizing:border-box; margin:0; padding:0; }
.step1, .step2, .step3 {
  border-bottom:1px solid var(--line);
  padding:8px 12px 7px;
  background:#faf8f5;
}
.step2, .step3 {
  background:#f3ebe3;
}
.button-row { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.main-btn, .sub-btn, .cat-btn {
  font-family:'Noto Sans KR',sans-serif;
  border:1px solid #d5bda8;
  background:#fffaf4;
  color:#5d4533;
  border-radius:11px;
  font-size:0.68em;
  font-weight:700;
  white-space:nowrap;
  cursor:pointer;
  transition:all .15s ease;
}
.main-btn { height:32px; padding:0 14px; }
.sub-btn, .cat-btn { height:28px; padding:0 12px; border-radius:14px; font-size:0.63em; }
.main-btn:hover, .sub-btn:hover, .cat-btn:hover { background:#f3e4d6; }
.main-btn.active, .sub-btn.active, .cat-btn.active {
  background:var(--brown-dark);
  color:#fff;
  border-color:var(--brown-dark);
}
.sub-btn.active, .cat-btn.active {
  background:var(--accent);
  border-color:var(--accent);
}
.step2.hidden, .step3.hidden { display:none; }

.content-scroll {
  overflow:visible;
  background:#f3eee8;
  padding:10px 14px 18px;
}
.screen-chip {
  display:inline-block;
  padding:4px 10px;
  border-radius:999px;
  background:#f5e7c9;
  color:#8a5a18;
  font-size:0.61em;
  font-weight:800;
  margin-bottom:10px;
}
.content-top-actions {
  display:flex; justify-content:flex-end; gap:8px; margin-bottom:8px;
}
.small-action {
  height:28px; padding:0 12px; border-radius:7px;
  border:1px solid #d8c6b3; background:#fff8f2;
  font-size:0.63em; font-weight:700; color:#7c5d44;
}

.script-write-btn {
  font-family:'Noto Sans KR',sans-serif;
  cursor:pointer;
  transition:all .15s ease;
}
.script-write-btn:hover { transform:translateY(-1px); }
.script-write-btn.top {
  height:32px;
  padding:0 14px;
  border-radius:11px;
  border:1px solid #d5bda8;
  background:#fff3e7;
  color:#8a5522;
  font-size:0.68em;
  font-weight:800;
}
.script-write-btn.top:hover {
  background:#f7e5d2;
}
.left-cta-card {
  margin-top:14px;
  background:#fff;
  border:1px solid #e1d2c3;
  border-radius:16px;
  padding:14px;
  box-shadow:0 4px 12px rgba(103,66,38,.05);
}
.15s ease;
}
.script-write-btn:hover { transform:translateY(-1px); }
.script-write-btn.main:hover {
  background:#f8e6d4;
}
.script-write-btn.side {
  width:100%;
  margin-top:2px;
  height:34px;
  border-radius:8px;
  border:1px solid #d8c6b3;
  background:#fff8f2;
  color:#7c5d44;
  font-size:0.63em;
  font-weight:800;
}
.script-write-btn.side:hover {
  background:#f4e8dc;
}

.content-grid {
  display:grid;
  grid-template-columns: 320px minmax(0, 1fr);
  gap:12px;
  align-items:start;
}
.left-col {
  display:flex;
  flex-direction:column;
  gap:14px;
}
.left-card, .accordion-section {
  background:#fff;
  border:1px solid #dbc8b5;
  border-radius:14px;
}
.left-card {
  padding:14px;
}
.left-label {
  font-size:0.61em; font-weight:800; color:#9b7f68; margin-bottom:10px;
}
.summary-badge {
  display:inline-block;
  padding:7px 12px;
  border-radius:16px;
  font-size:0.61em;
  font-weight:800;
  color:#4155c7;
  background:#e8e7fb;
  margin-bottom:12px;
}
.summary-box {
  background:#f7f2ec;
  border-left:3px solid #d07f45;
  border-radius:8px;
  padding:14px 12px;
  font-size:0.68em;
  line-height:1.85;
  color:#3b2d21;
  white-space:pre-line;
}

.center-col { min-width:0; }
.accordion-section {
  overflow:auto;
  margin-bottom:8px;
}
.accordion-header {
  background:#f4ece4;
  padding:10px 14px;
  display:flex; align-items:center; justify-content:space-between;
  cursor:pointer;
  border-bottom:1px solid #e5d4c4;
}
.acc-title { font-size:0.72em; font-weight:900; color:#2d2016; }
.acc-sub { font-size:0.61em; color:#a18369; margin-top:2px; }
.acc-arrow { font-size:0.61em; color:#9b7f68; }
.accordion-body {
  display:block;
  background:#fff;
  padding:14px 14px 12px;
}
.accordion-body.closed { display:none; }
.section-html {
  font-size:0.78em;
  color:#2a2018;
  line-height:1.9;
}
.section-html div, .section-html p { max-width:100%; }
.section-html img { max-width:100%; height:auto; }
.section-html [style*="font-size:0.84em"][style*="font-weight:700"] {
  font-size:0.84em !important;
  font-weight:800 !important;
  color:#1e1610 !important;
}
.section-html [style*="font-size:0.78em"][style*="color:#333"] {
  color:#7a685b !important;
}
.tip-box {
  margin-top:12px;
  padding:8px 12px;
  border-radius:6px;
  background:#f8ebca;
  color:#7a4e13;
  font-size:0.68em;
  font-weight:800;
}
.bottom-bar {
  margin-top:14px;
  background:var(--brown-dark);
  color:#fff6ef;
  text-align:center;
  font-size:0.68em;
  font-weight:800;
  padding:10px 14px;
  border-radius:8px;
}










.overlay {
  display:none; position:fixed; inset:0;
  background:rgba(26,16,8,.7);
  z-index:200; align-items:center; justify-content:center; backdrop-filter:blur(4px);
}
.overlay.active { display:flex; }
.quick-modal {
  background:#fff; border-radius:16px; width:100%; max-width:760px;
  box-shadow:0 24px 60px rgba(0,0,0,.3); overflow:hidden;
}
.quick-modal-header {
  background:var(--brown-dark); padding:16px 20px;
  display:flex; align-items:center; justify-content:space-between;
}
.quick-modal-title { font-size:0.84em; font-weight:800; color:#fff; }
.quick-close {
  width:28px; height:28px; border-radius:50%; background:rgba(255,255,255,.12); border:none;
  color:#fff; font-size:0.78em; cursor:pointer;
}
.quick-modal-header {
  background:var(--brown-dark); padding:16px 20px;
  display:flex; align-items:center; justify-content:space-between;
}
.quick-modal-footer {
  padding:12px 20px; border-top:1px solid #f0e4d8; display:flex; justify-content:flex-end;
}
.modal-close-btn {
  padding:8px 20px; border-radius:8px; border:1px solid #e0d0c0; background:var(--brown-dark);
  color:#fff; font-size:0.72em; font-family:'Noto Sans KR',sans-serif;
}

@media (max-width: 1180px) {
  .content-grid {
    grid-template-columns: 220px minmax(0,1fr);
  }
    }
@media (max-width: 900px) {
  
  .content-grid {
    grid-template-columns: 1fr;
  }
    
  
  
}


/* ── 페이지 헤더 ── */


/* ── page-scale-root ── */
.page-scale-root { font-size: calc(1em * var(--page-scale)); }
</style>

<div class="page-scale-root">

<div class="scripts-wrap">
    <div class="step1"><div class="button-row" id="main-row">
    <button class="main-btn active" data-main="도입인사" onclick="selectMain('도입인사')">📞 도입인사</button>
    <button class="main-btn" data-main="필요성 강조" onclick="selectMain('필요성 강조')">🔥 필요성 강조</button>
    <button class="main-btn" data-main="상황 확인" onclick="selectMain('상황 확인')">🔎 상황 확인</button>
    <button class="main-btn" data-main="보장분석" onclick="selectMain('보장분석')">📊 보장분석</button>
    <button class="main-btn" data-main="상품설명" onclick="selectMain('상품설명')">📦 상품설명</button>
    <button class="main-btn" data-main="클로징" onclick="selectMain('클로징')">✅ 클로징</button>
    <button class="script-write-btn top" onclick="goToMyScriptWriter()">✍️ 나만의 스크립트</button>
  </div></div>
    <div class="step2 hidden" id="step2"><div class="button-row" id="sub-row"></div></div>
    <div class="step3 hidden" id="step3"><div class="button-row" id="cat-row"></div></div>

    <div class="content-scroll">
      <div class="screen-chip" id="screen-chip"></div>
      <div class="content-top-actions" style="display:none;"></div>

      <div class="content-grid">
        <div class="left-col">
          <div class="left-card">
            <div class="left-label">카드 요약</div>
            <div class="summary-badge" id="summary-badge">요약</div>
            <div class="summary-box" id="summary-box">내용 준비 중입니다.</div>
          </div>
          <div class="left-cta-card">
            <button class="script-write-btn main" onclick="goToMyScriptWriter()">✍️ 나만의 스크립트 작성하기</button>
          </div>
        </div>

        <div class="center-col">
          <div id="accordion-wrap"></div>
          <div class="bottom-bar">- 지금 멈추지 마세요. 한 문장이 전체 흐름을 바꿉니다 -</div>
        </div>
      </div>
    </div>
</div>

<div class="overlay" id="quick-overlay" onclick="closeOverlay(event)">
  <div class="quick-modal">
    <div class="quick-modal-header">
      <div class="quick-modal-title" id="overlay-title">제목</div>
      <button class="quick-close" onclick="closeQuick()">✕</button>
    </div>
    <div class="quick-modal-body" id="overlay-body">준비 중입니다.</div>
    <div class="quick-modal-footer"><button class="modal-close-btn" onclick="closeQuick()">닫기</button></div>
  </div>
</div>

</div>

<script src="js/scripts-data.js"></script>
<script src="js/scripts-page.js"></script>
