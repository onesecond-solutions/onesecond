name: DB URL Diagnose (parse-only, no DB)

# 비운영 진단 전용 채널. SUPABASE_DB_URL 파싱 상태 플래그만 출력.
# - DB 접속/변경 0 · 마이그레이션 실행 0 · psql 설치 안 함.
# - production-db(리뷰어=대표) 환경을 쓰지 않음 → 승인 없이 실행.
# - secret은 리뷰어 없는 db-validate 환경에서 읽음(진단 전용). 원인 확정 후 환경/복사본 삭제.

on:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: db-url-diagnose
  cancel-in-progress: false

jobs:
  diagnose:
    if: github.repository == 'onesecond-solutions/onesecond'
    runs-on: ubuntu-latest
    environment: db-validate     # 리뷰어 없음 → 승인 프롬프트 없음. 진단 전용 secret 위치.
    steps:
      - uses: actions/checkout@v4
      - name: parse-only diagnose (no DB connection)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        run: bash scripts/ci/validate_db_url.sh
