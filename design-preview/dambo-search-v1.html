var RANK={'O':3,'△':2,'확인필요':1};
var LIST=DICT.map(function(d){return d.표준담보명;});
var cur=LIST[0];
var chips=document.getElementById('chips');
LIST.forEach(function(cov){var el=document.createElement('div');el.className='cc'+(cov===cur?' on':'');el.textContent=cov;
  el.onclick=function(){cur=cov;document.getElementById('q').value='';setOn(cov);render(cov);};chips.appendChild(el);});
function setOn(cov){document.querySelectorAll('.cc').forEach(function(c){c.classList.toggle('on',c.textContent===cov);});}
function filt(){
  var q=document.getElementById('q').value.trim();
  if(!q){render(cur);return;}
  // 담보명 부분일치
  var m=LIST.filter(function(c){return c.indexOf(q)>=0||q.indexOf(c.replace(/\s/g,''))>=0;});
  if(!m.length){
    // 검색키워드 매칭
    m=DICT.filter(function(d){return d.검색키워드.some(function(k){return k.indexOf(q)>=0||q.indexOf(k)>=0;});}).map(function(d){return d.표준담보명;});
  }
  if(m.length){cur=m[0];setOn(m[0]);render(m[0]);}
  else{document.getElementById('out').innerHTML='<div class="mid">「'+esc(q)+'」에 해당하는 담보를 찾지 못했습니다.</div>';}
}
function esc(s){return String(s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function badge(st){
  if(st==='O')return '<span class="ok O">O 소식지 확인</span>';
  if(st==='△')return '<span class="ok wm">△ 일부 확인 필요</span>';
  return '<span class="ok nc">확인필요</span>';
}
function render(cov){
  var out=document.getElementById('out');
  var def=DICT.find(function(d){return d.표준담보명===cov;});
  if(!def){out.innerHTML='<div class="mid">「'+esc(cov)+'」 담보 정의가 없습니다.</div>';return;}
  var items=LINKS.filter(function(l){return l.표준담보명===cov;});
  items.sort(function(a,b){
    if(RANK[b.확인상태]!==RANK[a.확인상태])return RANK[b.확인상태]-RANK[a.확인상태];
    var c=a.회사명.localeCompare(b.회사명,'ko'); if(c)return c;
    return a.상품명.localeCompare(b.상품명,'ko');
  });
  var h='<div class="cov-def"><div class="ct">'+esc(def.표준담보명)+'</div>'+
        '<div class="cd">'+esc(def.설명)+'</div>'+
        (def.성격?'<div class="cs">'+esc(def.성격)+'</div>':'')+
        '<div class="kw">검색 키워드 · '+def.검색키워드.map(esc).join(' · ')+'</div>'+
        '<div class="cnt">연결 상품 '+items.length+'건</div></div>';
  if(!items.length){h+='<div class="mid">연결된 상품이 없습니다.</div>';out.innerHTML=h;return;}
  h+='<div class="hrow">';
  items.forEach(function(it){
    var cl=COLORS[it.회사명]||'#6366F1';
    var amt=(it.금액&&it.금액!=='')?'<div class="amt">'+esc(it.금액)+'</div>':'<div class="amt empty">금액 원문 확인 필요</div>';
    h+='<div class="ccard"><div class="ch" style="background:'+cl+'">'+esc(it.회사명)+'</div>'+
       '<div class="cb"><div class="pn">'+esc(it.상품명)+'</div>'+
       '<div class="disp">'+esc(it.실제표시담보명)+'</div>'+
       amt+
       '<div class="src">'+esc(it.출처)+'</div>'+
       badge(it.확인상태)+'</div></div>';
  });
  h+='</div>';
  out.innerHTML=h;
}
