  res.forEach(function(r){
    var g=gradeCls(r.grade);
    h+='<div class="card"><div class="top"><div><div class="pt">'+r.prod+'</div><div class="co">'+r.co+'</div></div>'+
       '<div class="gr '+g+'">'+gradeLabel(r.grade)+'</div></div>'+
       '<div class="meta"><span class="tag">'+r.goji+'</span>'+
       r.codes.map(function(c){return '<span class="tag">'+c+'</span>';}).join('')+'</div>';
    if(r.detail){
      var dt=r.detail;
      h+='<div class="detail">'+
         (dt.code?'<div class="dr"><span class="dk">고지코드</span><span class="dv">'+dt.code+'</span></div>':'')+
         (dt['입원수술']?'<div class="dr"><span class="dk">입원·수술</span><span class="dv">'+dt['입원수술']+'</span></div>':'')+
         (dt['중대질환']?'<div class="dr"><span class="dk">중대질환</span><span class="dv">'+dt['중대질환']+'</span></div>':'')+
         (dt['납면']?'<div class="dr"><span class="dk">납입면제</span><span class="dv">'+dt['납면']+'</span></div>':'')+
         '</div>';
    }
    h+='</div>';
  });
  out.innerHTML=h;
}
run();
</script>
</body></html>
